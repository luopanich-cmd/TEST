<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luopanich Private Catalog</title>
  <style>
    :root{
      --bg:#0f1115;
      --surface:#191d24;
      --surface-2:#222834;
      --text:#f5f5f7;
      --text-soft:#b8c0cc;
      --muted:#8d96a6;
      --border:rgba(255,255,255,.12);
      --primary:#0a84ff;
      --primary-strong:#0067d6;
      --danger:#ff453a;
      --success:#34c759;
      --warning:#ffd60a;
      --shadow:0 18px 50px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 18% -10%, rgba(10,132,255,.20), transparent 34%),
        radial-gradient(circle at 88% 6%, rgba(52,199,89,.12), transparent 28%),
        linear-gradient(180deg, #151922 0%, var(--bg) 52%, #090b0f 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    button,input,textarea,select{font:inherit}

    .page{
      width:min(1120px,100%);
      margin:0 auto;
      padding:18px 14px 120px;
      overflow-x:hidden;
    }

    .hero{
      position:sticky;
      top:0;
      z-index:5;
      margin:-18px -14px 16px;
      padding:18px 14px 16px;
      background:rgba(15,17,21,.86);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(22px);
    }

    .hero-card{
      width:min(1120px,100%);
      margin:0 auto;
      display:grid;
      gap:12px;
    }

    .eyebrow{
      color:var(--primary);
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-size:25px;
      line-height:1.15;
      letter-spacing:-.02em;
    }

    .hero-copy{
      max-width:720px;
      color:var(--text-soft);
      font-size:14px;
      line-height:1.55;
    }

    .notice{
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(255,214,10,.28);
      background:rgba(255,214,10,.10);
      color:#ffe48a;
      font-size:13px;
      line-height:1.45;
    }

    .partner-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      color:var(--text-soft);
      font-size:13px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.06);
    }

    .toolbar{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
      margin:16px 0;
      padding:12px;
      border:1px solid var(--border);
      border-radius:20px;
      background:rgba(25,29,36,.58);
    }

    input,textarea,select{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 13px;
      background:rgba(255,255,255,.08);
      color:var(--text);
      outline:none;
      min-width:0;
    }

    textarea{min-height:96px;resize:vertical}

    input:focus,textarea:focus,select:focus{
      border-color:rgba(10,132,255,.7);
      box-shadow:0 0 0 3px rgba(10,132,255,.22);
    }

    .grid{
      display:grid;
      gap:12px;
      min-width:0;
    }

    .product-card,.panel,.state-card{
      border:1px solid var(--border);
      border-radius:22px;
      background:rgba(25,29,36,.86);
      box-shadow:var(--shadow);
    }

    .product-card{
      display:grid;
      grid-template-columns:96px minmax(0,1fr);
      gap:12px;
      padding:12px;
      max-width:100%;
      overflow:hidden;
    }

    .thumb{
      width:96px;
      height:96px;
      border-radius:18px;
      background:var(--surface-2);
      object-fit:contain;
      border:1px solid var(--border);
    }

    .thumb-placeholder{
      width:96px;
      height:96px;
      display:grid;
      place-items:center;
      color:var(--muted);
      border-radius:18px;
      background:var(--surface-2);
      border:1px dashed var(--border);
      font-size:13px;
    }

    .thumb,.thumb-placeholder,.product-card{
      cursor:pointer;
    }

    .product-main{
      min-width:0;
      display:grid;
      gap:7px;
    }

    .name{
      margin:0;
      font-size:16px;
      font-weight:800;
      line-height:1.3;
      overflow-wrap:anywhere;
    }

    .meta{
      color:var(--text-soft);
      font-size:13px;
      line-height:1.45;
      overflow-wrap:anywhere;
    }

    .sku-line{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      align-items:center;
    }

    .sku-chip{
      display:inline-flex;
      max-width:100%;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--border);
      color:var(--text-soft);
      font-size:12px;
      font-weight:800;
    }

    .price{
      font-size:18px;
      font-weight:900;
      color:#fff;
    }

    .variant-group-note{
      color:var(--text-soft);
      font-size:12px;
      line-height:1.45;
    }

    .size-options{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      max-width:100%;
    }

    .size-chip{
      display:inline-flex;
      flex-direction:column;
      align-items:flex-start;
      gap:2px;
      min-width:74px;
      max-width:100%;
      padding:9px 10px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-weight:900;
      cursor:pointer;
      text-align:left;
    }

    .size-chip small{
      color:var(--text-soft);
      font-size:11px;
      font-weight:800;
    }

    .size-chip.selected{
      border-color:rgba(10,132,255,.82);
      background:rgba(10,132,255,.18);
      box-shadow:0 0 0 3px rgba(10,132,255,.16);
    }

    .size-chip:disabled{
      opacity:.48;
      cursor:not-allowed;
      text-decoration:line-through;
    }

    .details{
      color:var(--text-soft);
      font-size:13px;
      line-height:1.5;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
    }

    .compare-images{
      display:flex;
      gap:8px;
      margin-top:4px;
      overflow-x:auto;
      max-width:100%;
      padding-bottom:2px;
    }

    .compare-images img{
      width:64px;
      height:64px;
      flex:0 0 auto;
      object-fit:contain;
      border-radius:14px;
      background:var(--surface-2);
      border:1px solid var(--border);
    }

    .status{
      display:inline-flex;
      align-items:center;
      margin-top:0;
      padding:5px 9px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--text-soft);
      font-size:12px;
      font-weight:800;
    }

    .status.ready,.status.ready_plus{color:#7ee787;background:rgba(52,199,89,.14)}
    .status.shipping{color:#64b5ff;background:rgba(10,132,255,.14)}
    .status.warehouse{color:#a9c3ff;background:rgba(90,140,255,.16)}
    .status.out{color:#ff8a82;background:rgba(255,69,58,.14)}

    .actions{
      margin-top:4px;
      display:flex;
      gap:8px;
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
      min-height:44px;
    }

    .btn-primary{
      background:linear-gradient(180deg,var(--primary),var(--primary-strong));
      color:#fff;
    }

    .btn-secondary{
      color:var(--text);
      background:rgba(255,255,255,.10);
      border:1px solid var(--border);
    }

    .btn-danger{
      color:#fff;
      background:var(--danger);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .layout{
      display:grid;
      gap:14px;
      min-width:0;
    }

    .panel{
      padding:14px;
      max-width:100%;
      overflow:hidden;
    }

    .panel h2{
      margin:0 0 12px;
      font-size:18px;
    }

    .interest-list{
      display:grid;
      gap:10px;
    }

    .interest-item{
      display:grid;
      gap:8px;
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      max-width:100%;
      overflow:hidden;
    }

    .interest-head{
      display:flex;
      gap:8px;
      justify-content:space-between;
      align-items:flex-start;
      min-width:0;
    }

    .interest-controls{
      display:grid;
      grid-template-columns:92px minmax(0,1fr);
      gap:8px;
    }

    .field-label{
      display:grid;
      gap:6px;
      color:var(--text-soft);
      font-size:12px;
      font-weight:800;
    }

    .form-stack{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .panel-note{
      margin:10px 0;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(10,132,255,.10);
      border:1px solid rgba(10,132,255,.24);
      color:var(--text-soft);
      font-size:13px;
      line-height:1.45;
    }

    .interest-summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin:12px 0;
    }

    .summary-tile{
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.07);
      border:1px solid var(--border);
      min-width:0;
    }

    .summary-tile span{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:3px;
    }

    .summary-tile strong{
      display:block;
      color:var(--text);
      font-size:17px;
      overflow-wrap:anywhere;
    }

    .summary-bar{
      position:fixed;
      left:12px;
      right:12px;
      bottom:12px;
      z-index:10;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:12px;
      border:1px solid var(--border);
      border-radius:20px;
      background:rgba(25,29,36,.94);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }

    .summary-bar .btn{
      flex:0 0 auto;
      white-space:nowrap;
    }

    .state-card{
      margin:36px auto;
      max-width:520px;
      padding:22px;
      text-align:center;
    }

    .state-card h2{margin:0 0 8px}
    .helper{color:var(--text-soft);line-height:1.55}
    .hidden{display:none!important}

    .detail-backdrop{
      position:fixed;
      inset:0;
      z-index:30;
      display:grid;
      align-items:end;
      background:rgba(0,0,0,.62);
      padding:12px;
    }

    .detail-sheet{
      width:min(720px,100%);
      max-height:min(88vh,760px);
      margin:0 auto;
      overflow:auto;
      border:1px solid var(--border);
      border-radius:26px 26px 20px 20px;
      background:rgba(25,29,36,.98);
      box-shadow:0 24px 80px rgba(0,0,0,.48);
    }

    .detail-topbar{
      position:sticky;
      top:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      background:rgba(25,29,36,.96);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(18px);
    }

    .detail-topbar strong{font-size:15px}
    .detail-close{
      width:40px;
      height:40px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.08);
      color:var(--text);
      cursor:pointer;
      font-size:20px;
      font-weight:900;
    }

    .detail-body{
      display:grid;
      gap:14px;
      padding:14px;
    }

    .detail-image{
      width:100%;
      max-height:320px;
      object-fit:contain;
      border:1px solid var(--border);
      border-radius:22px;
      background:var(--surface-2);
    }

    .detail-placeholder{
      min-height:220px;
      display:grid;
      place-items:center;
      color:var(--muted);
      border:1px dashed var(--border);
      border-radius:22px;
      background:var(--surface-2);
    }

    .detail-meta-grid{
      display:grid;
      gap:8px;
    }

    .detail-note{
      padding:10px 12px;
      border:1px solid rgba(10,132,255,.24);
      border-radius:16px;
      background:rgba(10,132,255,.10);
      color:var(--text-soft);
      font-size:13px;
      line-height:1.5;
    }

    @media (min-width:760px){
      .page{padding:24px 18px 48px}
      .hero{margin:-24px -18px 22px;padding:24px 18px 18px}
      h1{font-size:30px}
      .toolbar{grid-template-columns:1fr 220px}
      .layout{grid-template-columns:minmax(0,1fr) 360px;align-items:start}
      .product-card{grid-template-columns:112px 1fr}
      .thumb,.thumb-placeholder{width:112px;height:112px}
      .panel{position:sticky;top:116px}
      .summary-bar{display:none}
    }

    @media (max-width:420px){
      .product-card{grid-template-columns:86px minmax(0,1fr);gap:10px}
      .thumb,.thumb-placeholder{width:86px;height:86px;border-radius:16px}
      .name{font-size:15px}
      .price{font-size:17px}
      .interest-controls{grid-template-columns:1fr}
      .interest-summary{grid-template-columns:1fr}
      .summary-bar{left:8px;right:8px;bottom:8px}
    }
  </style>
</head>
<body>
  <main id="app" class="page">
    <section class="state-card">
      <h2>กำลังโหลดแคตตาล็อก</h2>
      <div class="helper">กรุณารอสักครู่</div>
    </section>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzx9WlWXUqZ9OM_R0tO9wJvw79RPWIn40iakCPNuPDLBmvcuHXkqp9EMPoRiuMRnaM2Wg/exec";

    const state = {
      partnerToken: new URLSearchParams(location.search).get("token") || "",
      partner: null,
      link: null,
      products: [],
      selectedItems: [],
      variantSelections: {},
      detailKey: "",
      search: "",
      status: "all",
      loading: true,
      error: "",
      success: null,
      submitError: "",
      submitting: false
    };

    const app = document.getElementById("app");

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escAttr(value) {
      return esc(value).replace(/`/g, "&#96;");
    }

    function jsString(value) {
      return JSON.stringify(String(value ?? ""));
    }

    function money(value) {
      return (Number(value) || 0).toLocaleString("th-TH");
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("th-TH", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    async function fetchWithTimeout(url, options = {}, ms = 30000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        const text = await res.text();
        let json;
        try {
          json = JSON.parse(text);
        } catch (err) {
          throw new Error("Invalid server response");
        }
        if (!res.ok) {
          throw new Error(json.error || `HTTP ${res.status}`);
        }
        return json;
      } finally {
        clearTimeout(timer);
      }
    }

    async function postAction(params) {
      const body = new URLSearchParams(params);
      const json = await fetchWithTimeout(API_URL, {
        method: "POST",
        body
      });
      if (!json || json.success !== true) {
        throw new Error(json?.error || json?.message || "เกิดข้อผิดพลาด");
      }
      return json.data;
    }

    async function loadCatalog() {
      if (!state.partnerToken) {
        state.loading = false;
        state.error = "ลิงก์นี้ไม่ถูกต้องหรือหมดอายุ กรุณาติดต่อร้านเพื่อขอลิงก์ใหม่";
        render();
        return;
      }

      try {
        const data = await postAction({
          action: "getPartnerCatalog",
          partnerToken: state.partnerToken
        });
        state.partner = data.partner || {};
        state.link = data.link || {};
        state.products = Array.isArray(data.products) ? data.products : [];
      } catch (err) {
        state.error = err.message || "ลิงก์นี้ไม่ถูกต้องหรือหมดอายุ กรุณาติดต่อร้านเพื่อขอลิงก์ใหม่";
      } finally {
        state.loading = false;
        render();
      }
    }

    function getStatusLabel(status) {
      return {
        ready: "พร้อมส่ง",
        ready_plus: "พร้อมส่ง + เพิ่มได้",
        shipping: "ระหว่างจัดส่ง",
        warehouse: "โกดังไทย",
        out: "หมด"
      }[String(status || "").trim()] || "พร้อมส่ง";
    }

    function isSizeVariantProduct(product) {
      return Boolean(
        product &&
        product.parentProductId &&
        product.displayName &&
        String(product.variantType || "").trim().toLowerCase() === "size" &&
        product.variantValue
      );
    }

    function getVariantGroupKey(product) {
      return [
        "size",
        String(product.parentProductId || "").trim(),
        String(product.displayName || "").trim()
      ].join("::");
    }

    function sortVariantsByOrder(variants) {
      return [...variants].sort((a, b) => {
        const orderA = Number(a.variantSortOrder);
        const orderB = Number(b.variantSortOrder);
        if (Number.isFinite(orderA) && Number.isFinite(orderB) && orderA !== orderB) return orderA - orderB;
        if (Number.isFinite(orderA)) return -1;
        if (Number.isFinite(orderB)) return 1;
        return String(a.variantValue || a.productId || "").localeCompare(String(b.variantValue || b.productId || ""), "th");
      });
    }

    function buildCatalogItems(products) {
      const groups = new Map();
      const singles = [];

      products.forEach(product => {
        if (!isSizeVariantProduct(product)) {
          singles.push(product);
          return;
        }

        const groupKey = getVariantGroupKey(product);
        if (!groups.has(groupKey)) {
          groups.set(groupKey, {
            isVariantGroup: true,
            groupKey,
            parentProductId: product.parentProductId,
            displayName: product.displayName,
            variants: []
          });
        }
        groups.get(groupKey).variants.push(product);
      });

      const grouped = [...groups.values()].map(group => ({
        ...group,
        variants: sortVariantsByOrder(group.variants)
      }));

      return [...grouped, ...singles];
    }

    function getCatalogItemText(item) {
      if (item.isVariantGroup) {
        return [
          item.displayName,
          item.parentProductId,
          ...item.variants.flatMap(variant => [
            variant.productId,
            variant.name,
            variant.variantValue
          ])
        ].join(" ").toLowerCase();
      }
      return `${item.productId || ""} ${item.name || ""} ${item.displayName || ""} ${item.parentProductId || ""} ${item.variantValue || ""}`.toLowerCase();
    }

    function catalogItemMatchesStatus(item) {
      if (state.status === "all") return true;
      if (item.isVariantGroup) {
        return item.variants.some(variant => String(variant.status || "") === state.status);
      }
      return String(item.status || "") === state.status;
    }

    function getFilteredProducts() {
      const search = state.search.trim().toLowerCase();
      return buildCatalogItems(state.products).filter(item => {
        const matchesSearch = !search || getCatalogItemText(item).includes(search);
        const matchesStatus = catalogItemMatchesStatus(item);
        return matchesSearch && matchesStatus;
      });
    }

    function getCatalogItemKey(item) {
      return item?.isVariantGroup ? item.groupKey : String(item?.productId || "");
    }

    function findCatalogItemByKey(key) {
      const target = String(key || "");
      if (!target) return null;
      return buildCatalogItems(state.products).find(item => getCatalogItemKey(item) === target) || null;
    }

    function openPartnerProductDetail(key, event) {
      if (event) event.stopPropagation();
      state.detailKey = String(key || "");
      render();
    }

    function closePartnerProductDetail(event) {
      if (event) event.stopPropagation();
      state.detailKey = "";
      render();
    }

    function selectPartnerDetailVariant(groupKey, productId, event) {
      if (event) event.stopPropagation();
      state.variantSelections[groupKey] = productId;
      render();
    }

    function getGroupPriceLabel(group) {
      const prices = [...new Set(group.variants.map(variant => Number(variant.price) || 0))].sort((a, b) => a - b);
      if (!prices.length) return "฿0";
      if (prices.length === 1) return `฿${money(prices[0])}`;
      return `฿${money(prices[0])} - ฿${money(prices[prices.length - 1])}`;
    }

    function isVariantUnavailable(product) {
      const status = String(product.status || "").trim();
      const hasStock = product.stock !== undefined && product.stock !== null && product.stock !== "";
      return status === "out" || (hasStock && Number(product.stock) <= 0);
    }

    function getVariantSubLabel(product) {
      const parts = [];
      if (product.stock !== undefined && product.stock !== null && product.stock !== "") {
        parts.push(`เหลือ ${money(product.stock)}`);
      }
      parts.push(getStatusLabel(product.status));
      return parts.join(" · ");
    }

    function selectVariant(groupKey, productId) {
      state.variantSelections[groupKey] = productId;
      render();
    }

    function addVariantGroupInterest(groupKey) {
      const productId = state.variantSelections[groupKey];
      if (!productId) {
        alert("กรุณาเลือกไซส์ก่อน");
        return;
      }
      addInterest(productId);
    }

    function addInterest(productId) {
      const product = state.products.find(item => item.productId === productId);
      if (!product) return;
      const existing = state.selectedItems.find(item => item.productId === productId);
      if (existing) {
        existing.qty += 1;
      } else {
        state.selectedItems.push({
          productId,
          name: product.name,
          displayName: product.displayName || "",
          parentProductId: product.parentProductId || "",
          variantValue: product.variantValue || "",
          price: Number(product.price) || 0,
          qty: 1,
          partnerNote: ""
        });
      }
      render();
    }

    function removeInterest(productId) {
      state.selectedItems = state.selectedItems.filter(item => item.productId !== productId);
      render();
    }

    function updateInterest(productId, field, value) {
      const item = state.selectedItems.find(entry => entry.productId === productId);
      if (!item) return;
      if (field === "qty") {
        const qty = Number(value);
        item.qty = Number.isInteger(qty) && qty > 0 ? qty : 1;
      } else if (field === "partnerNote") {
        item.partnerNote = String(value || "");
      }
      renderSummaryOnly();
    }

    function getEstimatedTotal() {
      return state.selectedItems.reduce(
        (sum, item) => sum + (Number(item.price) || 0) * (Number(item.qty) || 0),
        0
      );
    }

    function renderProduct(product) {
      if (product.isVariantGroup) {
        return renderVariantGroup(product);
      }

      const compareImages = String(product.compareImages || "")
        .split(",")
        .map(value => value.trim())
        .filter(Boolean)
        .slice(0, 4);

      return `
        <article class="product-card" onclick="openPartnerProductDetail(${escAttr(jsString(product.productId))}, event)">
          ${
            product.image
              ? `<img class="thumb" src="${escAttr(product.image)}" alt="${escAttr(product.name)}" onclick="openPartnerProductDetail(${escAttr(jsString(product.productId))}, event)" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-placeholder',textContent:'รูป'}))">`
              : `<div class="thumb-placeholder" aria-hidden="true">รูป</div>`
          }
          <div class="product-main">
            <h2 class="name">${esc(product.name || "-")}</h2>
            <div class="sku-line">
              <span class="sku-chip">SKU: ${esc(product.productId || "-")}</span>
              <span class="status ${escAttr(product.status || "")}">${esc(getStatusLabel(product.status))}</span>
            </div>
            <div class="price">฿${money(product.price)}</div>
            ${product.detailsText ? `<div class="details">${esc(product.detailsText)}</div>` : ""}
            ${
              compareImages.length
                ? `<div class="compare-images">${compareImages.map(url => `<img src="${escAttr(url)}" alt="compare" onerror="this.remove()">`).join("")}</div>`
                : ""
            }
            <div class="actions">
              <button class="btn btn-primary" type="button" style="width:100%" onclick="event.stopPropagation(); addInterest(${escAttr(jsString(product.productId))})">
                เพิ่มในรายการสนใจ
              </button>
            </div>
          </div>
        </article>
      `;
    }

    function renderVariantGroup(group) {
      const image = group.variants.find(variant => variant.image)?.image || "";
      const selectedProductId = state.variantSelections[group.groupKey] || "";
      const selectedVariant = group.variants.find(variant => variant.productId === selectedProductId);
      const detailsText = group.variants.find(variant => variant.detailsText)?.detailsText || "";
      const compareImages = String(group.variants.find(variant => variant.compareImages)?.compareImages || "")
        .split(",")
        .map(value => value.trim())
        .filter(Boolean)
        .slice(0, 4);

      return `
        <article class="product-card" onclick="openPartnerProductDetail(${escAttr(jsString(group.groupKey))}, event)">
          ${
            image
              ? `<img class="thumb" src="${escAttr(image)}" alt="${escAttr(group.displayName)}" onclick="openPartnerProductDetail(${escAttr(jsString(group.groupKey))}, event)" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-placeholder',textContent:'รูป'}))">`
              : `<div class="thumb-placeholder" aria-hidden="true">รูป</div>`
          }
          <div class="product-main">
            <h2 class="name">${esc(group.displayName || "-")}</h2>
            <div class="sku-line">
              <span class="sku-chip">กลุ่ม: ${esc(group.parentProductId || "-")}</span>
              <span class="sku-chip">${group.variants.length} ไซส์</span>
            </div>
            <div class="price">${esc(getGroupPriceLabel(group))}</div>
            ${detailsText ? `<div class="details">${esc(detailsText)}</div>` : ""}
            <div class="variant-group-note">เลือกไซส์ที่สนใจก่อนเพิ่มเข้ารายการ ระบบจะส่งรหัส SKU จริงของไซส์นั้นให้ร้าน</div>
            <div class="size-options" role="group" aria-label="เลือกไซส์">
              ${group.variants.map(variant => {
                const selected = variant.productId === selectedProductId;
                const disabled = isVariantUnavailable(variant);
                return `
                  <button class="size-chip ${selected ? "selected" : ""}" type="button"
                    ${disabled ? "disabled" : ""}
                    onclick="event.stopPropagation(); selectVariant(${escAttr(jsString(group.groupKey))},${escAttr(jsString(variant.productId))})">
                    <span>${esc(variant.variantValue || variant.productId)}</span>
                    <small>${esc(getVariantSubLabel(variant))}</small>
                  </button>
                `;
              }).join("")}
            </div>
            ${
              selectedVariant
                ? `<div class="meta">เลือกแล้ว: ${esc(selectedVariant.variantValue || "-")} · SKU: ${esc(selectedVariant.productId || "-")}</div>`
                : `<div class="meta">กรุณาเลือกไซส์ก่อนเพิ่มในรายการสนใจ</div>`
            }
            ${
              compareImages.length
                ? `<div class="compare-images">${compareImages.map(url => `<img src="${escAttr(url)}" alt="compare" onerror="this.remove()">`).join("")}</div>`
                : ""
            }
            <div class="actions">
              <button class="btn btn-primary" type="button" style="width:100%" onclick="event.stopPropagation(); addVariantGroupInterest(${escAttr(jsString(group.groupKey))})">
                เพิ่มในรายการสนใจ
              </button>
            </div>
          </div>
        </article>
      `;
    }

    function renderPartnerProductDetailSheet() {
      const item = findCatalogItemByKey(state.detailKey);
      if (!item) return "";

      const isGroup = Boolean(item.isVariantGroup);
      const selectedProductId = isGroup ? state.variantSelections[item.groupKey] || "" : item.productId;
      const selectedVariant = isGroup
        ? item.variants.find(variant => variant.productId === selectedProductId)
        : item;
      const displayProduct = selectedVariant || (isGroup ? item.variants[0] || {} : item);
      const image = displayProduct.image || (isGroup ? item.variants.find(variant => variant.image)?.image : item.image) || "";
      const name = isGroup ? item.displayName : item.name;
      const priceLabel = isGroup ? getGroupPriceLabel(item) : `฿${money(item.price)}`;
      const status = selectedVariant ? selectedVariant.status : displayProduct.status;
      const skuLabel = selectedVariant?.productId || (!isGroup ? item.productId : "-");
      const detailsText = displayProduct.detailsText || (!isGroup ? item.detailsText : "");

      return `
        <div class="detail-backdrop" onclick="closePartnerProductDetail(event)">
          <section class="detail-sheet" role="dialog" aria-modal="true" aria-label="รายละเอียดสินค้า" onclick="event.stopPropagation()">
            <div class="detail-topbar">
              <strong>รายละเอียดสินค้า</strong>
              <button class="detail-close" type="button" onclick="closePartnerProductDetail(event)" aria-label="ปิด">×</button>
            </div>
            <div class="detail-body">
              ${
                image
                  ? `<img class="detail-image" src="${escAttr(image)}" alt="${escAttr(name || skuLabel || "สินค้า")}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'detail-placeholder',textContent:'รูป'}))">`
                  : `<div class="detail-placeholder">รูป</div>`
              }
              <div>
                <h2 class="name">${esc(name || "-")}</h2>
                <div class="price">${esc(priceLabel)}</div>
              </div>
              <div class="detail-meta-grid">
                ${isGroup ? `<div class="sku-line"><span class="sku-chip">กลุ่ม: ${esc(item.parentProductId || "-")}</span></div>` : ""}
                <div class="sku-line">
                  <span class="sku-chip">SKU: ${esc(skuLabel)}</span>
                  <span class="status ${escAttr(status || "")}">${esc(selectedVariant ? getStatusLabel(status) : "เลือกไซส์")}</span>
                </div>
                ${
                  isGroup
                    ? `<div class="detail-note">เลือกไซส์เพื่อส่งรหัส SKU จริงของไซส์นั้นให้ร้าน</div>`
                    : ""
                }
              </div>
              ${
                isGroup
                  ? `<div class="size-options" role="group" aria-label="เลือกไซส์">
                      ${item.variants.map(variant => {
                        const selected = variant.productId === selectedProductId;
                        const disabled = isVariantUnavailable(variant);
                        return `
                          <button class="size-chip ${selected ? "selected" : ""}" type="button"
                            ${disabled ? "disabled" : ""}
                            onclick="selectPartnerDetailVariant(${escAttr(jsString(item.groupKey))},${escAttr(jsString(variant.productId))}, event)">
                            <span>${esc(variant.variantValue || variant.productId)}</span>
                            <small>${esc(getVariantSubLabel(variant))}</small>
                          </button>
                        `;
                      }).join("")}
                    </div>`
                  : ""
              }
              ${detailsText ? `<div class="details">${esc(detailsText)}</div>` : ""}
              <button class="btn btn-primary" type="button"
                onclick="event.stopPropagation(); ${isGroup ? `addVariantGroupInterest(${escAttr(jsString(item.groupKey))})` : `addInterest(${escAttr(jsString(item.productId))})`}">
                เพิ่มในรายการสนใจ
              </button>
            </div>
          </section>
        </div>
      `;
    }

    function renderInterestList() {
      if (!state.selectedItems.length) {
        return `<div class="panel-note">ยังไม่มีสินค้าในรายการที่สนใจ เลือกสินค้าจากแคตตาล็อกเพื่อส่งให้ร้านตรวจสอบ</div>`;
      }

      return `
        <div class="interest-list">
          ${state.selectedItems.map(item => `
            <div class="interest-item">
              <div class="interest-head">
                <div>
                  <strong>${esc(item.displayName || item.name || item.productId)}</strong>
                  <div class="meta">
                    ${item.variantValue ? `ไซส์: ${esc(item.variantValue)} · ` : ""}SKU: ${esc(item.productId)} · ฿${money(item.price)}
                  </div>
                </div>
                <button class="btn btn-danger" type="button" onclick="removeInterest(${escAttr(jsString(item.productId))})">ลบ</button>
              </div>
              <div class="interest-controls">
                <label class="field-label">
                  จำนวน
                  <input type="number" min="1" step="1" value="${Number(item.qty) || 1}" aria-label="จำนวน"
                    onchange="updateInterest(${escAttr(jsString(item.productId))},'qty',this.value)">
                </label>
                <label class="field-label">
                  หมายเหตุ
                  <input value="${escAttr(item.partnerNote || "")}" placeholder="หมายเหตุสำหรับสินค้านี้"
                    oninput="updateInterest(${escAttr(jsString(item.productId))},'partnerNote',this.value)">
                </label>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderSummaryOnly() {
      const total = document.querySelectorAll("[data-estimated-total]");
      total.forEach(el => {
        el.textContent = `฿${money(getEstimatedTotal())}`;
      });
    }

    async function submitRequest(event) {
      event.preventDefault();
      if (state.submitting || !state.selectedItems.length) return;
      state.submitError = "";

      const form = event.currentTarget;
      const items = state.selectedItems.map(item => ({
        productId: item.productId,
        qty: Number(item.qty) || 1,
        partnerNote: item.partnerNote || ""
      }));

      state.submitting = true;
      render();

      try {
        const data = await postAction({
          action: "submitPartnerRequest",
          partnerToken: state.partnerToken,
          items: JSON.stringify(items),
          contactName: form.contactName.value.trim(),
          contactPhone: form.contactPhone.value.trim(),
          contactEmail: form.contactEmail.value.trim(),
          message: form.message.value.trim()
        });
        state.success = data;
        state.selectedItems = [];
      } catch (err) {
        state.submitError = err.message || "ส่งรายการไม่สำเร็จ";
      } finally {
        state.submitting = false;
        render();
      }
    }

    function renderStateCard(title, detail) {
      app.innerHTML = `
        <section class="state-card">
          <h2>${esc(title)}</h2>
          <div class="helper">${esc(detail || "")}</div>
        </section>
      `;
    }

    function render() {
      if (state.loading) {
        renderStateCard("กำลังโหลดแคตตาล็อก", "กรุณารอสักครู่");
        return;
      }

      if (state.success) {
        renderStateCard(
          "ส่งรายการให้ร้านเรียบร้อยแล้ว",
          `ร้านจะตรวจสอบและติดต่อกลับเพื่อยืนยัน · เลขที่คำขอ ${state.success.requestId || "-"} · ${state.success.itemCount || 0} รายการ`
        );
        return;
      }

      if (state.error) {
        renderStateCard("ลิงก์นี้ไม่ถูกต้องหรือหมดอายุ", state.error || "กรุณาติดต่อร้านเพื่อขอลิงก์ใหม่");
        return;
      }

      const products = getFilteredProducts();
      app.innerHTML = `
        <header class="hero">
          <div class="hero-card">
            <div class="eyebrow">Luopanich Private Catalog</div>
            <h1>แคตตาล็อกส่วนตัวสำหรับคู่ค้า</h1>
            <div class="hero-copy">
              เลือกสินค้าที่สนใจ แล้วส่งรายการให้ร้านตรวจสอบ
            </div>
            <div class="notice">
              รายการนี้ยังไม่ใช่คำสั่งซื้อจนกว่าร้านจะยืนยัน
            </div>
            <div class="partner-meta">
              <span class="pill">พาร์ทเนอร์: ${esc(state.partner?.partnerName || "-")}</span>
              <span class="pill">ใช้ได้ถึง: ${esc(formatDate(state.link?.expiresAt))}</span>
            </div>
          </div>
        </header>

        <section class="toolbar" aria-label="ค้นหาและกรองสินค้า">
          <input value="${escAttr(state.search)}" placeholder="ค้นหาสินค้าด้วยชื่อหรือรหัสสินค้า"
            oninput="state.search=this.value; render()">
          <select onchange="state.status=this.value; render()">
            <option value="all" ${state.status === "all" ? "selected" : ""}>ทุกสถานะ</option>
            <option value="ready" ${state.status === "ready" ? "selected" : ""}>พร้อมส่ง</option>
            <option value="ready_plus" ${state.status === "ready_plus" ? "selected" : ""}>พร้อมส่ง + เพิ่มได้</option>
            <option value="shipping" ${state.status === "shipping" ? "selected" : ""}>ระหว่างจัดส่ง</option>
            <option value="warehouse" ${state.status === "warehouse" ? "selected" : ""}>โกดังไทย</option>
            <option value="out" ${state.status === "out" ? "selected" : ""}>หมด</option>
          </select>
        </section>

        <div class="layout">
          <section class="grid">
            ${
              products.length
                ? products.map(renderProduct).join("")
                : `<section class="state-card"><h2>ไม่มีสินค้าให้แสดง</h2><div class="helper">ลองเปลี่ยนคำค้นหาหรือตัวกรอง</div></section>`
            }
          </section>

          <aside class="panel" id="interestPanel">
            <h2>รายการที่สนใจ</h2>
            <div class="panel-note">
              รายการนี้เป็นการแจ้งความสนใจเท่านั้น ร้านจะตรวจสอบและติดต่อกลับเพื่อยืนยันก่อน
            </div>
            ${renderInterestList()}
            <div class="interest-summary">
              <div class="summary-tile">
                <span>จำนวนรายการ</span>
                <strong>${state.selectedItems.length} รายการ</strong>
              </div>
              <div class="summary-tile">
                <span>ยอดรวมโดยประมาณ</span>
                <strong data-estimated-total>฿${money(getEstimatedTotal())}</strong>
              </div>
            </div>
            <form onsubmit="submitRequest(event)">
              ${state.submitError ? `<div class="helper" style="color:var(--danger);margin-bottom:10px">${esc(state.submitError)}</div>` : ""}
              <div class="helper">ร้านจะใช้ข้อมูลนี้เพื่อติดต่อกลับและยืนยันรายการ</div>
              <div class="form-stack">
                <label class="field-label">
                  ชื่อผู้ติดต่อ
                  <input name="contactName" placeholder="ชื่อผู้ติดต่อ" autocomplete="name">
                </label>
                <label class="field-label">
                  เบอร์โทร
                  <input name="contactPhone" placeholder="เบอร์โทร" autocomplete="tel">
                </label>
                <label class="field-label">
                  อีเมล
                  <input name="contactEmail" placeholder="อีเมล" autocomplete="email">
                </label>
                <label class="field-label">
                  ข้อความเพิ่มเติม
                  <textarea name="message" placeholder="ข้อความเพิ่มเติม"></textarea>
                </label>
              </div>
              <button class="btn btn-primary" style="width:100%;margin-top:10px" type="submit"
                ${state.submitting || !state.selectedItems.length ? "disabled" : ""}>
                ${state.submitting ? "กำลังส่ง..." : "ส่งรายการให้ร้าน"}
              </button>
            </form>
          </aside>
        </div>

        <div class="summary-bar ${state.selectedItems.length ? "" : "hidden"}">
          <div>
            <strong>${state.selectedItems.length} รายการ</strong>
            <div class="meta">รวม <span data-estimated-total>฿${money(getEstimatedTotal())}</span></div>
          </div>
          <a class="btn btn-primary" href="#interestPanel" style="text-decoration:none">ดูรายการ</a>
        </div>
        ${renderPartnerProductDetailSheet()}
      `;
    }

    loadCatalog();
  </script>
</body>
</html>
