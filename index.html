 <head>

<!-- ================= UI STYLE ================= -->
<style>
  :root {
  /* ================= PHASE 3: TYPOGRAPHY / HIERARCHY ================= */
  --text-primary:   rgba(255,255,255,.92);
  --text-secondary: rgba(235,235,245,.75);
  --title-size:     22px;
  --subtitle-size:  12.5px;
  --title-weight:   700;
  --subtitle-weight:500;
    
  /* ================= STEP 2: SHADOW/DEPTH TOKENS (UNIFIED) ================= */
  --shadow-card:            0 10px 34px rgba(0,0,0,.65);
  --shadow-control:         0 8px 22px rgba(0,0,0,.60);
  --shadow-image:           0 6px 18px rgba(0,0,0,.65);
  --shadow-header:          0 8px 32px rgba(0,0,0,.50);
  --shadow-header-scrolled: 0 16px 42px rgba(0,0,0,.65);
  --shadow-card-pressed:    0 6px 18px rgba(0,0,0,.55);
  --shadow-side:            -6px 0 24px rgba(0,0,0,.60);
  --shadow-floating:        0 10px 34px rgba(0,0,0,.60);
  --shadow-fab:             0 12px 34px rgba(0,0,0,.60);
  --shadow-canvas-card:     var(--shadow-card);
 
  /* legacy alias (keep old refs working + follow unified override) */
  --shadow-float:           var(--shadow-floating);  
   
   /* ================= STEP 1: INTERACTION TOKENS ================= */
   /* Tap scale */
   --tap-scale-primary: .97;   /* primary / confirm */
   --tap-scale-icon:    .95;   /* icon circle buttons */
   --tap-scale-card:    .98;   /* cards should feel heavier */

   /* Motion tokens */
   --motion-duration-fast: 140ms;
   --motion-duration-normal: 300ms;
   --motion-duration-slow: 360ms;
   --motion-duration-toast: 220ms;
   --motion-ease-standard: cubic-bezier(.22,.61,.36,1);
   --motion-ease-emphasized: cubic-bezier(.2,.8,.2,1);

   /* Legacy aliases */
   --dur-tap:   var(--motion-duration-fast);
   --dur-sheet: var(--motion-duration-normal);
   --dur-chrome:var(--motion-duration-slow);

   --ease-tap:   var(--motion-ease-emphasized);
   --ease-out:   var(--motion-ease-standard);
   --ease-chrome:var(--motion-ease-standard);
 }
  
 html, body {
   margin: 0;
   padding: 0;
   width: 100%;
   max-width: 100%;
   overflow-x: hidden;
   font-family: -apple-system, BlinkMacSystemFont, sans-serif;
   background: #0f0f12;
   color: #f5f5f7;
   color-scheme: dark;
   height: 100%;
   min-height: 100%;
 }

  body{
   min-height: 100dvh;
  }
  
  header{
  padding:
    calc(env(safe-area-inset-top, 0px) + 14px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    12px
    calc(env(safe-area-inset-left, 0px) + 16px);
  font-size: inherit;
  font-weight: inherit;

  /* 🔹 Visual */
  background: rgba(28,28,30,.55); /* 🔴 CHANGED: dark glass */
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,.06); /* 🔴 CHANGED: subtle dark divider */

  box-shadow:
    var(--shadow-header),
    inset 0 -1px 0 rgba(255,255,255,.06); /* 🔴 CHANGED: reduce white glow */

  /* 🔹 Position */
  position: sticky;
  top: 0;
  z-index: 50;

  /* 🔹 Layout (สำคัญ) */
  display: flex;
  justify-content: space-between;
  align-items: center;

  /* 🔴 FIX สำคัญ */
  min-height: 96px; /* compact but still supports search + filter */
  box-sizing: border-box;

  transition:
    padding var(--dur-chrome) var(--ease-chrome),
    min-height var(--dur-chrome) var(--ease-chrome),
    background var(--dur-chrome) ease,
    box-shadow var(--dur-chrome) ease;
}

header.scrolled{
  padding:
    calc(env(safe-area-inset-top, 0px) + 10px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    8px
    calc(env(safe-area-inset-left, 0px) + 16px);
  min-height: 64px;
  background: rgba(28,28,30,.75); /* 🔴 CHANGED: darker when scrolled */
  box-shadow:
    var(--shadow-header-scrolled),
    inset 0 -1px 0 rgba(255,255,255,.08); /* 🔴 CHANGED: subtle inner edge */
}
  
/* ================= SHOP TITLE GLOW ================= */
.shop-title,
.admin-title{
  font-weight: var(--title-weight);
  font-size: var(--title-size);
  letter-spacing: .15px;
  color: var(--text-primary);

  display: inline-flex;
  align-items: center;
  padding: 6px 11px;
  border-radius: 999px;
  position: relative;
  overflow: hidden;
  isolation: isolate; /* 🔴 FIX: กัน layer เพี้ยน */

  /* 🔴 CHANGED: dark glass base */
  background: rgba(28,28,30,.72);
  border: 1px solid rgba(255,255,255,.10);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  /* 🔴 CHANGED: softer dark-depth inner rim */
  box-shadow:
    var(--shadow-control),
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 0 rgba(255,255,255,.04);

  /* 🔴 CHANGED: remove white glow feeling */
  text-shadow: 0 1px 0 rgba(0,0,0,.35);

  z-index: 0;
}

/* ✅ Glass highlight (top-left glare) */
.shop-title::before,
.admin-title::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0; /* 🔴 FIX: ไม่ใช้ -1 */
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.20) 0%,
      rgba(255,255,255,.10) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.55;
  pointer-events:none;
  mix-blend-mode: screen;
}

/* PHASE 3: Supporting line under title */
.shop-subtitle{
  margin-top: 4px;
  font-size: var(--subtitle-size);
  font-weight: var(--subtitle-weight);
  color: var(--text-secondary);
  letter-spacing: .2px;
}

/* ================= PHASE 3: HEADER HIERARCHY LAYOUT ================= */
.header-left{
  flex: 1;
  min-width: 0;
}
.header-stack{
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.header-actions{
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;

/* ================= ADMIN TITLE (only delta) ================= */
 .admin-title{
   /* 🔴 CHANGED: ให้เหมือน shop-title 100% → ไม่ดันซ้ายด้วย margin */
   margin-left: 0;
 }

  .backdrop{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.25);
  backdrop-filter: blur(2px);
  display: none;

}

.sheet{
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  background: rgba(28,28,30,.88);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 22px 22px 0 0;
  box-shadow: var(--shadow-float);

  padding:
    16px
    max(16px, env(safe-area-inset-right, 0px))
    calc(24px + env(safe-area-inset-bottom, 0px))
    max(16px, env(safe-area-inset-left, 0px));

  max-height: calc(100dvh - max(24px, env(safe-area-inset-top, 0px)));
  overflow-y: auto;
  overscroll-behavior: contain;
  scroll-padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
  -webkit-overflow-scrolling: touch;
  box-sizing: border-box;

  transform: translate3d(0, 100%, 0);
  opacity: 0;
  transition:
    transform var(--dur-sheet) var(--ease-out),
    opacity var(--motion-duration-fast) var(--motion-ease-standard);
  will-change: transform, opacity;
  backface-visibility: hidden;

  z-index: 101;
}

.sheet.show{
  transform: translate3d(0, 0, 0);
  opacity: 1;
}

body:has(.sheet.show),
body:has(.side-menu.show){
  overflow: hidden;
}

 #confirmSheet.show{
   z-index:9999;
 }

  margin:0 0 12px;
}



/* ================= BASE INPUT (NEUTRAL) ================= */
input,
select {
  width: 100%;
  box-sizing: border-box;
  outline: none;
  font-family: inherit;
  background: rgba(44,44,46,.90);
  color: #fff;
  border: 1px solid rgba(255,255,255,.08);
}

/* 🔴 NEW: textarea base style (Light mode fix) */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  background: rgba(44,44,46,.90);
  color: #fff;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
}
  
input::placeholder,
textarea::placeholder {
  color: #999;                 /* 🔴 FIX: placeholder ไม่จางเกินไป */
}  

input:focus,
select:focus {
  border-color: #007aff;
}

/* ================= STEP 3: FORM CONSISTENT ================= */

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.form-group label {
  font-size: 13px;
  color: rgba(235,235,245,.72);
}

/* ================= FORM INPUT (UNIFIED) ================= */

/* ทุก input / select ใน form + กัน iOS zoom */
.form-group input,
.form-group select {
  width: 100%;
  height: 44px;
  padding: 10px 12px;

  font-size: 16px;          /* 🔴 FIX iOS ZOOM */
  line-height: 1.2;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  box-sizing: border-box;
  background: rgba(44,44,46,.90);
  color: #fff;
  font-family: inherit;
}

/* number ต้องเหมือน text (iOS / Android) */
.form-group input[type="number"] {
  appearance: textfield;
  -moz-appearance: textfield;
}

/* focus state */
.form-group input:focus,
.form-group select:focus {
  border-color: #007aff;
  outline: none;
}

  /* ✅ เพิ่มตรงนี้ */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

 .btn-remove{
  min-width:44px;
  min-height:44px;
  padding:6px 12px;
  border-radius:10px;
  background:#d70015;
  color:#fff;
  border:none;

  font-size:13px;
  font-weight:600;
  line-height:1;

  cursor:pointer;
 }
  /* ✅ เพิ่มตรงนี้ */
.btn-remove:active {
  transform: scale(var(--tap-scale-icon));
}

/* interaction: use .btn:active as single source of truth */
  
/* ================= BUTTON SYSTEM ================= */

.btn {
  padding: 12px;
  min-height: 44px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition:
    transform var(--dur-tap) var(--ease-tap),
    box-shadow var(--dur-tap) ease,
    filter var(--dur-tap) ease;
}

/* Primary */
.btn-primary {
  background: #0066cc;
  color: #fff;
}

/* Secondary / neutral utility */
.btn-secondary {
  background: rgba(72,72,74,.92);
  color: #f5f5f7;
  border: 1px solid rgba(255,255,255,.10);
}

/* Success / completed action */
.btn-success {
  background: #1f7a35;
  color: #fff;
}

/* Outline / low-emphasis action */
.btn-outline {
  background: rgba(44,44,46,.58);
  color: #f5f5f7;
  border: 1px solid rgba(255,255,255,.16);
}

/* Danger (logout / destructive) */
.btn-danger{
  background:#d70015;
  color:#fff;
}
.btn-danger:active{
  transform: scale(var(--tap-scale-primary));
}

/* Interaction */
.btn:active {
  transform: scale(var(--tap-scale-primary));
  filter: brightness(.96);
  box-shadow: var(--shadow-card-pressed);
}

.btn.is-submitting{
  filter: saturate(.9) brightness(.92);
  cursor: wait;
  box-shadow: var(--shadow-card-pressed);
}

/* ================= HEADER SEARCH (iOS-LIKE) ================= */
.viewer-search-wrap{

 }  

.search-wrap {
  display: flex;
  align-items: center;
  position: relative;
  max-width: 100%;
  min-width: 0;          /* 🔴 กันดัน layout */
  overflow: visible;     /* ✅ ให้เงาปุ่มวงกลมไม่โดนตัดเป็นเหลี่ยม */
}

.search-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,.10);
  position: relative;
  overflow: hidden;

  /* ✅ Match filter/menu: Apple-nimble glass */
  background: rgba(28,28,30,.72);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  box-shadow: var(--shadow-control);
  cursor: pointer;
  color: rgba(255,255,255,.92);
  -webkit-tap-highlight-color: transparent;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;
}

/* ✅ Glass highlight (same language as filter/menu) */
.search-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
.search-btn::after{
  content:none;
}
.search-btn > *{ position: relative; z-index: 2; }
  
.search-btn:active {
  transform: scale(var(--tap-scale-icon));
  background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
}

@media (hover:hover){
  .search-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
.search-input {
   width: 0;             /* 🔴 สำคัญ: ตอนยังไม่ active ต้องไม่กินพื้นที่ */
   opacity: 0;
   margin-left: 0;
   height: 44px;
   padding: 0;

   font-size: 16px;
   border-radius: 12px;
   border: 0;

   background: rgba(44,44,46,.90);
   color: #fff;
   backdrop-filter: blur(14px);

  pointer-events: none;

  transform: translateX(-6px) scaleX(.6);
  transform-origin: left center;

  transition:
    opacity .18s ease,
    transform .45s cubic-bezier(.34,1.56,.64,1),
    width .35s ease,
    margin-left .35s ease,
    padding .35s ease;
}

/* 🔥 ACTIVE STATE */
.search-wrap.active .search-input {
  opacity: 1;
  transform: translateX(0) scaleX(1);
  pointer-events: auto;
  width: min(210px, calc(100vw - 176px)); /* compact mobile width without pushing filter+menu */
  margin-left: 6px;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,.08);
}

/* 🔹 subtle focus glow (iOS feel) */
.search-input:focus {
  border-color: #007aff;
  box-shadow:
    0 0 0 3px rgba(0,122,255,.18);
  outline: none;
}

/* ✅ STEP 3+4: SVG icon (monochrome) */
.icon-sf{
  width: 18px;
  height: 18px;
  display: block;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: .92;
}

  66%  { content: ".."; }

}

/* ================= TOAST SYSTEM (GLOBAL FEEDBACK) ================= */

#toast-container {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 24px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 3000;

  display: flex;
  flex-direction: column;
  gap: 8px;

  pointer-events: none; /* 🔒 ไม่บัง interaction */
}

.toast {
  min-width: 260px;
  max-width: 90vw;
  padding: 12px 16px;

  border-radius: 14px;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  white-space: pre-line;

  box-shadow: var(--shadow-float);              /* 🔴 ใช้ token เดียวกับระบบ */

  backdrop-filter: blur(18px) saturate(160%);   /* 🔴 เพิ่ม glass */
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  animation: toast-slide-down var(--motion-duration-toast) var(--motion-ease-standard);
  transform-origin: top center;
}

/* ===== Toast Variants ===== */
.toast.success { background: rgba(52,199,89,.92); }
.toast.error   { background: rgba(255,59,48,.92); }
.toast.warning { background: rgba(255,159,10,.92); }
.toast.info    { background: rgba(0,122,255,.92); }

/* ===== Animation (namespaced) ===== */
@keyframes toast-slide-down {
  from {
    opacity: 0;
    transform: translateY(-8px) scale(.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.hidden {
  display: none;
}

#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: loading-fade-in var(--motion-duration-fast) var(--motion-ease-standard);
}

#loading-overlay.hidden {
  display: none !important;
}

.loading-box {
  background: rgba(28,28,30,.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 20px 24px;
  border-radius: 12px;
  box-shadow: var(--shadow-float);
  text-align: center;
  min-width: 200px;
  animation: loading-pop var(--motion-duration-normal) var(--motion-ease-standard);
}

@keyframes loading-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes loading-pop {
  from {
    opacity: 0;
    transform: translateY(6px) scale(.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.skeleton-list{
  display:grid;
  gap:16px;
}
.skeleton-card{
  height:104px;
  border-radius:16px;
  background: rgba(28,28,30,.72);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  box-shadow: var(--shadow-card);
  position: relative;
  overflow:hidden;
}
.skeleton-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,.16) 45%,
      rgba(255,255,255,0) 90%);
  transform: translateX(-120%);
  animation: shimmer 1.15s infinite;
}
.skeleton-row{
  display:flex;
  gap:12px;
  padding:12px;
}
.skeleton-thumb{
  width:80px;height:80px;border-radius:12px;
  background: rgba(255,255,255,.08);
  flex-shrink:0;
}
.skeleton-lines{flex:1;display:flex;flex-direction:column;gap:10px;padding-top:6px;}
.skeleton-line{
  height:12px;border-radius:999px;
  background: rgba(255,255,255,.08);
}
.skeleton-line.w70{width:70%}
.skeleton-line.w45{width:45%}
.skeleton-line.w30{width:30%}

@keyframes shimmer{
  to { transform: translateX(120%); }
}
  
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,.18);
  border-top-color: rgba(255,255,255,.82);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ================= FLOATING BOTTOM BAR ================= */

/* 🔴 CHANGED: Clean + deterministic cascade (กัน opacity สลับทิศ) */
#floatingBar{
  position: fixed !important;
  left: 16px;
  right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 18px) !important;
  max-width: 520px;
  margin: 0 auto;

  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 18px;

  background: rgba(22,22,24,.78);
backdrop-filter: blur(36px) saturate(220%);
-webkit-backdrop-filter: blur(36px);

border: 1px solid rgba(255,255,255,.16);
  box-shadow:
    var(--shadow-floating),
    inset 0 1px 0 rgba(255,255,255,.10);
  color: #f5f5f7;

  z-index: 999;

  /* default = hidden */
  transform: translateY(120%);
  opacity: 0;
  pointer-events: none;
  visibility: hidden;            /* 🔍 FIX: บังคับซ่อนจริง (กัน opacity ค้าง) */
  
  transition:
    transform .48s cubic-bezier(.34,1.56,.64,1),
    opacity .3s ease;
  will-change: transform, opacity;
}

/* ✅ Cart bar text readability (เฉพาะ floatingBar) */
#floatingBar .bar-left{
  min-width: 0;
}
#floatingBar .bar-subtext{
  font-size: 13px;
  color: rgba(245,245,247,.82);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

#floatingBar.bounce-in{
  animation: float-bounce .65s cubic-bezier(.34,1.56,.64,1);
}
#floatingBar.cart-added-pulse{
  animation: cart-added-pulse var(--motion-duration-normal) var(--motion-ease-emphasized);
}
@keyframes float-bounce{
  0%   { transform:translateY(120%) scale(.94); }
  60%  { transform:translateY(-6px) scale(1.02); }
  100% { transform:translateY(0) scale(1); }
}
@keyframes cart-added-pulse{
  0%   { transform:translateY(0) scale(1); }
  45%  { transform:translateY(-2px) scale(1.018); }
  100% { transform:translateY(0) scale(1); }
}

#floatingBar .total-animate{ animation: total-pop .25s ease; }
@keyframes total-pop{
  0%   { transform:scale(.92); opacity:.6; }
  100% { transform:scale(1); opacity:1; }
}

/* ✅ SHOW = only show */
 #floatingBar.show{
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
  visibility: visible; /* 🔴 FIX: เพราะ default ตั้ง hidden ไว้ */ 
 }

/* ✅ HIDE (scroll) */
#floatingBar.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

/* ✅ HIGHEST PRIORITY: show + scroll-hide must hide */
#floatingBar.show.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}
  
#floatingBar:active{
  transform: translateY(0) scale(.98);
}
  
/* 🔴 NEW: เมื่อมี sheet เปิดอยู่ → ให้ floatingBar ซ่อน */
.sheet.show ~ #floatingBar{
  opacity: 0 !important;
  transform: translateY(20px) !important;
  pointer-events: none !important;
  visibility: hidden !important; /* 🔴 FIX: ซ่อนแบบ deterministic */
}  
  
 /* ================= REDUCED MOTION SUPPORT ================= */
 @media (prefers-reduced-motion: reduce){

   /* 🔴 Disable global transitions */
   * {
     transition: none !important;
     animation: none !important;   /* 🔴 ADD */
   }

   /* 🔴 Disable product card motion */
   .product-card{
     transition: none !important;
   }

   .product-card:hover{
     transform: none !important;
     box-shadow: var(--shadow-card) !important;
   }

   .product-card:active{
     transform: none !important;
   }

   /* 🔴 Disable floating bar animations */
   #floatingBar,
   #floatingBar.bounce-in,
   #floatingBar.cart-added-pulse{
     transition: none !important;
     animation: none !important;
   }

   #floatingBar .total-animate{
     animation: none !important;
   }

   /* 🔴 Disable toast slide animation */
   .toast{
     animation: none !important;
   }

   /* 🔴 Disable spinner rotation */
   .spinner{
     animation: none !important;
   }
 }

function isReducedMotion() {
  return !!(
    window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches
  );
}

function replayMotionClass(el, className, duration = MOTION.DURATION_NORMAL_MS) {
  if (!el || !className || isReducedMotion()) return;
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
  window.setTimeout(() => el.classList.remove(className), duration + 80);
}

function escapeHtml(value = "") {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 🔴 ADDED: หา SKU ถัดไปจาก state.products เช่น A001 -> A002
function getNextProductId(currentValue = "") {
  const raw = String(currentValue || "").trim().toUpperCase();

  // ใช้ prefix จากค่าปัจจุบันก่อน เช่น A001 => A
  // ถ้าไม่มี ให้ fallback จากสินค้าที่มีอยู่ หรือใช้ "A"
  let prefix = "";
  const currentMatch = raw.match(/^([A-Z]+)(\d+)$/);
  if (currentMatch) {
    prefix = currentMatch[1];
  }

  const productIds = Array.isArray(state.products)
    ? state.products
        .map(p => String(p.productId || "").trim().toUpperCase())
        .filter(Boolean)
    : [];

  if (!prefix) {
    const lastMatch = [...productIds]
      .reverse()
      .map(id => id.match(/^([A-Z]+)(\d+)$/))
      .find(Boolean);

    prefix = lastMatch ? lastMatch[1] : "A";
  }

  const samePrefixMatches = productIds
    .map(id => id.match(/^([A-Z]+)(\d+)$/))
    .filter(match => match && match[1] === prefix);

  let maxNum = 0;
  samePrefixMatches.forEach(match => {
    const num = Number(match[2]);
    if (Number.isFinite(num) && num > maxNum) {
      maxNum = num;
    }
  });

  const nextNum = maxNum + 1;
  return `${prefix}${String(nextNum).padStart(3, "0")}`;
}

function showToast(message, type = 'info', timeout = 2500) {
  const container = document.getElementById('toast-container');
  if (!container) return;

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  toast.setAttribute("role", type === "error" ? "alert" : "status");
  toast.setAttribute("aria-live", type === "error" ? "assertive" : "polite");

  container.appendChild(toast);

  // 🔒 limit toast count (optional but pro)
  if (container.children.length > 3) {
    container.removeChild(container.firstChild);
  }

  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

// ---------- Central loading timer ----------
let _loadingTimer = null;
let _loadingShownAt = 0;
const MIN_LOADING_MS = 350; // กันกระพริบ

function showLoading(message, timeoutMs = 60000) {
  const overlay = document.getElementById("loading-overlay");
  const text = document.getElementById("loading-text");
  if (!overlay || !text) return;

  text.textContent = message;
  overlay.classList.remove("hidden");
  overlay.setAttribute("aria-hidden", "false");
  overlay.setAttribute("aria-busy", "true");

  // บังคับ render
  overlay.offsetHeight;

  _loadingShownAt = Date.now();
  state.ui.backdropLocked = true;
  if (backdrop) backdrop.style.display = "block";

  clearTimeout(_loadingTimer);
  _loadingTimer = setTimeout(() => {
    console.warn("[showLoading] auto-hide after timeout");
    safeHideLoading(true);
    showToast("การเชื่อมต่อล่าช้า ระบบยกเลิกแล้ว", "warning", 1800);
  }, timeoutMs);
}

/* ================= SAFE HIDE LOADING (SINGLE SOURCE OF TRUTH) ================= */
/**
 * ❗ IMPORTANT
 * - ต้องมี safeHideLoading แค่ตัวเดียวในระบบ
 * - ตัวนี้คือเวอร์ชันเดียวที่อนุญาตให้ใช้
 */

function safeHideLoading(fromTimeout = false) {
  const overlay = document.getElementById("loading-overlay");

  const elapsed = Date.now() - (_loadingShownAt || 0);
  const delay = Math.max(0, MIN_LOADING_MS - elapsed);

  setTimeout(() => {
    try {
      if (overlay) {
        overlay.classList.add("hidden");
        overlay.setAttribute("aria-hidden", "true");
        overlay.setAttribute("aria-busy", "false");
      }

      // 🔥 หัวใจ: เคลียร์ timer ของ showLoading
      if (_loadingTimer) {
        clearTimeout(_loadingTimer);
        _loadingTimer = null;
      }
      // 🔒 ปลด lock เฉพาะเมื่อไม่มี overlay เปิดอยู่ (กัน confirm/flow หลุด)
      if (state.ui.overlayCount === 0) {
        state.ui.backdropLocked = false;
      }

      if (state.ui.overlayCount === 0 && backdrop) {
        backdrop.style.display = "none";
      }

      console.log(
        "[safeHideLoading] loading closed",
        fromTimeout ? "(timeout)" : ""
      );

    } catch (e) {
      console.error("[safeHideLoading] failed", e);
    }
  }, delay);
}


// ---------- fetchWithTimeout ----------
async function fetchWithTimeout(input, init = {}, ms = 30000) {
  const controller = new AbortController();
  const signal = controller.signal;
  const id = setTimeout(() => controller.abort(), ms);

  try {
    const res = await fetch(input, { ...init, signal });

    // 🔒 เช็ค HTTP status ชัดเจน
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    return res;

  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error("การเชื่อมต่อช้าเกินไป กรุณาลองใหม่อีกครั้ง");
    }
    throw err;
  } finally {
    clearTimeout(id);
  }
}

function isAuthError(message = "") {
   return [
     "Session expired",
     "Invalid token",
     "Missing token"
   ].includes(String(message || "").trim());
 }

 async function postFormAction(form, { timeout = 30000 } = {}) {
   const res = await fetchWithTimeout(API_URL, {
     method: "POST",
     body: form
   }, timeout);

   let json;
   try {
     json = await res.json();
   } catch (err) {
     throw new Error("รูปแบบข้อมูลตอบกลับไม่ถูกต้อง");
   }

   if (json?.error || json?.success === false) {
     if (isAuthError(json.error)) {
       showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
       exitAdmin({ silent: true });
     }
     throw new Error(json.message || json.error || "Request failed");
   }

   return json;
 } 

/* ================= API LAYER ================= */
const API_URL="https://script.google.com/macros/s/AKfycbzx9WlWXUqZ9OM_R0tO9wJvw79RPWIn40iakCPNuPDLBmvcuHXkqp9EMPoRiuMRnaM2Wg/exec";

let adminLogoutPromise = null;

async function adminLogout(token) {
  const form = new URLSearchParams();
  form.append("action", "adminLogout");
  form.append("token", token);

  return await postFormAction(form);
}

function handleAdminLogout() {
  if (adminLogoutPromise) {
    return adminLogoutPromise;
  }

  const token = String(state.admin?.token || "").trim();

  adminLogoutPromise = (async () => {
    try {
      if (token) {
        await adminLogout(token);
      }
    } catch (err) {
      console.warn("Backend logout failed:", err);
    } finally {
      exitAdmin();
      adminLogoutPromise = null;
    }
  })();

  return adminLogoutPromise;
}

 );

function sortProducts(products) {
  if (!Array.isArray(products)) return [];

  return products.sort((a, b) =>
    String(a.productId || "").localeCompare(
      String(b.productId || ""),
      'th',
      {
        numeric: true,
        sensitivity: 'base'
      }
    )
  );
}

async function createOrder() {
  // 🔴 HARDENING: reload stock snapshot before submit
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      throw new Error(`ไม่พบสินค้า ${item.name}`);
    }

    if (Number(product.stock) < Number(item.qty)) {
      throw new Error(
        `${item.name} คงเหลือ ${product.stock} ชิ้น (คุณเลือก ${item.qty})`
      );
    }
  }

  const total = state.cart.reduce(
   (s,i)=> s + Number(i.price) * Number(i.qty),
   0
 );

  const form = new URLSearchParams();
  form.append("action", "createOrder");
  form.append("items", JSON.stringify(state.cart));
  form.append("total", total);
  form.append("poNumber", String(state.poNumber || "").trim());
 
  // ใช้ fetchWithTimeout เพื่อป้องกัน request แขวน
  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 15000);

  // 🔴 FIX: เช็ค HTTP status ก่อน
  if (!res.ok) {
    const text = await res.text();
    throw new Error(
      `CreateOrder HTTP ${res.status}: ${text}`
    );
  }

  const json = await res.json();

  // 🔴 FIX: validate response shape
  if (!json || json.success !== true || !json.data?.orderId) {
    throw new Error("Invalid createOrder response");
  }

  return json;
}

function closeOverlay(el){

  el.classList.remove("show");
  state.ui.overlayCount = Math.max(0, state.ui.overlayCount - 1);

  // 🔴 CHANGED: จำว่าเราปิด "cartSheet" อยู่ไหม (เพราะบางครั้งปิดผ่าน backdrop จะไม่เรียก closeCart)

    backdrop.style.display = "none";

    // 🔴 FIX: reset floating bar momentum state
    const bar = document.getElementById("floatingBar");
    if (bar) bar.classList.remove("scroll-hide");

// 🔒 Global HTML Escape (XSS Guard) — micro polish: escape &, <, >, ", '
 const esc = (s) =>
   String(s ?? "")
     .replace(/&/g, "&amp;")
     .replace(/</g, "&lt;")
     .replace(/>/g, "&gt;")
     .replace(/"/g, "&quot;")
     .replace(/'/g, "&#39;");

 // 🔒 Attribute-safe (สำหรับ src/alt/href)
 const escAttr = (s) => esc(s);

function toInlineJsStringLiteral(value) {
  return "'" + String(value ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "\\x22")
    .replace(/&/g, "\\x26")
    .replace(/</g, "\\x3C")
    .replace(/>/g, "\\x3E")
    .replace(/\r/g, "\\r")
    .replace(/\n/g, "\\n")
    .replace(/\u2028/g, "\\u2028")
    .replace(/\u2029/g, "\\u2029") + "'";
}

function handleKeyboardActivation(event, element) {
  if (!event || !element) return;
  if (event.key !== "Enter" && event.key !== " ") return;
  event.preventDefault();
  element.click();
}

function renderProducts(){
  const app = document.getElementById("app");

  const escapeHTML = (str="") =>
    String(str ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  
  // 🔒 GUARD สำคัญที่สุด
  if (!Array.isArray(state.products)) {
    console.error("renderProducts: products is not array", state.products);
    app.innerHTML = `
      <div role="alert" style="
        text-align:center;
        color:#d93025;
        margin-top:40px;
        font-size:15px;
      ">
        ไม่สามารถโหลดรายการสินค้าได้
      </div>
    `;
    return;
  }

  const filteredProducts = [];

  state.products.forEach(p => {
    const stockNum = Number(p.stock);

  // 🔍 STATUS RESOLVE (ต้องมาก่อน filter ทุกครั้ง)
    const resolvedStatus =
      stockNum <= 0
        ? "out"
        : String(p.status || "ready").trim().toLowerCase();  

    // ❌ ไม่แสดงสินค้าที่ปิดขาย (viewer เท่านั้น)
    if (state.mode === "viewer" && !p.active) return;

    // 🔍 SEARCH FILTER (ชื่อ + รหัส)
    if (state.search) {
      const text = (p.name + p.productId).toLowerCase();
      if (!text.includes(String(state.search).toLowerCase())) return;
    }

// 🔍 STATUS FILTER (Viewer/Admin use resolved status)
if (
  state.mode === "viewer" &&
  state.viewerFilter &&
  state.viewerFilter.status !== "all"
) {
  if (resolvedStatus !== state.viewerFilter.status) return;
}

// 🔴 CHANGED: admin filter (ต้องอยู่หลัง resolvedStatus เสมอ)
    if (
      state.mode === "admin" &&
      state.admin.filters &&
      state.admin.filters.status !== "all"
    ) {
      if (resolvedStatus !== state.admin.filters.status) return;
    } 

    filteredProducts.push({
      ...p,
      resolvedStatus
    });
  });

  const pageSize = Number(state.pagination?.pageSize) || 100;
  const totalItems = filteredProducts.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
  const safePage = Math.min(Math.max(1, Number(state.pagination?.page) || 1), totalPages);
  state.pagination.page = safePage;

  const startIndex = (safePage - 1) * pageSize;
  const pageItems = filteredProducts.slice(startIndex, startIndex + pageSize);

  app.innerHTML = "";
  let found = false;

  pageItems.forEach(p => {
    const statusMap = {
      ready:     "พร้อมส่ง",
      ready_plus:
        "พร้อมส่ง สามารถบวกเพิ่มได้",
      shipping:  "อยู่ระหว่างจัดส่ง",
      warehouse: "อยู่โกดังไทย",
      out:       "หมด"
    };
 
    const statusKey = p.resolvedStatus;
    const allowedStatusClasses = new Set([
      "ready",
      "ready_plus",
      "shipping",
      "warehouse",
      "out"
    ]);
    const statusClass = allowedStatusClasses.has(statusKey)
      ? statusKey
      : "ready";
    let statusText  = statusMap[statusKey] || "พร้อมส่ง";

    /* ================= CARD ================= */
    const card = document.createElement("div");
    card.className = "product-card";
    card.setAttribute("role", "button");
    card.setAttribute("tabindex", "0");

    card.onclick = () => {
      if (state.mode === "admin") {
        openAdminProductAction(p);
      } else {
        openProduct(p);
      }
    };
    card.onkeydown = event => handleKeyboardActivation(event, card);

    card.innerHTML = `
      <img class="thumb"
        src="${p.image ? escAttr(p.image) : "about:blank"}"
        alt="${escAttr(p.name)}"
        onerror="this.style.display='none'">

      <div class="info">
        <div class="name">${escapeHTML(p.name)}</div>
        <div class="sku">รหัส: ${escapeHTML(p.productId)}</div>
        <div class="price">ราคา: ฿${Number(p.price).toLocaleString()}</div>

        <div class="meta">
          <span class="qty">จำนวน: ${Number(p.stock) || 0}</span>
          <span class="status ${statusClass}">
            ${statusText}
          </span>
        </div>
      </div>
    `;

    app.appendChild(card);
    found = true;
  });

  // ❌ ไม่พบสินค้า
  if (!found) {
    const hasSearch = String(state.search || "").trim().length > 0;
    const activeFilter = state.mode === "admin"
      ? state.admin?.filters?.status
      : state.viewerFilter?.status;
    const hasFilter = activeFilter && activeFilter !== "all";
    const emptyMessage = hasSearch
      ? "ไม่พบสินค้าที่ค้นหา"
      : hasFilter
        ? "ไม่มีสินค้าที่ตรงกับตัวกรอง"
        : "ยังไม่มีสินค้าให้แสดง";

    app.innerHTML = `
      <div role="status" style="
        text-align:center;
        color:#888;
        margin-top:40px;
        font-size:15px;
      ">
        ${emptyMessage}
      </div>
    `;
    return;   
  }

  if (totalItems > pageSize) {
    const pagination = document.createElement("div");
    pagination.className = "pagination";
    pagination.innerHTML = `
      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === 1 ? "disabled" : ""}
        onclick="changePage(-1)">

      </button>
    `;
    app.appendChild(pagination);
  }

  // Product card entrance is intentionally limited for mobile performance.
  if (!isReducedMotion()) {
    const cards = Array.from(document.querySelectorAll(".product-card"))
      .slice(0, MOTION.CARD_ENTRANCE_LIMIT);

    cards.forEach((card, index) => {
      card.animate(
        [
          {
            opacity: 0,
            transform: "translateY(10px)"
          },
          {
            opacity: 1,
            transform: "translateY(0)"
          }
        ],
        {
          duration: MOTION.DURATION_NORMAL_MS,
          delay: index * MOTION.CARD_STAGGER_MS,
          easing: MOTION.EASING_STANDARD,
          fill: "both"
        }
      );
    });
  }

}

 let lastFocusTrigger = null;

 function rememberTrigger(el){
   if (el instanceof HTMLElement) lastFocusTrigger = el;
 }

 function restoreTriggerFocus(){
   if (lastFocusTrigger && typeof lastFocusTrigger.focus === "function") {
     lastFocusTrigger.focus();
   }
 }

 function syncExpanded(button, expanded){
   if (button) button.setAttribute("aria-expanded", String(!!expanded));
 }

 function focusFirstInteractive(container){
   if (!container) return;
   const first = container.querySelector(
     'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
   );
   (first || container).focus();
 } 
  
/* 🔍 viewer search toggle (เฉพาะ UI) */
function toggleViewerSearch(triggerEl){
  const wrap  = document.getElementById("viewerSearchWrap");
  const input = document.getElementById("viewerSearchInput");
  if(!wrap || !input) return;

  rememberTrigger(triggerEl || document.querySelector("#viewerSearchWrap .search-btn")); 
  const opened = wrap.classList.contains("active");

  if(opened){
    input.value = "";
    state.search = "";
    state.pagination.page = 1;
    state.viewerSearchOpen = false;
    renderProducts();
    wrap.classList.remove("active");
    syncExpanded(wrap.querySelector(".search-btn"), false);
    restoreTriggerFocus();   
  }else{
    state.viewerSearchOpen = true;
    wrap.classList.add("active");
    syncExpanded(wrap.querySelector(".search-btn"), true);   
    setTimeout(()=>input.focus(),80);
  }
}

/* 🔍 admin search toggle (ICON EXPAND) */

function toggleAdminSearch(triggerEl){
  const wrap = document.getElementById("adminSearchWrap");
  if (!wrap) return;

  rememberTrigger(triggerEl || wrap.querySelector(".search-btn")); 
  const opening = !wrap.classList.contains("active");

  wrap.classList.toggle("active");
  syncExpanded(wrap.querySelector(".search-btn"), opening);

  if (opening) {
    const input = wrap.querySelector("input");
    // 🕒 รอ animation เริ่มก่อน focus (iOS trick)
    setTimeout(() => input && input.focus(), 120);
   } else {
     restoreTriggerFocus();   
  }
}
  
function handleSearch(keyword){
  state.search = keyword.toLowerCase();
  state.pagination.page = 1;
  renderProducts();
}

function toggleFilterDropdown(triggerEl){
  const el = document.getElementById("filterDropdown");
  if(!el) return;

  const btn = triggerEl || document.querySelector(".filter-btn");
  rememberTrigger(btn);
  const isOpen = el.classList.contains("show");

  document.querySelectorAll(".filter-dropdown.show")
    .forEach(d => d.classList.remove("show"));
  document.querySelectorAll(".filter-btn[aria-expanded='true']")
    .forEach(b => syncExpanded(b, false));

  if(!isOpen){
    el.classList.add("show");
     syncExpanded(btn, true);
     setTimeout(() => focusFirstInteractive(el), 0);   

    // 🔴 auto close on outside click
    setTimeout(()=>{
      document.addEventListener("click", closeFilterOnOutside, { once:true });
    }, 0);
   } else {
     restoreTriggerFocus();   
  }
}

function closeFilterOnOutside(e){
  const wrap = document.querySelector(".filter-wrap");
  if(!wrap || wrap.contains(e.target)) return;

  const el = document.getElementById("filterDropdown");
  if(el) el.classList.remove("show");
   document.querySelectorAll(".filter-btn[aria-expanded='true']")
     .forEach(b => syncExpanded(b, false)); 
}

     .forEach(b => syncExpanded(b, false));
   restoreTriggerFocus(); 
}

  const p = state.selectedProduct;

      "จำนวนสินค้าต้องเป็นจำนวนเต็มมากกว่า 0",

    );
    return;
  }

  // 🔒 GUARD: ห้ามเกิน stock
  const existing = state.cart.find(i => i.productId === p.productId);
  const currentQty = existing ? existing.qty : 0;

  if (currentQty + qty > Number(p.stock)) {
    // ❌ เดิม: alert
    // alert(`สินค้า "${p.name}" มีคงเหลือ ${p.stock} ชิ้น`);

    state.cart.push({
      productId: p.productId,
      name: p.name,
      price: p.price,

async function submitChangePassword(btn){
  if (state.admin.isSubmitting) return;

  const currentPassword = document.getElementById("currentPassword")?.value || "";
  const newPassword = document.getElementById("newPassword")?.value || "";
  const confirmNewPassword = document.getElementById("confirmNewPassword")?.value || "";

  if (!currentPassword || !newPassword || !confirmNewPassword) {
    showToast("กรุณากรอกข้อมูลให้ครบ", "warning");
    return;
  }

  if (newPassword !== confirmNewPassword) {
    showToast("รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน", "warning");
    return;
  }

  if (newPassword.length < 4) {
    showToast("รหัสผ่านใหม่สั้นเกินไป", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  if (btn) btn.disabled = true;

  try {
    const form = new URLSearchParams();
    form.append("action", "changePassword");
    form.append("token", state.admin.token);
    form.append("currentPassword", currentPassword);
    form.append("newPassword", newPassword);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success) {
      throw new Error(json.error || json.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ");
    }

    showToast("เปลี่ยนรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบใหม่", "success");
    exitAdmin();

  } catch (err) {
    console.error(err);
    showToast(err.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ", "error");
  } finally {
    state.admin.isSubmitting = false;
    if (btn) btn.disabled = false;
  }
}

function toYmdLocal(value) {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return "";
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function formatThaiDate(value) {

  if (!value) return "-";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) {
    return String(value);
  }

  return d.toLocaleString(
    "th-TH",
    {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }
  );
}
 
function getOrderDateValue(order) {
  return (
    order?.createdAt ||
    order?.created_at ||
    order?.timestamp ||
    order?.date ||
    ""
  );
}
 

function isOrderInRange(order, fromYmd, toYmd) {
  const raw = getOrderDateValue(order);

 console.log(
   "ORDER DATE:",
   order.orderId,
   raw
 );
 
  if (!raw) return false;

  const d = new Date(raw);

 console.log(
   "PARSED:",
   order.orderId,
   d,
   Number.isNaN(d.getTime())
 ); 
 
  if (Number.isNaN(d.getTime())) return false;

  const orderYmd = toYmdLocal(d);
  if (fromYmd && orderYmd < fromYmd) return false;
  if (toYmd && orderYmd > toYmd) return false;
  return true;
}

function getDashboardProductCostMap() {
  return new Map(
    (Array.isArray(state.products) ? state.products : []).map(p => [
      String(p.productId || "").trim(),
      Number(p.costPrice || 0)
    ])
  );
}

function calculateDashboardSummary(orders) {
  const safeOrders = Array.isArray(orders) ? orders : [];
  const productCostMap = getDashboardProductCostMap();

  let totalSales = 0;
  let totalCost = 0;
  let totalProfit = 0;
  let totalQty = 0;

  safeOrders.forEach(order => {
    const items = Array.isArray(order.items) ? order.items : [];

    items.forEach(item => {
      const qty = Number(item.qty || 0);
      const sellPrice = Number(item.price || 0);
      const fallbackCost = productCostMap.get(String(item.productId || "").trim()) || 0;
      const costPrice = Number(
        item.costPrice ?? item.unitCost ?? fallbackCost
      );

      const lineSales = sellPrice * qty;
      const lineCost = costPrice * qty;

      totalSales += lineSales;
      totalCost += lineCost;
      totalProfit += (lineSales - lineCost);
      totalQty += qty;
    });
  });

  return {
    orderCount: safeOrders.length,
    totalQty,
    totalSales,
    totalCost,
    totalProfit
  };
}

async function openStockTimeline(force = false) {
  // ❌ ต้องมี intent จริง
  if (!force && !allowOpenStockTimeline) return;

  // 🔐 session guard
  if (
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
    exitAdmin();
    return;
  }

  // 🔒 ใช้แล้วปิดทันที (กันเด้งซ้ำ)
  allowOpenStockTimeline = false;

  closeOverlay(adminDashboardSheet);

  adminStockSheet.innerHTML = `
    <h3 id="adminStockSheetTitle">📦 ประวัติความเคลื่อนไหวสต๊อก</h3>
    <div class="loading">กำลังโหลด...</div>
  `;

  openOverlay(adminStockSheet);

  try {
    const logs = await fetchStockLogs();
    const safeLogs = Array.isArray(logs) ? logs : [];

    const money = (value) => `฿${Number(value || 0).toLocaleString("th-TH")}`;
    const esc = (value) => escapeHtml(value ?? "");   

    // ✅ ensure orders พร้อมใช้สำหรับ fallback ราคา/ยอดรวม
    if (!Array.isArray(state.admin.orders) || state.admin.orders.length === 0) {
      try {
        const freshOrders = await fetchOrders();
        state.admin.orders = Array.isArray(freshOrders) ? freshOrders : [];
      } catch (orderErr) {
        console.warn("openStockTimeline: preload orders failed", orderErr);
      }
    }
   
    // ✅ fallback ราคา/ยอดรวมจาก order จริง ถ้า stock log ไม่มีราคา
    const orderLookup = new Map(
      (Array.isArray(state.admin.orders) ? state.admin.orders : []).map(o => [
        String(o.orderId || "").trim(),
        o
      ])
    );   

    /* ================= GROUP ORDER OUT ================= */
    const orderMap = {};
    const singles = [];

 safeLogs.forEach(l => {
  const time = l.timestamp ? new Date(l.timestamp) : new Date();

  // ✅ ใช้ orderId จริงจาก sheet (fallback เผื่อของเก่า)
  const orderRef = l.orderId || l.ref || null;

  if (l.type === "OUT" && orderRef) {
    const matchedOrder = orderLookup.get(String(orderRef).trim());
    const matchedOrderItem = Array.isArray(matchedOrder?.items)
      ? matchedOrder.items.find(item =>
          String(item.productId || "").trim() === String(l.productId || "").trim()
        )
      : null;

    const fallbackSalePrice = Number(
      l.salePrice ??
      l.price ??
      matchedOrderItem?.price ??
      0
    );

    const fallbackLineTotal = Number(
      l.lineTotal ??
      (fallbackSalePrice * Math.abs(Number(l.qty || 0)))
    );
   
    if (!orderMap[orderRef]) {
      orderMap[orderRef] = {
        orderId: orderRef,
        time,
        by: l.by || "-",
        note: l.note || l.reason || "",
        totalSalesAmount: Number(matchedOrder?.total || 0),
        items: []
      };
    }

    if (!orderMap[orderRef].note && (l.note || l.reason)) {
      orderMap[orderRef].note = l.note || l.reason || "";
    }   

    // ใช้เวลาล่าสุดของ item ใน order เดียวกัน
    if (time.getTime() > orderMap[orderRef].time.getTime()) {
      orderMap[orderRef].time = time;
    }

    // ✅ ถ้า order.total ไม่มี ค่อยสะสมจากรายการย่อย
    if (!Number(orderMap[orderRef].totalSalesAmount)) {
      orderMap[orderRef].totalSalesAmount += fallbackLineTotal;
    }   

    orderMap[orderRef].items.push({
      productId: l.productId,
      productName: l.productName || l.name || "",
      qty: Math.abs(Number(l.qty || 0)),
      before: l.before,
      after: l.after,
      salePrice: fallbackSalePrice,
      lineTotal: fallbackLineTotal
    });
  } else {
    singles.push({
      ...l,
      _time: time
    });
  }
});

    /* ================= BUILD TIMELINE ================= */
    const timeline = [];

    Object.values(orderMap).forEach(o => {
      timeline.push({
        kind: "ORDER",
        type: "OUT",
        orderId: o.orderId,
        time: o.time,
        by: o.by,
        note: o.note || "",
        items: o.items,
        totalLines: o.items.length,
        totalQty: o.items.reduce((sum, item) => sum + Number(item.qty || 0), 0),
        totalSalesAmount: o.totalSalesAmount
      });
    });

    singles.forEach(l => {
      timeline.push({
        kind: "STOCK",
        type: l.type,
        productId: l.productId,
        productName: l.productName || l.name || "",
        qty: l.qty,
        before: l.before,
        after: l.after,
        time: l._time,
        by: l.by || "-",
        note: l.note || l.reason || ""
      });
    });

    // 🕒 latest first (safe)
    timeline.sort((a, b) => b.time.getTime() - a.time.getTime());

    /* ================= RENDER ================= */
    adminStockSheet.innerHTML = `
      <h3 id="adminStockSheetTitle">📦 ประวัติความเคลื่อนไหวสต๊อก</h3>

      <button class="btn btn-outline"
        style="width:100%;margin-bottom:12px"
        onclick="finishAdminAction({ refresh:false })">
        ← กลับ
      </button>

      ${
        timeline.length
          ? timeline.map((t, timelineIndex) => {

              if (t.kind === "ORDER") {
                const detailId = `stock-detail-${timelineIndex}`;
               
                return `
                  <div class="card">
                    <div class="timeline-tag tag-out">
                      🧾 ขายออก (ออเดอร์ ${esc(t.orderId)})
                    </div>

                    <div class="timeline-summary">
                      ${Number(t.totalLines) || 0} รายการ · ${Number(t.totalQty) || 0} ชิ้น · ${money(t.totalSalesAmount)}
                    </div>                    

                    ${t.items.map(i => `
                      <div class="timeline-row">
                        ${esc(i.productId)}
                        ${i.productName ? ` — ${esc(i.productName)}` : ""}
                        x ${Number(i.qty || 0)}
                        ${
                          Number.isFinite(Number(i.before)) &&
                          Number.isFinite(Number(i.after))
                            ? `<span class="timeline-muted">
                                (${Number(i.before)} → ${Number(i.after)})
                              </span>`
                            : ""
                        }
                      </div>
                    `).join("")}

                    <div class="timeline-detail-wrap">
                      <button
                        type="button"
                        class="timeline-detail-toggle"
                        onclick="
                          const panel = document.getElementById(${toInlineJsStringLiteral(detailId)});
                          if (!panel) return;
                          panel.classList.toggle('show');
                          this.textContent = panel.classList.contains('show')
                            ? 'ซ่อนรายละเอียด'
                            : 'ดูรายละเอียดเพิ่มเติม';
                        "
                      >
                        ดูรายละเอียดเพิ่มเติม
                      </button>

                      <div id="${escAttr(detailId)}" class="timeline-detail-panel">
                        <div class="timeline-detail-meta">
                          ยอดรวมสินค้า: ${Number(t.totalLines) || 0} รายการ<br>
                          ยอดรวมจำนวนชิ้น: ${Number(t.totalQty) || 0}<br>
                          ยอดขายรวม: ${money(t.totalSalesAmount)}
                          ${t.note ? `<br>หมายเหตุ: ${esc(t.note)}` : ""}
                        </div>

                        <div class="timeline-detail-list" style="margin-top:10px">
                          ${t.items.map(i => `
                            <div class="timeline-row">
                              ${esc(i.productId)}
                              ${i.productName ? ` — ${esc(i.productName)}` : ""} |
                              ${Number(i.qty || 0)} ชิ้น
                              ${
                                Number.isFinite(Number(i.before)) &&
                                Number.isFinite(Number(i.after))
                                  ? ` | ${Number(i.before)} → ${Number(i.after)}`
                                  : ""
                              }
                              | ${money(i.salePrice)}/ชิ้น
                              | รวม ${money(i.lineTotal)}
                            </div>
                          `).join("")}
                        </div>
                      </div>
                    </div>                    

                    <div style="font-size:12px;color:#888;margin-top:6px">
                      ${t.time.toLocaleDateString("th-TH")}
                      ${t.time.toLocaleTimeString("th-TH")}
                      · โดย ${esc(t.by)}
                    </div>
                  </div>
                `;
              }

              const typeMap = {
                IN:     { text: "➕ รับสต๊อกเข้า", class: "tag-in" },
                CREATE: { text: "🆕 เพิ่มสินค้าใหม่", class: "tag-create" },
                ADJUST: { text: "✏️ ปรับสต๊อก", class: "tag-adjust" }
              };

              const cfg = typeMap[t.type] || { text: t.type, class: "" };

              return `
                <div class="card">
                  <div class="timeline-tag ${escAttr(cfg.class)}">
                    ${esc(cfg.text)}
                  </div>

                  <div class="timeline-row">
                    ${esc(t.productId)}
                    ${t.productName ? ` — ${esc(t.productName)}` : ""}
                    ${Number.isFinite(Number(t.qty)) ? ` x ${Math.abs(Number(t.qty))}` : ""}
                    ${

 async function submitBulkPendingDelivery() {
   if (state.admin.isSubmitting) return;
   state.admin.isSubmitting = true;

   try {
     const order =
       state.admin.pendingDeliveryOrder;

     if (!order) return;

     const items =
       state.admin.bulkPendingItems
         .filter(i => i.selected);

     if (!items.length) {
       showToast(
         "กรุณาเลือกสินค้า",
         "warning"
       );
       return;
     }

     const invalidItem = items.find(item => {
       const qty = Number(item.qty);

       return (
         !Number.isInteger(qty) ||
         qty <= 0
       );
     });

     if (invalidItem) {
       showToast(
         `จำนวนค้างส่งของ "${invalidItem.name || invalidItem.productId}" ต้องเป็นจำนวนเต็ม 1-${invalidItem.orderedQty}`,
         "warning"
       );
       return;
     }

     let pendingDeliveries =
       state.admin.pendingDeliveries;

     if (!Array.isArray(pendingDeliveries)) {
       try {
         pendingDeliveries =
           await fetchPendingDeliveries();
         state.admin.pendingDeliveries =
           pendingDeliveries;
       } catch (err) {
         console.error(err);
         showToast(
           err.message ||
           "ไม่สามารถตรวจสอบรายการค้างส่งได้",
           "error"
         );
         return;
       }
     }
     const batchQtyByProduct = new Map();
     const cumulativeInvalidItem = items.find(item => {
       const productId = String(item.productId || "");
       const qty = Number(item.qty);
       const orderedQty = Number(item.orderedQty);
       const existingOpenQty = pendingDeliveries
         .filter(pending =>
           String(pending.status || "").toUpperCase() === "OPEN" &&
           String(pending.orderId || "") === String(order.orderId || "") &&
           String(pending.productId || "") === productId
         )
         .reduce(
           (sum, pending) =>
             sum + Math.max(0, Number(pending.qty) || 0),
           0
         );
       const batchQty =
         (batchQtyByProduct.get(productId) || 0) + qty;

       batchQtyByProduct.set(productId, batchQty);

       return existingOpenQty + batchQty > orderedQty;
     });

     if (cumulativeInvalidItem) {
       showToast(
         `จำนวนค้างส่งของ "${cumulativeInvalidItem.name || cumulativeInvalidItem.productId}" เกินจำนวนใน PO`,
         "warning"
       );
       return;
     }

     showLoading(
       "กำลังสร้างรายการค้างส่ง..."
     );

     const succeededItems = [];
     const failedItems = [];

     for (const item of items) {
       try {
         const form =
           new URLSearchParams();

         form.append("action", "createPendingDelivery");
         form.append("token", state.admin.token);
         form.append("orderId", order.orderId);
         form.append("poNumber", order.poNumber || "");
         form.append("productId", item.productId);
         form.append("qty", item.qty);
         form.append("orderedQty", item.orderedQty);
         form.append("note", "Bulk Pending Delivery");

         const result =
           await postFormAction(form);

         if (!result?.success) {
           throw new Error(
             result?.error ||
             "Create pending failed"
           );
         }

         succeededItems.push(item);
       } catch (err) {
         failedItems.push({
           item,
           error: err.message || "Create pending failed"
         });
       }
     }

     if (failedItems.length === 0) {
       showToast(
         "สร้างรายการสำเร็จ",
         "success"
       );

       closeOverlay(
         bulkPendingDeliverySheet
       );

       openPendingDeliverySheet();
       return;
     }

     if (succeededItems.length > 0) {
       const successText = succeededItems
         .map(item => `- ${item.name || item.productId}`)
         .join("\n");
       const failureText = failedItems
         .map(({ item, error }) =>
           `- ${item.name || item.productId}: ${error}`
         )
         .join("\n");

       showToast(
         `สร้างสำเร็จ:\n${successText}\n\nสร้างไม่สำเร็จ:\n${failureText}`,
         "warning",
         7000
       );

       closeOverlay(
         bulkPendingDeliverySheet
       );

       openPendingDeliverySheet();
       return;
     }

     showToast(
       "สร้างรายการไม่สำเร็จ\n" +
         failedItems
           .map(({ item, error }) =>
             `- ${item.name || item.productId}: ${error}`
           )
           .join("\n"),
       "error",
       7000
     );

   } finally {
     state.admin.isSubmitting = false;
     safeHideLoading();
   }
 }

async function handleApprove() {
  // 🔒 GUARD: ต้องอยู่ใน admin mode และมี order
  if (state.mode !== "admin" || !state.admin.selectedOrder) return;

  try {
    const o = state.admin.selectedOrder;

    // ✅ CORE: ใช้ API เวอร์ชันใหม่ (มี loading + toast + guard)
    await adminApproveOrder(o.orderId);

    // ✅ ปิดหน้า Order Detail ผ่าน Overlay Manager
    closeOverlay(adminOrderSheet);

    // 🔄 refresh stock + product list
    await refreshProducts();

    // ✅ อนุญาตให้เปิด Orders (เฉพาะ flow นี้)
    allowOpenOrders = true;

    // ✅ กลับไปหน้า Pending Orders เพื่อทำรายการต่อได้ทันที
    await openAdminDashboard("PENDING", true);

  } catch (err) {
    // ❌ ไม่ต้อง alert ซ้ำ
    // toast + error handling จัดการใน adminApproveOrder แล้ว
    console.warn("handleApprove aborted:", err);
  }
}

async function submitStockIn(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.selectedProduct) {
    showToast("Unauthorized", "error");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const qty    = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(qty) || qty <= 0) {
    showToast("จำนวนไม่ถูกต้อง", "warning");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockIn(
      state.selectedProduct.productId,
      qty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

    showToast("รับสต๊อกเข้าแล้ว", "success");

    // 🔄 sync ข้อมูลหลัก + ข้อมูลย้อนหลังทันที
    await refreshProducts();
    await refreshAdminAuditSnapshot();

    // 🧹 reset input
    qtyInput.value = "";
    reasonInput.value = "";

    // ✅ ปิด Stock Action ผ่าน Overlay Manager
    closeOverlay(adminStockActionSheet);

    // ✅ กลับสู่หน้าแม่ของ admin แบบนิ่ง
    finishAdminAction({ refresh: true });

  } catch (err) {
    console.error(err);
    showToast(err.message || "ไม่สามารถรับสต๊อกได้", "error");
  } finally {
    // 🔓 เปิดปุ่มกลับทุกกรณี
    buttons.forEach(b => b.disabled = false);
  }
}

function handleAddImagePreview(input){
  const file = input.files[0];
  if(!file) return;

 try {
   validateProductImageFile(file);
 } catch (err) {
   input.value = "";
   state.addImageFile = null;
   const img = document.getElementById("addImagePreview");
   if (img) {
     img.removeAttribute("src");
     img.style.display = "none";
   }
   showToast(err.message || "ไฟล์รูปไม่ถูกต้อง", "error");
   return;
 }
 
  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("addImagePreview");
    img.src = reader.result;
    img.style.display = "block";

    state.addImageFile = file; // เก็บไว้ใช้ upload
  };
  reader.readAsDataURL(file);
}

 // ================= GLOBAL KEYBOARD SUPPORT =================
 document.addEventListener("keydown", (e) => {
   const activeOverlay = [...document.querySelectorAll(".sheet.show, .side-menu.show")].pop();

   if (e.key === "Escape") {
     const filter = document.getElementById("filterDropdown");
     if (filter?.classList.contains("show")) {
       filter.classList.remove("show");
       document.querySelectorAll(".filter-btn[aria-expanded='true']")
         .forEach(b => syncExpanded(b, false));
       restoreTriggerFocus();
       return;
     }

     const viewerSearch = document.getElementById("viewerSearchWrap");
     if (viewerSearch?.classList.contains("active")) {
       toggleViewerSearch(viewerSearch.querySelector(".search-btn"));
       return;
     }

     const adminSearch = document.getElementById("adminSearchWrap");
     if (adminSearch?.classList.contains("active")) {
       toggleAdminSearch(adminSearch.querySelector(".search-btn"));
       return;
     }

     if (activeOverlay && !state.ui.backdropLocked) {
       if (activeOverlay === mainMenuSheet) return closeMainMenu();
       return closeOverlay(activeOverlay);
     }
   }

   if (e.key === "Tab" && activeOverlay) {
     const focusables = activeOverlay.querySelectorAll(
       'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
     );
     if (!focusables.length) return;

     const first = focusables[0];
     const last = focusables[focusables.length - 1];
    
    if (!activeOverlay.contains(document.activeElement)) {
      e.preventDefault();
      first.focus();
      return;
    }

     if (e.shiftKey && document.activeElement === first) {
       e.preventDefault();
       last.focus();
     } else if (!e.shiftKey && document.activeElement === last) {
       e.preventDefault();
       first.focus();
     }
   }
 });

async function submitOrder(){
  // ❌ ห้ามใช้ state.loading เป็น guard
  if (state.isSubmitting || state.cart.length === 0) return;
 
 const poNumber = String(state.poNumber || "").trim();
 if (!poNumber) {
   showToast("กรุณากรอกเลข PO", "warning");
   const poInput = document.getElementById("poInput");
   if (poInput) poInput.focus();
   return;
 }

  state.isSubmitting = true;
  state.ui.backdropLocked = true;
  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.classList.add("is-submitting");
    submitBtn.setAttribute("aria-busy", "true");
  }

  try {
    // ================= STEP 1: CHECK STOCK =================
    showLoading('กำลังตรวจสอบสต๊อก...');
    const stockCheck = await checkStockBeforeSubmit();

    if (!stockCheck.ok) {
      showToast(stockCheck.message, 'warning');
      throw new Error("STOCK_CHECK_FAILED");
    }

    // ================= STEP 2: CREATE ORDER =================
    updateLoadingText('กำลังสร้างใบสั่งซื้อ...');
    const res = await createOrder();

    if (!res || res.success !== true || !res.data?.orderId) {
      throw new Error("Invalid order response");
    }

    // ================= SUCCESS =================
    const localItems = JSON.parse(JSON.stringify(state.cart));
    const localTotal = state.cart.reduce(
      (sum, item) => sum + Number(item.price) * Number(item.qty),
      0
    );
    const backendItems = res.data.items;
    const hasValidBackendItems =
      Array.isArray(backendItems) &&
      backendItems.length > 0 &&
      backendItems.every(item =>
        item &&
        typeof item === "object" &&
        String(item.productId || "").trim() &&
        Number.isInteger(Number(item.qty)) &&
        Number(item.qty) > 0 &&
        Number.isFinite(Number(item.price))
      );
    const backendTotal = Number(res.data.total);
    const hasValidBackendTotal =
      res.data.total !== null &&
      res.data.total !== "" &&
      Number.isFinite(backendTotal) &&
      backendTotal >= 0;

    state.lastOrder = {
      orderId: res.data.orderId,
      items: JSON.parse(JSON.stringify(
        hasValidBackendItems ? backendItems : localItems
      )),
      total: hasValidBackendTotal ? backendTotal : localTotal,
 createdAt: new Date(),
 poNumber: state.poNumber || ""
    };
   
    saveLastOrder();

    showToast('สร้างใบสั่งซื้อเรียบร้อยแล้ว', 'success');
    showToast("กดปุ่มเพื่อดาวน์โหลดใบสั่งซื้อ", "info", 3000);

    renderLastOrderSheet();
   
// confirmSheet เปิดอยู่แล้ว ไม่ต้อง reopen

    state.cart = [];
    clearCartStorage();
    state.poNumber = "";
    if (typeof renderBadge === "function") renderBadge();
    // 🔴 CHANGED: เคลียร์ตะกร้าแล้วต้องซ่อน/รีเฟรช floating bar
    if (typeof renderFloatingBar === "function") renderFloatingBar();
    
  // ❌ ห้าม auto reset หลังสร้าง order สำเร็จ
    
  } catch(err){
    console.error(err);
    // 🔒 ถ้า fail เพราะ stock-check เรา toast ไปแล้ว ไม่ต้องซ้ำ
    if (err && err.message === "STOCK_CHECK_FAILED") return;

    showToast(
      err.message || 'เกิดข้อผิดพลาดในการสร้างใบสั่งซื้อ',
      'error'
    );
  } finally {
    safeHideLoading();
    state.isSubmitting = false;
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.classList.remove("is-submitting");
      submitBtn.setAttribute("aria-busy", "false");
    }

async function uploadProductImage(file) {
  return new Promise((resolve, reject) => {
    try {
      validateProductImageFile(file);
    } catch (err) {
      reject(err);
      return;
    }

    // 🔴 CHANGED: ให้ error เป็น Error object เสมอ
    if (!state.admin || !state.admin.token) {
      reject(new Error("Missing admin token"));
      return;
    }

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        // 🔴 CHANGED: กัน reader.result ว่าง/ผิดรูปแบบ
        const result = String(reader.result || "");
        const base64 = result.includes(",") ? result.split(",")[1] : "";
        if (!base64) {
          throw new Error("ไม่สามารถอ่านข้อมูลรูปภาพได้");
        }

        const formData = new FormData();
        formData.append("action", "uploadProductImage");
        formData.append("token", state.admin.token);
        formData.append("filename", file.name);
        formData.append("mimeType", file.type || "image/jpeg");
        formData.append("data", base64);

        // 🔴 CHANGED: ใช้ fetchWithTimeout แบบเดียวกับ API อื่น
        const res = await fetchWithTimeout(API_URL, {
          method: "POST",
          body: formData
        }, 30000);

        let json;
        try {
          json = await res.json();
        } catch (_) {
          throw new Error("รูปแบบข้อมูลตอบกลับจากการอัปโหลดไม่ถูกต้อง");
        }

        if (!json || json.success !== true || !json.data?.imageUrl) {
          const rawMessage = json?.message || json?.error || "Upload failed";

          // 🔴 CHANGED: แปลง DriveApp error ให้ debug ง่าย
          if (String(rawMessage).includes("DriveApp")) {
            throw new Error("อัปโหลดรูปไม่สำเร็จ: Apps Script ยังไม่มีสิทธิ์ใช้ DriveApp");
          }

          throw new Error(rawMessage);
        }

        resolve(json.data.imageUrl);
      } catch (err) {
        reject(err instanceof Error ? err : new Error(String(err || "Upload failed")));
      }
    };

    reader.onerror = () => {
      reject(new Error("File read error"));
    };

    reader.readAsDataURL(file);
  });
}
  
async function submitProductEdit(){
  // 🔒 GUARD: กันกดซ้ำ (admin scope only)
  if (state.admin.isSubmitting) return;

  const p = state.selectedProduct;
  if (!p) return;

  state.admin.isSubmitting = true;

  // 🔒 LOCK BUTTON
  const saveBtn = adminProductEditSheet.querySelector(".btn-primary");
  const originalText = saveBtn?.textContent;
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = "กำลังบันทึก...";
  }

  const name   = document.getElementById("editName").value.trim();
  const price  = Number(document.getElementById("editPrice").value);
  const rawCostPrice = document.getElementById("editCostPrice").value.trim();
  const costPrice = rawCostPrice === "" ? null : Number(rawCostPrice);
  const stock  = Number(document.getElementById("editStock").value);
  let status = normalizeProductStatus(
    document.getElementById("editStatus").value
  );
  const newProductId = normalizeProductId(
    document.getElementById("editProductId").value
  );
  const oldProductId = normalizeProductId(p.productId);
  const note   = document.getElementById("editNote")?.value.trim() || "";
  const detailsText =
  document.getElementById("editDetailsText")?.value.trim() || "";

 const compareImages =
   Array.isArray(state.compareImagesDraft)
     ? state.compareImagesDraft.join(",")
     : "";

  // 🔒 Validate
  if (
   !name ||
   !newProductId ||
   !Number.isInteger(price) ||
   costPrice === null ||
   !Number.isInteger(costPrice) ||
   !Number.isInteger(stock) ||
   price < 0 ||
   costPrice < 0 || 
   stock < 0
 ) {
    showToast("ข้อมูลไม่ถูกต้อง", "error");

    // 🔓 คืนสภาพทันที
    state.admin.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  // 🔒 SKU Duplicate Check (วางตรงนี้เท่านั้น)
 const duplicate = state.products.find(x =>
   normalizeProductId(x.productId) === newProductId &&
   normalizeProductId(x.productId) !== oldProductId
 );
 
  if (duplicate) {
    showToast("รหัสสินค้านี้มีอยู่แล้ว", "error");
    state.admin.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  if (stock === 0) {
    status = "out";
  }
 
  let imageUrl = p.image || "";

  try {
    showLoading("กำลังบันทึกการแก้ไขสินค้า...");

    // ถ้ามีการเลือกภาพใหม่ → upload ก่อน
    if (state.editImageFile) {
      validateProductImageFile(state.editImageFile);
      imageUrl = await uploadProductImage(state.editImageFile);
      if (!imageUrl) {
        throw new Error("ไม่สามารถอัปโหลดรูปได้");
      }
    }

    // Update product
    const form = new URLSearchParams();
    form.append("action", "updateProduct");
    form.append("token", state.admin.token);
    form.append("oldProductId", oldProductId);
    form.append("newProductId", newProductId);
    form.append("name", name);
    form.append("price", price);
    form.append("costPrice", costPrice);
    form.append("stock", stock);
    form.append("status", status);
    form.append("image", imageUrl);
    form.append("note", note);
    form.append("detailsText", detailsText);
    form.append("compareImages", compareImages);

    const res = await postFormAction(form);

    showToast("บันทึกการแก้ไขเรียบร้อย", "success");

    state.selectedProduct = null;

    // cleanup
    state.editImageFile = null;
    closeProductEdit();
    await refreshProducts();
    await refreshAdminAuditSnapshot();

  } catch (err) {
    console.error(err);
    showToast(
      err.message || "เกิดข้อผิดพลาดในการบันทึกสินค้า",
      "error"
    );

  } finally {
    // ✅ CLEANUP กลางเดียว (หัวใจ STEP 9)
    safeHideLoading();
    state.admin.isSubmitting = false;

    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
  }
}

function normalizeProductId(value = "") {
   return String(value || "").trim().toUpperCase();
 }

const ALLOWED_PRODUCT_STATUS = ["ready", "ready_plus", "shipping", "warehouse", "out"];

function normalizeProductStatus(value = "") {
  const normalized = String(value || "").trim().toLowerCase();
  return ALLOWED_PRODUCT_STATUS.includes(normalized) ? normalized : "ready";
}

function validateProductImageFile(file) {
  if (!file) return;

  const allowedTypes = ["image/jpeg", "image/png", "image/webp"];
  const maxBytes = 5 * 1024 * 1024;

  if (!allowedTypes.includes(file.type)) {
    throw new Error("รองรับเฉพาะไฟล์ JPG, PNG, WEBP");
  }

  if (file.size > maxBytes) {
    throw new Error("รูปสินค้าต้องมีขนาดไม่เกิน 5MB");
  }
}

async function copyTextToClipboard(text, successMessage) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }
    showToast(successMessage, "success");
  } catch (err) {
    console.error(err);
    showToast("คัดลอกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง", "error");
  }
}

async function pasteBulkProductImportFromClipboard() {
  const input = document.getElementById("bulkProductImportText");
  try {
    if (!navigator.clipboard || typeof navigator.clipboard.readText !== "function") {
      throw new Error("Clipboard API unavailable");
    }
    const text = await navigator.clipboard.readText();
    state.admin.bulkProductImport.rawText = String(text || "");
    state.admin.bulkProductImport.backendErrors = [];
    state.admin.bulkProductImport.summary = "";
    state.admin.bulkProductImport.importedCount = 0;

  }

function downloadBulkProductTemplate() {
  const blob = new Blob([BULK_PRODUCT_SAMPLE], {
    type: "text/tab-separated-values;charset=utf-8"
  });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "bulk-product-template.tsv";
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  showToast("ดาวน์โหลดแม่แบบแล้ว", "success");
}

function handleBulkProductFileUpload(event) {
  const file = event?.target?.files?.[0];
  if (!file) return;

  const fileName = String(file.name || "").toLowerCase();
  if (!fileName.endsWith(".tsv") && !fileName.endsWith(".txt")) {
    showToast("เวอร์ชันนี้รองรับเฉพาะไฟล์ .tsv หรือ .txt", "warning");
    event.target.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    state.admin.bulkProductImport.rawText = String(reader.result || "");
    state.admin.bulkProductImport.backendErrors = [];
    state.admin.bulkProductImport.summary = "";
    state.admin.bulkProductImport.importedCount = 0;
    renderBulkProductImportSheet();
    showToast("อ่านไฟล์แล้ว กรุณาตรวจสอบข้อมูลก่อนนำเข้า", "success");
  };
  reader.onerror = () => {
    showToast("ไม่สามารถอ่านไฟล์ได้ กรุณาลองใหม่อีกครั้ง", "error");
  };
  reader.readAsText(file, "UTF-8");
}
