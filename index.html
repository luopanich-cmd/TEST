function parseBulkProductImportText(rawText) {
  const text = String(rawText || "").replace(/\r/g, "").trimEnd();
  const errors = [];
  const items = [];

  if (!text.trim()) {
    return { items, errors };
  }

  const lines = text
    .split("\n")
    .filter(line => line.trim());

  const firstCells = splitTsvLine(lines[0]);
  const hasHeader = isBulkProductHeaderRow(firstCells);
  const dataLines = hasHeader ? lines.slice(1) : lines;
  const columns = hasHeader
    ? firstCells.map(normalizeBulkHeader)
    : BULK_PRODUCT_COLUMNS;
  const seenSkus = new Set();

  if (dataLines.length > 100) {
    errors.push(bulkImportError(0, "", "items", "นำเข้าได้สูงสุด 100 รายการต่อครั้ง"));
    return { items, errors };
  }

  dataLines.forEach((line, index) => {
    const rowNumber = index + 1;
    const cells = splitTsvLine(line);
    const row = {};

    columns.forEach((column, cellIndex) => {
      if (!column) return;
      row[column] = String(cells[cellIndex] || "").trim();
    });

    const item = normalizeBulkProductImportRow(row);
    validateBulkProductImportRow(item, rowNumber, seenSkus, errors);
    items.push(item);
  });

  if (items.length === 0) {
    errors.push(bulkImportError(1, "", "items", "กรุณาเพิ่มข้อมูลสินค้าอย่างน้อย 1 รายการ"));
  }

  return { items, errors };
}

function splitTsvLine(line) {
  return String(line || "").split("\t");
}

function isBulkProductHeaderRow(cells) {
  const normalized = cells.map(normalizeBulkHeader).filter(Boolean);
  return normalized.includes("productId") &&
    normalized.includes("name") &&
    normalized.includes("price");
}

function normalizeBulkHeader(value) {
  const key = String(value || "").trim().toLowerCase();
  const map = {
    productid: "productId",
    sku: "productId",
    name: "name",
    price: "price",
    costprice: "costPrice",
    cost: "costPrice",
    stock: "stock",
    qty: "stock",
    status: "status",
    image: "image",
    active: "active",
    note: "note",
    detailstext: "detailsText",
    details: "detailsText",
    compareimages: "compareImages"
  };
  return map[key] || "";
}

function normalizeBulkProductImportRow(row) {
  const stock = Number(row.stock);
  const status = Number.isInteger(stock) && stock === 0
    ? "out"
    : String(row.status || "").trim();

  return {
    productId: normalizeProductId(row.productId || ""),
    name: String(row.name || "").trim(),
    price: String(row.price || "").trim(),
    costPrice: String(row.costPrice || "").trim(),
    stock: String(row.stock || "").trim(),
    status,
    image: String(row.image || "").trim(),
    active: String(row.active || "").trim(),
    note: String(row.note || "").trim(),
    detailsText: String(row.detailsText || "").trim(),
    compareImages: String(row.compareImages || "").trim()
  };
}

function validateBulkProductImportRow(item, rowNumber, seenSkus, errors) {
  const allowedStatuses = ["ready", "ready_plus", "shipping", "warehouse", "out"];
  const productId = item.productId;
  const price = Number(item.price);
  const costPrice = Number(item.costPrice);
  const stock = Number(item.stock);

  if (!productId) {
    errors.push(bulkImportError(rowNumber, productId, "productId", "กรุณากรอกรหัสสินค้า"));
  } else if (seenSkus.has(productId)) {
    errors.push(bulkImportError(rowNumber, productId, "productId", "รหัสสินค้าซ้ำในข้อมูลที่วาง"));
  }

  if (productId) {
    seenSkus.add(productId);
  }

  if (!item.name) {
    errors.push(bulkImportError(rowNumber, productId, "name", "กรุณากรอกชื่อสินค้า"));
  }

  if (item.price === "" || !Number.isInteger(price) || price < 0) {
    errors.push(bulkImportError(rowNumber, productId, "price", "ราคาต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"));
  }

  if (item.costPrice === "" || !Number.isInteger(costPrice) || costPrice < 0) {
    errors.push(bulkImportError(rowNumber, productId, "costPrice", "ต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"));
  }

  if (item.stock === "" || !Number.isInteger(stock) || stock < 0) {
    errors.push(bulkImportError(rowNumber, productId, "stock", "จำนวนสต๊อกต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"));
  }

  if (!item.status || !allowedStatuses.includes(item.status)) {
    errors.push(bulkImportError(rowNumber, productId, "status", "สถานะสินค้าไม่ถูกต้อง"));
  }

  if (
    item.active &&
    !["true", "false", "1", "0"].includes(item.active.toLowerCase())
  ) {
    errors.push(bulkImportError(rowNumber, productId, "active", "active ต้องเป็น true/false/1/0 หรือเว้นว่าง"));
  }
}

      </div>
    `;
  }

  const errorsByRow = new Map();
  errors.forEach(error => {
    const row = Number(error.row) || 0;
    if (!errorsByRow.has(row)) errorsByRow.set(row, []);
    errorsByRow.get(row).push(error);
  });

  const cards = items.map((item, index) => {
    const rowNumber = index + 1;
    const rowErrors = errorsByRow.get(rowNumber) || [];
    return `
      <div class="bulk-preview-card ${rowErrors.length ? "has-error" : ""}">
        <div class="name">${esc(item.productId || "(ยังไม่มีรหัสสินค้า)")}</div>

          ${esc(item.name || "(ยังไม่มีชื่อสินค้า)")}<br>
          ราคา: ${esc(item.price)} | ต้นทุน: ${esc(item.costPrice)} | สต๊อก: ${esc(item.stock)} | สถานะ: ${esc(item.status || "-")}
        </div>
        ${
          rowErrors.length
            ? `<ul class="bulk-error-list">${rowErrors.map(error => `<li>${esc(error.field)}: ${esc(getBulkImportErrorMessage(error))}</li>`).join("")}</ul>`
            : `<div class="status-badge status-approved compact" style="margin-top:8px">พร้อมนำเข้า</div>`
        }
      </div>
    `;
  }).join("");

  const globalErrors = errorsByRow.get(0) || [];

  return `
    ${globalErrors.length ? `<ul class="bulk-error-list">${globalErrors.map(error => `<li>${esc(getBulkImportErrorMessage(error))}</li>`).join("")}</ul>` : ""}
    ${renderBulkProductDataPreviewTable(items, errorsByRow)}
    <div class="bulk-preview-list">${cards}</div>
  `;
}

async function submitBulkProductImport(btn) {
  if (!ensureAdminSessionForBulkImport()) return;
  if (state.admin.isSubmitting) return;

  previewBulkProductImport();

  const bulkState = state.admin.bulkProductImport;
  if (!bulkState.items.length || bulkState.errors.length) {
    showToast("กรุณาแก้ไขข้อผิดพลาดก่อนนำเข้าสินค้า", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  renderBulkProductImportSheet();

  try {
    showLoading("กำลังนำเข้าสินค้า...");
    const form = new URLSearchParams();
    form.append("action", "bulkAddProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(bulkState.items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const imported = Number(json.imported || json.data?.imported || 0);
      bulkState.backendErrors = [];
      bulkState.importedCount = imported;
      bulkState.summary = `นำเข้าสินค้าสำเร็จ ${imported} รายการ`;
      showToast(bulkState.summary, "success");
      await refreshProducts();
      renderBulkProductImportSheet();
      return;
    }

    bulkState.backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors
      : [];
    bulkState.summary = "";
    bulkState.importedCount = 0;
    renderBulkProductImportSheet();
    if (isAuthError(json?.error)) {
      showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(getBulkImportErrorMessage({ message: json?.error }) || "นำเข้าสินค้าไม่สำเร็จ", "error");
  } catch (err) {
    console.error(err);
    showToast("นำเข้าสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง", "error");
  } finally {
    safeHideLoading();
    state.admin.isSubmitting = false;
    renderBulkProductImportSheet();
  }
}

/* =========================================================
   🔤 THAI BAHT TEXT CONVERTER
========================================================= */
function numberToThaiText(num) {
  if (isNaN(num)) return "";

  const digit = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
  const position = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];

  function convert(n) {
    let result = "";
    const str = parseInt(n, 10).toString();
    const len = str.length;

    for (let i = 0; i < len; i++) {
      const d = parseInt(str.charAt(i));
      const pos = len - i - 1;

      if (d === 0) continue;

      if (pos === 0 && d === 1 && len > 1) {
        result += "เอ็ด";
      } else if (pos === 1 && d === 2) {
        result += "ยี่";
      } else if (pos === 1 && d === 1) {
        result += "";
      } else {
        result += digit[d];
      }

      result += position[pos];
    }

    return result;
  }

  if (num === 0) return "ศูนย์บาทถ้วน";

  return convert(num) + "บาทถ้วน";
}

function exportOrderPNG() {
  const order = state.lastOrder;

  /* ================= A4 CONFIG (FIXED) ================= */
  const cfg = {
    width: 794,          // A4 width @96dpi
    height: 1123,        // 🔥 A4 height fixed
    padding: 64,
    titleSize: 32,
    textSize: 18,
    lineHeight: 34
  };
  /* ================= CANVAS SIZE ================= */
  const items = Array.isArray(order.items) ? order.items : [];

  const po = order.poNumber
    ? String(order.poNumber)
    : "-";

  const canvas = document.createElement("canvas");
  canvas.width = cfg.width;
  canvas.height = cfg.height;  // 🔥 FIXED A4

  const ctx = canvas.getContext("2d");

  /* ================= BACKGROUND ================= */
  ctx.fillStyle = "#f2f2f7";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

/* ================= CARD ================= */
  ctx.fillStyle = "#ffffff";

  // ✅ Canvas shadow uses token (sync light/dark)
  const getToken = (name) =>
    getComputedStyle(document.documentElement)
      .getPropertyValue(name)
      .trim();

  const parseShadowToken = (v) => {
    // expects: "0 10px 30px rgba(0,0,0,.08)" (single shadow)
    const m = String(v).match(
      /^\s*(-?\d+(?:\.\d+)?)px?\s+(-?\d+(?:\.\d+)?)px?\s+(\d+(?:\.\d+)?)px?\s+(.+)\s*$/i
    );
    if (!m) return null;
    return {
      x: Number(m[1]) || 0,
      y: Number(m[2]) || 0,
      blur: Number(m[3]) || 0,
      color: (m[4] || "rgba(0,0,0,.08)").trim()
    };
  };

  let canvasShadowRaw =
    getToken("--shadow-canvas-card") || getToken("--shadow-card");

  // ✅ resolve var(--shadow-*) for custom properties (Safari/Chrome may return literal "var(...)")
  const varMatch = String(canvasShadowRaw).match(/var\((--[^)]+)\)/);
  if (varMatch && varMatch[1]) {
    canvasShadowRaw = getToken(varMatch[1]) || canvasShadowRaw;
  }
  const sh = parseShadowToken(canvasShadowRaw);
  if (sh) {
    ctx.shadowColor = sh.color;
    ctx.shadowBlur = sh.blur;
    ctx.shadowOffsetX = sh.x;
    ctx.shadowOffsetY = sh.y;
  } else {
    // fallback (should rarely happen)
    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 6;
  }

  ctx.beginPath();

  if (typeof ctx.roundRect === "function") {
    ctx.roundRect(8, 8, canvas.width - 16, canvas.height - 16, 18);
  } else {
    const x = 8;
    const y0 = 8;
    const w = canvas.width - 16;
    const h = canvas.height - 16;
    const r = 18;

    ctx.moveTo(x + r, y0);
    ctx.lineTo(x + w - r, y0);
    ctx.quadraticCurveTo(x + w, y0, x + w, y0 + r);
    ctx.lineTo(x + w, y0 + h - r);
    ctx.quadraticCurveTo(x + w, y0 + h, x + w - r, y0 + h);
    ctx.lineTo(x + r, y0 + h);
    ctx.quadraticCurveTo(x, y0 + h, x, y0 + h - r);
    ctx.lineTo(x, y0 + r);
    ctx.quadraticCurveTo(x, y0, x + r, y0);
  }

  ctx.fill();
  ctx.shadowColor = "transparent";

  /* ================= TEXT ================= */
  let y = cfg.padding + cfg.lineHeight;
  ctx.fillStyle = "#000";

  /* ===== TITLE ===== */
  ctx.font = `700 ${cfg.titleSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillText("ใบสั่งซื้อ", cfg.padding, y);
  y += cfg.lineHeight + 8;

  /* ===== HEADER BASE LINE ===== */
  const headerTopY = y;

  /* ===== COMPANY BLOCK ===== */
ctx.font = `700 ${cfg.textSize + 4}px -apple-system`;
ctx.fillText("ร้านล้อพาณิชย์", cfg.padding, headerTopY);

ctx.fillText(
   "7/13 หมู่ 5",
   cfg.padding,
   headerTopY + cfg.lineHeight
 );
 ctx.fillText(
   "ต.หนองแขม อ.หนองแค",
   cfg.padding,
   headerTopY + cfg.lineHeight * 2
 );
 ctx.fillText(
   "จ.สระบุรี 18140",
   cfg.padding,
   headerTopY + cfg.lineHeight * 3
 );

/* ===== DOCUMENT META ===== */
const rightX = canvas.width - cfg.padding;

  ctx.textAlign = "right";
  ctx.fillText(`เลขที่: ${order.orderId}`, rightX, headerTopY);
 ctx.fillText(`PO: ${po}`, rightX, headerTopY + cfg.lineHeight);
 const docDate = new Date(order.createdAt);
 ctx.fillText(
   `วันที่: ${docDate.toLocaleDateString("th-TH")}`,
   rightX,
   headerTopY + cfg.lineHeight * 2
 );

  ctx.textAlign = "left";
  y = headerTopY + cfg.lineHeight * 5;


  /* ===== DIVIDER ===== */
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

/* ================= ITEMS (GRID TABLE) ================= */
  const tableTopY = y;
  const rowHeight = 42;

  const col = {
    no: cfg.padding,
    name: cfg.padding + 60,
    qty: canvas.width - cfg.padding - 260,
    price: canvas.width - cfg.padding - 180,
    total: canvas.width - cfg.padding - 90
  };

  ctx.font = `700 ${cfg.textSize}px -apple-system`;

  // HEADER
  ctx.fillText("ลำดับ", col.no, y);
  ctx.fillText("รายการสินค้า", col.name, y);
  ctx.fillText("จำนวน", col.qty, y);
  ctx.fillText("ราคา", col.price, y);
  ctx.fillText("รวม", col.total, y);

  y += 16;

  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();

  y += rowHeight - 16;

  ctx.font = `${cfg.textSize}px -apple-system`;

  items.forEach((i, index) => {
    const total = Number(i.price) * Number(i.qty);

    ctx.fillText(String(index + 1), col.no, y);

    // truncate name (single line grid)
    let name = `[${i.productId}] ${i.name}`;
    while (ctx.measureText(name).width > (col.qty - col.name - 20)) {
      name = name.slice(0, -1);
    }

    ctx.fillText(name, col.name, y);

    ctx.textAlign = "right";

    ctx.fillText(`฿${Number(i.price).toLocaleString()}`, col.price + 60, y);
    ctx.fillText(`฿${total.toLocaleString()}`, col.total + 80, y);
    ctx.textAlign = "left";

    // horizontal line
    ctx.beginPath();
    ctx.moveTo(cfg.padding, y + 16);
    ctx.lineTo(canvas.width - cfg.padding, y + 16);
    ctx.strokeStyle = "#ddd";
    ctx.stroke();

    y += rowHeight;
  });
  
  /* ===== DIVIDER ===== */
  y += 4;
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

  /* ================= TOTAL ================= */
  ctx.font = `700 ${cfg.textSize + 4}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const safeTotal = Number(order.total) || 0;
  const totalText = `ยอดรวม: ฿${safeTotal.toLocaleString()}`;
  const tw = ctx.measureText(totalText).width;
  ctx.fillText(
    totalText,
    canvas.width - cfg.padding - tw,
    y
  );

  /* ===== THAI TEXT TOTAL ===== */
  y += cfg.lineHeight;
  ctx.font = `${cfg.textSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const thaiText = `(${numberToThaiText(safeTotal)})`;
  const thaiWidth = ctx.measureText(thaiText).width;
  ctx.fillText(
    thaiText,
    canvas.width - cfg.padding - thaiWidth,
    y
  );

  /* ================= DOWNLOAD (FIXED) ================= */
  const a = document.createElement("a");
  a.download = `order-${order.orderId}.png`;

  // 🔴 FIX: ต้อง append เข้า DOM (Mobile Safari / Chrome policy)
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);

// 🔍 DEBUG: Trace CSS winners for #floatingBar
// เป้าหมาย: หา "rule ไหน" ที่ชนะ opacity/transform จริง
// =========================
window.traceBarCSS = function traceBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[traceBarCSS] #floatingBar not found"); return []; }

  const props = ["opacity","transform","pointer-events"];
  const out = [];

  const tryPushRule = (sheet, rule, ruleIndex, sel) => {
    const style = rule.style;
    const hit = {
      sheet: sheet.href || "[inline <style>]",
      ruleIndex,
      selector: sel,
      cssText: rule.cssText
    };
    // เก็บเฉพาะค่าที่เกี่ยวข้อง
    props.forEach(p => {
      const v = style.getPropertyValue(p);
      if (v) {
        hit[p] = v.trim();
        hit[p + "_important"] = style.getPropertyPriority(p) === "important";
      }
    });
    // ดันเฉพาะ rule ที่แตะ props จริง
    if (props.some(p => hit[p])) out.push(hit);
  };

  for (const sheet of Array.from(document.styleSheets)) {
    let rules;
    try { rules = sheet.cssRules; } catch(e) { continue; } // cross-origin
    if (!rules) continue;

    for (let i = 0; i < rules.length; i++) {
      const r = rules[i];
      if (!r || !r.selectorText) continue;
      // รองรับ selector หลายตัวคั่นด้วย comma
      const sels = r.selectorText.split(",").map(s => s.trim()).filter(Boolean);
      for (const sel of sels) {
        try {
          if (bar.matches(sel)) {
            tryPushRule(sheet, r, i, sel);
          }
        } catch(_) {}
      }
    }
  }

  const cs = getComputedStyle(bar);
  console.log("===== traceBarCSS =====");
  console.log("className:", bar.className);
  console.table({
    computed_opacity: cs.opacity,
    computed_transform: cs.transform,
    computed_pointerEvents: cs.pointerEvents
  });
  console.table(out);
  return out;
};

window.spyBar = function spyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[spyBar] #floatingBar not found"); return; }
  if (bar.__spyInstalled) { console.warn("[spyBar] already installed"); return; }
  bar.__spyInstalled = true;

  // 1) spy classList.add/remove/toggle
  const cl = bar.classList;
  ["add","remove","toggle"].forEach((m) => {
    const orig = cl[m].bind(cl);
    cl[m] = (...args) => {
      console.groupCollapsed(`🧩 [spyBar] classList.${m}(${args.join(", ")})  | before="${bar.className}"`);
      console.trace();
      const r = orig(...args);
      console.log(`after="${bar.className}"`);
      console.groupEnd();
      return r;
    };
  });

  // 2) spy style attribute changes (รวมถึง bar.style.opacity/transform ที่ไปลงเป็น inline)
  const mo = new MutationObserver((list) => {
    for (const it of list) {
      if (it.type === "attributes" && it.attributeName === "style") {
        console.groupCollapsed(`🎨 [spyBar] style changed: ${bar.getAttribute("style") || "(empty)"}`);
        console.trace();
        console.groupEnd();
      }
    }
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["style"] });
  bar.__spyMO = mo;

  console.log("✅ spyBar installed. Now reproduce the bug.");
};

window.testBarHide = function testBarHide(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[testBarHide] #floatingBar not found"); return; }

  bar.className = "show scroll-hide";
  requestAnimationFrame(() => {
    const cs1 = getComputedStyle(bar);
    console.log("[testBarHide] show+scroll-hide => opacity:", cs1.opacity, "transform:", cs1.transform);
    window.traceBarCSS();

    bar.className = "show";
    requestAnimationFrame(() => {
      const cs2 = getComputedStyle(bar);
      console.log("[testBarHide] show => opacity:", cs2.opacity, "transform:", cs2.transform);
      window.traceBarCSS();
    });
  });
};  
 
</script>
  
<!-- Toast Container -->
<div id="toast-container"
  aria-atomic="false"></div>

<!-- Floating Bottom Bar -->
<div id="floatingBar"></div> 

<!-- Back to Top -->
<button id="btnTop" class="btnTop" type="button" aria-label="กลับขึ้นด้านบน" title="กลับขึ้นด้านบน">
  ↑
</button>  

<!-- Loading Overlay -->
<div id="loading-overlay"
  class="hidden"
  role="status"
  aria-live="polite"
  aria-busy="false"
  aria-hidden="true">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loading-text">กำลังดำเนินการ...</div>
  </div>
</div>

  
</body>
</html>
