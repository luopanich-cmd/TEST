function validatePartnerCatalogInput() {
  const partnerState = state.admin.partnerCatalog;
  const partnerId = String(partnerState.partnerId || "").trim();
  const productIds = getPartnerCatalogSelectedSkus();
  const expiresAt = getPartnerCatalogExpiresAt();
  const expiresTime = expiresAt ? new Date(expiresAt).getTime() : NaN;

  if (!partnerId) {
    return { valid: false, message: t("partnerIdRequired", "กรุณาระบุรหัสคู่ค้า") };
  }
  if (!expiresAt || Number.isNaN(expiresTime) || expiresTime <= Date.now()) {
    return { valid: false, message: t("partnerExpiryFutureRequired", "กรุณาระบุวันหมดอายุที่อยู่ในอนาคต") };
  }
  if (!productIds.length) {
    return { valid: false, message: t("selectAtLeastOneProduct", "กรุณาเลือกสินค้าอย่างน้อย 1 รายการ") };
  }
  if (productIds.length > 100) {
    return { valid: false, message: t("partnerLinkMaxItems", "เลือกรายการสินค้าได้สูงสุด 100 รายการต่อหนึ่งลิงก์") };
  }
  if (!state.admin.token) {
    return { valid: false, message: t("adminTokenMissingLoginAgain", "ไม่พบ admin token กรุณาเข้าสู่ระบบใหม่") };
  }

  return {
    valid: true,
    partnerId,
    expiresAt,
    productIds,
    label: String(partnerState.label || "").trim()
  };
}

async function createPartnerCatalogLink(btn) {
  if (!ensureAdminSessionForPartnerCatalog()) return;
  if (state.admin.isSubmitting) return;

  const validation = validatePartnerCatalogInput();
  if (!validation.valid) {
    state.admin.partnerCatalog.error = validation.message;
    renderPartnerCatalogSheet();
    return;
  }

  state.admin.isSubmitting = true;
  state.admin.partnerCatalog.error = "";
  renderPartnerCatalogSheet();

  try {
    showLoading(t("creatingPartnerLink", "กำลังสร้างลิงก์คู่ค้า..."));
    const form = new URLSearchParams();
    form.append("action", "createPartnerLink");
    form.append("token", state.admin.token);
    form.append("partnerId", validation.partnerId);
    form.append("expiresAt", validation.expiresAt);
    form.append("productIds", JSON.stringify(validation.productIds));
    form.append("label", validation.label);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      state.admin.partnerCatalog.result = json.data || {};
      state.admin.partnerCatalog.error = "";
      showToast(t("partnerLinkCreated", "สร้างลิงก์คู่ค้าสำเร็จ"), "success");
      renderPartnerCatalogSheet();
      return;
    }

    if (isAuthError(json?.error)) {
      showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
      exitAdmin({ silent: true });
      return;
    }

    state.admin.partnerCatalog.error = json?.error || json?.message || t("createPartnerLinkFailed", "สร้างลิงก์คู่ค้าไม่สำเร็จ");
    renderPartnerCatalogSheet();
  } catch (err) {
    console.error(err);
    state.admin.partnerCatalog.error = err.message || t("createPartnerLinkFailedRetry", "สร้างลิงก์คู่ค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
    renderPartnerCatalogSheet();
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderPartnerCatalogSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

async function copyPartnerCatalogLink() {
  const result = state.admin.partnerCatalog.result;
  const url = getPartnerCatalogResultUrl(result);
  if (!url) {
    showToast(t("noLinkToCopy", "ไม่พบลิงก์สำหรับคัดลอก"), "warning");
    return;
  }

  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(url);
    } else {
      const textarea = document.createElement("textarea");
      textarea.value = url;
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }
    showToast(t("linkCopied", "คัดลอกลิงก์แล้ว"), "success");
  } catch (err) {
    console.error(err);
    showToast(t("linkCopyFailed", "คัดลอกลิงก์ไม่สำเร็จ กรุณาคัดลอกจากช่องข้อความ"), "warning");
  }
}

function getPartnerLinkStatusClass(link) {
  const status = String(link?.status || "").trim().toLowerCase();
  if (link?.isExpired) return "status-pending";
  if (status === "active") return "status-approved";
  if (status === "disabled") return "status-neutral";
  return "status-neutral";
}

function getPartnerLinkStatusLabel(link) {
  const status = String(link?.status || "").trim().toLowerCase();
  if (link?.isExpired) return t("expired", "หมดอายุ");
  return {
    active: t("activeNow", "ใช้งานอยู่"),
    disabled: t("disabledDisplay", "ปิดใช้งาน")
  }[status] || (status || "-");
}

async function loadPartnerLinks() {
  if (!ensureAdminSessionForPartnerCatalog()) return;

  const partnerState = state.admin.partnerCatalog;
  partnerState.linkLoading = true;
  partnerState.linkError = "";
  partnerState.linkStatusMessage = "";
  partnerState.view = "links";
  partnerState.linkDetail = null;
  renderPartnerCatalogSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "listPartnerLinks");
    form.append("token", state.admin.token);
    form.append("limit", String(partnerState.linkLimit || 50));
    form.append("offset", String(partnerState.linkOffset || 0));
    if (partnerState.linkStatus && partnerState.linkStatus !== "all") {
      form.append("status", partnerState.linkStatus);
    }
    if (String(partnerState.linkPartnerId || "").trim()) {
      form.append("partnerId", partnerState.linkPartnerId.trim());
    }
    if (String(partnerState.linkQ || "").trim()) {
      form.append("q", partnerState.linkQ.trim());
    }

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || t("loadPartnerLinksFailed", "โหลดลิงก์คู่ค้าไม่สำเร็จ"));
    }

    partnerState.links = Array.isArray(json.data?.links)
      ? json.data.links
      : [];
    partnerState.linkTotal = Number(json.data?.total || 0);
    partnerState.linkLimit = Number(json.data?.limit || partnerState.linkLimit || 50);
    partnerState.linkOffset = Number(json.data?.offset || 0);
    partnerState.linkError = "";
  } catch (err) {
    console.error(err);
    partnerState.links = [];
    partnerState.linkTotal = 0;
    partnerState.linkError = err.message || t("loadPartnerLinksFailed", "โหลดลิงก์คู่ค้าไม่สำเร็จ");
  } finally {
    partnerState.linkLoading = false;
    renderPartnerCatalogSheet();
  }
}

async function updatePartnerLinkStatusFromAdmin(linkId, status) {
  if (!ensureAdminSessionForPartnerCatalog()) return;

  const partnerState = state.admin.partnerCatalog;
  if (partnerState.linkStatusSubmitting) return;

  const cleanLinkId = String(linkId || "").trim();
  const cleanStatus = String(status || "").trim().toLowerCase();
  if (!cleanLinkId || !cleanStatus) return;

  partnerState.linkStatusSubmitting = true;
  partnerState.linkStatusMessage = t("updatingLinkStatus", "กำลังอัปเดตสถานะลิงก์...");
  partnerState.linkError = "";
  renderPartnerCatalogSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "updatePartnerLinkStatus");
    form.append("token", state.admin.token);
    form.append("linkId", cleanLinkId);
    form.append("status", cleanStatus);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || t("updateLinkStatusFailed", "อัปเดตสถานะลิงก์ไม่สำเร็จ"));
    }

    const updatedLink = json.data?.link || null;
    if (updatedLink) {
      if (partnerState.linkDetail?.link?.linkId === updatedLink.linkId) {
        partnerState.linkDetail.link = {
          ...partnerState.linkDetail.link,
          ...updatedLink
        };
      }
      partnerState.links = partnerState.links.map(link =>
        link.linkId === updatedLink.linkId
          ? { ...link, ...updatedLink }
          : link
      );
    }

    partnerState.linkStatusMessage = t("linkStatusUpdated", "อัปเดตสถานะลิงก์แล้ว");
    showToast(t("linkStatusUpdated", "อัปเดตสถานะลิงก์แล้ว"), "success");
  } catch (err) {
    console.error(err);
    partnerState.linkStatusMessage = "";
    partnerState.linkError = err.message || t("updateLinkStatusFailed", "อัปเดตสถานะลิงก์ไม่สำเร็จ");
    showToast(partnerState.linkError, "error");
  } finally {
    partnerState.linkStatusSubmitting = false;
    renderPartnerCatalogSheet();
  }
}

async function updatePartnerRequestStatusFromAdmin(requestId, status) {
  if (!ensureAdminSessionForPartnerRequests()) return;
  if (state.admin.partnerRequests.statusSubmitting) return;

  const cleanRequestId = String(requestId || "").trim();
  const cleanStatus = String(status || "").trim().toLowerCase();
  if (!cleanRequestId || !cleanStatus) return;

  const requestState = state.admin.partnerRequests;
  requestState.statusSubmitting = true;
  requestState.statusMessage = t("updatingRequestStatus", "กำลังอัปเดตสถานะ...");
  requestState.error = "";
  renderPartnerRequestsSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "updatePartnerRequestStatus");
    form.append("token", state.admin.token);
    form.append("requestId", cleanRequestId);
    form.append("status", cleanStatus);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || t("updateRequestStatusFailed", "อัปเดตสถานะคำขอไม่สำเร็จ"));
    }

    const updatedRequest = json.data?.request || null;
    if (updatedRequest) {
      if (requestState.detail?.request?.requestId === updatedRequest.requestId) {
        requestState.detail.request = {
          ...requestState.detail.request,
          ...updatedRequest
        };
      }
      requestState.requests = requestState.requests.map(request =>
        request.requestId === updatedRequest.requestId
          ? { ...request, ...updatedRequest }
          : request
      );
    }

    requestState.statusMessage = t("requestStatusUpdated", "อัปเดตสถานะแล้ว");
    showToast(t("requestStatusUpdated", "อัปเดตสถานะคำขอแล้ว"), "success");
  } catch (err) {
    console.error(err);
    requestState.statusMessage = "";
    requestState.error = err.message || t("updateRequestStatusFailed", "อัปเดตสถานะคำขอไม่สำเร็จ");
    showToast(requestState.error, "error");
  } finally {
    requestState.statusSubmitting = false;
    renderPartnerRequestsSheet();
  }
}

function setPartnerRequestConvertPoNumber(value) {
  state.admin.partnerRequests.convertPoNumber = value || "";
  state.admin.partnerRequests.convertError = "";
}

function normalizePoNumberForCompare(value) {
  return String(value || "").trim().toLowerCase();
}

function findDuplicatePoOrders(poNumber) {
  const normalizedPo = normalizePoNumberForCompare(poNumber);
  if (!normalizedPo || !Array.isArray(state.admin.orders)) return [];

  return state.admin.orders.filter(order =>
    normalizePoNumberForCompare(order?.poNumber) === normalizedPo
  );
}

function confirmDuplicatePoBeforePartnerConvert(poNumber) {
  const duplicates = findDuplicatePoOrders(poNumber);
  if (!duplicates.length) return true;

  const detailText = duplicates
    .slice(0, 3)
    .map(order => {
      const parts = [
        `${t("orderNumber", "เลขออเดอร์")}: ${order?.orderId || "-"}`,
        `${t("status", "สถานะ")}: ${getAdminOrderStatusLabel(order?.status || "-")}`,
        `${t("source", "แหล่งที่มา")}: ${getAdminOrderSourceDisplayLabel(order)}`
      ];
      if (order?.partnerRequestId) {
        parts.push(`${t("partnerRequestId", "เลขคำขอคู่ค้า")}: ${order.partnerRequestId}`);
      }
      return parts.join(" | ");
    })
    .join("\n");

  const moreText = duplicates.length > 3
    ? `\n${formatUiText("andMoreOrders", { count: duplicates.length - 3 }, "...และอีก {count} ออเดอร์")}`
    : "";

  return window.confirm(
    formatUiText("duplicatePoPartnerConvertConfirm", { po: poNumber, details: detailText, more: moreText }, "พบเลข PO ซ้ำ: {po}\n\n{details}{more}\n\nต้องการสร้างออเดอร์ด้วย PO นี้ต่อหรือไม่?")
  );
}

async function checkDuplicatePo(poNumber) {
  const form = new URLSearchParams();
  form.append("action", "checkDuplicatePo");
  form.append("poNumber", String(poNumber || "").trim());

  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 8000);
  const json = await res.json();

  if (!json || json.success !== true) {
    throw new Error(json?.message || json?.error || "Duplicate PO lookup failed");
  }

  return json.data || { duplicate: false, matches: [] };
}

async function confirmDuplicatePoBeforeCreateOrder(poNumber) {
  let result;
  try {
    result = await checkDuplicatePo(poNumber);
  } catch (err) {
    console.warn("Duplicate PO lookup failed; continuing createOrder flow", err);
    return true;
  }

  const matches = Array.isArray(result?.matches) ? result.matches : [];
  if (!result?.duplicate || !matches.length) return true;

  const detailText = matches
    .slice(0, 3)
    .map(order => {
      const parts = [
        `${t("orderNumber", "เลขออเดอร์")}: ${order?.orderId || "-"}`,
        `${t("status", "สถานะ")}: ${getAdminOrderStatusLabel(order?.status || "-")}`,
        `${t("source", "แหล่งที่มา")}: ${esc(order?.source || "-")}`
      ];
      if (order?.partnerRequestId) {
        parts.push(`${t("partnerRequestId", "เลขคำขอคู่ค้า")}: ${order.partnerRequestId}`);
      }
      return parts.join(" | ");
    })
    .join("\n");

  const moreText = matches.length > 3
    ? `\n${formatUiText("andMoreOrders", { count: matches.length - 3 }, "...และอีก {count} ออเดอร์")}`
    : "";

  return window.confirm(
    formatUiText("duplicatePoPartnerCreateConfirm", { po: poNumber, details: detailText, more: moreText }, "พบเลข PO ซ้ำ: {po}\n\n{details}{more}\n\nต้องการสร้างใบสั่งซื้อด้วย PO นี้ต่อหรือไม่?")
  );
}

async function convertPartnerRequestToOrderFromAdmin(requestId) {
  if (!ensureAdminSessionForPartnerRequests()) return;

  const requestState = state.admin.partnerRequests;
  if (requestState.convertSubmitting) return;

  const cleanRequestId = String(requestId || "").trim();
  const poInput = document.getElementById("partnerRequestConvertPoNumber");
  const poNumber = String(poInput?.value || requestState.convertPoNumber || "").trim();

  if (!cleanRequestId) return;

  if (!poNumber) {
    requestState.convertError = t("enterPoBeforeCreateOrder", "กรุณาระบุเลข PO ก่อนสร้างออเดอร์");
    requestState.convertResult = null;
    renderPartnerRequestsSheet();
    return;
  }

  if (!confirmDuplicatePoBeforePartnerConvert(poNumber)) {
    requestState.convertError = t("duplicatePoCancelled", "ยกเลิกการสร้างใบสั่งซื้อ เนื่องจากพบเลข PO ซ้ำ");
    requestState.convertResult = null;
    renderPartnerRequestsSheet();
    return;
  }

  requestState.convertPoNumber = poNumber;
  requestState.convertSubmitting = true;
  requestState.convertError = "";
  requestState.convertResult = null;
  renderPartnerRequestsSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "convertPartnerRequestToOrder");
    form.append("token", state.admin.token);
    form.append("requestId", cleanRequestId);
    form.append("poNumber", poNumber);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || t("createOrderFromRequestFailed", "สร้างออเดอร์จากคำขอไม่สำเร็จ"));
    }

    requestState.convertResult = json.data || null;
    requestState.convertError = "";
    requestState.convertPoNumber = "";
    showToast(t("orderCreatedPendingApproval", "สร้างออเดอร์แล้ว รออนุมัติในออเดอร์รออนุมัติ"), "success");

    try {
      state.admin.orders = await fetchOrders();
    } catch (refreshErr) {
      console.error("refresh orders after partner conversion failed:", refreshErr);
    }
  } catch (err) {
    console.error(err);
    requestState.convertResult = null;
    requestState.convertError = err.message || t("createOrderFromRequestFailed", "สร้างออเดอร์จากคำขอไม่สำเร็จ");
    showToast(requestState.convertError, "error");
  } finally {
    requestState.convertSubmitting = false;
    renderPartnerRequestsSheet();
  }
}

/* =========================================================
   🔤 THAI BAHT TEXT CONVERTER
========================================================= */
function numberToThaiText(num) {
  if (isNaN(num)) return "";

  const digit = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
  const position = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];

  function convert(n) {
    let result = "";
    const str = parseInt(n, 10).toString();
    const len = str.length;

    for (let i = 0; i < len; i++) {
      const d = parseInt(str.charAt(i));
      const pos = len - i - 1;

      if (d === 0) continue;

      if (pos === 0 && d === 1 && len > 1) {
        result += "เอ็ด";
      } else if (pos === 1 && d === 2) {
        result += "ยี่";
      } else if (pos === 1 && d === 1) {
        result += "";
      } else {
        result += digit[d];
      }

      result += position[pos];
    }

    return result;
  }

  if (num === 0) return "ศูนย์บาทถ้วน";

  return convert(num) + "บาทถ้วน";
}
  
/* ================= EXPORT ORDER PNG (FINAL) ================= */
function exportOrderPNG() {
  const order = state.lastOrder;
  if (!order) return;

  /* ================= A4 CONFIG (FIXED) ================= */
  const cfg = {
    width: 794,          // A4 width @96dpi
    height: 1123,        // 🔥 A4 height fixed
    padding: 64,
    titleSize: 32,
    textSize: 18,
    lineHeight: 34
  };
  /* ================= CANVAS SIZE ================= */
  const items = Array.isArray(order.items) ? order.items : [];

  const po = order.poNumber
    ? String(order.poNumber)
    : "-";

  const canvas = document.createElement("canvas");
  canvas.width = cfg.width;
  canvas.height = cfg.height;  // 🔥 FIXED A4

  const ctx = canvas.getContext("2d");

  /* ================= BACKGROUND ================= */
  ctx.fillStyle = "#f2f2f7";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

/* ================= CARD ================= */
  ctx.fillStyle = "#ffffff";

  // ✅ Canvas shadow uses token (sync light/dark)
  const getToken = (name) =>
    getComputedStyle(document.documentElement)
      .getPropertyValue(name)
      .trim();

  const parseShadowToken = (v) => {
    // expects: "0 10px 30px rgba(0,0,0,.08)" (single shadow)
    const m = String(v).match(
      /^\s*(-?\d+(?:\.\d+)?)px?\s+(-?\d+(?:\.\d+)?)px?\s+(\d+(?:\.\d+)?)px?\s+(.+)\s*$/i
    );
    if (!m) return null;
    return {
      x: Number(m[1]) || 0,
      y: Number(m[2]) || 0,
      blur: Number(m[3]) || 0,
      color: (m[4] || "rgba(0,0,0,.08)").trim()
    };
  };

  let canvasShadowRaw =
    getToken("--shadow-canvas-card") || getToken("--shadow-card");

  // ✅ resolve var(--shadow-*) for custom properties (Safari/Chrome may return literal "var(...)")
  const varMatch = String(canvasShadowRaw).match(/var\((--[^)]+)\)/);
  if (varMatch && varMatch[1]) {
    canvasShadowRaw = getToken(varMatch[1]) || canvasShadowRaw;
  }
  const sh = parseShadowToken(canvasShadowRaw);
  if (sh) {
    ctx.shadowColor = sh.color;
    ctx.shadowBlur = sh.blur;
    ctx.shadowOffsetX = sh.x;
    ctx.shadowOffsetY = sh.y;
  } else {
    // fallback (should rarely happen)
    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 6;
  }

  ctx.beginPath();

  if (typeof ctx.roundRect === "function") {
    ctx.roundRect(8, 8, canvas.width - 16, canvas.height - 16, 18);
  } else {
    const x = 8;
    const y0 = 8;
    const w = canvas.width - 16;
    const h = canvas.height - 16;
    const r = 18;

    ctx.moveTo(x + r, y0);
    ctx.lineTo(x + w - r, y0);
    ctx.quadraticCurveTo(x + w, y0, x + w, y0 + r);
    ctx.lineTo(x + w, y0 + h - r);
    ctx.quadraticCurveTo(x + w, y0 + h, x + w - r, y0 + h);
    ctx.lineTo(x + r, y0 + h);
    ctx.quadraticCurveTo(x, y0 + h, x, y0 + h - r);
    ctx.lineTo(x, y0 + r);
    ctx.quadraticCurveTo(x, y0, x + r, y0);
  }

  ctx.fill();
  ctx.shadowColor = "transparent";

  /* ================= TEXT ================= */
  let y = cfg.padding + cfg.lineHeight;
  ctx.fillStyle = "#000";

  /* ===== TITLE ===== */
  ctx.font = `700 ${cfg.titleSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillText("ใบสั่งซื้อ", cfg.padding, y);
  y += cfg.lineHeight + 8;

  /* ===== HEADER BASE LINE ===== */
  const headerTopY = y;

  /* ===== COMPANY BLOCK ===== */
ctx.font = `700 ${cfg.textSize + 4}px -apple-system`;
ctx.fillText("ร้านล้อพาณิชย์", cfg.padding, headerTopY);

ctx.fillText(
   "7/13 หมู่ 5",
   cfg.padding,
   headerTopY + cfg.lineHeight
 );
 ctx.fillText(
   "ต.หนองแขม อ.หนองแค",
   cfg.padding,
   headerTopY + cfg.lineHeight * 2
 );
 ctx.fillText(
   "จ.สระบุรี 18140",
   cfg.padding,
   headerTopY + cfg.lineHeight * 3
 );

/* ===== DOCUMENT META ===== */
const rightX = canvas.width - cfg.padding;

  ctx.textAlign = "right";
  ctx.fillText(`เลขที่: ${order.orderId}`, rightX, headerTopY);
 ctx.fillText(`PO: ${po}`, rightX, headerTopY + cfg.lineHeight);
 const docDate = new Date(order.createdAt);
 ctx.fillText(
   `วันที่: ${docDate.toLocaleDateString("th-TH")}`,
   rightX,
   headerTopY + cfg.lineHeight * 2
 );

  ctx.textAlign = "left";
  y = headerTopY + cfg.lineHeight * 5;


  /* ===== DIVIDER ===== */
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

/* ================= ITEMS (GRID TABLE) ================= */
  const tableTopY = y;
  const rowHeight = 42;

  const col = {
    no: cfg.padding,
    name: cfg.padding + 60,
    qty: canvas.width - cfg.padding - 260,
    price: canvas.width - cfg.padding - 180,
    total: canvas.width - cfg.padding - 90
  };

  ctx.font = `700 ${cfg.textSize}px -apple-system`;

  // HEADER
  ctx.fillText("ลำดับ", col.no, y);
  ctx.fillText("รายการสินค้า", col.name, y);
  ctx.fillText("จำนวน", col.qty, y);
  ctx.fillText("ราคา", col.price, y);
  ctx.fillText("รวม", col.total, y);

  y += 16;

  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();

  y += rowHeight - 16;

  ctx.font = `${cfg.textSize}px -apple-system`;

  items.forEach((i, index) => {
    const total = Number(i.price) * Number(i.qty);

    ctx.fillText(String(index + 1), col.no, y);

    // truncate name (single line grid)
    let name = `[${i.productId}] ${i.name}`;
    while (ctx.measureText(name).width > (col.qty - col.name - 20)) {
      name = name.slice(0, -1);
    }

    ctx.fillText(name, col.name, y);

    ctx.textAlign = "right";
    ctx.fillText(String(i.qty), col.qty + 40, y);
    ctx.fillText(`฿${Number(i.price).toLocaleString()}`, col.price + 60, y);
    ctx.fillText(`฿${total.toLocaleString()}`, col.total + 80, y);
    ctx.textAlign = "left";

    // horizontal line
    ctx.beginPath();
    ctx.moveTo(cfg.padding, y + 16);
    ctx.lineTo(canvas.width - cfg.padding, y + 16);
    ctx.strokeStyle = "#ddd";
    ctx.stroke();

    y += rowHeight;
  });
  
  /* ===== DIVIDER ===== */
  y += 4;
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

  /* ================= TOTAL ================= */
  ctx.font = `700 ${cfg.textSize + 4}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const safeTotal = Number(order.total) || 0;
  const totalText = `ยอดรวม: ฿${safeTotal.toLocaleString()}`;
  const tw = ctx.measureText(totalText).width;
  ctx.fillText(
    totalText,
    canvas.width - cfg.padding - tw,
    y
  );

  /* ===== THAI TEXT TOTAL ===== */
  y += cfg.lineHeight;
  ctx.font = `${cfg.textSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const thaiText = `(${numberToThaiText(safeTotal)})`;
  const thaiWidth = ctx.measureText(thaiText).width;
  ctx.fillText(
    thaiText,
    canvas.width - cfg.padding - thaiWidth,
    y
  );

  /* ================= DOWNLOAD (FIXED) ================= */
  const a = document.createElement("a");

  if (!restored?.token || !restored?.expiredAt) return false;

  // expired guard
  if (Date.now() > new Date(restored.expiredAt).getTime()) {
    clearAdminSession();
    return false;
  }

  try {

    const form = new URLSearchParams();

    form.append("token", restored.token);

    const res = await fetch(API_URL, {

    });

    const json = await res.json();

    if (json?.success === true) {
      state.admin.loggedIn = true;

      state.admin.token = restored.token;
      state.admin.expiredAt = restored.expiredAt;

window.traceBarCSS = function traceBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[traceBarCSS] #floatingBar not found"); return []; }

  const props = ["opacity","transform","pointer-events"];
  const out = [];

  const tryPushRule = (sheet, rule, ruleIndex, sel) => {
    const style = rule.style;
    const hit = {
      sheet: sheet.href || "[inline <style>]",
      ruleIndex,
      selector: sel,
      cssText: rule.cssText
    };
    // เก็บเฉพาะค่าที่เกี่ยวข้อง
    props.forEach(p => {
      const v = style.getPropertyValue(p);
      if (v) {
        hit[p] = v.trim();
        hit[p + "_important"] = style.getPropertyPriority(p) === "important";
      }
    });
    // ดันเฉพาะ rule ที่แตะ props จริง
    if (props.some(p => hit[p])) out.push(hit);
  };

  for (const sheet of Array.from(document.styleSheets)) {
    let rules;
    try { rules = sheet.cssRules; } catch(e) { continue; } // cross-origin
    if (!rules) continue;

    for (let i = 0; i < rules.length; i++) {
      const r = rules[i];
      if (!r || !r.selectorText) continue;
      // รองรับ selector หลายตัวคั่นด้วย comma
      const sels = r.selectorText.split(",").map(s => s.trim()).filter(Boolean);
      for (const sel of sels) {
        try {
          if (bar.matches(sel)) {
            tryPushRule(sheet, r, i, sel);
          }
        } catch(_) {}
      }
    }
  }

  const cs = getComputedStyle(bar);
  console.log("===== traceBarCSS =====");
  console.log("className:", bar.className);
  console.table({
    computed_opacity: cs.opacity,
    computed_transform: cs.transform,
    computed_pointerEvents: cs.pointerEvents
  });
  console.table(out);
  return out;
};

// =========================
// 🔍 DEBUG: Watch class changes แล้ว trace ทันที
// ใช้: watchBarCSS(); แล้วลองเลื่อน/เปิดปิด sheet
// =========================
window.watchBarCSS = function watchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[watchBarCSS] #floatingBar not found"); return; }
  if (bar.__watchingCSS) { console.warn("[watchBarCSS] already watching"); return; }
  bar.__watchingCSS = true;

  const mo = new MutationObserver(() => {
    // trace หลัง DOM อัปเดตแล้ว 1 เฟรม (กันอ่านค่าก่อน apply)
    requestAnimationFrame(() => window.traceBarCSS());
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["class","style"] });
  bar.__watchMO = mo;
  console.log("✅ watching #floatingBar class/style changes");
  window.traceBarCSS();
};

// =========================
// 🕵️ SPY: ใครเป็นคนแก้ class/style ของ #floatingBar
// ใช้: spyBar(); แล้วลองเลื่อน/เปิดปิด sheet/เพิ่มของในตะกร้า
// =========================
window.spyBar = function spyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[spyBar] #floatingBar not found"); return; }
  if (bar.__spyInstalled) { console.warn("[spyBar] already installed"); return; }
  bar.__spyInstalled = true;

  // 1) spy classList.add/remove/toggle
  const cl = bar.classList;
  ["add","remove","toggle"].forEach((m) => {
    const orig = cl[m].bind(cl);
    cl[m] = (...args) => {
      console.groupCollapsed(`🧩 [spyBar] classList.${m}(${args.join(", ")})  | before="${bar.className}"`);
      console.trace();
      const r = orig(...args);
      console.log(`after="${bar.className}"`);
      console.groupEnd();
      return r;
    };
  });

  // 2) spy style attribute changes (รวมถึง bar.style.opacity/transform ที่ไปลงเป็น inline)
  const mo = new MutationObserver((list) => {
    for (const it of list) {
      if (it.type === "attributes" && it.attributeName === "style") {
        console.groupCollapsed(`🎨 [spyBar] style changed: ${bar.getAttribute("style") || "(empty)"}`);
        console.trace();
        console.groupEnd();
      }
    }
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["style"] });
  bar.__spyMO = mo;

  console.log("✅ spyBar installed. Now reproduce the bug.");
};

window.unspyBar = function unspyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) return;
  if (bar.__spyMO) bar.__spyMO.disconnect();
  bar.__spyMO = null;
  bar.__spyInstalled = false;
  console.log("🛑 spyBar removed (note: classList methods won't auto-restore after override)");
};  

window.unwatchBarCSS = function unwatchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar || !bar.__watchMO) return;
  bar.__watchMO.disconnect();
  bar.__watchMO = null;
  bar.__watchingCSS = false;
  console.log("🛑 stop watching #floatingBar");
};

// =========================
// 🔍 DEBUG: Force test show/hide (พิสูจน์ cascade)
// ใช้: testBarHide(); แล้วดู console + traceBarCSS
// =========================
window.testBarHide = function testBarHide(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[testBarHide] #floatingBar not found"); return; }

  bar.className = "show scroll-hide";
  requestAnimationFrame(() => {
    const cs1 = getComputedStyle(bar);
    console.log("[testBarHide] show+scroll-hide => opacity:", cs1.opacity, "transform:", cs1.transform);
    window.traceBarCSS();

    bar.className = "show";
    requestAnimationFrame(() => {
      const cs2 = getComputedStyle(bar);
      console.log("[testBarHide] show => opacity:", cs2.opacity, "transform:", cs2.transform);
      window.traceBarCSS();
    });
  });
};  
 
</script>
