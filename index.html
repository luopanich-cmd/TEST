async function handleApprove() {
  // 🔒 GUARD: ต้องอยู่ใน admin mode และมี order
  if (state.mode !== "admin" || !state.admin.selectedOrder) return;

  try {
    const o = state.admin.selectedOrder;

    // ✅ CORE: ใช้ API เวอร์ชันใหม่ (มี loading + toast + guard)
    await adminApproveOrder(o.orderId);

    // ✅ ปิดหน้า Order Detail ผ่าน Overlay Manager
    closeOverlay(adminOrderSheet);

    // 🔄 refresh stock + product list
    await refreshProducts();

    // ✅ อนุญาตให้เปิด Orders (เฉพาะ flow นี้)
    allowOpenOrders = true;

    // ✅ กลับไปหน้า Pending Orders เพื่อทำรายการต่อได้ทันที
    await openAdminDashboard("PENDING", true);

  } catch (err) {
    // ❌ ไม่ต้อง alert ซ้ำ
    // toast + error handling จัดการใน adminApproveOrder แล้ว
    console.warn("handleApprove aborted:", err);
  }
}

async function handleReject() {
  // 🔒 GUARD: ต้องอยู่ใน admin mode และมี order
  if (state.mode !== "admin" || !state.admin.selectedOrder) return;

  try {
    const o = state.admin.selectedOrder;

    // ✅ CORE: ใช้ API เวอร์ชันใหม่ (มี loading + toast + guard)
    await adminRejectOrder(o.orderId);

    // ✅ ปิดหน้า Order Detail ผ่าน Overlay Manager
    closeOverlay(adminOrderSheet);

    // 🔄 รีเฟรชสินค้า (แม้ reject จะไม่ตัด stock แต่ UI ต้อง sync)
    await refreshProducts();

    // ✅ อนุญาตให้เปิด Orders (เฉพาะ flow นี้)
    allowOpenOrders = true;

    // ✅ กลับไปหน้า Orders (รอดำเนินการ)
    await openAdminDashboard("PENDING", true);

  } catch (err) {
    // ❌ ไม่ต้อง alert ซ้ำ
    // toast + error handling จัดการใน adminRejectOrder แล้ว
    console.warn("handleReject aborted:", err);
  }
}

async function submitStockIn(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.selectedProduct) {
    showToast("Unauthorized", "error");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const qty    = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(qty) || qty <= 0) {
    showToast("จำนวนไม่ถูกต้อง", "warning");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockIn(
      state.selectedProduct.productId,
      qty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

    showToast("รับสต๊อกเข้าแล้ว", "success");

    // 🔄 sync ข้อมูลหลัก + ข้อมูลย้อนหลังทันที
    await refreshProducts();
    await refreshAdminAuditSnapshot();

    // 🧹 reset input
    qtyInput.value = "";
    reasonInput.value = "";

async function submitStockAdjust(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.admin.loggedIn || !state.selectedProduct) {
    showToast("Unauthorized", "error");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const newQty = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(newQty) || newQty < 0) {
    showToast("จำนวนไม่ถูกต้อง", "warning");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockAdjust(
      state.selectedProduct.productId,
      newQty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

    showToast("ปรับสต๊อกแล้ว", "success");

    // 🔄 sync ข้อมูลหลัก + ข้อมูลย้อนหลังทันที
    await refreshProducts();
    await refreshAdminAuditSnapshot();

    // 🧹 reset input
    qtyInput.value = "";
    reasonInput.value = "";

    // ✅ ปิด Stock Action ผ่าน Overlay Manager
    closeOverlay(adminStockActionSheet);

    // 🔴 CHANGED: หลัง refresh ต้อง lookup object ล่าสุดก่อน
    openAdminProductAction(
      state.products.find(x => x.productId === state.selectedProduct?.productId)
    );

  } catch (err) {
    console.error(err);
    showToast(err.message || "ไม่สามารถปรับสต๊อกได้", "error");
  } finally {
    // 🔓 เปิดปุ่มกลับทุกกรณี
    buttons.forEach(b => b.disabled = false);
  }
}

       "error"
     );

function handleAddImagePreview(input){
  const file = input.files[0];
  if(!file) return;

 try {
   validateProductImageFile(file);
 } catch (err) {
   input.value = "";
   state.addImageFile = null;
   const img = document.getElementById("addImagePreview");
   if (img) {
     img.removeAttribute("src");
     img.style.display = "none";
   }
   showToast(err.message || "ไฟล์รูปไม่ถูกต้อง", "error");
   return;
 }
 
  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("addImagePreview");
    img.src = reader.result;
    img.style.display = "block";

    state.addImageFile = file; // เก็บไว้ใช้ upload
  };
  reader.readAsDataURL(file);
}

 // ================= GLOBAL KEYBOARD SUPPORT =================
 document.addEventListener("keydown", (e) => {
   const activeOverlay = [...document.querySelectorAll(".sheet.show, .side-menu.show")].pop();

   if (e.key === "Escape") {
     const filter = document.getElementById("filterDropdown");
     if (filter?.classList.contains("show")) {
       filter.classList.remove("show");
       document.querySelectorAll(".filter-btn[aria-expanded='true']")
         .forEach(b => syncExpanded(b, false));
       restoreTriggerFocus();
       return;
     }

     const viewerSearch = document.getElementById("viewerSearchWrap");
     if (viewerSearch?.classList.contains("active")) {
       toggleViewerSearch(viewerSearch.querySelector(".search-btn"));
       return;
     }

     const adminSearch = document.getElementById("adminSearchWrap");
     if (adminSearch?.classList.contains("active")) {
       toggleAdminSearch(adminSearch.querySelector(".search-btn"));
       return;
     }

    if (activeOverlay && !state.ui.backdropLocked) {
      if (activeOverlay === mainMenuSheet) return closeMainMenu();
      if (activeOverlay === adminStockSheet) return closeStockTimelineSheet();
      return closeOverlay(activeOverlay);
    }
   }

   if (e.key === "Tab" && activeOverlay) {
     const focusables = activeOverlay.querySelectorAll(
       'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
     );
     if (!focusables.length) return;

     const first = focusables[0];
     const last = focusables[focusables.length - 1];
    
    if (!activeOverlay.contains(document.activeElement)) {
      e.preventDefault();
      first.focus();
      return;
    }

     if (e.shiftKey && document.activeElement === first) {
       e.preventDefault();
       last.focus();
     } else if (!e.shiftKey && document.activeElement === last) {
       e.preventDefault();
       first.focus();
     }
   }
 });

async function submitOrder(){
  // ❌ ห้ามใช้ state.loading เป็น guard
  if (state.isSubmitting || state.cart.length === 0) return;
 
 const poNumber = String(state.poNumber || "").trim();
 if (!poNumber) {
   showToast("กรุณากรอกเลข PO", "warning");
   const poInput = document.getElementById("poInput");
   if (poInput) poInput.focus();
   return;
 }

  state.isSubmitting = true;
  state.ui.backdropLocked = true;
  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.classList.add("is-submitting");
    submitBtn.setAttribute("aria-busy", "true");
  }

  try {
    // ================= STEP 1: CHECK STOCK =================
    showLoading('กำลังตรวจสอบสต๊อก...');
    const stockCheck = await checkStockBeforeSubmit();

    if (!stockCheck.ok) {
      showToast(stockCheck.message, 'warning');
      throw new Error("STOCK_CHECK_FAILED");
    }

    // ================= STEP 2: CREATE ORDER =================
    updateLoadingText('กำลังสร้างใบสั่งซื้อ...');
    const res = await createOrder();

    if (!res || res.success !== true || !res.data?.orderId) {
      throw new Error("Invalid order response");
    }

    // ================= SUCCESS =================
    const localItems = JSON.parse(JSON.stringify(state.cart));
    const localTotal = state.cart.reduce(
      (sum, item) => sum + Number(item.price) * Number(item.qty),
      0
    );
    const backendItems = res.data.items;
    const hasValidBackendItems =
      Array.isArray(backendItems) &&
      backendItems.length > 0 &&
      backendItems.every(item =>
        item &&
        typeof item === "object" &&
        String(item.productId || "").trim() &&
        Number.isInteger(Number(item.qty)) &&
        Number(item.qty) > 0 &&
        Number.isFinite(Number(item.price))
      );
    const backendTotal = Number(res.data.total);
    const hasValidBackendTotal =
      res.data.total !== null &&
      res.data.total !== "" &&
      Number.isFinite(backendTotal) &&
      backendTotal >= 0;

    state.lastOrder = {
      orderId: res.data.orderId,
      items: JSON.parse(JSON.stringify(
        hasValidBackendItems ? backendItems : localItems
      )),
      total: hasValidBackendTotal ? backendTotal : localTotal,
 createdAt: new Date(),
 poNumber: state.poNumber || ""
    };
   
    saveLastOrder();

    showToast('สร้างใบสั่งซื้อเรียบร้อยแล้ว', 'success');
    showToast("กดปุ่มเพื่อดาวน์โหลดใบสั่งซื้อ", "info", 3000);

    renderLastOrderSheet();
   
// confirmSheet เปิดอยู่แล้ว ไม่ต้อง reopen

    state.cart = [];
    clearCartStorage();
    state.poNumber = "";
    if (typeof renderBadge === "function") renderBadge();
    // 🔴 CHANGED: เคลียร์ตะกร้าแล้วต้องซ่อน/รีเฟรช floating bar
    if (typeof renderFloatingBar === "function") renderFloatingBar();
    
  // ❌ ห้าม auto reset หลังสร้าง order สำเร็จ
    
  } catch(err){
    console.error(err);
    // 🔒 ถ้า fail เพราะ stock-check เรา toast ไปแล้ว ไม่ต้องซ้ำ
    if (err && err.message === "STOCK_CHECK_FAILED") return;

    showToast(
      err.message || 'เกิดข้อผิดพลาดในการสร้างใบสั่งซื้อ',
      'error'
    );
  } finally {
    safeHideLoading();
    state.isSubmitting = false;
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.classList.remove("is-submitting");
      submitBtn.setAttribute("aria-busy", "false");
    }
    // 🔒 ปลด lock เฉพาะเมื่อไม่มี sheet เปิดอยู่ (กัน race condition)
    if (state.ui.overlayCount === 0) {
      state.ui.backdropLocked = false;
    }
  }
}

async function uploadProductImage(file) {
  return new Promise((resolve, reject) => {
    try {
      validateProductImageFile(file);
    } catch (err) {
      reject(err);
      return;
    }

    // 🔴 CHANGED: ให้ error เป็น Error object เสมอ
    if (!state.admin || !state.admin.token) {
      reject(new Error("Missing admin token"));
      return;
    }

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        // 🔴 CHANGED: กัน reader.result ว่าง/ผิดรูปแบบ
        const result = String(reader.result || "");
        const base64 = result.includes(",") ? result.split(",")[1] : "";
        if (!base64) {
          throw new Error("ไม่สามารถอ่านข้อมูลรูปภาพได้");
        }

        const formData = new FormData();
        formData.append("action", "uploadProductImage");
        formData.append("token", state.admin.token);
        formData.append("filename", file.name);
        formData.append("mimeType", file.type || "image/jpeg");
        formData.append("data", base64);

        // 🔴 CHANGED: ใช้ fetchWithTimeout แบบเดียวกับ API อื่น
        const res = await fetchWithTimeout(API_URL, {
          method: "POST",
          body: formData
        }, 30000);

        let json;
        try {
          json = await res.json();
        } catch (_) {
          throw new Error("รูปแบบข้อมูลตอบกลับจากการอัปโหลดไม่ถูกต้อง");
        }

        if (!json || json.success !== true || !json.data?.imageUrl) {
          const rawMessage = json?.message || json?.error || "Upload failed";

          // 🔴 CHANGED: แปลง DriveApp error ให้ debug ง่าย
          if (String(rawMessage).includes("DriveApp")) {
            throw new Error("อัปโหลดรูปไม่สำเร็จ: Apps Script ยังไม่มีสิทธิ์ใช้ DriveApp");
          }

          throw new Error(rawMessage);
        }

        resolve(json.data.imageUrl);
      } catch (err) {
        reject(err instanceof Error ? err : new Error(String(err || "Upload failed")));
      }
    };

    reader.onerror = () => {
      reject(new Error("File read error"));
    };

    reader.readAsDataURL(file);
  });
}

  // 🔒 GUARD: กันกดซ้ำ (admin scope only)
  if (state.admin.isSubmitting) return;

  const p = state.selectedProduct;

  state.admin.isSubmitting = true;

 const compareImages =
   Array.isArray(state.compareImagesDraft)
     ? state.compareImagesDraft.join(",")
     : "";

  // 🔒 Validate
  if (
   !name ||
   !newProductId ||
   !Number.isInteger(price) ||
   costPrice === null ||
   !Number.isInteger(costPrice) ||
   !Number.isInteger(stock) ||
   price < 0 ||

 ) {

    state.admin.isSubmitting = false;

      saveBtn.disabled = false;
      saveBtn.textContent = originalText;

  try {

  } catch (err) {
    showToast(err.message || "ข้อมูลตัวเลือกสินค้าไม่ถูกต้อง", "error");

    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

 const duplicate = state.products.find(x =>
   normalizeProductId(x.productId) === newProductId &&
   normalizeProductId(x.productId) !== oldProductId
 );
 
  if (duplicate) {
    showToast("รหัสสินค้านี้มีอยู่แล้ว", "error");
    state.admin.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  if (stock === 0) {
    status = "out";
  }
 
  let imageUrl = p.image || "";

  try {
    showLoading("กำลังบันทึกการแก้ไขสินค้า...");

    // ถ้ามีการเลือกภาพใหม่ → upload ก่อน

function normalizeProductId(value = "") {
   return String(value || "").trim().toUpperCase();

const ALLOWED_PRODUCT_STATUS = ["ready", "ready_plus", "shipping", "warehouse", "out"];
const PRODUCT_VARIANT_FIELDS = [
  "parentProductId",
  "variantType",
  "variantValue",
  "displayName",
  "variantSortOrder"
];

function normalizeProductStatus(value = "") {
  const normalized = String(value || "").trim().toLowerCase();
  return ALLOWED_PRODUCT_STATUS.includes(normalized) ? normalized : "ready";
}

function getProductVariantFormValues(prefix) {
  const values = {};
  PRODUCT_VARIANT_FIELDS.forEach(field => {
    const input = document.getElementById(`${prefix}${field}`);
    values[field] = input ? input.value.trim() : "";
  });
  return values;
}

function validateProductVariantFormValues(values) {
  const sortValue = String(values?.variantSortOrder || "").trim();
  if (sortValue !== "" && !Number.isInteger(Number(sortValue))) {
    throw new Error("ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม");

}

function appendProductVariantFieldsToForm(form, values) {
  PRODUCT_VARIANT_FIELDS.forEach(field => {
    form.append(field, values?.[field] || "");

}

function validateProductImageFile(file) {
  if (!file) return;

  const allowedTypes = ["image/jpeg", "image/png", "image/webp"];
  const maxBytes = 5 * 1024 * 1024;

  if (!allowedTypes.includes(file.type)) {
    throw new Error("รองรับเฉพาะไฟล์ JPG, PNG, WEBP");
  }

  if (file.size > maxBytes) {
    throw new Error("รูปสินค้าต้องมีขนาดไม่เกิน 5MB");
  }
}

   const img = document.getElementById("addImagePreview");
   if (img) {
     img.src = "";
     img.style.display = "none";
   }

   const fileInput = document.getElementById("addImageFile");
   if (fileInput) {
     fileInput.value = "";
   }
  
   state.addImageFile = null;
   document.getElementById("addProductId").focus();
   document.getElementById("addProductId").select();
 } else {
   closeAddProduct();
 }

  } catch(err){
    console.error(err);
    showToast(err.message || "เกิดข้อผิดพลาด", "error");
  } finally {
    safeHideLoading(); // 🔒 สำคัญ: ปิด loading ทุกกรณี
    state.admin.isSubmitting = false;

    if(btn){
      btn.disabled = false;
      btn.textContent = "บันทึกสินค้า";
    }
  }
}

    { variantValue: "M / อก 46", stock: "", variantSortOrder: "2", nameOverride: "" },

    { variantValue: "XL / อก 50", stock: "", variantSortOrder: "4", nameOverride: "" }
  ];
}

function resetMultiSizeProductState() {
  state.admin.multiSizeProduct = {
    parentProductId: "",
    displayName: "",
    nameTemplate: "",
    price: "",
    costPrice: "",
    image: "",
    imageFile: null,
    status: "ready",
    active: true,
    note: "",
    detailsText: "",
    rows: createDefaultMultiSizeRows(),
    hasPreview: false,
    errors: [],
    summary: "",
    createdCount: 0
  };
}

function ensureAdminSessionForMultiSizeProduct() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
    exitAdmin();
    return false;
  }
  return true;
}

function openMultiSizeProductSheet() {
  if (!ensureAdminSessionForMultiSizeProduct()) return;
  resetMultiSizeProductState();
  renderMultiSizeProductSheet();
  openOverlay(adminMultiSizeProductSheet);
}

function closeMultiSizeProductSheet() {
  if (state.admin.multiSizeProduct?.createdCount > 0) {
    resetMultiSizeProductState();
  }
  closeOverlay(adminMultiSizeProductSheet);
  state.ui.backdropLocked = false;
  requestAnimationFrame(syncOverlayBackdropState);
}

function backToAdminMenuFromMultiSizeProduct() {
  closeOverlay(adminMultiSizeProductSheet);
  resetMultiSizeProductState();
  state.ui.backdropLocked = false;
  syncOverlayBackdropState();
  requestAnimationFrame(() => openMainMenu());
}

function startNewMultiSizeProductBatch() {
  resetMultiSizeProductState();
  renderMultiSizeProductSheet();
  state.ui.backdropLocked = false;
  requestAnimationFrame(syncOverlayBackdropState);
}

function updateMultiSizeProductField(field, value) {
  if (!state.admin.multiSizeProduct) resetMultiSizeProductState();
  state.admin.multiSizeProduct[field] =
    field === "active" ? value === true : value || "";
  state.admin.multiSizeProduct.hasPreview = false;
  state.admin.multiSizeProduct.errors = [];
  state.admin.multiSizeProduct.summary = "";
  state.admin.multiSizeProduct.createdCount = 0;
}

function handleMultiSizeImagePreview(input) {
  const file = input.files?.[0];
  if (!file) return;

  try {
    validateProductImageFile(file);
  } catch (err) {
    input.value = "";
    state.admin.multiSizeProduct.imageFile = null;
    const img = document.getElementById("multiSizeImagePreview");
    if (img) {
      img.removeAttribute("src");
      img.style.display = "none";
    }
    showToast(err.message || "ไฟล์รูปไม่ถูกต้อง", "error");
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("multiSizeImagePreview");
    if (img) {
      img.src = reader.result;
      img.style.display = "block";
    }
    state.admin.multiSizeProduct.imageFile = file;
    state.admin.multiSizeProduct.hasPreview = false;
    state.admin.multiSizeProduct.errors = [];
    state.admin.multiSizeProduct.summary = "";
    state.admin.multiSizeProduct.createdCount = 0;
  };
  reader.readAsDataURL(file);
}

function updateMultiSizeProductRowField(index, field, value) {
  const rows = state.admin.multiSizeProduct.rows || [];
  if (!rows[index]) return;
  rows[index][field] = value || "";
  state.admin.multiSizeProduct.hasPreview = false;
  state.admin.multiSizeProduct.errors = [];
  state.admin.multiSizeProduct.summary = "";
  state.admin.multiSizeProduct.createdCount = 0;
}

function addMultiSizeProductRow() {
  if (!Array.isArray(state.admin.multiSizeProduct.rows)) {
    state.admin.multiSizeProduct.rows = [];
  }
  state.admin.multiSizeProduct.rows.push({
    variantValue: "",
    stock: "",
    variantSortOrder: String(state.admin.multiSizeProduct.rows.length + 1),
    nameOverride: ""
  });
  state.admin.multiSizeProduct.hasPreview = false;
  renderMultiSizeProductSheet();
}

function removeMultiSizeProductRow(index) {
  const rows = state.admin.multiSizeProduct.rows || [];
  if (rows.length <= 1) {
    showToast("ต้องมีไซส์อย่างน้อย 1 แถว", "warning");
    return;
  }
  rows.splice(index, 1);
  state.admin.multiSizeProduct.hasPreview = false;
  state.admin.multiSizeProduct.errors = [];
  renderMultiSizeProductSheet();
}

function getMultiSizeSkuSuffix(variantValue) {
  const firstPart = String(variantValue || "")
    .split("/")
    .shift()
    .trim();
  return firstPart
    .replace(/\s+/g, "")
    .replace(/[^A-Za-z0-9ก-๙_-]/g, "")
    .toUpperCase();
}

function getMultiSizeGeneratedSku(parentProductId, variantValue) {
  return normalizeProductId(
    String(parentProductId || "") + getMultiSizeSkuSuffix(variantValue)
  );
}

function getMultiSizePreviewItems() {
  const multiState = state.admin.multiSizeProduct;
  const parentProductId = normalizeProductId(multiState.parentProductId);
  const displayName = String(multiState.displayName || "").trim();
  const nameTemplate = String(multiState.nameTemplate || "").trim();
  const baseName = nameTemplate || displayName;

  return (multiState.rows || [])
    .map((row, index) => {
      const variantValue = String(row.variantValue || "").trim();
      const productId = getMultiSizeGeneratedSku(parentProductId, variantValue);
      const nameOverride = String(row.nameOverride || "").trim();
      return {
        rowNumber: index + 1,
        productId,
        name: nameOverride || (variantValue ? `${baseName} ${variantValue}` : baseName),
        price: String(multiState.price || "").trim(),
        costPrice: String(multiState.costPrice || "").trim(),
        stock: String(row.stock || "").trim(),
        status: String(multiState.status || "ready").trim(),
        image: String(multiState.image || "").trim(),
        active: String(multiState.active !== false),
        note: String(multiState.note || "").trim(),
        detailsText: String(multiState.detailsText || "").trim(),
        compareImages: "",
        parentProductId,
        variantType: "size",
        variantValue,
        displayName,
        variantSortOrder: String(row.variantSortOrder || "").trim()
      };
    });
}

function validateMultiSizePreviewItems(items) {
  const errors = [];
  const multiState = state.admin.multiSizeProduct;
  const parentProductId = normalizeProductId(multiState.parentProductId);
  const displayName = String(multiState.displayName || "").trim();
  const price = Number(multiState.price);
  const costPrice = Number(multiState.costPrice);
  const existingSkus = new Set(
    (Array.isArray(state.products) ? state.products : [])
      .map(product => normalizeProductId(product.productId))
      .filter(Boolean)
  );
  const batchSkus = new Set();

  if (!parentProductId) errors.push("กรุณากรอกรหัสสินค้าแม่ / รหัสกลุ่ม");
  if (!displayName) errors.push("กรุณากรอกชื่อแสดงรวมของสินค้าแม่");
  if (!Number.isInteger(price) || price < 0) errors.push("ราคาขายต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป");
  if (!Number.isInteger(costPrice) || costPrice < 0) errors.push("ราคาต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป");
  if (!items.length) errors.push("กรุณาเพิ่มไซส์อย่างน้อย 1 แถว");

  items.forEach(item => {
    const rowLabel = `แถว ${item.rowNumber}`;
    const stock = Number(item.stock);
    const sortOrder = Number(item.variantSortOrder);

    if (!item.variantValue) errors.push(`${rowLabel}: กรุณากรอกไซส์/ตัวเลือก`);
    if (!item.productId || item.productId === parentProductId) errors.push(`${rowLabel}: ไม่สามารถสร้าง SKU ได้`);
    if (item.stock === "" || !Number.isInteger(stock) || stock < 0) errors.push(`${rowLabel}: สต็อกต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป`);
    if (item.variantSortOrder === "" || !Number.isInteger(sortOrder)) errors.push(`${rowLabel}: ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม`);
    if (existingSkus.has(item.productId)) errors.push(`${rowLabel}: SKU ${item.productId} มีอยู่แล้ว`);
    if (batchSkus.has(item.productId)) errors.push(`${rowLabel}: SKU ${item.productId} ซ้ำในชุดนี้`);
    if (!item.name) errors.push(`${rowLabel}: กรุณากรอกชื่อสินค้า`);
    batchSkus.add(item.productId);
  });

  return errors;
}

async function submitMultiSizeProducts(btn) {
  if (!ensureAdminSessionForMultiSizeProduct()) return;
  if (state.admin.isSubmitting) return;
  if (!state.admin.multiSizeProduct.hasPreview) {
    state.admin.multiSizeProduct.errors = [
      "กรุณากดตรวจสอบรายการก่อนบันทึก"
    ];
    renderMultiSizeProductSheet();
    showToast("กรุณาตรวจสอบรายการก่อนบันทึก", "warning");
    return;
  }

  const items = getMultiSizePreviewItems();
  const errors = validateMultiSizePreviewItems(items);
  state.admin.multiSizeProduct.hasPreview = true;
  state.admin.multiSizeProduct.errors = errors;

  if (errors.length) {
    renderMultiSizeProductSheet();
    showToast("กรุณาแก้ไขข้อมูลก่อนบันทึกสินค้า", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  renderMultiSizeProductSheet();

  try {
    if (state.admin.multiSizeProduct.imageFile) {
      validateProductImageFile(state.admin.multiSizeProduct.imageFile);
      showLoading("กำลังอัปโหลดรูปสินค้า...");
      const uploadedImageUrl = await uploadProductImage(state.admin.multiSizeProduct.imageFile);
      if (!uploadedImageUrl) {
        throw new Error("อัปโหลดรูปไม่สำเร็จ");
      }
      state.admin.multiSizeProduct.image = uploadedImageUrl;
      state.admin.multiSizeProduct.imageFile = null;
      items.forEach(item => {
        item.image = uploadedImageUrl;
      });
    }

    showLoading("กำลังสร้างสินค้าแบบหลายไซส์...");
    const form = new URLSearchParams();
    form.append("action", "bulkAddProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const json = await postFormAction(form);
    if (!json || json.success === false) {
      const backendErrors = Array.isArray(json?.data?.errors) ? json.data.errors : [];
      state.admin.multiSizeProduct.errors = backendErrors.length
        ? backendErrors.map(error => `${error.productId || error.row || "-"}: ${getBulkImportErrorMessage(error)}`)
        : [json?.error || json?.message || "สร้างสินค้าแบบหลายไซส์ไม่สำเร็จ"];
      renderMultiSizeProductSheet();
      showToast("สร้างสินค้าแบบหลายไซส์ไม่สำเร็จ", "error");
      return;
    }

    const created = Number(json.imported || json.created || items.length || 0);
    state.admin.multiSizeProduct.summary = `สร้างสินค้าแบบหลายไซส์สำเร็จ ${created} รายการ`;
    state.admin.multiSizeProduct.createdCount = created;
    await refreshProducts();
    renderMultiSizeProductSheet();
    showToast("สร้างสินค้าแบบหลายไซส์สำเร็จ", "success");
  } catch (err) {
    console.error(err);
    state.admin.multiSizeProduct.errors = [
      err.message || "สร้างสินค้าแบบหลายไซส์ไม่สำเร็จ กรุณาลองใหม่อีกครั้ง"
    ];
    renderMultiSizeProductSheet();
    showToast("สร้างสินค้าแบบหลายไซส์ไม่สำเร็จ", "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderMultiSizeProductSheet();

const SIZE_VARIANT_DETECTION = Object.freeze({
  S: { value: "S / อก 44", order: 1 },
  M: { value: "M / อก 46", order: 2 },
  L: { value: "L / อก 48", order: 3 },
  XL: { value: "XL / อก 50", order: 4 },
  XXL: { value: "XXL", order: 5 }
});

function parseLegacySizeVariant(product) {
  const productId = normalizeProductId(product?.productId);
  const name = String(product?.name || "").trim();
  const sizeFromName = name.match(/^\s*\(?\s*Size\s+(XXL|XL|L|M|S)(?:\s*\/\s*อก\s*([0-9]+))?\s*\)?\s*/i);
  const sizeFromSku = productId.match(/^(.*?)(XXL|XL|L|M|S)$/i);
  const sizeCode = String(sizeFromName?.[1] || sizeFromSku?.[2] || "").toUpperCase();
  const sizeMeta = SIZE_VARIANT_DETECTION[sizeCode];

  if (!productId || !sizeMeta || !sizeFromSku) return null;

  const parentProductId = normalizeProductId(sizeFromSku[1]);
  if (!parentProductId) return null;

  const chest = sizeFromName?.[2] || "";
  const variantValue = chest
    ? `${sizeCode} / อก ${chest}`
    : sizeMeta.value;
  const displayName = name
    .replace(/^\s*\(?\s*Size\s+(XXL|XL|L|M|S)(?:\s*\/\s*อก\s*[0-9]+)?\s*\)?\s*/i, "")
    .trim() || name;

  return {
    product,
    parentProductId,
    variantType: "size",
    variantValue,
    variantSortOrder: sizeMeta.order,
    displayName,
    sizeCode
  };
}

function getVariantScanResults() {
  const grouped = new Map();
  const singles = [];

  (Array.isArray(state.products) ? state.products : []).forEach(product => {
    if (isViewerVariantProduct(product)) return;
    const suggestion = parseLegacySizeVariant(product);
    if (!suggestion) return;

    if (!grouped.has(suggestion.parentProductId)) {
      grouped.set(suggestion.parentProductId, []);
    }
    grouped.get(suggestion.parentProductId).push(suggestion);
  });

  const groups = [];
  grouped.forEach((items, parentProductId) => {
    const sorted = items.sort((a, b) => a.variantSortOrder - b.variantSortOrder);
    if (sorted.length < 2) {
      singles.push(...sorted);
      return;
    }

    const displayNames = [...new Set(sorted.map(item => item.displayName).filter(Boolean))];
    const sizeCounts = sorted.reduce((map, item) => {
      map[item.sizeCode] = (map[item.sizeCode] || 0) + 1;
      return map;
    }, {});
    const warnings = [];
    if (displayNames.length > 1) {
      warnings.push("ชื่อสินค้าในกลุ่มไม่เหมือนกันทั้งหมด ควรตรวจสอบก่อนบันทึกจริง");
    }
    Object.entries(sizeCounts).forEach(([sizeCode, count]) => {
      if (count > 1) warnings.push(`พบไซส์ ${sizeCode} ซ้ำในกลุ่มนี้`);
    });

    groups.push({
      parentProductId,
      displayName: displayNames[0] || sorted[0]?.displayName || "",
      items: sorted,
      warnings
    });
  });

  return {
    groups: groups.sort((a, b) => a.parentProductId.localeCompare(b.parentProductId)),
    singles: singles.sort((a, b) => a.parentProductId.localeCompare(b.parentProductId))
  };
}

function ensureVariantScanState() {
  if (!state.admin.variantScan) {
    state.admin.variantScan = {
      selectedGroups: [],
      message: "",
      error: "",
      appliedGroups: []
    };
  }
  if (!Array.isArray(state.admin.variantScan.selectedGroups)) {
    state.admin.variantScan.selectedGroups = [];
  }
  if (!Array.isArray(state.admin.variantScan.appliedGroups)) {
    state.admin.variantScan.appliedGroups = [];
  }
  return state.admin.variantScan;
}

function getSelectedVariantScanGroups(results = getVariantScanResults()) {
  const scanState = ensureVariantScanState();
  const selected = new Set(scanState.selectedGroups || []);
  return (results.groups || []).filter(group => selected.has(group.parentProductId));
}

function getVariantScanApplyItems(groups) {
  const seen = new Set();
  const errors = [];
  const items = [];

  (groups || []).forEach(group => {
    if (!group || !group.parentProductId || !group.displayName || !Array.isArray(group.items) || group.items.length < 2) {
      errors.push(`กลุ่ม ${group?.parentProductId || "-"} ไม่พร้อมบันทึก`);
      return;
    }

    group.items.forEach(item => {
      const productId = normalizeProductId(item.product?.productId);
      const sortOrder = Number(item.variantSortOrder);
      if (!productId) errors.push(`กลุ่ม ${group.parentProductId}: ไม่พบ SKU`);
      if (seen.has(productId)) errors.push(`SKU ${productId} ซ้ำในรายการบันทึก`);
      if (!item.parentProductId) errors.push(`${productId}: ไม่พบ parentProductId`);
      if (!item.variantValue) errors.push(`${productId}: ไม่พบไซส์/ตัวเลือก`);
      if (!Number.isInteger(sortOrder)) errors.push(`${productId}: ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม`);
      if (!group.displayName) errors.push(`${productId}: ไม่พบชื่อแสดงรวม`);
      if (productId) seen.add(productId);

      items.push({
        productId,
        parentProductId: item.parentProductId,
        variantType: "size",
        variantValue: item.variantValue,
        displayName: group.displayName,
        variantSortOrder: sortOrder
      });
    });
  });

  return { items, errors };
}

function toggleVariantScanGroup(parentProductId, checked) {
  const scanState = ensureVariantScanState();
  const selected = new Set(scanState.selectedGroups);
  const cleanId = normalizeProductId(parentProductId);
  if (checked) {
    selected.add(cleanId);
  } else {
    selected.delete(cleanId);
  }
  scanState.selectedGroups = Array.from(selected);
  scanState.message = "";
  scanState.error = "";
  renderVariantScanSheet();
}

async function applySelectedVariantScanGroups(btn) {
  if (!ensureAdminSessionForMultiSizeProduct()) return;
  if (state.admin.isSubmitting) return;

  const scanState = ensureVariantScanState();
  const results = getVariantScanResults();
  const selectedGroups = getSelectedVariantScanGroups(results);
  const { items, errors } = getVariantScanApplyItems(selectedGroups);

  if (!selectedGroups.length) {
    scanState.error = "กรุณาเลือกกลุ่มที่ต้องการบันทึก";
    renderVariantScanSheet();
    showToast(scanState.error, "warning");
    return;
  }

  if (errors.length) {
    scanState.error = errors.join(" / ");
    renderVariantScanSheet();
    showToast("ข้อมูลบางรายการยังไม่พร้อมบันทึก", "warning");
    return;
  }

  const confirmed = window.confirm(
    `ยืนยันบันทึกข้อมูลกลุ่มไซส์ ${selectedGroups.length} กลุ่ม (${items.length} SKU)?\n\nการบันทึกนี้จะแก้ข้อมูล Products จริง แต่จะไม่เปลี่ยน stock/ราคา/order`
  );
  if (!confirmed) return;

  state.admin.isSubmitting = true;
  scanState.error = "";
  scanState.message = "";
  renderVariantScanSheet();

  try {
    showLoading("กำลังบันทึกข้อมูลกลุ่มไซส์...");
    const form = new URLSearchParams();
    form.append("action", "bulkUpdateProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const updated = Number(json.updated || json.data?.updated || items.length || 0);
      scanState.message = `บันทึกข้อมูลกลุ่มไซส์สำเร็จ ${updated} SKU`;
      scanState.appliedGroups = selectedGroups.map(group => group.parentProductId);
      scanState.selectedGroups = [];
      showToast(scanState.message, "success");
      await refreshProducts();
      renderVariantScanSheet();
      return;
    }

    scanState.error = json?.error || json?.message || "บันทึกข้อมูลกลุ่มไซส์ไม่สำเร็จ";
    renderVariantScanSheet();
    showToast(scanState.error, "error");
  } catch (err) {
    console.error(err);
    scanState.error = err.message || "บันทึกข้อมูลกลุ่มไซส์ไม่สำเร็จ";
    renderVariantScanSheet();
    showToast(scanState.error, "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderVariantScanSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

async function copyTextToClipboard(text, successMessage) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }
    showToast(successMessage, "success");
  } catch (err) {
    console.error(err);
    showToast("คัดลอกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง", "error");
  }
}

  if (state.admin.isSubmitting) {
    return {
      label: "กำลังนำเข้าสินค้า...",
      detail: "กรุณารอสักครู่ ระบบกำลังส่งข้อมูลไปยังหลังบ้าน",
      type: "loading"
    };
  }
  if (state.admin.bulkProductImport.summary) {
    return {
      label: "นำเข้าสินค้าสำเร็จ",
      detail: state.admin.bulkProductImport.summary,
      type: "success"
    };
  }
  if (errors.length > 0) {
    return {
      label: `พบข้อผิดพลาด ${errors.length} รายการ`,
      detail: "กรุณาตรวจสอบรายการที่มีปัญหาก่อนนำเข้า",
      type: "error"
    };
  }
  if (items.length > 0) {
    return {
      label: `พร้อมนำเข้า ${items.length} รายการ`,
      detail: `ตรวจสอบแล้ว ${items.length} รายการ พร้อมนำเข้าสู่ระบบ`,
      type: "ready"
    };
  }
  return {
    label: "ยังไม่ได้ตรวจสอบข้อมูล",
    detail: "วางข้อมูลหรืออัปโหลดไฟล์ แล้วกดตรวจสอบข้อมูล",
    type: "idle"
  };
}

function parseBulkProductImportText(rawText) {
  const text = String(rawText || "").replace(/\r/g, "").trimEnd();
  const errors = [];
  const items = [];

  if (!text.trim()) {
    return { items, errors };
  }

  const lines = text
    .split("\n")
    .filter(line => line.trim());

  const firstCells = splitTsvLine(lines[0]);
  const hasHeader = isBulkProductHeaderRow(firstCells);
  const dataLines = hasHeader ? lines.slice(1) : lines;
  const columns = hasHeader
    ? firstCells.map(normalizeBulkHeader)
    : BULK_PRODUCT_COLUMNS;
  const seenSkus = new Set();

  if (dataLines.length > 100) {
    errors.push(bulkImportError(0, "", "items", "นำเข้าได้สูงสุด 100 รายการต่อครั้ง"));
    return { items, errors };
  }

  dataLines.forEach((line, index) => {
    const rowNumber = index + 1;
    const cells = splitTsvLine(line);
    const row = {};

    columns.forEach((column, cellIndex) => {
      if (!column) return;
      row[column] = String(cells[cellIndex] || "").trim();
    });

    const item = normalizeBulkProductImportRow(row);
    validateBulkProductImportRow(item, rowNumber, seenSkus, errors);
    items.push(item);
  });

  if (items.length === 0) {
    errors.push(bulkImportError(1, "", "items", "กรุณาเพิ่มข้อมูลสินค้าอย่างน้อย 1 รายการ"));
  }

  return { items, errors };
}

function splitTsvLine(line) {
  return String(line || "").split("\t");
}

function isBulkProductHeaderRow(cells) {
  const normalized = cells.map(normalizeBulkHeader).filter(Boolean);
  return normalized.includes("productId") &&
    normalized.includes("name") &&
    normalized.includes("price");
}

function normalizeBulkHeader(value) {
  const key = String(value || "").trim().toLowerCase();
  const map = {
    productid: "productId",
    sku: "productId",
    name: "name",
    price: "price",
    costprice: "costPrice",
    cost: "costPrice",
    stock: "stock",
    qty: "stock",
    status: "status",
    image: "image",
    active: "active",
    note: "note",
    detailstext: "detailsText",
    details: "detailsText",
    compareimages: "compareImages",
    parentproductid: "parentProductId",
    parent: "parentProductId",
    groupid: "parentProductId",
    varianttype: "variantType",
    variantvalue: "variantValue",
    size: "variantValue",
    displayname: "displayName",
    groupname: "displayName",
    variantsortorder: "variantSortOrder",
    sortorder: "variantSortOrder"
  };
  return map[key] || "";
}

function normalizeBulkProductImportRow(row) {
  const stock = Number(row.stock);
  const status = Number.isInteger(stock) && stock === 0
    ? "out"
    : String(row.status || "").trim();

  return {
    productId: normalizeProductId(row.productId || ""),
    name: String(row.name || "").trim(),
    price: String(row.price || "").trim(),
    costPrice: String(row.costPrice || "").trim(),
    stock: String(row.stock || "").trim(),
    status,
    image: String(row.image || "").trim(),
    active: String(row.active || "").trim(),
    note: String(row.note || "").trim(),
    detailsText: String(row.detailsText || "").trim(),
    compareImages: String(row.compareImages || "").trim(),
    parentProductId: String(row.parentProductId || "").trim(),
    variantType: String(row.variantType || "").trim(),
    variantValue: String(row.variantValue || "").trim(),
    displayName: String(row.displayName || "").trim(),
    variantSortOrder: String(row.variantSortOrder || "").trim()
  };
}

function validateBulkProductImportRow(item, rowNumber, seenSkus, errors) {
  const allowedStatuses = ["ready", "ready_plus", "shipping", "warehouse", "out"];
  const productId = item.productId;
  const price = Number(item.price);
  const costPrice = Number(item.costPrice);
  const stock = Number(item.stock);

  if (!productId) {
    errors.push(bulkImportError(rowNumber, productId, "productId", "กรุณากรอกรหัสสินค้า"));
  } else if (seenSkus.has(productId)) {
    errors.push(bulkImportError(rowNumber, productId, "productId", "รหัสสินค้าซ้ำในข้อมูลที่วาง"));
  }

  if (productId) {
    seenSkus.add(productId);
  }

  if (!item.name) {
    errors.push(bulkImportError(rowNumber, productId, "name", "กรุณากรอกชื่อสินค้า"));
  }

  if (item.price === "" || !Number.isInteger(price) || price < 0) {
    errors.push(bulkImportError(rowNumber, productId, "price", "ราคาต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"));
  }

  if (item.costPrice === "" || !Number.isInteger(costPrice) || costPrice < 0) {
    errors.push(bulkImportError(rowNumber, productId, "costPrice", "ต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"));
  }

  if (item.stock === "" || !Number.isInteger(stock) || stock < 0) {
    errors.push(bulkImportError(rowNumber, productId, "stock", "จำนวนสต๊อกต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"));
  }

  if (!item.status || !allowedStatuses.includes(item.status)) {
    errors.push(bulkImportError(rowNumber, productId, "status", "สถานะสินค้าไม่ถูกต้อง"));
  }

  if (
    item.active &&
    !["true", "false", "1", "0"].includes(item.active.toLowerCase())
  ) {
    errors.push(bulkImportError(rowNumber, productId, "active", "active ต้องเป็น true/false/1/0 หรือเว้นว่าง"));
  }
  if (
    item.variantSortOrder !== "" &&
    !Number.isInteger(Number(item.variantSortOrder))
  ) {
    errors.push(bulkImportError(rowNumber, productId, "variantSortOrder", "ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม"));
  }
}

function bulkImportError(row, productId, field, message) {
  return { row, productId, field, message };
}

    "Cost price must be an integer >= 0": "ต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป",
    "Stock must be an integer >= 0": "จำนวนสต๊อกต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป",

    "Active must be true/false/1/0": "active ต้องเป็น true/false/1/0 หรือเว้นว่าง",

    "Image must be an http/https URL": "รูปภาพต้องเป็น URL แบบ http/https",

function renderBulkProductDataPreviewTable(items, errorsByRow) {
  const columns = BULK_PRODUCT_COLUMNS;
  return `
    <div class="bulk-template-table bulk-data-preview-table" aria-label="ตัวอย่างข้อมูลที่นำเข้า">

                }).join("")
              : `

function renderBulkProductImportPreview(items, errors) {
  if (!items.length && !errors.length) {
    return `
      ${renderBulkProductDataPreviewTable(items, new Map())}
      <div class="empty-state">
        วางข้อมูล TSV หรืออัปโหลดไฟล์ แล้วกดตรวจสอบข้อมูล
      </div>
    `;
  }

  const errorsByRow = new Map();
  errors.forEach(error => {
    const row = Number(error.row) || 0;
    if (!errorsByRow.has(row)) errorsByRow.set(row, []);
    errorsByRow.get(row).push(error);
  });

  const cards = items.map((item, index) => {
    const rowNumber = index + 1;
    const rowErrors = errorsByRow.get(rowNumber) || [];
    return `
      <div class="bulk-preview-card ${rowErrors.length ? "has-error" : ""}">
        <div class="name">${esc(item.productId || "(ยังไม่มีรหัสสินค้า)")}</div>
        <div class="bulk-preview-meta">
          ${esc(item.name || "(ยังไม่มีชื่อสินค้า)")}<br>
          ราคา: ${esc(item.price)} | ต้นทุน: ${esc(item.costPrice)} | สต๊อก: ${esc(item.stock)} | สถานะ: ${esc(item.status || "-")}
        </div>
        ${
          rowErrors.length
            ? `<ul class="bulk-error-list">${rowErrors.map(error => `<li>${esc(error.field)}: ${esc(getBulkImportErrorMessage(error))}</li>`).join("")}</ul>`
            : `<div class="status-badge status-approved compact" style="margin-top:8px">พร้อมนำเข้า</div>`
        }
      </div>
    `;
  }).join("");

  const globalErrors = errorsByRow.get(0) || [];

  return `
    ${globalErrors.length ? `<ul class="bulk-error-list">${globalErrors.map(error => `<li>${esc(getBulkImportErrorMessage(error))}</li>`).join("")}</ul>` : ""}
    ${renderBulkProductDataPreviewTable(items, errorsByRow)}
    <div class="bulk-preview-list">${cards}</div>
  `;
}

async function submitBulkProductImport(btn) {
  if (!ensureAdminSessionForBulkImport()) return;
  if (state.admin.isSubmitting) return;

  const bulkState = state.admin.bulkProductImport;
  if (
    !bulkState.hasPreview ||
    !bulkState.previewValid ||
    !bulkState.items.length ||
    bulkState.errors.length ||
    bulkState.backendErrors.length
  ) {
    showToast("กรุณาแก้ไขข้อผิดพลาดก่อนนำเข้าสินค้า", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  renderBulkProductImportSheet();

  try {
    showLoading("กำลังนำเข้าสินค้า...");
    const form = new URLSearchParams();
    form.append("action", "bulkAddProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(bulkState.items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const imported = Number(json.imported || json.data?.imported || 0);
      bulkState.backendErrors = [];
      bulkState.importedCount = imported;
      bulkState.summary = `นำเข้าสินค้าสำเร็จ ${imported} รายการ`;
      showToast(bulkState.summary, "success");
      clearBulkProductImportWorkingState({ keepSuccess: true });
      await refreshProducts();
      renderBulkProductImportSheet();
      return;
    }

    bulkState.backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors
      : [];
    bulkState.summary = "";
    bulkState.importedCount = 0;
    renderBulkProductImportSheet();
    if (isAuthError(json?.error)) {
      showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(getBulkImportErrorMessage({ message: json?.error }) || "นำเข้าสินค้าไม่สำเร็จ", "error");
  } catch (err) {
    console.error(err);
    showToast("นำเข้าสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง", "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderBulkProductImportSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

function ensureAdminSessionForBulkUpdate() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
    exitAdmin();
    return false;
  }
  return true;
}

function openBulkProductUpdateSheet() {
  if (!ensureAdminSessionForBulkUpdate()) return;

  clearBulkProductUpdateWorkingState();
  renderBulkProductUpdateSheet();
  openOverlay(adminBulkProductUpdateSheet);
}

function closeBulkProductUpdateSheet() {
  closeOverlay(adminBulkProductUpdateSheet);
}

function resetBulkProductUpdate() {
  const bulkState = state.admin.bulkProductUpdate;
  bulkState.skuText = "";
  bulkState.selectedSkus = [];
  bulkState.pickerSearch = "";
  bulkState.pickerStatus = "all";
  bulkState.field = "price";
  bulkState.value = "";
  bulkState.items = [];
  bulkState.errors = [];
  bulkState.backendErrors = [];
  bulkState.summary = "";
  bulkState.updatedCount = 0;
  bulkState.hasPreview = false;
  bulkState.previewValid = false;
  renderBulkProductUpdateSheet();
}

function invalidateBulkProductUpdatePreview() {
  const bulkState = state.admin.bulkProductUpdate;
  bulkState.items = [];
  bulkState.errors = [];
  bulkState.backendErrors = [];
  bulkState.summary = "";
  bulkState.updatedCount = 0;
  bulkState.hasPreview = false;
  bulkState.previewValid = false;
}

function clearBulkProductUpdateWorkingState(options = {}) {
  const bulkState = state.admin.bulkProductUpdate;
  const keepSuccess = options.keepSuccess === true;
  const preservedSummary = keepSuccess ? bulkState.summary : "";
  const preservedUpdatedCount = keepSuccess ? bulkState.updatedCount : 0;

  bulkState.skuText = "";
  bulkState.selectedSkus = [];
  bulkState.value = "";
  bulkState.items = [];
  bulkState.errors = [];
  bulkState.backendErrors = [];
  bulkState.summary = preservedSummary;
  bulkState.updatedCount = preservedUpdatedCount;
  bulkState.hasPreview = false;
  bulkState.previewValid = false;
}

function getBulkProductUpdateSelectedSkus() {
  const selectedSkus = Array.isArray(state.admin.bulkProductUpdate.selectedSkus)
    ? state.admin.bulkProductUpdate.selectedSkus
    : [];
  const seen = new Set();
  return selectedSkus
    .map(normalizeProductId)
    .filter(productId => {
      if (!productId || seen.has(productId)) return false;
      seen.add(productId);
      return true;
    });
}

function getBulkProductUpdateManualSkus() {
  return String(state.admin.bulkProductUpdate.skuText || "")
    .split(/[\s,]+/)
    .map(normalizeProductId)
    .filter(Boolean);
}

function getBulkProductUpdateCombinedSkus() {
  return getBulkProductUpdateSelectedSkus().concat(getBulkProductUpdateManualSkus());
}

function getBulkProductUpdatePickerProducts() {
  const bulkState = state.admin.bulkProductUpdate;
  const searchText = String(bulkState.pickerSearch || "").trim().toLowerCase();
  const rawStatusFilter = String(bulkState.pickerStatus || "all").trim().toLowerCase();
  const statusFilter = rawStatusFilter === "all" ? "all" : normalizeProductStatus(rawStatusFilter);
  const products = Array.isArray(state.products) ? state.products : [];

  return products.filter(product => {
    const productId = normalizeProductId(product.productId);
    const name = String(product.name || "").toLowerCase();
    const status = normalizeProductStatus(product.status);
    const matchesSearch = !searchText ||
      productId.toLowerCase().includes(searchText) ||
      name.includes(searchText);
    const matchesStatus = !statusFilter ||
      statusFilter === "all" ||
      status === statusFilter;
    return matchesSearch && matchesStatus;
  });
}

function setBulkProductUpdatePickerSearch(value) {
  state.admin.bulkProductUpdate.pickerSearch = value || "";
  invalidateBulkProductUpdatePreview();
  updateBulkProductUpdatePickerList();
  syncBulkProductUpdatePreviewGateUi();
}

function setBulkProductUpdatePickerStatus(value) {
  state.admin.bulkProductUpdate.pickerStatus = value || "all";
  invalidateBulkProductUpdatePreview();
  updateBulkProductUpdatePickerList();
  syncBulkProductUpdatePreviewGateUi();
}

function toggleBulkProductUpdateProduct(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(getBulkProductUpdateSelectedSkus());
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.bulkProductUpdate.selectedSkus = Array.from(selected);
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheetPreservingPickerScroll();
}

function selectVisibleBulkProductUpdateProducts() {
  const selected = new Set(getBulkProductUpdateSelectedSkus());
  getBulkProductUpdatePickerProducts().forEach(product => {
    const productId = normalizeProductId(product.productId);
    if (productId) selected.add(productId);
  });
  state.admin.bulkProductUpdate.selectedSkus = Array.from(selected);
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheet();
}

function clearBulkProductUpdateSelection() {
  state.admin.bulkProductUpdate.selectedSkus = [];
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheet();
}

function backToAdminMenuFromBulkProductUpdate() {
  clearBulkProductUpdateWorkingState();
  closeBulkProductUpdateSheet();
  syncOverlayBackdropState();
  requestAnimationFrame(() => {
    openMainMenu();
    syncOverlayBackdropState();
  });
}

function getBulkProductUpdateFieldLabel(field) {
  return {
    price: "ราคาขาย",
    costPrice: "ต้นทุน",
    status: "สถานะสินค้า",
    active: "สถานะการขาย"
  }[field] || "ข้อมูลสินค้า";
}

function getBulkProductUpdateStatusLabel(status) {
  return {
    ready: "พร้อมส่ง",
    ready_plus: "พร้อมส่ง + เพิ่มได้",
    shipping: "อยู่ระหว่างจัดส่ง",
    warehouse: "อยู่โกดังไทย",
    out: "หมด"
  }[normalizeProductStatus(status)] || "พร้อมส่ง";
}

function getBulkProductUpdateStatusClass(status) {
  const key = normalizeProductStatus(status);
  if (key === "out") return "status-rejected";
  if (key === "shipping") return "status-pending";
  if (key === "warehouse") return "status-neutral";
  return "status-approved";
}

function formatBulkProductUpdateValue(field, value) {
  if (field === "price" || field === "costPrice") {
    return `฿${Number(value || 0).toLocaleString("th-TH")}`;
  }
  if (field === "status") {
    return getBulkProductUpdateStatusLabel(value);
  }
  if (field === "active") {
    return value === true ? "เปิดขาย" : "ปิดขาย";
  }
  return String(value ?? "-");
}

function renderBulkProductUpdateValueDisplay(field, value) {
  if (field === "status") {
    return `<span class="status-badge compact ${getBulkProductUpdateStatusClass(value)}">${esc(getBulkProductUpdateStatusLabel(value))}</span>`;
  }
  if (field === "active") {
    const isActive = value === true;
    return `<span class="status-badge compact ${isActive ? "status-approved" : "status-neutral"}">${isActive ? "เปิดขาย" : "ปิดขาย"}</span>`;
  }
  return esc(formatBulkProductUpdateValue(field, value));
}

function parseBulkProductUpdateActive(value) {
  if (value === true || value === false) {
    return { valid: true, value };
  }

  const normalized = String(value || "").trim().toLowerCase();
  if (["true", "1", "เปิดขาย", "active", "yes"].includes(normalized)) {
    return { valid: true, value: true };
  }
  if (["false", "0", "ปิดขาย", "inactive", "no"].includes(normalized)) {
    return { valid: true, value: false };
  }
  return { valid: false, value: null };
}

function parseBulkProductUpdateValue(field, rawValue) {
  const valueText = String(rawValue ?? "").trim();
  if (!valueText) {
    return {
      valid: false,
      value: null,
      message: "กรุณาระบุค่าใหม่"
    };
  }

  if (field === "price" || field === "costPrice") {
    const value = Number(valueText);
    if (!Number.isInteger(value) || value < 0) {
      return {
        valid: false,
        value: null,
        message: `${getBulkProductUpdateFieldLabel(field)}ต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป`
      };
    }
    return { valid: true, value };
  }

  if (field === "status") {
    const status = normalizeProductStatus(valueText);
    const allowed = ["ready", "ready_plus", "shipping", "warehouse", "out"];
    if (!allowed.includes(status)) {
      return {
        valid: false,
        value: null,
        message: "สถานะสินค้าไม่ถูกต้อง"
      };
    }
    return { valid: true, value: status };
  }

  if (field === "active") {
    const active = parseBulkProductUpdateActive(valueText);
    if (!active.valid) {
      return {
        valid: false,
        value: null,
        message: "สถานะการขายต้องเป็น เปิดขาย/ปิดขาย หรือ true/false"
      };
    }
    return active;
  }

  return {
    valid: false,
    value: null,
    message: "ประเภทการอัปเดตไม่ถูกต้อง"
  };
}

function parseBulkProductUpdateInput() {
  const bulkState = state.admin.bulkProductUpdate;
  const field = bulkState.field || "price";
  const valueResult = parseBulkProductUpdateValue(field, bulkState.value);
  const skus = getBulkProductUpdateCombinedSkus();
  const errors = [];
  const items = [];
  const seenSkus = new Set();
  const products = Array.isArray(state.products) ? state.products : [];
  const productMap = new Map(
    products.map(product => [
      normalizeProductId(product.productId),
      product
    ])
  );

  if (!skus.length && !String(bulkState.value ?? "").trim()) {
    return { items, errors };
  }

  if (!skus.length) {
    errors.push(bulkImportError(1, "", "productId", "กรุณาระบุ SKU อย่างน้อย 1 รายการ"));
    return { items, errors };
  }

  if (skus.length > 100) {
    errors.push(bulkImportError(0, "", "items", "อัปเดตได้สูงสุด 100 รายการต่อครั้ง"));
    return { items, errors };
  }

  skus.forEach((productId, index) => {
    const rowNumber = index + 1;
    const product = productMap.get(productId) || null;
    const item = {
      row: rowNumber,
      productId,
      product,
      field,
      oldValue: product ? product[field] : "",
      newValue: valueResult.value
    };

    if (!productId) {
      errors.push(bulkImportError(rowNumber, productId, "productId", "กรุณาระบุ SKU"));
    } else if (seenSkus.has(productId)) {
      errors.push(bulkImportError(rowNumber, productId, "productId", "SKU ซ้ำในรายการที่เลือก"));
    }

    if (productId) {
      seenSkus.add(productId);
    }

    if (products.length && !product) {
      errors.push(bulkImportError(rowNumber, productId, "productId", "ไม่พบสินค้าในรายการปัจจุบัน"));
    }

    if (!valueResult.valid) {
      errors.push(bulkImportError(rowNumber, productId, field, valueResult.message));
    }

    items.push(item);
  });

  if (!items.length) {
    errors.push(bulkImportError(1, "", "productId", "กรุณาระบุ SKU อย่างน้อย 1 รายการ"));
  }

  return { items, errors };
}

  const message = String(error?.message || "").trim();
  const known = {
    "Bulk update validation failed": "ตรวจสอบข้อมูลอัปเดตไม่ผ่าน",
    "Items must be valid JSON": "รูปแบบข้อมูลไม่ถูกต้อง",
    "Items must be an array": "รูปแบบข้อมูลไม่ถูกต้อง",
    "At least one product update is required": "กรุณาระบุสินค้าอย่างน้อย 1 รายการ",
    "Batch size limit is 100 rows": "อัปเดตได้สูงสุด 100 รายการต่อครั้ง",
    "Item must be an object": "ข้อมูลรายการไม่ถูกต้อง",
    "SKU is required": "กรุณาระบุ SKU",
    "Duplicate SKU inside update batch": "SKU ซ้ำในรายการอัปเดต",
    "Product not found": "ไม่พบสินค้า",
    "Unknown field is not allowed": "มีฟิลด์ที่ไม่อนุญาตให้อัปเดต",
    "Stock cannot be updated by bulkUpdateProducts": "ไม่สามารถอัปเดตสต็อกในหน้าจอนี้ได้",
    "At least one allowed field is required": "กรุณาเลือกข้อมูลที่ต้องการอัปเดต",
    "Price must be an integer >= 0": "ราคาขายต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป",
    "Cost price must be an integer >= 0": "ต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป",
    "Invalid product status": "สถานะสินค้าไม่ถูกต้อง",
    "Active must be true/false or 1/0": "สถานะการขายต้องเป็น true/false หรือ 1/0"
  };
  return known[message] || message || "ข้อมูลไม่ถูกต้อง";
}

function getBulkProductUpdateStatus(items, errors) {
  if (state.admin.isSubmitting) {
    return {
      label: "กำลังอัปเดตสินค้า...",
      detail: "กรุณารอสักครู่ ระบบกำลังส่งข้อมูลไปยังหลังบ้าน",
      type: "loading"
    };
  }
  if (state.admin.bulkProductUpdate.summary) {
    return {
      label: "อัปเดตสินค้าสำเร็จ",
      detail: state.admin.bulkProductUpdate.summary,
      type: "success"
    };
  }
  if (errors.length) {
    return {
      label: `พบข้อผิดพลาด ${errors.length} รายการ`,
      detail: "กรุณาตรวจสอบ SKU และค่าใหม่ก่อนอัปเดต",
      type: "error"
    };
  }
  if (items.length) {
    return {
      label: `พร้อมอัปเดต ${items.length} รายการ`,
      detail: `ตรวจสอบแล้ว ${items.length} รายการ พร้อมส่งไปอัปเดต`,
      type: "ready"
    };
  }
  return {
    label: "ยังไม่ได้ตรวจสอบข้อมูล",
    detail: "ระบุ SKU เลือกข้อมูลที่ต้องการแก้ไข แล้วกดตรวจสอบข้อมูล",
    type: "idle"
  };
}

function renderBulkProductUpdateStatus(items, errors) {
  const status = getBulkProductUpdateStatus(items, errors);
  const badgeClass = status.type === "success" || status.type === "ready"
    ? "status-approved"
    : status.type === "error"
      ? "status-rejected"
      : "status-pending";
  return `
    <div class="bulk-import-status" role="status" aria-live="polite">
      <span class="status-badge ${badgeClass} compact">${esc(status.label)}</span>
      <div class="helper-text" style="margin-top:8px">${esc(status.detail)}</div>
    </div>
  `;
}

  return `
    <div class="bulk-import-success-card" role="status" aria-live="polite">
      <strong>อัปเดตสินค้าสำเร็จ</strong>
      <div>อัปเดตสำเร็จ ${updated} รายการ</div>
      <div class="bulk-import-success-actions">
        <button class="btn btn-secondary" type="button" onclick="backToAdminMenuFromBulkProductUpdate()">

function renderBulkProductUpdatePickerRows() {
  const products = getBulkProductUpdatePickerProducts();
  const selectedSkus = new Set(getBulkProductUpdateSelectedSkus());

  return products.length
    ? products.map(product => {
        const productId = normalizeProductId(product.productId);
        const selected = selectedSkus.has(productId);
        const isActive = product.active !== false;
        return `
          <label class="bulk-product-picker-row ${selected ? "is-selected" : ""}">
            <input
              type="checkbox"
              ${selected ? "checked" : ""}
              onchange="toggleBulkProductUpdateProduct(${toInlineJsStringLiteral(productId)}, this.checked)">
            ${renderCartItemThumb({
              productId,
              name: product.name || productId || "สินค้า",
              image: product.image || ""
            })}
            <div class="bulk-product-picker-main">
              <div class="name">${esc(product.name || productId || "-")}</div>
              <div class="bulk-product-picker-meta">
                <span>SKU: ${esc(productId || "-")}</span>
                <span>ราคา: ${esc(formatBulkProductUpdateValue("price", product.price))}</span>
                <span>ต้นทุน: ${esc(formatBulkProductUpdateValue("costPrice", product.costPrice))}</span>
              </div>
              <div class="bulk-product-picker-meta">
                ${renderBulkProductUpdateValueDisplay("status", product.status)}
                ${renderBulkProductUpdateValueDisplay("active", isActive)}
              </div>
            </div>
          </label>
        `;
      }).join("")
    : `<div class="bulk-product-picker-empty">ไม่พบสินค้าตามเงื่อนไขที่ค้นหา</div>`;
}

  const count = document.getElementById("bulkProductUpdatePickerCount");
  if (list) {
    list.innerHTML = renderBulkProductUpdatePickerRows();
  }
  if (count) {
    count.textContent = String(getBulkProductUpdateSelectedSkus().length);
  }
}

function syncBulkProductUpdatePreviewGateUi() {
  const submitButton = document.getElementById("bulkProductUpdateSubmitButton");
  if (submitButton) {
    submitButton.disabled = true;
  }

  const status = document.getElementById("bulkProductUpdateStatusHost");
  if (status) {
    status.innerHTML = renderBulkProductUpdateStatus([], []);
  }

  const success = document.getElementById("bulkProductUpdateSuccessHost");
  if (success) {
    success.innerHTML = "";
  }

  const preview = document.getElementById("bulkProductUpdatePreviewHost");
  if (preview) {
    preview.innerHTML = renderBulkProductUpdatePreview([], []);
  }
}

function renderBulkProductUpdateSheetPreservingPickerScroll() {
  const picker = document.getElementById("bulkProductUpdatePickerList");
  const scrollTop = picker ? picker.scrollTop : 0;
  renderBulkProductUpdateSheet();
  requestAnimationFrame(() => {
    const nextPicker = document.getElementById("bulkProductUpdatePickerList");
    if (nextPicker) {
      nextPicker.scrollTop = scrollTop;
    }
  });
}

function renderBulkProductUpdatePreview(items, errors) {
  if (!items.length && !errors.length) {
    return `
      <div class="empty-state">
        ระบุ SKU แล้วกดตรวจสอบข้อมูล เพื่อดูค่าเดิมและค่าใหม่ก่อนบันทึก
      </div>
    `;
  }

  const errorsByRow = new Map();
  errors.forEach(error => {
    const row = Number(error.row) || 0;
    if (!errorsByRow.has(row)) errorsByRow.set(row, []);
    errorsByRow.get(row).push(error);
  });

  const globalErrors = errorsByRow.get(0) || [];
  const cards = items.map((item, index) => {
    const rowNumber = item.row || index + 1;
    const rowErrors = errorsByRow.get(rowNumber) || [];
    const product = item.product || {};
    const oldValue = item.product
      ? renderBulkProductUpdateValueDisplay(item.field, item.oldValue)
      : "-";
    const newValue = item.newValue !== null && item.newValue !== undefined
      ? renderBulkProductUpdateValueDisplay(item.field, item.newValue)
      : "-";

    return `
      <div class="bulk-preview-card bulk-update-preview-card ${rowErrors.length ? "has-error" : ""}">
        ${renderCartItemThumb({
          productId: item.productId,
          name: product.name || item.productId || "สินค้า",
          image: product.image || ""
        })}
        <div>
          <div class="name">${esc(product.name || item.productId || "-")}</div>
          <div class="bulk-preview-meta">
            SKU: ${esc(item.productId || "-")}<br>
            อัปเดต: ${esc(getBulkProductUpdateFieldLabel(item.field))}
          </div>
          <div class="bulk-update-values">
            <div class="bulk-update-value">
              ค่าเดิม
              <strong>${oldValue}</strong>
            </div>
            <div class="bulk-update-value">
              ค่าใหม่
              <strong>${newValue}</strong>
            </div>
          </div>
          ${
            rowErrors.length
              ? `<ul class="bulk-error-list">${rowErrors.map(error => `<li>${esc(error.field)}: ${esc(error.message || getBulkProductUpdateBackendErrorMessage(error))}</li>`).join("")}</ul>`
              : `<div class="status-badge status-approved compact" style="margin-top:8px">พร้อมอัปเดต</div>`
          }
        </div>
      </div>
    `;
  }).join("");

  return `
    ${globalErrors.length ? `<ul class="bulk-error-list">${globalErrors.map(error => `<li>${esc(error.message || getBulkProductUpdateBackendErrorMessage(error))}</li>`).join("")}</ul>` : ""}
    <div class="bulk-preview-list">${cards}</div>
  `;
}

function previewBulkProductUpdate() {
  const skuInput = document.getElementById("bulkProductUpdateSkus");

  if (skuInput) {
    state.admin.bulkProductUpdate.skuText = skuInput.value;
  }

  }
  state.admin.bulkProductUpdate.backendErrors = [];
  state.admin.bulkProductUpdate.summary = "";
  state.admin.bulkProductUpdate.updatedCount = 0;
  state.admin.bulkProductUpdate.hasPreview = true;
  state.admin.bulkProductUpdate.previewValid = false;
  renderBulkProductUpdateSheet();
}

async function submitBulkProductUpdate(btn) {
  if (!ensureAdminSessionForBulkUpdate()) return;
  if (state.admin.isSubmitting) return;

  const bulkState = state.admin.bulkProductUpdate;
  if (
    !bulkState.hasPreview ||
    !bulkState.previewValid ||
    !bulkState.items.length ||
    bulkState.errors.length ||
    bulkState.backendErrors.length
  ) {
    showToast("กรุณาแก้ไขข้อผิดพลาดก่อนอัปเดตสินค้า", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  renderBulkProductUpdateSheet();

  try {
    showLoading("กำลังอัปเดตสินค้า...");
    const items = bulkState.items.map(item => ({
      productId: item.productId,
      [item.field]: item.newValue
    }));

    const form = new URLSearchParams();
    form.append("action", "bulkUpdateProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const updated = Number(json.updated || json.data?.updated || 0);
      const successSummary = `อัปเดตสินค้าสำเร็จ ${updated} รายการ`;
      bulkState.summary = successSummary;
      bulkState.updatedCount = updated;
      clearBulkProductUpdateWorkingState({ keepSuccess: true });
      showToast(bulkState.summary, "success");
      await refreshProducts();
      renderBulkProductUpdateSheet();
      return;
    }

    bulkState.backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors
      : [];
    bulkState.summary = "";
    bulkState.updatedCount = 0;
    renderBulkProductUpdateSheet();
    if (isAuthError(json?.error)) {
      showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(getBulkProductUpdateBackendErrorMessage({ message: json?.error }) || "อัปเดตสินค้าไม่สำเร็จ", "error");
  } catch (err) {
    console.error(err);
    showToast("อัปเดตสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง", "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderBulkProductUpdateSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

function ensureAdminSessionForLandedCost() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
    exitAdmin();
    return false;
  }
  return true;
}

function createEmptyLandedCostRow() {
  return {
    productId: "",
    name: "",
    currentPrice: null,
    currentCostPrice: null,
    image: "",
    stock: null,
    status: "",
    active: true,
    qty: "",
    chinaUnitCost: ""
  };
}

function getLandedCostProductName(productId) {
  const cleanId = normalizeProductId(productId);
  if (!cleanId) return "";
  const products = Array.isArray(state.products) ? state.products : [];
  const product = products.find(item => normalizeProductId(item.productId) === cleanId);
  return product ? String(product.name || "").trim() : "";
}

function getLandedCostProductSnapshot(productId) {
  const cleanId = normalizeProductId(productId);
  if (!cleanId) return null;
  const products = Array.isArray(state.products) ? state.products : [];
  return products.find(item => normalizeProductId(item.productId) === cleanId) || null;
}

function getLandedCostRowProductName(row) {
  const rowName = String(row?.name || "").trim();
  if (rowName) return rowName;
  return getLandedCostProductName(row?.productId);
}

function isEmptyLandedCostRow(row) {
  return (
    !normalizeProductId(row?.productId) &&
    String(row?.qty ?? "").trim() === "" &&
    String(row?.chinaUnitCost ?? "").trim() === ""
  );
}

function createLandedCostRowFromProduct(product) {
  const productId = normalizeProductId(product?.productId);
  const costPrice =
    product?.costPrice !== null &&
    product?.costPrice !== undefined &&
    product?.costPrice !== ""
      ? Number(product.costPrice) || 0
      : 0;

  return {
    productId,
    name: String(product?.name || "").trim(),
    currentPrice: Number(product?.price || 0),
    currentCostPrice: costPrice,
    image: product?.image || "",
    stock: product?.stock !== null && product?.stock !== undefined ? Number(product.stock || 0) : null,
    status: product?.status || "",
    active: product?.active !== false,
    qty: "1",
    chinaUnitCost: String(costPrice)
  };
}

function clearLandedCostApplyStatus(calcState = state.admin.landedCost) {
  calcState.applyStatus = "";
  calcState.applyError = "";
  calcState.appliedCount = 0;
}

function parseNonNegativeNumber(value) {
  const text = String(value ?? "").trim();
  if (text === "") return { valid: true, value: 0 };
  const number = Number(text);
  return { valid: Number.isFinite(number) && number >= 0, value: number };
}

function roundLandedCostValue(value, mode) {
  const safeValue = Number.isFinite(value) ? value : 0;
  if (mode === "floor") return Math.floor(safeValue);
  if (mode === "round") return Math.round(safeValue);
  return Math.ceil(safeValue);
}

function updateLandedCostField(field, value) {
  const calcState = state.admin.landedCost;
  if (!Object.prototype.hasOwnProperty.call(calcState, field)) return;
  calcState[field] = value;
  calcState.result = null;
  calcState.errors = [];
  calcState.applyPreviewRows = [];
  calcState.applySelectedIds = [];
  calcState.applyMessage = "";
  clearLandedCostApplyStatus(calcState);
}

function updateLandedCostRow(index, field, value) {
  const rowIndex = Number(index);
  const row = state.admin.landedCost.rows[rowIndex];
  if (!row || !["productId", "qty", "chinaUnitCost"].includes(field)) return;
  if (field === "productId") {
    const productId = normalizeProductId(value);
    const product = getLandedCostProductSnapshot(productId);
    row.productId = productId;
    row.name = product ? String(product.name || "").trim() : "";
    row.currentPrice = product ? Number(product.price || 0) : null;
    row.currentCostPrice = product ? Number(product.costPrice || 0) : null;
    row.image = product?.image || "";
    row.stock = product ? Number(product.stock || 0) : null;
    row.status = product?.status || "";
    row.active = product ? product.active !== false : true;
  } else {
    row[field] = value;
  }
  state.admin.landedCost.result = null;
  state.admin.landedCost.errors = [];
  state.admin.landedCost.applyPreviewRows = [];
  state.admin.landedCost.applySelectedIds = [];
  state.admin.landedCost.applyMessage = "";
  clearLandedCostApplyStatus();
}

function addLandedCostRow() {
  state.admin.landedCost.rows.push(createEmptyLandedCostRow());
  state.admin.landedCost.result = null;
  state.admin.landedCost.errors = [];
  state.admin.landedCost.applyPreviewRows = [];
  state.admin.landedCost.applySelectedIds = [];
  state.admin.landedCost.applyMessage = "";
  clearLandedCostApplyStatus();
  renderLandedCostSheet();
}

function removeLandedCostRow(index) {
  const rowIndex = Number(index);
  if (!Number.isInteger(rowIndex)) return;
  const rows = state.admin.landedCost.rows;
  rows.splice(rowIndex, 1);
  if (!rows.length) rows.push(createEmptyLandedCostRow());
  state.admin.landedCost.result = null;
  state.admin.landedCost.errors = [];
  state.admin.landedCost.applyPreviewRows = [];
  state.admin.landedCost.applySelectedIds = [];
  state.admin.landedCost.applyMessage = "";
  clearLandedCostApplyStatus();
  renderLandedCostSheet();
}

function getLandedCostSelectedSkus() {
  const selectedSkus = Array.isArray(state.admin.landedCost.selectedSkus)
    ? state.admin.landedCost.selectedSkus
    : [];
  const seen = new Set();
  return selectedSkus
    .map(normalizeProductId)
    .filter(productId => {
      if (!productId || seen.has(productId)) return false;
      seen.add(productId);
      return true;
    });
}

function getLandedCostExistingSkus() {
  return new Set(
    (Array.isArray(state.admin.landedCost.rows) ? state.admin.landedCost.rows : [])
      .map(row => normalizeProductId(row.productId))
      .filter(Boolean)
  );
}

function getLandedCostPickerProducts() {
  const calcState = state.admin.landedCost;
  const searchText = String(calcState.pickerSearch || "").trim().toLowerCase();
  const rawStatusFilter = String(calcState.pickerStatus || "all").trim().toLowerCase();
  const statusFilter = rawStatusFilter === "all" ? "all" : normalizeProductStatus(rawStatusFilter);
  const products = Array.isArray(state.products) ? state.products : [];

  return products.filter(product => {
    const productId = normalizeProductId(product.productId);
    const name = String(product.name || "").toLowerCase();
    const status = normalizeProductStatus(product.status);
    const matchesSearch = !searchText ||
      productId.toLowerCase().includes(searchText) ||
      name.includes(searchText);
    const matchesStatus = statusFilter === "all" || status === statusFilter;
    return matchesSearch && matchesStatus;
  });
}

function toggleLandedCostPicker() {
  state.admin.landedCost.pickerOpen = !state.admin.landedCost.pickerOpen;
  state.admin.landedCost.pickerMessage = "";
  renderLandedCostSheet();
}

function setLandedCostPickerSearch(value) {

}

function setLandedCostPickerStatus(value) {

}

function toggleLandedCostProduct(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(getLandedCostSelectedSkus());
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.landedCost.selectedSkus = Array.from(selected);
  state.admin.landedCost.pickerMessage = "";
  renderLandedCostSheet();
}

function selectVisibleLandedCostProducts() {
  const selected = new Set(getLandedCostSelectedSkus());
  getLandedCostPickerProducts().forEach(product => {
    const productId = normalizeProductId(product.productId);
    if (productId) selected.add(productId);
  });
  state.admin.landedCost.selectedSkus = Array.from(selected);
  state.admin.landedCost.pickerMessage = "";
  renderLandedCostSheet();
}

function clearLandedCostSelection() {
  state.admin.landedCost.selectedSkus = [];
  state.admin.landedCost.pickerMessage = "";
  renderLandedCostSheet();
}

function addSelectedLandedCostProducts() {
  const calcState = state.admin.landedCost;
  const selectedSkus = getLandedCostSelectedSkus();
  const products = Array.isArray(state.products) ? state.products : [];
  const productMap = new Map(
    products.map(product => [normalizeProductId(product.productId), product])
  );
  const nextRows = Array.isArray(calcState.rows)
    ? calcState.rows.filter(row => !isEmptyLandedCostRow(row))
    : [];
  const existingSkus = new Set(
    nextRows
      .map(row => normalizeProductId(row.productId))
      .filter(Boolean)
  );

  let added = 0;
  let skipped = 0;
  selectedSkus.forEach(productId => {
    if (!productId || existingSkus.has(productId)) {
      skipped += 1;
      return;
    }

    const product = productMap.get(productId);
    if (!product) {
      skipped += 1;
      return;
    }

    nextRows.push(createLandedCostRowFromProduct(product));
    existingSkus.add(productId);
    added += 1;
  });

  calcState.rows = nextRows.length ? nextRows : [createEmptyLandedCostRow()];
  calcState.selectedSkus = [];
  calcState.result = null;
  calcState.errors = [];
  calcState.applyPreviewRows = [];
  calcState.applySelectedIds = [];
  calcState.applyMessage = "";
  clearLandedCostApplyStatus(calcState);
  calcState.pickerMessage = added
    ? `เพิ่มสินค้าเข้ารอบคำนวณแล้ว ${added} รายการ${skipped ? ` · ข้ามรายการซ้ำ ${skipped} รายการ` : ""}`
    : skipped
      ? "สินค้านี้อยู่ในรายการแล้ว"
      : "กรุณาเลือกสินค้าอย่างน้อย 1 รายการ";
  renderLandedCostSheet();
}
