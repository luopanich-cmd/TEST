 <!DOCTYPE html>  
 <html lang="en">
 <head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
 <meta name="color-scheme" content="dark">
 <meta name="theme-color" content="#0f0f12">
 <title>Stock Viewer</title>

<!-- ================= UI STYLE ================= -->
<style>
  :root {
  /* ================= PHASE 3: TYPOGRAPHY / HIERARCHY ================= */
  --text-primary:   rgba(255,255,255,.92);
  --text-secondary: rgba(235,235,245,.75);
  --title-size:     22px;
  --subtitle-size:  12.5px;
  --title-weight:   700;
  --subtitle-weight:500;
    
  /* ================= STEP 2: SHADOW/DEPTH TOKENS (UNIFIED) ================= */
  --shadow-card:            0 10px 34px rgba(0,0,0,.65);
  --shadow-control:         0 8px 22px rgba(0,0,0,.60);
  --shadow-image:           0 6px 18px rgba(0,0,0,.65);
  --shadow-header:          0 8px 32px rgba(0,0,0,.50);
  --shadow-header-scrolled: 0 16px 42px rgba(0,0,0,.65);
  --shadow-card-pressed:    0 6px 18px rgba(0,0,0,.55);
  --shadow-side:            -6px 0 24px rgba(0,0,0,.60);
  --shadow-floating:        0 10px 34px rgba(0,0,0,.60);
  --shadow-fab:             0 12px 34px rgba(0,0,0,.60);
  --shadow-canvas-card:     var(--shadow-card);
 
  /* legacy alias (keep old refs working + follow unified override) */
  --shadow-float:           var(--shadow-floating);  
   
   /* ================= STEP 1: INTERACTION TOKENS ================= */
   /* Tap scale */
   --tap-scale-primary: .97;   /* primary / confirm */
   --tap-scale-icon:    .95;   /* icon circle buttons */
   --tap-scale-card:    .98;   /* cards should feel heavier */

   /* Durations */
   --dur-tap:   140ms;
   --dur-sheet: 300ms;
   --dur-chrome:360ms;

   /* Easings (keep minimal, iOS-like) */
   --ease-tap:   cubic-bezier(.2,.8,.2,1);
   --ease-out:   cubic-bezier(.22,.61,.36,1);
   --ease-chrome:cubic-bezier(.22,.61,.36,1); 
 }
  
 html, body {
   margin: 0;
   padding: 0;
   width: 100%;
   max-width: 100%;
   overflow-x: hidden;
   font-family: -apple-system, BlinkMacSystemFont, sans-serif;
   background: #0f0f12;
   color: #f5f5f7;
   color-scheme: dark;
   height: 100%;
   min-height: 100%;
 }

  body{
   min-height: 100dvh;
  }
  
  header{
  padding:
    calc(env(safe-area-inset-top, 0px) + 20px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    18px
    calc(env(safe-area-inset-left, 0px) + 16px);
  font-size: inherit;
  font-weight: inherit;

  /* 🔹 Visual */
  background: rgba(28,28,30,.55); /* 🔴 CHANGED: dark glass */
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,.06); /* 🔴 CHANGED: subtle dark divider */

  box-shadow:
    var(--shadow-header),
    inset 0 -1px 0 rgba(255,255,255,.06); /* 🔴 CHANGED: reduce white glow */

  /* 🔹 Position */
  position: sticky;
  top: 0;
  z-index: 50;

  /* 🔹 Layout (สำคัญ) */
  display: flex;
  justify-content: space-between;
  align-items: center;

  /* 🔴 FIX สำคัญ */
  min-height: 110px; /* รองรับ Search + Filter (STEP 5.2) */
  box-sizing: border-box;

  transition:
    padding var(--dur-chrome) var(--ease-chrome),
    min-height var(--dur-chrome) var(--ease-chrome),
    background var(--dur-chrome) ease,
    box-shadow var(--dur-chrome) ease;
}

header.scrolled{
  padding:
    calc(env(safe-area-inset-top, 0px) + 12px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    10px
    calc(env(safe-area-inset-left, 0px) + 16px);
  min-height: 72px;
  background: rgba(28,28,30,.75); /* 🔴 CHANGED: darker when scrolled */
  box-shadow:
    var(--shadow-header-scrolled),
    inset 0 -1px 0 rgba(255,255,255,.08); /* 🔴 CHANGED: subtle inner edge */
}
  
/* ================= SHOP TITLE GLOW ================= */
.shop-title,
.admin-title{
  font-weight: var(--title-weight);
  font-size: var(--title-size);
  letter-spacing: .15px;
  color: var(--text-primary);

  display: inline-flex;
  align-items: center;
  padding: 7px 12px;
  border-radius: 999px;
  position: relative;
  overflow: hidden;
  isolation: isolate; /* 🔴 FIX: กัน layer เพี้ยน */

  /* 🔴 CHANGED: dark glass base */
  background: rgba(28,28,30,.72);
  border: 1px solid rgba(255,255,255,.10);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  /* 🔴 CHANGED: softer dark-depth inner rim */
  box-shadow:
    var(--shadow-control),
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 0 rgba(255,255,255,.04);

  /* 🔴 CHANGED: remove white glow feeling */
  text-shadow: 0 1px 0 rgba(0,0,0,.35);

  z-index: 0;
}

/* ✅ Glass highlight (top-left glare) */
.shop-title::before,
.admin-title::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0; /* 🔴 FIX: ไม่ใช้ -1 */
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.20) 0%,
      rgba(255,255,255,.10) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.55;
  pointer-events:none;
  mix-blend-mode: screen;
}

/* PHASE 3: Supporting line under title */
.shop-subtitle{
  margin-top: 6px;
  font-size: var(--subtitle-size);
  font-weight: var(--subtitle-weight);
  color: var(--text-secondary);
  letter-spacing: .2px;
}

/* ================= PHASE 3: HEADER HIERARCHY LAYOUT ================= */
.header-left{
  flex: 1;
  min-width: 0;
}
.header-stack{
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.header-actions{
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: 12px;
}  
  
/* ================= ADMIN TITLE (only delta) ================= */
 .admin-title{
   /* 🔴 CHANGED: ให้เหมือน shop-title 100% → ไม่ดันซ้ายด้วย margin */
   margin-left: 0;
 }
    
  .badge{
    color:#fff;
  border-radius:999px;
  padding:3px 10px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.2px;
  background: rgba(255,59,48,.88);
  border: 1px solid rgba(255,255,255,.28);
  box-shadow:
    0 10px 24px rgba(0,0,0,.14),
    inset 0 1px 0 rgba(255,255,255,.35);
  }
  .container{padding:16px;display:grid;gap:16px;}

.pagination{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-top:8px;
  padding:12px 0 calc(env(safe-area-inset-bottom) + 8px);
}

.pagination-info{
  flex:1;
  text-align:center;
  font-size:14px;
  color:rgba(245,245,247,.92);
  line-height:1.35;
}
  .card{
  background: rgba(28,28,30,.72);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-radius:18px;
  padding:14px;
  cursor:pointer;
  box-shadow: var(--shadow-card);
  }
  .name{
  font-weight:600;
  line-height:1.35;

  display:-webkit-box;
  -webkit-line-clamp:2;      /* จำกัด 2 บรรทัด */
  -webkit-box-orient:vertical;

  overflow:hidden;
  word-break:break-word;
}
  .price{color:#007aff;margin-top:4px;}
  .stock{font-size:14px;color:rgba(235,235,245,.72);}

  .backdrop{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.25);
  backdrop-filter: blur(2px);
  display: none;
  z-index: 100;
}

.sheet{
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  background: rgba(28,28,30,.88);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 22px 22px 0 0;
  box-shadow: var(--shadow-float);

  padding: 20px 20px 24px; /* เว้นล่างให้หายอึดอัด */

  /* ✅ CORE FIX */
  max-height: calc(100dvh - 40px);   /* ใช้ dvh แทน vh */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  transform: translateY(100%);
  transition: transform var(--dur-sheet) var(--ease-out);

  z-index: 101;
}

.sheet.show{
  transform: translateY(0);
}

.sheet h3{
  margin:0 0 12px;
}



/* ================= BASE INPUT (NEUTRAL) ================= */
input,
select {
  width: 100%;
  box-sizing: border-box;
  outline: none;
  font-family: inherit;
  background: rgba(44,44,46,.90);
  color: #fff;
  border: 1px solid rgba(255,255,255,.08);
}

/* 🔴 NEW: textarea base style (Light mode fix) */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  background: rgba(44,44,46,.90);
  color: #fff;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
}
  
input::placeholder,
textarea::placeholder {
  color: #999;                 /* 🔴 FIX: placeholder ไม่จางเกินไป */
}  

input:focus,
select:focus {
  border-color: #007aff;
}

/* ================= STEP 3: FORM CONSISTENT ================= */

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.form-group label {
  font-size: 13px;
  color: rgba(235,235,245,.72);
}

/* ================= FORM INPUT (UNIFIED) ================= */

/* ทุก input / select ใน form + กัน iOS zoom */
.form-group input,
.form-group select {
  width: 100%;
  height: 44px;
  padding: 10px 12px;

  font-size: 16px;          /* 🔴 FIX iOS ZOOM */
  line-height: 1.2;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  box-sizing: border-box;
  background: rgba(44,44,46,.90);
  color: #fff;
  font-family: inherit;
}

/* number ต้องเหมือน text (iOS / Android) */
.form-group input[type="number"] {
  appearance: textfield;
  -moz-appearance: textfield;
}

/* focus state */
.form-group input:focus,
.form-group select:focus {
  border-color: #007aff;
  outline: none;
}

  /* ✅ เพิ่มตรงนี้ */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

 .btn-remove{
  padding:6px 12px;
  border-radius:10px;
  background:#ff3b30;
  color:#fff;
  border:none;

  font-size:13px;
  font-weight:600;
  line-height:1;

  cursor:pointer;
 }
  /* ✅ เพิ่มตรงนี้ */
.btn-remove:active {
  transform: scale(var(--tap-scale-icon));
}

/* interaction: use .btn:active as single source of truth */
  
/* ================= BUTTON SYSTEM ================= */

.btn {
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition:
    transform var(--dur-tap) var(--ease-tap),
    box-shadow var(--dur-tap) ease;
}

/* Primary */
.btn-primary {
  background: #007aff;
  color: #fff;
}

/* Secondary (soft green) */
.btn-secondary {
  background: #34c759;
  color: #fff;
}

/* Outline (cancel / back) */
.btn-outline {
  background: rgba(44,44,46,.90);
  color: #f5f5f7;
  border: 1px solid rgba(255,255,255,.08);
}

/* Danger (logout / destructive) */
.btn-danger{
  background:#ff3b30;
  color:#fff;
}
.btn-danger:active{
  transform: scale(var(--tap-scale-primary));
}

/* Interaction */
.btn:active {
  transform: scale(var(--tap-scale-primary));
}

  .cart-item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:12px 0;
  border-bottom:1px dashed rgba(0,0,0,.08);
  }

 .cart-item > div:first-child {
   flex: 1;
   min-width: 0; /* 🔴 สำคัญมาก: ให้ text ถูกตัดได้ */
 }

 .cart-item > div:last-child {
   flex-shrink: 0;
   text-align: right;
 }

 .cart-item .price{
   margin-top:2px;
 }

 .cart-item-right{
   display:flex;
   align-items:center;   /* 🔴 หัวใจ: align กับราคา */
   gap:8px;
 }
 

  .total{
  font-size:18px;
  font-weight:700;
  text-align:right;
  margin-top:16px;
  padding-top:12px;
  border-top:1px solid rgba(0,0,0,.08);
  }

#cartSheet .btn-primary{
  margin-top:16px;
  margin-bottom:12px;
}

#cartSheet{
  padding-bottom: calc(env(safe-area-inset-bottom) + 28px);
}
  
  /* ===== Order Preview (Hidden) ===== */
  #orderPreview {
    width: 360px;
    padding: 16px;
    background: #1c1c1e;
    color: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: none;
  }
  #orderPreview h2 {
    margin: 0 0 8px;
  }
  #orderPreview .item {
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    font-size:14px;
  }
  #orderPreview .footer {
    margin-top:12px;
    font-weight:700;
    text-align:right;
  }

/* ================= HEADER SEARCH (iOS-LIKE) ================= */
.viewer-search-wrap{
   margin-top:6px;
   max-width:100%;
 }  

.search-wrap {
  display: flex;
  align-items: center;
  position: relative;
  max-width: 100%;
  min-width: 0;          /* 🔴 กันดัน layout */
  overflow: visible;     /* ✅ ให้เงาปุ่มวงกลมไม่โดนตัดเป็นเหลี่ยม */
}

.search-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,.10);
  position: relative;
  overflow: hidden;

  /* ✅ Match filter/menu: Apple-nimble glass */
  background: rgba(28,28,30,.72);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  box-shadow: var(--shadow-control);
  cursor: pointer;
  color: rgba(255,255,255,.92);
  -webkit-tap-highlight-color: transparent;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;
}

/* ✅ Glass highlight (same language as filter/menu) */
.search-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
.search-btn::after{
  content:none;
}
.search-btn > *{ position: relative; z-index: 2; }
  
.search-btn:active {
  transform: scale(var(--tap-scale-icon));
  background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
}

@media (hover:hover){
  .search-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
.search-input {
   width: 0;             /* 🔴 สำคัญ: ตอนยังไม่ active ต้องไม่กินพื้นที่ */
   opacity: 0;
   margin-left: 0;
   height: 40px;
   padding: 0;

   font-size: 16px;
   border-radius: 12px;
   border: 0;

   background: rgba(44,44,46,.90);
   color: #fff;
   backdrop-filter: blur(14px);

  pointer-events: none;

  transform: translateX(-6px) scaleX(.6);
  transform-origin: left center;

  transition:
    opacity .18s ease,
    transform .45s cubic-bezier(.34,1.56,.64,1),
    width .35s ease,
    margin-left .35s ease,
    padding .35s ease;
}

/* 🔥 ACTIVE STATE */
.search-wrap.active .search-input {
  opacity: 1;
  transform: translateX(0) scaleX(1);
  pointer-events: auto;
  width: min(220px, calc(100vw - 200px)); /* 🔴 ลด/ยืดตามจอ ไม่ดัน filter+menu */
  margin-left: 8px;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,.08);
}

/* 🔹 subtle focus glow (iOS feel) */
.search-input:focus {
  border-color: #007aff;
  box-shadow:
    0 0 0 3px rgba(0,122,255,.18);
  outline: none;
}

/* ✅ STEP 3+4: SVG icon (monochrome) */
.icon-sf{
  width: 18px;
  height: 18px;
  display: block;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: .92;
}
 /* ================= FILTER ICON DROPDOWN ================= */
 .filter-wrap{ position:relative; }

 .filter-btn{
   width:40px;
   height:40px;
   border-radius:50%;
   border:none;
   position: relative;          /* ✅ needed for glass layers */
   overflow: hidden;            /* ✅ clip highlight rim */
   
   /* ✅ Apple-nimble glass (less "3D") */
  background: rgba(28,28,30,.72);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
   cursor:pointer;
   color: rgba(255,255,255,.92);
   display:flex;
   align-items:center;
   justify-content:center;
   -webkit-tap-highlight-color: transparent;
   transition:
     transform var(--dur-tap) var(--ease-tap),
     background var(--dur-tap) ease,
     box-shadow var(--dur-tap) ease;

   /* ✅ Token shadow (unified depth) */
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: var(--shadow-control);
 }

 /* ✅ Glass highlight (top-left glare) */
.filter-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index: 0;
  background: radial-gradient(70% 55% at 28% 22%,
    rgba(255,255,255,.65) 0%,
    rgba(255,255,255,0) 58%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}

/* ✅ Inner rim (second ring) */
.filter-btn::after{
  content:none;
} 
  
 .filter-btn:active{
   transform: scale(var(--tap-scale-icon));
   /* ✅ press = simpler, less 3D */
   background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
 }

 @media (hover:hover){
  .filter-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
 .filter-btn .icon{
   position: relative;
   z-index: 2;
   width:18px;
   height:18px;
   fill: currentColor;
   opacity:.9;
 }
  
 .filter-dropdown{
   position:absolute;
   top:52px;
   right:0;
   min-width:200px;
   padding:10px;
   border-radius:18px;
   /* 🔴 CHANGED: เพิ่ม contrast + ขอบ + แยกชั้นให้ชัด */
   background: rgba(44,44,46,.96);
   backdrop-filter: blur(26px) saturate(180%);
   -webkit-backdrop-filter: blur(26px) saturate(180%);
   border: 1px solid rgba(255,255,255,.12);
   box-shadow: var(--shadow-floating);
   color: rgba(245,245,247,.92);
   display:none;
   flex-direction:column;
   gap:6px;
 }

 .filter-dropdown.show{ display:flex; }

 .filter-item{
   /* 🔴 CHANGED: ทำให้แต่ละแถวอ่านง่าย + มี state */
   padding: 10px 12px;
   border-radius: 12px;
   font-size: 14px;
   font-weight: 600;
   color: rgba(245,245,247,.92);
   cursor: pointer;
   user-select: none;
   transition: background .16s ease, transform .16s ease;
 }

 /* 🔴 CHANGED: เส้นแบ่งแบบ iOS (ช่วยแยก item ไม่ให้กลืน) */
 .filter-item + .filter-item{
   border-top: 1px solid rgba(255,255,255,.08);
 }

 /* 🔴 CHANGED: hover/active ให้รู้ว่ากดได้ */
 @media (hover:hover){
   .filter-item:hover{
     background: rgba(255,255,255,.10);
   }
 }
 .filter-item:active{
   background: rgba(255,255,255,.14);
   transform: scale(.985);
 } 
  
/* ================= HEADER MENU BUTTON (iOS TACTILE) ================= */
.menu-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  position: relative;
  overflow: hidden;

  /* ✅ Match filter-btn: Apple-nimble glass (less 3D) */
  background: rgba(28,28,30,.72);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: var(--shadow-control);

  color: rgba(255,255,255,.92);
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;

  -webkit-tap-highlight-color: transparent;
}


/* ✅ Glass highlight (like filter) */
.menu-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:

/* ===== Animation (namespaced) ===== */

  from {

    transform: translateY(-10px);

  to {

    transform: translateY(0);

}

/* ================= FLOATING BOTTOM BAR ================= */

/* 🔴 CHANGED: Clean + deterministic cascade (กัน opacity สลับทิศ) */
#floatingBar{
  position: fixed !important;
  left: 16px;
  right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 18px) !important;
  max-width: 520px;
  margin: 0 auto;

  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 18px;

  background: rgba(28,28,30,.72);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,.12);
  box-shadow:
    var(--shadow-floating),
    inset 0 1px 0 rgba(255,255,255,.10);
  color: #f5f5f7;

  z-index: 999;

  /* default = hidden */
  transform: translateY(120%);
  opacity: 0;
  pointer-events: none;
  visibility: hidden;            /* 🔍 FIX: บังคับซ่อนจริง (กัน opacity ค้าง) */
  
  transition:
    transform .48s cubic-bezier(.34,1.56,.64,1),
    opacity .3s ease;
  will-change: transform, opacity;
}

/* ✅ Cart bar text readability (เฉพาะ floatingBar) */
#floatingBar .bar-left{
  min-width: 0;
}
#floatingBar .bar-subtext{
  font-size: 13px;
  color: rgba(245,245,247,.82);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

#floatingBar.bounce-in{
  animation: float-bounce .65s cubic-bezier(.34,1.56,.64,1);
}
@keyframes float-bounce{
  0%   { transform:translateY(120%) scale(.94); }
  60%  { transform:translateY(-6px) scale(1.02); }
  100% { transform:translateY(0) scale(1); }
}

#floatingBar .total-animate{ animation: total-pop .25s ease; }
@keyframes total-pop{
  0%   { transform:scale(.92); opacity:.6; }
  100% { transform:scale(1); opacity:1; }
}

/* ✅ SHOW = only show */
 #floatingBar.show{
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
  visibility: visible; /* 🔴 FIX: เพราะ default ตั้ง hidden ไว้ */ 
 }

/* ✅ HIDE (scroll) */
#floatingBar.scroll-hide{

/* ================= SKU AUTO RUN UTILITY ================= */
// 🔴 ADDED: หา SKU ถัดไปจาก state.products เช่น A001 -> A002
function getNextProductId(currentValue = "") {
  const raw = String(currentValue || "").trim().toUpperCase();

  // ใช้ prefix จากค่าปัจจุบันก่อน เช่น A001 => A
  // ถ้าไม่มี ให้ fallback จากสินค้าที่มีอยู่ หรือใช้ "A"
  let prefix = "";
  const currentMatch = raw.match(/^([A-Z]+)(\d+)$/);
  if (currentMatch) {
    prefix = currentMatch[1];
  }

  const productIds = Array.isArray(state.products)
    ? state.products
        .map(p => String(p.productId || "").trim().toUpperCase())
        .filter(Boolean)
    : [];

  if (!prefix) {
    const lastMatch = [...productIds]
      .reverse()
      .map(id => id.match(/^([A-Z]+)(\d+)$/))
      .find(Boolean);

    prefix = lastMatch ? lastMatch[1] : "A";
  }

  const samePrefixMatches = productIds
    .map(id => id.match(/^([A-Z]+)(\d+)$/))
    .filter(match => match && match[1] === prefix);

  let maxNum = 0;
  samePrefixMatches.forEach(match => {
    const num = Number(match[2]);
    if (Number.isFinite(num) && num > maxNum) {
      maxNum = num;
    }
  });

  const nextNum = maxNum + 1;
  return `${prefix}${String(nextNum).padStart(3, "0")}`;
}

  toast.className = `toast ${type}`;

}

// ---------- Central loading timer ----------
let _loadingTimer = null;
let _loadingShownAt = 0;
const MIN_LOADING_MS = 350; // กันกระพริบ

function showLoading(message, timeoutMs = 60000) {
  const overlay = document.getElementById("loading-overlay");
  const text = document.getElementById("loading-text");
  if (!overlay || !text) return;

  text.textContent = message;
  overlay.classList.remove("hidden");

  // บังคับ render
  overlay.offsetHeight;

  _loadingShownAt = Date.now();
  state.ui.backdropLocked = true;
  if (backdrop) backdrop.style.display = "block";

  clearTimeout(_loadingTimer);
  _loadingTimer = setTimeout(() => {
    console.warn("[showLoading] auto-hide after timeout");
    safeHideLoading(true);
    showToast("การเชื่อมต่อล่าช้า ระบบยกเลิกแล้ว", "warning", 1800);
  }, timeoutMs);

/* ================= SAFE HIDE LOADING (SINGLE SOURCE OF TRUTH) ================= */
/**
 * ❗ IMPORTANT
 * - ต้องมี safeHideLoading แค่ตัวเดียวในระบบ
 * - ตัวนี้คือเวอร์ชันเดียวที่อนุญาตให้ใช้
 */

function safeHideLoading(fromTimeout = false) {
  const overlay = document.getElementById("loading-overlay");

  const elapsed = Date.now() - (_loadingShownAt || 0);
  const delay = Math.max(0, MIN_LOADING_MS - elapsed);

  setTimeout(() => {
    try {
      if (overlay) overlay.classList.add("hidden");

      // 🔥 หัวใจ: เคลียร์ timer ของ showLoading
      if (_loadingTimer) {
        clearTimeout(_loadingTimer);
        _loadingTimer = null;
      }
      // 🔒 ปลด lock เฉพาะเมื่อไม่มี overlay เปิดอยู่ (กัน confirm/flow หลุด)

        fromTimeout ? "(timeout)" : ""
      );

    } catch (e) {
      console.error("[safeHideLoading] failed", e);
    }
  }, delay);
}


// ---------- fetchWithTimeout ----------
async function fetchWithTimeout(input, init = {}, ms = 30000) {
  const controller = new AbortController();
  const signal = controller.signal;
  const id = setTimeout(() => controller.abort(), ms);

  try {
    const res = await fetch(input, { ...init, signal });

    // 🔒 เช็ค HTTP status ชัดเจน
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    return res;

  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error("การเชื่อมต่อช้าเกินไป กรุณาลองใหม่อีกครั้ง");
    }
    throw err;
  } finally {
    clearTimeout(id);
  }
}

       exitAdmin({ silent: true });

   }

   return json;
 } 

/* ================= API LAYER ================= */
const API_URL="https://script.google.com/macros/s/AKfycbzx9WlWXUqZ9OM_R0tO9wJvw79RPWIn40iakCPNuPDLBmvcuHXkqp9EMPoRiuMRnaM2Wg/exec";

const fetchProducts = async () => {
  const res = await fetchWithTimeout(
   `${API_URL}?action=products`,
   {},
   15000
 );
  const json = await res.json();

  // 🔒 enforce standard response
  if (!json || json.success !== true || !Array.isArray(json.data)) {
    console.error("fetchProducts invalid response:", json);
    return []; // ✅ คืน array เสมอ
  }

  return json.data;
};

const fetchAdminProducts = async () => {
  if (!state.admin?.token) {
    throw new Error("Not authenticated");
  }

  const form = new URLSearchParams();
  form.append("action", "adminProducts");
  form.append("token", state.admin.token);

  const res = await fetchWithTimeout(
    API_URL,
    {
      method: "POST",
      body: form
    },
    15000
  );

  const json = await res.json();
 
  if (!json || json.success !== true || !Array.isArray(json.data)) {
    throw new Error(json?.error || "โหลดสินค้าแอดมินไม่สำเร็จ");
  }

  return json.data;
};  

function sortProducts(products) {
  if (!Array.isArray(products)) return [];

  return products.sort((a, b) =>
    String(a.productId || "").localeCompare(
      String(b.productId || ""),
      'th',
      {
        numeric: true,
        sensitivity: 'base'
      }
    )
  );
}
  
async function refreshProducts() {
  const app = document.getElementById("app");

  // ✅ Premium Skeleton เฉพาะตอน "ยังไม่มีรายการ" (ลดอาการวูบ/กระพริบ)

  }

  try {

}

async function createOrder() {
  // 🔴 HARDENING: reload stock snapshot before submit
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      throw new Error(`ไม่พบสินค้า ${item.name}`);
    }

    if (Number(product.stock) < Number(item.qty)) {
      throw new Error(
        `${item.name} คงเหลือ ${product.stock} ชิ้น (คุณเลือก ${item.qty})`
      );
    }
  }

  const total = state.cart.reduce(
   (s,i)=> s + Number(i.price) * Number(i.qty),
   0
 );

  const form = new URLSearchParams();
  form.append("action", "createOrder");
  form.append("items", JSON.stringify(state.cart));
  form.append("total", total);
  form.append("poNumber", String(state.poNumber || "").trim());
 
  // ใช้ fetchWithTimeout เพื่อป้องกัน request แขวน
  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 15000);

  // 🔴 FIX: เช็ค HTTP status ก่อน
  if (!res.ok) {
    const text = await res.text();
    throw new Error(
      `CreateOrder HTTP ${res.status}: ${text}`
    );
  }

  const json = await res.json();

  // 🔴 FIX: validate response shape
  if (!json || json.success !== true || !json.data?.orderId) {
    throw new Error("Invalid createOrder response");
  }

  return json;
}

function openOverlay(el){
  if (!el || el.classList.contains("show")) return;

  el.classList.add("show");
  state.ui.overlayCount++;

  backdrop.style.display = "block";
  setTimeout(() => focusFirstInteractive(el), 0);
}

function closeOverlay(el){
  if (!el || !el.classList.contains("show")) return;

  el.classList.remove("show");
  state.ui.overlayCount = Math.max(0, state.ui.overlayCount - 1);

  // 🔴 CHANGED: จำว่าเราปิด "cartSheet" อยู่ไหม (เพราะบางครั้งปิดผ่าน backdrop จะไม่เรียก closeCart)

/* ================= STOCK CHECK ================= */
async function checkStockBeforeSubmit() {
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      return { ok:false, message:`ไม่พบสินค้า ${item.name}` };
    }

    if (Number(product.stock) < Number(item.qty)) {
      return {
        ok:false,
        message:`${item.name} คงเหลือ ${product.stock} ชิ้น (คุณเลือก ${item.qty})`
      };
    }
  }

  return { ok:true };
}

// 🔒 Global HTML Escape (XSS Guard) — micro polish: escape &, <, >, ", '
 const esc = (s) =>
   String(s ?? "")
     .replace(/&/g, "&amp;")
     .replace(/</g, "&lt;")
     .replace(/>/g, "&gt;")
     .replace(/"/g, "&quot;")
     .replace(/'/g, "&#39;");

 // 🔒 Attribute-safe (สำหรับ src/alt/href)
 const escAttr = (s) => esc(s);


// 🔴 CHANGED: ADD renderFloatingBar() (fix: cart added but bar never appears because function was missing)
function renderFloatingBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) return;

  // show เฉพาะ viewer + มีของในตะกร้า
  const hasItems = Array.isArray(state.cart) && state.cart.length > 0;
   const isViewer = state.mode === "viewer";

  // ✅ FIX: กัน ReferenceError ถ้าไม่มีตัวแปร cartSheet (หาจาก DOM โดยตรง)
  const cartSheetEl = document.getElementById("cartSheet");
  const cartOpen = !!(cartSheetEl && cartSheetEl.classList.contains("show"));

  if (!isViewer || !hasItems || cartOpen) {
    bar.classList.remove("show","bounce-in");
    bar.innerHTML = "";
    return;
  }

  const total = state.cart.reduce((s,i)=> s + (Number(i.price)||0) * (Number(i.qty)||0), 0);
  const money = (n) => (Number(n)||0).toLocaleString("th-TH");

  // ✅ แสดงเป็น "รายการ" (ชื่อสินค้าแบบย่อ) ไม่โชว์จำนวน
  const names = state.cart
    .map(i => String(i.name || "").trim())
    .filter(Boolean);
  const uniqueNames = [...new Set(names)];
  const itemCount = uniqueNames.length; // ✅ จำนวน "รายการ" (distinct) เช่น qty=3 ก็ยัง = 1 รายการ
  const preview = uniqueNames.slice(0, 2).join(", ");
  const more = uniqueNames.length - 2;
  const listText = itemCount
    ? `${itemCount} รายการ: ${preview}${more > 0 ? ` +อีก ${more} รายการ` : ""}`
    : "0 รายการ";
  
  bar.innerHTML = `
    <div class="bar-left" style="width:100%;">
      <div style="font-weight:700">ตะกร้า</div>
      <div class="bar-subtext">
        ${listText} • รวม ฿${money(total)}
      </div>
    </div>
  `;

// 🔴 NEW: ทั้งแถบกดเพื่อเปิดตะกร้า
bar.onclick = openCart;
bar.style.cursor = "pointer";

  // ให้โชว์แน่นอน + กันโดน scroll-hide ค้าง
  bar.classList.remove("scroll-hide");
  bar.classList.add("show","bounce-in");
  setTimeout(()=> bar.classList.remove("bounce-in"), 650);

function renderProducts(){
  const app = document.getElementById("app");

  const escapeHTML = (str="") =>
    String(str ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  
  // 🔒 GUARD สำคัญที่สุด
  if (!Array.isArray(state.products)) {
    console.error("renderProducts: products is not array", state.products);
    app.innerHTML = `
      <div style="
        text-align:center;
        color:#d93025;
        margin-top:40px;
        font-size:15px;
      ">
        ไม่สามารถโหลดรายการสินค้าได้
      </div>
    `;
    return;
  }

  const filteredProducts = [];

  state.products.forEach(p => {
    const stockNum = Number(p.stock);

  // 🔍 STATUS RESOLVE (ต้องมาก่อน filter ทุกครั้ง)
    const resolvedStatus =
      stockNum <= 0
        ? "out"
        : String(p.status || "ready").trim().toLowerCase();  

    // ❌ ไม่แสดงสินค้าที่ปิดขาย (viewer เท่านั้น)
    if (state.mode === "viewer" && !p.active) return;

    // 🔍 SEARCH FILTER (ชื่อ + รหัส)
    if (state.search) {
      const text = (p.name + p.productId).toLowerCase();
      if (!text.includes(String(state.search).toLowerCase())) return;
    }

// 🔍 STATUS FILTER (Viewer/Admin use resolved status)
if (
  state.mode === "viewer" &&
  state.viewerFilter &&
  state.viewerFilter.status !== "all"
) {
  if (resolvedStatus !== state.viewerFilter.status) return;
}

// 🔴 CHANGED: admin filter (ต้องอยู่หลัง resolvedStatus เสมอ)
    if (
      state.mode === "admin" &&
      state.admin.filters &&
      state.admin.filters.status !== "all"
    ) {
      if (resolvedStatus !== state.admin.filters.status) return;
    } 

    filteredProducts.push({
      ...p,
      resolvedStatus
    });
  });

  const pageSize = Number(state.pagination?.pageSize) || 100;
  const totalItems = filteredProducts.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
  const safePage = Math.min(Math.max(1, Number(state.pagination?.page) || 1), totalPages);
  state.pagination.page = safePage;

  const startIndex = (safePage - 1) * pageSize;
  const pageItems = filteredProducts.slice(startIndex, startIndex + pageSize);

  app.innerHTML = "";
  let found = false;

  pageItems.forEach(p => {
    const statusMap = {
      ready:     "พร้อมส่ง",
      shipping:  "อยู่ระหว่างจัดส่ง",
      warehouse: "อยู่โกดังไทย",
      out:       "หมด"
    };
 
    const statusKey = p.resolvedStatus;
    let statusClass = statusKey;
    let statusText  = statusMap[statusKey] || "พร้อมส่ง";

    /* ================= CARD ================= */
    const card = document.createElement("div");
    card.className = "product-card";

    card.onclick = () => {
      if (state.mode === "admin") {
        openAdminProductAction(p);
      } else {
        openProduct(p);
      }
    };

    card.innerHTML = `
      <img class="thumb"
        src="${p.image ? escapeHTML(p.image) : "about:blank"}"
        alt="${escapeHTML(p.name)}"
        onerror="this.style.display='none'">

      <div class="info">
        <div class="name">${escapeHTML(p.name)}</div>
        <div class="sku">รหัส: ${escapeHTML(p.productId)}</div>
        <div class="price">ราคา: ฿${Number(p.price).toLocaleString()}</div>

        <div class="meta">
          <span class="qty">จำนวน: ${p.stock}</span>
          <span class="status ${statusClass}">
            ${statusText}
          </span>
        </div>
      </div>
    `;

    app.appendChild(card);
    found = true;
  });

  // ❌ ไม่พบสินค้า
  if (!found) {
    app.innerHTML = `
      <div style="
        text-align:center;
        color:#888;
        margin-top:40px;
        font-size:15px;
      ">
        ไม่พบสินค้าที่ค้นหา
      </div>
    `;
    return;   
  }

  if (totalItems > pageSize) {
    const pagination = document.createElement("div");
    pagination.className = "pagination";
    pagination.innerHTML = `
      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === 1 ? "disabled" : ""}
        onclick="changePage(-1)">
        ก่อนหน้า
      </button>

      <div class="pagination-info">
        หน้า ${safePage} / ${totalPages}
        <br>
        <span style="font-size:12px;color:rgba(235,235,245,.72)">
          ${totalItems.toLocaleString()} รายการ
        </span>
      </div>

      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === totalPages ? "disabled" : ""}
        onclick="changePage(1)">
        ถัดไป
      </button>
    `;
    app.appendChild(pagination);
  } 
}

function changePage(delta){
  const nextPage = (Number(state.pagination.page) || 1) + Number(delta || 0);
  if (nextPage < 1) return;

  state.pagination.page = nextPage;
  renderProducts();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

 let lastFocusTrigger = null;

 function rememberTrigger(el){
   if (el instanceof HTMLElement) lastFocusTrigger = el;
 }

 function restoreTriggerFocus(){
   if (lastFocusTrigger && typeof lastFocusTrigger.focus === "function") {
     lastFocusTrigger.focus();
   }
 }

 function syncExpanded(button, expanded){
   if (button) button.setAttribute("aria-expanded", String(!!expanded));
 }

 function focusFirstInteractive(container){
   if (!container) return;
   const first = container.querySelector(
     'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
   );
   (first || container).focus();
 } 
  
/* 🔍 viewer search toggle (เฉพาะ UI) */
function toggleViewerSearch(triggerEl){
  const wrap  = document.getElementById("viewerSearchWrap");
  const input = document.getElementById("viewerSearchInput");
  if(!wrap || !input) return;

  rememberTrigger(triggerEl || document.querySelector("#viewerSearchWrap .search-btn")); 
  const opened = wrap.classList.contains("active");

  if(opened){
    input.value = "";
    state.search = "";
    state.pagination.page = 1;
    state.viewerSearchOpen = false;
    renderProducts();
    wrap.classList.remove("active");
    syncExpanded(wrap.querySelector(".search-btn"), false);
    restoreTriggerFocus();   
  }else{
    state.viewerSearchOpen = true;
    wrap.classList.add("active");
    syncExpanded(wrap.querySelector(".search-btn"), true);   
    setTimeout(()=>input.focus(),80);
  }
}

/* 🔍 admin search toggle (ICON EXPAND) */

function toggleAdminSearch(triggerEl){
  const wrap = document.getElementById("adminSearchWrap");
  if (!wrap) return;

  rememberTrigger(triggerEl || wrap.querySelector(".search-btn")); 
  const opening = !wrap.classList.contains("active");

  wrap.classList.toggle("active");
  syncExpanded(wrap.querySelector(".search-btn"), opening);

  if (opening) {
    const input = wrap.querySelector("input");
    // 🕒 รอ animation เริ่มก่อน focus (iOS trick)
    setTimeout(() => input && input.focus(), 120);
   } else {
     restoreTriggerFocus();   
  }
}

function toggleFilterDropdown(triggerEl){
  const el = document.getElementById("filterDropdown");
  if(!el) return;

  const btn = triggerEl || document.querySelector(".filter-btn");
  rememberTrigger(btn);
  const isOpen = el.classList.contains("show");

  document.querySelectorAll(".filter-dropdown.show")
    .forEach(d => d.classList.remove("show"));
  document.querySelectorAll(".filter-btn[aria-expanded='true']")
    .forEach(b => syncExpanded(b, false));

  if(!isOpen){
    el.classList.add("show");
     syncExpanded(btn, true);
     setTimeout(() => focusFirstInteractive(el), 0);   

    // 🔴 auto close on outside click
    setTimeout(()=>{
      document.addEventListener("click", closeFilterOnOutside, { once:true });
    }, 0);
   } else {
     restoreTriggerFocus();   
  }
}

function closeFilterOnOutside(e){
  const wrap = document.querySelector(".filter-wrap");
  if(!wrap || wrap.contains(e.target)) return;

  const el = document.getElementById("filterDropdown");
  if(el) el.classList.remove("show");
   document.querySelectorAll(".filter-btn[aria-expanded='true']")
     .forEach(b => syncExpanded(b, false)); 
}

function confirmAddToCart(){
  const p = state.selectedProduct;
  if (!p) return;

  const qty = Number(state.qty) || 1;

  // 🔒 GUARD: ห้ามเกิน stock
  const existing = state.cart.find(i => i.productId === p.productId);
  const currentQty = existing ? existing.qty : 0;

  if (currentQty + qty > Number(p.stock)) {
    // ❌ เดิม: alert
    // alert(`สินค้า "${p.name}" มีคงเหลือ ${p.stock} ชิ้น`);

    // ✅ ใหม่: toast warning
    showToast(
      `สินค้า "${p.name}" คงเหลือ ${p.stock} ชิ้น`,
      "warning"
    );
    return;
  }

  if(existing){
    existing.qty += qty;
  }else{
    state.cart.push({
      productId: p.productId,
      name: p.name,
      price: p.price,
      qty: qty
    });

  if (typeof renderBadge === "function") renderBadge();
  saveCart();
  // 🔴 CHANGED: ให้ floating cart bar อัปเดตทันทีหลังเพิ่มตะกร้า

  showToast(
    `เพิ่ม "${p.name}" ลงตะกร้าแล้ว`,
    "success"
  );

  resetToHome();
}

async function submitChangePassword(btn){
  if (state.admin.isSubmitting) return;

  const currentPassword = document.getElementById("currentPassword")?.value || "";
  const newPassword = document.getElementById("newPassword")?.value || "";
  const confirmNewPassword = document.getElementById("confirmNewPassword")?.value || "";

  if (!currentPassword || !newPassword || !confirmNewPassword) {
    showToast("กรุณากรอกข้อมูลให้ครบ", "warning");
    return;
  }

  if (newPassword !== confirmNewPassword) {
    showToast("รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน", "warning");
    return;
  }

  if (newPassword.length < 4) {
    showToast("รหัสผ่านใหม่สั้นเกินไป", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  if (btn) btn.disabled = true;

  try {
    const form = new URLSearchParams();
    form.append("action", "changePassword");
    form.append("token", state.admin.token);
    form.append("currentPassword", currentPassword);
    form.append("newPassword", newPassword);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success) {
      throw new Error(json.error || json.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ");
    }

    showToast("เปลี่ยนรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบใหม่", "success");
    exitAdmin();

  } catch (err) {
    console.error(err);
    showToast(err.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ", "error");
  } finally {
    state.admin.isSubmitting = false;
    if (btn) btn.disabled = false;
  }
}

async function handleAdminLogin(btn){
  // 🔒 กันกดซ้ำ
  if (state.admin.isSubmitting) return;

  // 🔒 force global rate limit (scope-safe)
  if (typeof window.isLoginRateLimited === "function") {

  const passInput = document.getElementById("adminPass");

  const username = userInput.value.trim();
  const password = passInput.value;

  if (!username || !password) {
    showToast("กรุณากรอก Username และ Password", "warning");
    return;
  }

  // ================= UX START =================
  state.admin.isSubmitting = true;

  if (btn) {
    btn.disabled = true;
    btn.textContent = "กำลังเข้าสู่ระบบ...";
  }
  if (cancelBtn) cancelBtn.disabled = true;

  showLoading("กำลังเข้าสู่ระบบแอดมิน...");
  // ================= UX END ===================

  try {
    // 🔐 CALL BACKEND LOGIN
    const form = new URLSearchParams();
    form.append("action", "adminLogin");
    form.append("username", username);
    form.append("password", password);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success || !json.token) {
      throw new Error(json.error || json.message || "Login failed");
    }

    // ✅ SAVE SESSION (STATE)
    state.admin.loggedIn = true;
    state.admin.user = json.username;
    state.admin.token = json.token;
    state.admin.expiredAt = json.expiredAt;

    // ✅ SAVE SESSION (PERSIST)
    saveAdminSession(json);

    // 🧹 CLOSE LOGIN SHEET
    closeOverlay(adminLoginSheet);

    // 🔓 reset lock เผื่อมีค้าง
    state.ui.backdropLocked = false;

    // 🚀 ENTER ADMIN MODE
    await enterAdmin();

  } catch (err) {
    console.error(err);
    showToast(err.message || "ไม่สามารถเข้าสู่ระบบได้", "error");

  } finally {
    // ================= CLEANUP =================
    safeHideLoading();
    state.admin.isSubmitting = false;

    if (btn) {
      btn.disabled = false;
      btn.textContent = "Login";
    }
    if (cancelBtn) cancelBtn.disabled = false;
  }
}

async function openAdminDashboard(mode = "PENDING", force = false) {
  // ❌ ต้องมี intent จริง
  if (!force && !allowOpenOrders) return;

  // 🔐 session guard (ก่อนเปิด UI)
  if (
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
    exitAdmin();
    return;
  }

  // 🔒 ใช้แล้วปิดทันที (กันเด้งซ้ำ)
  allowOpenOrders = false;

  // ✅ ปิด Stock Timeline
  closeOverlay(adminStockSheet);

  // 🔍 reset search
  state.search = "";

  // ✅ Loading UI
  adminDashboardSheet.innerHTML = `
    <h3>${mode === "PENDING"
      ? "Orders (รอดำเนินการ)"
      : "Order History"}</h3>

    <div class="loading">กำลังโหลดรายการ</div>
  `;

  openOverlay(adminDashboardSheet);

  try {
    state.admin.orders = await fetchOrders();

    const orders = state.admin.orders.filter(o =>
      mode === "PENDING"
        ? o.status === "PENDING"
        : o.status !== "PENDING"
    );

    adminDashboardSheet.innerHTML = `
      <h3>${mode === "PENDING"
        ? "Orders (รอดำเนินการ)"
        : "Order History"}</h3>

      ${
        orders.length
          ? orders.map(o => `
              <div class="card"
                onclick="openAdminOrder('${o.orderId}')">
                <div class="name">${o.orderId}</div>
                <div>Status: ${o.status}</div>
                <div>Total: ฿${Number(o.total).toLocaleString()}</div>
              </div>
            `).join("")
          : `
            <div style="color:#888;text-align:center;margin-top:24px">
              ${mode === "PENDING"
                ? "ไม่มีรายการรอดำเนินการ"
                : "ไม่มีประวัติออเดอร์"}
            </div>
          `
      }
    `;
  } catch (err) {
    console.error(err);

    // 🔴 ถ้าเป็น session error → ออกทันที
    if (
      err.message?.includes("Session") ||
      err.message?.includes("token")
    ) {
      showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
      exitAdmin();
      return;
    }

    adminDashboardSheet.innerHTML = `
      <h3>Orders</h3>

      <div style="text-align:center;color:#d93025;margin-top:32px">
        ไม่สามารถโหลดรายการออเดอร์ได้
      </div>

      <button class="btn btn-secondary"
        style="width:100%;margin-top:16px"
        onclick="allowOpenOrders = true; openAdminDashboard('${mode}', true)">
        🔄 ลองใหม่
      </button>

      <button class="btn"
        style="width:100%;margin-top:8px"
        onclick="finishAdminAction({ refresh:false })">
        ← กลับ
      </button>
    `;
  }
}

async function openStockTimeline(force = false) {
  // ❌ ต้องมี intent จริง
  if (!force && !allowOpenStockTimeline) return;

  // 🔐 session guard
  if (
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
    exitAdmin();
    return;
  }

  // 🔒 ใช้แล้วปิดทันที (กันเด้งซ้ำ)
  allowOpenStockTimeline = false;

  closeOverlay(adminDashboardSheet);

  adminStockSheet.innerHTML = `
    <h3>📦 ประวัติความเคลื่อนไหวสต๊อก</h3>
    <div class="loading">กำลังโหลด...</div>
  `;

  openOverlay(adminStockSheet);

  try {
    const logs = await fetchStockLogs();
    const safeLogs = Array.isArray(logs) ? logs : [];

    const money = (value) => `฿${Number(value || 0).toLocaleString("th-TH")}`;
    const esc = (value) => escapeHtml(value ?? "");   

    // ✅ ensure orders พร้อมใช้สำหรับ fallback ราคา/ยอดรวม
    if (!Array.isArray(state.admin.orders) || state.admin.orders.length === 0) {
      try {
        const freshOrders = await fetchOrders();
        state.admin.orders = Array.isArray(freshOrders) ? freshOrders : [];
      } catch (orderErr) {
        console.warn("openStockTimeline: preload orders failed", orderErr);
      }
    }
   
    // ✅ fallback ราคา/ยอดรวมจาก order จริง ถ้า stock log ไม่มีราคา
    const orderLookup = new Map(
      (Array.isArray(state.admin.orders) ? state.admin.orders : []).map(o => [
        String(o.orderId || "").trim(),
        o
      ])
    );   

    /* ================= GROUP ORDER OUT ================= */
    const orderMap = {};
    const singles = [];

 safeLogs.forEach(l => {
  const time = l.timestamp ? new Date(l.timestamp) : new Date();

  // ✅ ใช้ orderId จริงจาก sheet (fallback เผื่อของเก่า)
  const orderRef = l.orderId || l.ref || null;

  if (l.type === "OUT" && orderRef) {
    const matchedOrder = orderLookup.get(String(orderRef).trim());
    const matchedOrderItem = Array.isArray(matchedOrder?.items)
      ? matchedOrder.items.find(item =>
          String(item.productId || "").trim() === String(l.productId || "").trim()
        )
      : null;

    const fallbackSalePrice = Number(
      l.salePrice ??
      l.price ??
      matchedOrderItem?.price ??
      0
    );

    const fallbackLineTotal = Number(
      l.lineTotal ??
      (fallbackSalePrice * Math.abs(Number(l.qty || 0)))
    );
   
    if (!orderMap[orderRef]) {
      orderMap[orderRef] = {
        orderId: orderRef,
        time,
        by: l.by || "-",
        note: l.note || l.reason || "",
        totalSalesAmount: Number(matchedOrder?.total || 0),
        items: []
      };
    }

    if (!orderMap[orderRef].note && (l.note || l.reason)) {
      orderMap[orderRef].note = l.note || l.reason || "";
    }   

    // ใช้เวลาล่าสุดของ item ใน order เดียวกัน
    if (time.getTime() > orderMap[orderRef].time.getTime()) {
      orderMap[orderRef].time = time;
    }

    // ✅ ถ้า order.total ไม่มี ค่อยสะสมจากรายการย่อย
    if (!Number(orderMap[orderRef].totalSalesAmount)) {
      orderMap[orderRef].totalSalesAmount += fallbackLineTotal;
    }   

    orderMap[orderRef].items.push({
      productId: l.productId,
      productName: l.productName || l.name || "",
      qty: Math.abs(Number(l.qty || 0)),
      before: l.before,
      after: l.after,
      salePrice: fallbackSalePrice,
      lineTotal: fallbackLineTotal
    });
  } else {
    singles.push({
      ...l,
      _time: time
    });
  }
});

    /* ================= BUILD TIMELINE ================= */
    const timeline = [];

    Object.values(orderMap).forEach(o => {
      timeline.push({
        kind: "ORDER",
        type: "OUT",
        orderId: o.orderId,
        time: o.time,
        by: o.by,
        note: o.note || "",
        items: o.items,
        totalLines: o.items.length,
        totalQty: o.items.reduce((sum, item) => sum + Number(item.qty || 0), 0),
        totalSalesAmount: o.totalSalesAmount
      });
    });

    singles.forEach(l => {
      timeline.push({
        kind: "STOCK",
        type: l.type,
        productId: l.productId,
        productName: l.productName || l.name || "",
        qty: l.qty,
        before: l.before,
        after: l.after,
        time: l._time,
        by: l.by || "-",
        note: l.note || l.reason || ""
      });
    });

    // 🕒 latest first (safe)
    timeline.sort((a, b) => b.time.getTime() - a.time.getTime());

    /* ================= RENDER ================= */
    adminStockSheet.innerHTML = `
      <h3>📦 ประวัติความเคลื่อนไหวสต๊อก</h3>

      <button class="btn btn-secondary"
        style="width:100%;margin-bottom:12px"
        onclick="finishAdminAction({ refresh:false })">
        ← กลับ
      </button>

      ${
        timeline.length
          ? timeline.map(t => {

              if (t.kind === "ORDER") {
                const detailId = `stock-detail-${esc(t.orderId)}`;
               
                return `
                  <div class="card">
                    <div class="timeline-tag tag-out">
                      🧾 ขายออก (ออเดอร์ ${esc(t.orderId)})
                    </div>

                    <div class="timeline-summary">
                      ${t.totalLines} รายการ · ${t.totalQty} ชิ้น · ${money(t.totalSalesAmount)}
                    </div>                    

                    ${t.items.map(i => `
                      <div class="timeline-row">
                        ${esc(i.productId)}
                        ${i.productName ? ` — ${esc(i.productName)}` : ""}
                        x ${Number(i.qty || 0)}
                        ${
                          Number.isFinite(Number(i.before))
                            ? `<span class="timeline-muted">
                                (${i.before} → ${i.after})
                              </span>`
                            : ""
                        }
                      </div>
                    `).join("")}

                    <div class="timeline-detail-wrap">
                      <button
                        type="button"
                        class="timeline-detail-toggle"
                        onclick="
                          const panel = document.getElementById('${detailId}');
                          if (!panel) return;
                          panel.classList.toggle('show');
                          this.textContent = panel.classList.contains('show')
                            ? 'ซ่อนรายละเอียด'
                            : 'ดูรายละเอียดเพิ่มเติม';
                        "
                      >
                        ดูรายละเอียดเพิ่มเติม
                      </button>

                      <div id="${detailId}" class="timeline-detail-panel">
                        <div class="timeline-detail-meta">
                          ยอดรวมสินค้า: ${t.totalLines} รายการ<br>
                          ยอดรวมจำนวนชิ้น: ${t.totalQty}<br>
                          ยอดขายรวม: ${money(t.totalSalesAmount)}
                          ${t.note ? `<br>หมายเหตุ: ${esc(t.note)}` : ""}
                        </div>

                        <div class="timeline-detail-list" style="margin-top:10px">
                          ${t.items.map(i => `
                            <div class="timeline-row">
                              ${esc(i.productId)}
                              ${i.productName ? ` — ${esc(i.productName)}` : ""} |
                              ${Number(i.qty || 0)} ชิ้น
                              ${Number.isFinite(Number(i.before)) ? ` | ${i.before} → ${i.after}` : ""}
                              | ${money(i.salePrice)}/ชิ้น
                              | รวม ${money(i.lineTotal)}
                            </div>
                          `).join("")}
                        </div>
                      </div>
                    </div>                    

                    <div style="font-size:12px;color:#888;margin-top:6px">
                      ${t.time.toLocaleDateString("th-TH")}
                      ${t.time.toLocaleTimeString("th-TH")}
                      · โดย ${t.by}
                    </div>
                  </div>
                `;
              }

              const typeMap = {
                IN:     { text: "➕ รับสต๊อกเข้า", class: "tag-in" },
                CREATE: { text: "🆕 เพิ่มสินค้าใหม่", class: "tag-create" },
                ADJUST: { text: "✏️ ปรับสต๊อก", class: "tag-adjust" }
              };

              const cfg = typeMap[t.type] || { text: t.type, class: "" };

              return `
                <div class="card">
                  <div class="timeline-tag ${cfg.class}">
                    ${cfg.text}
                  </div>

                  <div class="timeline-row">
                    ${esc(t.productId)}
                    ${t.productName ? ` — ${esc(t.productName)}` : ""}
                    ${Number.isFinite(Number(t.qty)) ? ` x ${Math.abs(Number(t.qty))}` : ""}
                    ${
                      Number.isFinite(Number(t.before))
                        ? ` (${t.before} → ${t.after})`
                        : ""
                    }
                  </div>

                  ${
                    t.note
                      ? `
                        <div class="timeline-detail-wrap">
                          <button
                            type="button"
                            class="timeline-detail-toggle"
                            onclick="
                              const panel = this.nextElementSibling;
                              if (!panel) return;
                              panel.classList.toggle('show');
                              this.textContent = panel.classList.contains('show')
                                ? 'ซ่อนรายละเอียด'
                                : 'ดูรายละเอียดเพิ่มเติม';
                            "
                          >
                            ดูรายละเอียดเพิ่มเติม
                          </button>
                          <div class="timeline-detail-panel">
                            <div class="timeline-detail-meta">
                              หมายเหตุ: ${esc(t.note)}
                            </div>
                          </div>
                        </div>
                      `
                      : ""
                  }

                  <div style="font-size:12px;color:#888;margin-top:6px">
                    ${t.time.toLocaleDateString("th-TH")}
                    ${t.time.toLocaleTimeString("th-TH")}
                    · โดย ${t.by}
                  </div>
                </div>
              `;
            }).join("")
          : `
            <div style="text-align:center;color:#888;margin-top:32px">
              ไม่มีข้อมูลประวัติสต๊อก
            </div>

  } catch (err) {

    adminStockSheet.innerHTML = `

      <div style="text-align:center;color:#d93025;margin-top:32px">
        ไม่สามารถโหลดข้อมูลได้
      </div>
    `;
  }
}

async function submitStockIn(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.selectedProduct) {
    showToast("Unauthorized", "error");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const qty    = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(qty) || qty <= 0) {
    showToast("จำนวนไม่ถูกต้อง", "warning");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockIn(
      state.selectedProduct.productId,
      qty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

    showToast("รับสต๊อกเข้าแล้ว", "success");

    // 🔄 sync ข้อมูลหลัก + ข้อมูลย้อนหลังทันที
    await refreshProducts();
    await refreshAdminAuditSnapshot();

    // 🧹 reset input
    qtyInput.value = "";
    reasonInput.value = "";

    // ✅ ปิด Stock Action ผ่าน Overlay Manager
    closeOverlay(adminStockActionSheet);

    // ✅ กลับสู่หน้าแม่ของ admin แบบนิ่ง
    finishAdminAction({ refresh: true });

  } catch (err) {
    console.error(err);
    showToast(err.message || "ไม่สามารถรับสต๊อกได้", "error");
  } finally {
    // 🔓 เปิดปุ่มกลับทุกกรณี
    buttons.forEach(b => b.disabled = false);
  }
}


async function submitStockAdjust(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.admin.loggedIn || !state.selectedProduct) {
    showToast("Unauthorized", "error");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const newQty = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(newQty) || newQty < 0) {
    showToast("จำนวนไม่ถูกต้อง", "warning");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockAdjust(
      state.selectedProduct.productId,
      newQty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

 const PRODUCT_IMAGE_MAX_MB = 5;
 const PRODUCT_IMAGE_ALLOWED_TYPES = ["image/jpeg", "image/png", "image/webp"];
 
function validateProductImageFile(file) {
   if (!file) return;

   if (!PRODUCT_IMAGE_ALLOWED_TYPES.includes(file.type)) {
     throw new Error("รองรับเฉพาะไฟล์ JPG, PNG, WEBP");
   }

   const maxBytes = PRODUCT_IMAGE_MAX_MB * 1024 * 1024;
   if (file.size > maxBytes) {
     throw new Error(`รูปต้องมีขนาดไม่เกิน ${PRODUCT_IMAGE_MAX_MB} MB`);
   }
 }
 
function handleAddImagePreview(input){
  const file = input.files[0];
  if(!file) return;

 try {
   validateProductImageFile(file);
 } catch (err) {
   input.value = "";
   state.addImageFile = null;
   const img = document.getElementById("addImagePreview");
   if (img) {
     img.removeAttribute("src");
     img.style.display = "none";
   }
   showToast(err.message || "ไฟล์รูปไม่ถูกต้อง", "error");
   return;
 }
 
  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("addImagePreview");
    img.src = reader.result;
    img.style.display = "block";

    state.addImageFile = file; // เก็บไว้ใช้ upload
  };
  reader.readAsDataURL(file);
}

 // ================= GLOBAL KEYBOARD SUPPORT =================
 document.addEventListener("keydown", (e) => {
   const activeOverlay = [...document.querySelectorAll(".sheet.show, .side-menu.show")].pop();

   if (e.key === "Escape") {
     const filter = document.getElementById("filterDropdown");
     if (filter?.classList.contains("show")) {
       filter.classList.remove("show");
       document.querySelectorAll(".filter-btn[aria-expanded='true']")
         .forEach(b => syncExpanded(b, false));
       restoreTriggerFocus();
       return;
     }

     const viewerSearch = document.getElementById("viewerSearchWrap");
     if (viewerSearch?.classList.contains("active")) {
       toggleViewerSearch(viewerSearch.querySelector(".search-btn"));
       return;
     }

     const adminSearch = document.getElementById("adminSearchWrap");
     if (adminSearch?.classList.contains("active")) {
       toggleAdminSearch(adminSearch.querySelector(".search-btn"));
       return;
     }

     if (activeOverlay && !state.ui.backdropLocked) {
       if (activeOverlay === mainMenuSheet) return closeMainMenu();
       return closeOverlay(activeOverlay);
     }
   }

   if (e.key === "Tab" && activeOverlay) {
     const focusables = activeOverlay.querySelectorAll(
       'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
     );
     if (!focusables.length) return;

     const first = focusables[0];
     const last = focusables[focusables.length - 1];
    
    if (!activeOverlay.contains(document.activeElement)) {
      e.preventDefault();
      first.focus();
      return;
    }

     if (e.shiftKey && document.activeElement === first) {
       e.preventDefault();
       last.focus();
     } else if (!e.shiftKey && document.activeElement === last) {
       e.preventDefault();
       first.focus();
     }
   }
 });

async function submitOrder(){
  // ❌ ห้ามใช้ state.loading เป็น guard
  if (state.isSubmitting || state.cart.length === 0) return;
 
 const poNumber = String(state.poNumber || "").trim();
 if (!poNumber) {
   showToast("กรุณากรอกเลข PO", "warning");
   const poInput = document.getElementById("poInput");
   if (poInput) poInput.focus();
   return;
 }

  state.isSubmitting = true;
  state.ui.backdropLocked = true;

  try {
    // ================= STEP 1: CHECK STOCK =================
    showLoading('กำลังตรวจสอบสต๊อก...');
    const stockCheck = await checkStockBeforeSubmit();

    if (!stockCheck.ok) {
      showToast(stockCheck.message, 'warning');
      throw new Error("STOCK_CHECK_FAILED");
    }

    // ================= STEP 2: CREATE ORDER =================
    updateLoadingText('กำลังสร้างใบสั่งซื้อ...');
    const res = await createOrder();

    if (!res || res.success !== true || !res.data?.orderId) {
      throw new Error("Invalid order response");
    }

    // ================= SUCCESS =================
    state.lastOrder = {
      orderId: res.data.orderId,
      items: JSON.parse(JSON.stringify(state.cart)),
      total: state.cart.reduce(
        (s,i)=> s + Number(i.price) * Number(i.qty),
        0
      ),
 createdAt: new Date(),
 poNumber: state.poNumber || ""
    };
   
    saveLastOrder();

    showToast('สร้างใบสั่งซื้อเรียบร้อยแล้ว', 'success');
    showToast("กดปุ่มเพื่อดาวน์โหลดใบสั่งซื้อ", "info", 3000);

    renderLastOrderSheet();
   
// confirmSheet เปิดอยู่แล้ว ไม่ต้อง reopen

    state.cart = [];
    clearCartStorage();
    state.poNumber = "";
    if (typeof renderBadge === "function") renderBadge();
    // 🔴 CHANGED: เคลียร์ตะกร้าแล้วต้องซ่อน/รีเฟรช floating bar
    if (typeof renderFloatingBar === "function") renderFloatingBar();
    
  // ❌ ห้าม auto reset หลังสร้าง order สำเร็จ
    
  } catch(err){
    console.error(err);
    // 🔒 ถ้า fail เพราะ stock-check เรา toast ไปแล้ว ไม่ต้องซ้ำ
    if (err && err.message === "STOCK_CHECK_FAILED") return;

    showToast(
      err.message || 'เกิดข้อผิดพลาดในการสร้างใบสั่งซื้อ',
      'error'
    );
  } finally {
    safeHideLoading();
    state.isSubmitting = false;
    // 🔒 ปลด lock เฉพาะเมื่อไม่มี sheet เปิดอยู่ (กัน race condition)
    if (state.ui.overlayCount === 0) {
      state.ui.backdropLocked = false;
    }
  }
}

async function uploadProductImage(file) {
  return new Promise((resolve, reject) => {
    try {
      validateProductImageFile(file);
    } catch (err) {
      reject(err);
      return;
    }

    // 🔴 CHANGED: ให้ error เป็น Error object เสมอ
    if (!state.admin || !state.admin.token) {
      reject(new Error("Missing admin token"));
      return;
    }

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        // 🔴 CHANGED: กัน reader.result ว่าง/ผิดรูปแบบ
        const result = String(reader.result || "");
        const base64 = result.includes(",") ? result.split(",")[1] : "";
        if (!base64) {
          throw new Error("ไม่สามารถอ่านข้อมูลรูปภาพได้");
        }

        const formData = new FormData();
        formData.append("action", "uploadProductImage");
        formData.append("token", state.admin.token);
        formData.append("filename", file.name);
        formData.append("mimeType", file.type || "image/jpeg");
        formData.append("data", base64);

        // 🔴 CHANGED: ใช้ fetchWithTimeout แบบเดียวกับ API อื่น
        const res = await fetchWithTimeout(API_URL, {
          method: "POST",
          body: formData
        }, 30000);

        let json;
        try {
          json = await res.json();
        } catch (_) {
          throw new Error("รูปแบบข้อมูลตอบกลับจากการอัปโหลดไม่ถูกต้อง");
        }

        if (!json || json.success !== true || !json.data?.imageUrl) {
          const rawMessage = json?.message || json?.error || "Upload failed";

          // 🔴 CHANGED: แปลง DriveApp error ให้ debug ง่าย
          if (String(rawMessage).includes("DriveApp")) {
            throw new Error("อัปโหลดรูปไม่สำเร็จ: Apps Script ยังไม่มีสิทธิ์ใช้ DriveApp");
          }

          throw new Error(rawMessage);
        }

        resolve(json.data.imageUrl);
      } catch (err) {
        reject(err instanceof Error ? err : new Error(String(err || "Upload failed")));
      }
    };

    reader.onerror = () => {
      reject(new Error("File read error"));
    };

    reader.readAsDataURL(file);
  });
}

 const compareImages =
   Array.isArray(state.compareImagesDraft)

  if (
   !name ||
   !newProductId ||
   !Number.isInteger(price) ||
   costPrice === null ||

   price < 0 ||

 ) {

 const duplicate = state.products.find(x =>

 );
 
  if (duplicate) {

    if (saveBtn) {

  }

  try {
    showLoading("กำลังบันทึกการแก้ไขสินค้า...");

    // ถ้ามีการเลือกภาพใหม่ → upload ก่อน

      }

    form.append("newProductId", newProductId);

    form.append("status", status);
    form.append("image", imageUrl);
    form.append("note", note);
    form.append("detailsText", detailsText);
    form.append("compareImages", compareImages);

    const res = await postFormAction(form);

    showToast("บันทึกการแก้ไขเรียบร้อย", "success");

    state.selectedProduct = null;

    // cleanup
    state.editImageFile = null;
    closeProductEdit();
    await refreshProducts();
    await refreshAdminAuditSnapshot();

  } catch (err) {
    console.error(err);
    showToast(
      err.message || "เกิดข้อผิดพลาดในการบันทึกสินค้า",
      "error"
    );

  } finally {
    // ✅ CLEANUP กลางเดียว (หัวใจ STEP 9)
    safeHideLoading();
    state.admin.isSubmitting = false;

    if (saveBtn) {
      saveBtn.disabled = false;

function normalizeProductId(value = "") {
   return String(value || "").trim().toUpperCase();
 }

const ALLOWED_PRODUCT_STATUS = ["ready", "shipping", "warehouse", "out"];

function normalizeProductStatus(value = "") {
  const normalized = String(value || "").trim().toLowerCase();
  return ALLOWED_PRODUCT_STATUS.includes(normalized) ? normalized : "ready";
}

function validateProductImageFile(file) {
  if (!file) return;

  const allowedTypes = ["image/jpeg", "image/png", "image/webp"];
  const maxBytes = 5 * 1024 * 1024;

  if (!allowedTypes.includes(file.type)) {
    throw new Error("รองรับเฉพาะไฟล์ JPG, PNG, WEBP");
  }

  if (file.size > maxBytes) {
    throw new Error("รูปสินค้าต้องมีขนาดไม่เกิน 5MB");
  }
}

/* =========================================================
   🔤 THAI BAHT TEXT CONVERTER
========================================================= */
function numberToThaiText(num) {
  if (isNaN(num)) return "";

  const digit = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
  const position = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];

  function convert(n) {
    let result = "";
    const str = parseInt(n, 10).toString();
    const len = str.length;

    for (let i = 0; i < len; i++) {
      const d = parseInt(str.charAt(i));
      const pos = len - i - 1;

      if (d === 0) continue;

      if (pos === 0 && d === 1 && len > 1) {
        result += "เอ็ด";
      } else if (pos === 1 && d === 2) {
        result += "ยี่";
      } else if (pos === 1 && d === 1) {
        result += "";
      } else {
        result += digit[d];
      }

      result += position[pos];
    }

    return result;
  }

  if (num === 0) return "ศูนย์บาทถ้วน";

  return convert(num) + "บาทถ้วน";
}

function exportOrderPNG() {
  const order = state.lastOrder;
  if (!order) return;

  /* ================= A4 CONFIG (FIXED) ================= */
  const cfg = {
    width: 794,          // A4 width @96dpi
    height: 1123,        // 🔥 A4 height fixed
    padding: 64,
    titleSize: 32,
    textSize: 18,
    lineHeight: 34
  };
  /* ================= CANVAS SIZE ================= */
  const items = Array.isArray(order.items) ? order.items : [];

  const po = order.poNumber
    ? String(order.poNumber)
    : "-";

  const canvas = document.createElement("canvas");
  canvas.width = cfg.width;
  canvas.height = cfg.height;  // 🔥 FIXED A4

  const ctx = canvas.getContext("2d");

  /* ================= BACKGROUND ================= */
  ctx.fillStyle = "#f2f2f7";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

/* ================= CARD ================= */
  ctx.fillStyle = "#ffffff";

  // ✅ Canvas shadow uses token (sync light/dark)
  const getToken = (name) =>
    getComputedStyle(document.documentElement)
      .getPropertyValue(name)
      .trim();

  const parseShadowToken = (v) => {
    // expects: "0 10px 30px rgba(0,0,0,.08)" (single shadow)
    const m = String(v).match(
      /^\s*(-?\d+(?:\.\d+)?)px?\s+(-?\d+(?:\.\d+)?)px?\s+(\d+(?:\.\d+)?)px?\s+(.+)\s*$/i
    );
    if (!m) return null;
    return {
      x: Number(m[1]) || 0,
      y: Number(m[2]) || 0,
      blur: Number(m[3]) || 0,
      color: (m[4] || "rgba(0,0,0,.08)").trim()
    };
  };

  let canvasShadowRaw =
    getToken("--shadow-canvas-card") || getToken("--shadow-card");

  // ✅ resolve var(--shadow-*) for custom properties (Safari/Chrome may return literal "var(...)")
  const varMatch = String(canvasShadowRaw).match(/var\((--[^)]+)\)/);
  if (varMatch && varMatch[1]) {
    canvasShadowRaw = getToken(varMatch[1]) || canvasShadowRaw;
  }
  const sh = parseShadowToken(canvasShadowRaw);
  if (sh) {
    ctx.shadowColor = sh.color;
    ctx.shadowBlur = sh.blur;
    ctx.shadowOffsetX = sh.x;
    ctx.shadowOffsetY = sh.y;
  } else {
    // fallback (should rarely happen)
    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 6;
  }

  ctx.beginPath();

  if (typeof ctx.roundRect === "function") {
    ctx.roundRect(8, 8, canvas.width - 16, canvas.height - 16, 18);
  } else {
    const x = 8;
    const y0 = 8;
    const w = canvas.width - 16;
    const h = canvas.height - 16;
    const r = 18;

    ctx.moveTo(x + r, y0);
    ctx.lineTo(x + w - r, y0);
    ctx.quadraticCurveTo(x + w, y0, x + w, y0 + r);
    ctx.lineTo(x + w, y0 + h - r);
    ctx.quadraticCurveTo(x + w, y0 + h, x + w - r, y0 + h);
    ctx.lineTo(x + r, y0 + h);
    ctx.quadraticCurveTo(x, y0 + h, x, y0 + h - r);
    ctx.lineTo(x, y0 + r);
    ctx.quadraticCurveTo(x, y0, x + r, y0);
  }

  ctx.fill();
  ctx.shadowColor = "transparent";

  /* ================= TEXT ================= */
  let y = cfg.padding + cfg.lineHeight;
  ctx.fillStyle = "#000";

  /* ===== TITLE ===== */
  ctx.font = `700 ${cfg.titleSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillText("ใบสั่งซื้อ", cfg.padding, y);
  y += cfg.lineHeight + 8;

  /* ===== HEADER BASE LINE ===== */
  const headerTopY = y;

  /* ===== COMPANY BLOCK ===== */
ctx.font = `700 ${cfg.textSize + 4}px -apple-system`;
ctx.fillText("ร้านล้อพาณิชย์", cfg.padding, headerTopY);

ctx.fillText(
   "7/13 หมู่ 5",
   cfg.padding,
   headerTopY + cfg.lineHeight
 );
 ctx.fillText(
   "ต.หนองแขม อ.หนองแค",
   cfg.padding,
   headerTopY + cfg.lineHeight * 2
 );
 ctx.fillText(
   "จ.สระบุรี 18140",
   cfg.padding,
   headerTopY + cfg.lineHeight * 3
 );

/* ===== DOCUMENT META ===== */
const rightX = canvas.width - cfg.padding;

  ctx.textAlign = "right";
  ctx.fillText(`เลขที่: ${order.orderId}`, rightX, headerTopY);
 ctx.fillText(`PO: ${po}`, rightX, headerTopY + cfg.lineHeight);
 const docDate = new Date(order.createdAt);
 ctx.fillText(
   `วันที่: ${docDate.toLocaleDateString("th-TH")}`,
   rightX,
   headerTopY + cfg.lineHeight * 2
 );

  ctx.textAlign = "left";
  y = headerTopY + cfg.lineHeight * 5;


  /* ===== DIVIDER ===== */
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

/* ================= ITEMS (GRID TABLE) ================= */
  const tableTopY = y;
  const rowHeight = 42;

  const col = {
    no: cfg.padding,
    name: cfg.padding + 60,
    qty: canvas.width - cfg.padding - 260,
    price: canvas.width - cfg.padding - 180,
    total: canvas.width - cfg.padding - 90
  };

  ctx.font = `700 ${cfg.textSize}px -apple-system`;

  // HEADER
  ctx.fillText("ลำดับ", col.no, y);
  ctx.fillText("รายการสินค้า", col.name, y);
  ctx.fillText("จำนวน", col.qty, y);
  ctx.fillText("ราคา", col.price, y);
  ctx.fillText("รวม", col.total, y);

  y += 16;

  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();

  y += rowHeight - 16;

  ctx.font = `${cfg.textSize}px -apple-system`;

  items.forEach((i, index) => {
    const total = Number(i.price) * Number(i.qty);

    ctx.fillText(String(index + 1), col.no, y);

    ctx.fillText(`฿${Number(i.price).toLocaleString()}`, col.price + 60, y);
    ctx.fillText(`฿${total.toLocaleString()}`, col.total + 80, y);
    ctx.textAlign = "left";

    // horizontal line
    ctx.beginPath();
    ctx.moveTo(cfg.padding, y + 16);
    ctx.lineTo(canvas.width - cfg.padding, y + 16);
    ctx.strokeStyle = "#ddd";
    ctx.stroke();

    y += rowHeight;
  });
  
  /* ===== DIVIDER ===== */
  y += 4;
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

  /* ================= TOTAL ================= */
  ctx.font = `700 ${cfg.textSize + 4}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const safeTotal = Number(order.total) || 0;
  const totalText = `ยอดรวม: ฿${safeTotal.toLocaleString()}`;
  const tw = ctx.measureText(totalText).width;
  ctx.fillText(
    totalText,

  );

  /* ===== THAI TEXT TOTAL ===== */
  y += cfg.lineHeight;
  ctx.font = `${cfg.textSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const thaiText = `(${numberToThaiText(safeTotal)})`;
  const thaiWidth = ctx.measureText(thaiText).width;
  ctx.fillText(

  );

  /* ================= DOWNLOAD (FIXED) ================= */
  const a = document.createElement("a");

async function restoreAdminSessionIfValid() {
  const restored = loadAdminSession();
  if (!restored?.token || !restored?.expiredAt) return false;

  // expired guard
  if (Date.now() > new Date(restored.expiredAt).getTime()) {
    clearAdminSession();
    return false;
  }

  try {
    // ✅ lightweight validate (POST ให้ตรง backend)
    const form = new URLSearchParams();
    form.append("action", "orders");
    form.append("token", restored.token);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (json?.success === true) {
      state.admin.loggedIn = true;
      state.admin.user = restored.username || null;
      state.admin.token = restored.token;
      state.admin.expiredAt = restored.expiredAt;

      // ❗ ไม่ set state.mode ที่นี่ (กันกระทบ flow)
      return true;
    }
  } catch (e) {
    console.warn("restore admin failed", e);
  }

  clearAdminSession();
  return false;
}

 // 🔴 ADD: Smart hide เมื่อ scroll ภายใน .sheet (เพราะ window.scrollY ไม่เปลี่ยน)
(function bindSheetScrollSmartHide(){
  const lastTop = new WeakMap(); // เก็บ scrollTop ล่าสุดของแต่ละ sheet

  document.addEventListener("scroll", (e) => {
    const t = e.target;
    if (!t) return;
    const sheetEl = (t.closest && t.closest(".sheet")) || (t.classList && t.classList.contains("sheet") ? t : null);
    if (!sheetEl) return;

    const bar = document.getElementById("floatingBar");
    if (!bar || !bar.classList.contains("show")) return;

   const prev = lastTop.get(sheetEl) ?? sheetEl.scrollTop;
    const d = sheetEl.scrollTop - prev;
    lastTop.set(sheetEl, sheetEl.scrollTop);

    if (Math.abs(d) < 1) return;
    if (d > 2) bar.classList.add("scroll-hide");        // ⬇️ เลื่อนลงใน sheet = ซ่อน
    else if (d < -2) bar.classList.remove("scroll-hide"); // ⬆️ เลื่อนขึ้นใน sheet = โชว์
  }, true); // capture=true เพื่อจับ element scroll
})();

// 🔍 DEBUG: Trace CSS winners for #floatingBar
// เป้าหมาย: หา "rule ไหน" ที่ชนะ opacity/transform จริง
// =========================
window.traceBarCSS = function traceBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[traceBarCSS] #floatingBar not found"); return []; }

  const props = ["opacity","transform","pointer-events"];
  const out = [];

  const tryPushRule = (sheet, rule, ruleIndex, sel) => {
    const style = rule.style;
    const hit = {
      sheet: sheet.href || "[inline <style>]",
      ruleIndex,
      selector: sel,
      cssText: rule.cssText
    };
    // เก็บเฉพาะค่าที่เกี่ยวข้อง
    props.forEach(p => {
      const v = style.getPropertyValue(p);
      if (v) {
        hit[p] = v.trim();
        hit[p + "_important"] = style.getPropertyPriority(p) === "important";
      }
    });
    // ดันเฉพาะ rule ที่แตะ props จริง
    if (props.some(p => hit[p])) out.push(hit);
  };

  for (const sheet of Array.from(document.styleSheets)) {
    let rules;
    try { rules = sheet.cssRules; } catch(e) { continue; } // cross-origin
    if (!rules) continue;

    for (let i = 0; i < rules.length; i++) {
      const r = rules[i];
      if (!r || !r.selectorText) continue;
      // รองรับ selector หลายตัวคั่นด้วย comma
      const sels = r.selectorText.split(",").map(s => s.trim()).filter(Boolean);
      for (const sel of sels) {
        try {
          if (bar.matches(sel)) {
            tryPushRule(sheet, r, i, sel);
          }
        } catch(_) {}
      }
    }
  }

  const cs = getComputedStyle(bar);
  console.log("===== traceBarCSS =====");
  console.log("className:", bar.className);
  console.table({
    computed_opacity: cs.opacity,
    computed_transform: cs.transform,
    computed_pointerEvents: cs.pointerEvents
  });
  console.table(out);
  return out;
};

window.watchBarCSS = function watchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[watchBarCSS] #floatingBar not found"); return; }
  if (bar.__watchingCSS) { console.warn("[watchBarCSS] already watching"); return; }
  bar.__watchingCSS = true;

  const mo = new MutationObserver(() => {
    // trace หลัง DOM อัปเดตแล้ว 1 เฟรม (กันอ่านค่าก่อน apply)
    requestAnimationFrame(() => window.traceBarCSS());
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["class","style"] });
  bar.__watchMO = mo;
  console.log("✅ watching #floatingBar class/style changes");
  window.traceBarCSS();
};

// =========================
// 🕵️ SPY: ใครเป็นคนแก้ class/style ของ #floatingBar
// ใช้: spyBar(); แล้วลองเลื่อน/เปิดปิด sheet/เพิ่มของในตะกร้า
// =========================
window.spyBar = function spyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[spyBar] #floatingBar not found"); return; }
  if (bar.__spyInstalled) { console.warn("[spyBar] already installed"); return; }
  bar.__spyInstalled = true;

  // 1) spy classList.add/remove/toggle
  const cl = bar.classList;
  ["add","remove","toggle"].forEach((m) => {
    const orig = cl[m].bind(cl);
    cl[m] = (...args) => {
      console.groupCollapsed(`🧩 [spyBar] classList.${m}(${args.join(", ")})  | before="${bar.className}"`);
      console.trace();
      const r = orig(...args);
      console.log(`after="${bar.className}"`);
      console.groupEnd();
      return r;
    };
  });

  // 2) spy style attribute changes (รวมถึง bar.style.opacity/transform ที่ไปลงเป็น inline)
  const mo = new MutationObserver((list) => {
    for (const it of list) {
      if (it.type === "attributes" && it.attributeName === "style") {
        console.groupCollapsed(`🎨 [spyBar] style changed: ${bar.getAttribute("style") || "(empty)"}`);
        console.trace();
        console.groupEnd();
      }
    }
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["style"] });
  bar.__spyMO = mo;

  console.log("✅ spyBar installed. Now reproduce the bug.");
};

window.unspyBar = function unspyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) return;
  if (bar.__spyMO) bar.__spyMO.disconnect();
  bar.__spyMO = null;
  bar.__spyInstalled = false;
  console.log("🛑 spyBar removed (note: classList methods won't auto-restore after override)");
};  

window.unwatchBarCSS = function unwatchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar || !bar.__watchMO) return;
  bar.__watchMO.disconnect();
  bar.__watchMO = null;
  bar.__watchingCSS = false;
  console.log("🛑 stop watching #floatingBar");
};
