  --shadow-canvas-card:     var(--shadow-card);
 
  /* legacy alias (keep old refs working + follow unified override) */

   /* ================= STEP 1: INTERACTION TOKENS ================= */

   /* Motion tokens */

   --motion-duration-slow: 360ms;

 }

 html, body {
   margin: 0;

  body{
   min-height: 100dvh;
  }
  
  header{
  padding:
    calc(env(safe-area-inset-top, 0px) + 14px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    12px
    calc(env(safe-area-inset-left, 0px) + 16px);
  font-size: inherit;
  font-weight: inherit;

  /* 🔹 Visual */
  background: var(--header-bg); /* 🔴 CHANGED: dark glass */
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-bottom: 1px solid var(--header-border); /* 🔴 CHANGED: subtle dark divider */

  box-shadow:
    var(--shadow-header),
    inset 0 -1px 0 var(--header-border); /* 🔴 CHANGED: reduce white glow */

  /* 🔹 Position */
  position: sticky;
  top: 0;
  z-index: 50;

  /* 🔹 Layout (สำคัญ) */
  display: flex;
  justify-content: space-between;
  align-items: center;

  /* 🔴 FIX สำคัญ */
  min-height: 96px; /* compact but still supports search + filter */
  box-sizing: border-box;

  transition:
    padding var(--dur-chrome) var(--ease-chrome),
    min-height var(--dur-chrome) var(--ease-chrome),
    background var(--dur-chrome) ease,
    box-shadow var(--dur-chrome) ease;
}

header.scrolled{
  padding:
    calc(env(safe-area-inset-top, 0px) + 10px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    8px
    calc(env(safe-area-inset-left, 0px) + 16px);
  min-height: 64px;
  background: var(--header-bg-scrolled); /* 🔴 CHANGED: darker when scrolled */
  box-shadow:
    var(--shadow-header-scrolled),
    inset 0 -1px 0 var(--header-border-strong); /* 🔴 CHANGED: subtle inner edge */
}
  
/* ================= SHOP TITLE GLOW ================= */
.shop-title,
.admin-title{
  font-weight: var(--title-weight);
  font-size: var(--title-size);
  letter-spacing: .15px;
  color: var(--text-primary);

  display: inline-flex;
  align-items: center;
  padding: 6px 11px;
  border-radius: 999px;
  position: relative;
  overflow: hidden;
  isolation: isolate; /* 🔴 FIX: กัน layer เพี้ยน */

  /* 🔴 CHANGED: dark glass base */
  background: var(--surface-glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  /* 🔴 CHANGED: softer dark-depth inner rim */
  box-shadow:
    var(--shadow-control),
    inset 0 1px 0 var(--inner-highlight),
    inset 0 -1px 0 var(--header-border);

  /* 🔴 CHANGED: remove white glow feeling */
  text-shadow: 0 1px 0 rgba(0,0,0,.35);

  z-index: 0;
}

/* ✅ Glass highlight (top-left glare) */
.shop-title::before,
.admin-title::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0; /* 🔴 FIX: ไม่ใช้ -1 */
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.20) 0%,
      rgba(255,255,255,.10) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.55;
  pointer-events:none;
  mix-blend-mode: screen;
}

body[data-theme="cute"] .shop-title,
body[data-theme="cute"] .admin-title{
  color: var(--text);
  text-shadow: none;
  background: var(--surface-glass);
  border-color: var(--border-strong);
}

body[data-theme="cute"] .shop-title::before,
body[data-theme="cute"] .admin-title::before{
  opacity:.28;
  mix-blend-mode: normal;
}

body[data-theme="cute"] .shop-subtitle{
  color: var(--muted);
  opacity: 1;
  text-shadow: none;
}

.shop-subtitle{

/* ================= BASE INPUT (NEUTRAL) ================= */
input,
select {
  width: 100%;
  box-sizing: border-box;
  outline: none;
  font-family: inherit;
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}

/* 🔴 NEW: textarea base style (Light mode fix) */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
}
  
input::placeholder,
textarea::placeholder {
  color: var(--placeholder);                 /* 🔴 FIX: placeholder ไม่จางเกินไป */
}  

input:focus,
select:focus {
  border-color: var(--focus-color);
}

/* ================= STEP 3: FORM CONSISTENT ================= */

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.form-group label {
  font-size: 13px;
  color: var(--text-soft);
}

/* ================= FORM INPUT (UNIFIED) ================= */

/* ทุก input / select ใน form + กัน iOS zoom */
.form-group input,
.form-group select {
  width: 100%;
  height: 44px;
  padding: 10px 12px;

  font-size: 16px;          /* 🔴 FIX iOS ZOOM */
  line-height: 1.2;

  border-radius: 12px;
  border: 1px solid var(--border);
  box-sizing: border-box;
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit;
}

/* number ต้องเหมือน text (iOS / Android) */
.form-group input[type="number"] {
  appearance: textfield;
  -moz-appearance: textfield;
}

/* focus state */
.form-group input:focus,
.form-group select:focus {
  border-color: var(--focus-color);
  outline: none;
}

  /* ✅ เพิ่มตรงนี้ */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

 .btn-remove{
  min-width:44px;
  min-height:44px;
  padding:6px 12px;
  border-radius:10px;
  background:#d70015;
  color:#fff;
  border:none;

  font-size:13px;
  font-weight:600;
  line-height:1;

  cursor:pointer;
 }
  /* ✅ เพิ่มตรงนี้ */
.btn-remove:active {
  transform: scale(var(--tap-scale-icon));
}

/* interaction: use .btn:active as single source of truth */
  
/* ================= BUTTON SYSTEM ================= */

.btn {
  padding: 12px;
  min-height: 44px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition:
    transform var(--dur-tap) var(--ease-tap),
    box-shadow var(--dur-tap) ease,
    filter var(--dur-tap) ease;
}

/* Primary */
.btn-primary {
  background: var(--primary);
  color: var(--primary-text);
}

/* Secondary / neutral utility */
.btn-secondary {
  background: var(--secondary);
  color: var(--text);
  border: 1px solid var(--border);
}

/* Success / completed action */
.btn-success {
  background: var(--success);
  color: var(--primary-text);
}

/* Outline / low-emphasis action */
.btn-outline {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border-strong);
}

/* Danger (logout / destructive) */
.btn-danger{
  background:var(--danger);
  color:var(--primary-text);
}
.btn-danger:active{
  transform: scale(var(--tap-scale-primary));
}

/* Interaction */
.btn:active {
  transform: scale(var(--tap-scale-primary));
  filter: brightness(.96);
  box-shadow: var(--shadow-card-pressed);
}

.btn.is-submitting{
  filter: saturate(.9) brightness(.92);
  cursor: wait;
  box-shadow: var(--shadow-card-pressed);
}

/* ================= HEADER SEARCH (iOS-LIKE) ================= */
.viewer-search-wrap{

   max-width:100%;
 }  

.search-wrap {
  display: flex;
  align-items: center;
  position: relative;
  max-width: 100%;
  min-width: 0;          /* 🔴 กันดัน layout */
  overflow: visible;     /* ✅ ให้เงาปุ่มวงกลมไม่โดนตัดเป็นเหลี่ยม */
}

.search-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;

  /* ✅ Match filter/menu: Apple-nimble glass */
  background: var(--surface-glass);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  box-shadow: var(--shadow-control);
  cursor: pointer;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;
}

/* ✅ Glass highlight (same language as filter/menu) */
.search-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
.search-btn::after{
  content:none;
}
.search-btn > *{ position: relative; z-index: 2; }
  
.search-btn:active {
  transform: scale(var(--tap-scale-icon));
  background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
}

@media (hover:hover){
  .search-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
.search-input {
   width: 0;             /* 🔴 สำคัญ: ตอนยังไม่ active ต้องไม่กินพื้นที่ */
   opacity: 0;
   margin-left: 0;
   height: 44px;
   padding: 0;

   font-size: 16px;
   border-radius: 12px;
   border: 0;

   background: var(--surface-2);
   color: var(--text);
   backdrop-filter: blur(14px);

  pointer-events: none;

  transform: translateX(-6px) scaleX(.6);
  transform-origin: left center;

  transition:
    opacity .18s ease,
    transform .45s cubic-bezier(.34,1.56,.64,1),
    width .35s ease,
    margin-left .35s ease,
    padding .35s ease;
}

/* 🔥 ACTIVE STATE */
.search-wrap.active .search-input {
  opacity: 1;
  transform: translateX(0) scaleX(1);
  pointer-events: auto;
  width: min(210px, calc(100vw - 176px)); /* compact mobile width without pushing filter+menu */
  margin-left: 6px;
  padding: 8px 12px;
  border: 1px solid var(--border);
}

/* 🔹 subtle focus glow (iOS feel) */
.search-input:focus {
  border-color: var(--focus-color);
  box-shadow:
    var(--focus-ring);
  outline: none;
}

/* ✅ STEP 3+4: SVG icon (monochrome) */
.icon-sf{
  width: 18px;
  height: 18px;
  display: block;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: .92;
}
 /* ================= FILTER ICON DROPDOWN ================= */
 .filter-wrap{ position:relative; }

.filter-btn{
   width:44px;
   height:44px;
   border-radius:50%;
   border:none;
   position: relative;          /* ✅ needed for glass layers */
   overflow: hidden;            /* ✅ clip highlight rim */
   
   /* ✅ Apple-nimble glass (less "3D") */
  background: var(--surface-glass);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
   cursor:pointer;
   color: var(--text);
   display:flex;
   align-items:center;
   justify-content:center;
   -webkit-tap-highlight-color: transparent;
   transition:
     transform var(--dur-tap) var(--ease-tap),
     background var(--dur-tap) ease,
     box-shadow var(--dur-tap) ease;

   /* ✅ Token shadow (unified depth) */
  border: 1px solid var(--border);
  box-shadow: var(--shadow-control);
 }

.filter-btn.has-active-filter{
  border-color: var(--border-strong);
  background: var(--primary);
}

 /* ✅ Glass highlight (top-left glare) */
.filter-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index: 0;
  background: radial-gradient(70% 55% at 28% 22%,
    rgba(255,255,255,.65) 0%,
    rgba(255,255,255,0) 58%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}

/* ✅ Inner rim (second ring) */
.filter-btn::after{
  content:none;
} 
  
 .filter-btn:active{
   transform: scale(var(--tap-scale-icon));
   /* ✅ press = simpler, less 3D */
   background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
 }

 @media (hover:hover){
  .filter-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
 .filter-btn .icon{
   position: relative;
   z-index: 2;
   width:18px;
   height:18px;
   fill: currentColor;
   opacity:.9;
 }
  
 .filter-dropdown{
   position:absolute;
   top:48px;
   right:0;
   min-width:190px;
   padding:8px;
   border-radius:16px;
   /* 🔴 CHANGED: เพิ่ม contrast + ขอบ + แยกชั้นให้ชัด */
   background: var(--surface-2);
   backdrop-filter: blur(26px) saturate(180%);
   -webkit-backdrop-filter: blur(26px) saturate(180%);
   border: 1px solid var(--border);
   box-shadow: var(--shadow-floating);
   color: var(--text);
   display:none;
   flex-direction:column;
   gap:4px;
 }

 .filter-dropdown.show{ display:flex; }

 .filter-item{
   /* 🔴 CHANGED: ทำให้แต่ละแถวอ่านง่าย + มี state */
   padding: 9px 10px;
   border-radius: 12px;
   font-size: 14px;
   font-weight: 600;
   line-height: 1.35;
   text-align: center;  
   color: var(--text);
   cursor: pointer;
   user-select: none;
   transition: background .16s ease, transform .16s ease;
   min-height:44px;
 }

.filter-item.active{
  background: var(--primary);
  color: var(--primary-text);
  box-shadow: inset 0 0 0 1px var(--border-strong);
}

 /* 🔴 CHANGED: เส้นแบ่งแบบ iOS (ช่วยแยก item ไม่ให้กลืน) */
 .filter-item + .filter-item{
   border-top: 1px solid var(--border);
 }

 /* 🔴 CHANGED: hover/active ให้รู้ว่ากดได้ */
 @media (hover:hover){
   .filter-item:hover{
     background: var(--bg-soft);
   }
 }
 .filter-item:active{
   background: var(--surface-3);
   transform: scale(.985);
 } 
  
/* ================= HEADER MENU BUTTON (iOS TACTILE) ================= */
.menu-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  position: relative;
  overflow: hidden;

  /* ✅ Match filter-btn: Apple-nimble glass (less 3D) */
  background: var(--surface-glass);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-control);

  color: var(--text);
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;

  -webkit-tap-highlight-color: transparent;
}


/* ✅ Glass highlight (like filter) */
.menu-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
.menu-btn::after{
  content:none;
}
  
.menu-btn > *{ position: relative; z-index: 2; }  
  
.menu-btn:active{

}

@media (hover:hover){

}

/* ================= SIDE ADMIN MENU ================= */
.side-menu {
  position: fixed;
  top: 0;
  right: 0;

  width: min(65vw, 260px);
   /* ✅ ลดลงอีกนิด กำลังพอดี */
  height: 100dvh;
  max-height: 100dvh;

  background: var(--side-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: var(--shadow-side);

  z-index: 102;
  padding:
    calc(env(safe-area-inset-top, 0px) + 16px)
    max(16px, env(safe-area-inset-right, 0px))
    calc(env(safe-area-inset-bottom, 0px) + 24px)
    16px;
  box-sizing:border-box;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;

  transform: translate3d(100%, 0, 0);
  opacity: 0;
  transition:
    transform var(--dur-sheet) var(--ease-out),
    opacity var(--motion-duration-fast) var(--motion-ease-standard);
  will-change: transform, opacity;
  backface-visibility: hidden;
}

.side-menu.show {
  transform: translate3d(0, 0, 0);
  opacity: 1;
}

.sheet.stock-menu-return-side {
  position: fixed;
  inset: 0 0 auto auto;
  left: auto;
  width: min(65vw, 260px);
  max-width: none;
  height: 100dvh;
  max-height: 100dvh;
  border-radius: 0;
  padding:
    calc(env(safe-area-inset-top, 0px) + 16px)
    max(16px, env(safe-area-inset-right, 0px))
    calc(env(safe-area-inset-bottom, 0px) + 24px)
    16px;
  background: var(--side-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: var(--shadow-side);
  box-sizing: border-box;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  scroll-padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  transform: translate3d(100%, 0, 0);
  transition:
    transform var(--dur-sheet) var(--ease-out),
    opacity var(--motion-duration-fast) var(--motion-ease-standard);
  z-index: 102;
}

.sheet.stock-menu-return-side.show {
  transform: translate3d(0, 0, 0);
  opacity: 1;
}

.stock-menu-return-side .side-menu-topbar{
  top:calc(-16px - env(safe-area-inset-top, 0px));

/* ================= TOAST SYSTEM (GLOBAL FEEDBACK) ================= */

#toast-container {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 24px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 3000;

}

.toast {
  min-width: 260px;
  max-width: 90vw;
  padding: 12px 16px;

  border-radius: 14px;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  white-space: pre-line;

  box-shadow: var(--shadow-float);              /* 🔴 ใช้ token เดียวกับระบบ */

  backdrop-filter: blur(18px) saturate(160%);   /* 🔴 เพิ่ม glass */
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  animation: toast-slide-down var(--motion-duration-toast) var(--motion-ease-standard);
  transform-origin: top center;
}

/* ===== Toast Variants ===== */
.toast.success { background: rgba(52,199,89,.92); }
.toast.error   { background: rgba(255,59,48,.92); }
.toast.warning { background: rgba(255,159,10,.92); }
.toast.info    { background: rgba(0,122,255,.92); }

/* ===== Animation (namespaced) ===== */
@keyframes toast-slide-down {
  from {
    opacity: 0;
    transform: translateY(-8px) scale(.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.hidden {
  display: none;
}

#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: loading-fade-in var(--motion-duration-fast) var(--motion-ease-standard);
}

#loading-overlay.hidden {
  display: none !important;
}

.loading-box {
  background: var(--sheet-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 20px 24px;
  border-radius: 12px;
  box-shadow: var(--shadow-float);
  text-align: center;
  min-width: 200px;
  animation: loading-pop var(--motion-duration-normal) var(--motion-ease-standard);
}

@keyframes loading-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes loading-pop {
  from {
    opacity: 0;
    transform: translateY(6px) scale(.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ================= FLOATING BOTTOM BAR ================= */

/* 🔴 CHANGED: Clean + deterministic cascade (กัน opacity สลับทิศ) */
#floatingBar{
  position: fixed !important;
  left: 16px;
  right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 18px) !important;
  max-width: 520px;
  margin: 0 auto;

  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 18px;

  background: var(--sheet-bg);
backdrop-filter: blur(36px) saturate(220%);
-webkit-backdrop-filter: blur(36px);

border: 1px solid var(--border-strong);
  box-shadow:
    var(--shadow-floating),
    inset 0 1px 0 var(--inner-highlight);
  color: var(--text);

  z-index: 999;

  /* default = hidden */
  transform: translateY(120%);
  opacity: 0;
  pointer-events: none;
  visibility: hidden;            /* 🔍 FIX: บังคับซ่อนจริง (กัน opacity ค้าง) */
  
  transition:
    transform .48s cubic-bezier(.34,1.56,.64,1),
    opacity .3s ease;
  will-change: transform, opacity;
}

/* ✅ Cart bar text readability (เฉพาะ floatingBar) */
#floatingBar .bar-left{
  min-width: 0;
}
#floatingBar .bar-subtext{
  font-size: 13px;
  color: var(--text-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

#floatingBar .cart-badge{
  position:absolute;
  top:-8px;
  right:12px;
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#e53935;
  color:#fff;
  font-size:11px;
  font-weight:900;
  line-height:1;
  box-shadow:0 8px 18px rgba(229,57,53,.32);
  border:2px solid var(--surface);
  pointer-events:none;
}

#floatingBar .cart-badge.cart-badge-pop{
  animation:cart-badge-pop var(--motion-duration-normal) var(--motion-ease-emphasized);
}

@keyframes cart-badge-pop{
  0%   { transform:scale(.72); }
  55%  { transform:scale(1.22); }
  100% { transform:scale(1); }
}

#floatingBar.bounce-in{
  animation: float-bounce .65s cubic-bezier(.34,1.56,.64,1);
}
#floatingBar.cart-added-pulse{
  animation: cart-added-pulse var(--motion-duration-normal) var(--motion-ease-emphasized);
}
@keyframes float-bounce{
  0%   { transform:translateY(120%) scale(.94); }
  60%  { transform:translateY(-6px) scale(1.02); }
  100% { transform:translateY(0) scale(1); }
}
@keyframes cart-added-pulse{
  0%   { transform:translateY(0) scale(1); }
  45%  { transform:translateY(-2px) scale(1.018); }
  100% { transform:translateY(0) scale(1); }
}

#floatingBar .total-animate{ animation: total-pop .25s ease; }
@keyframes total-pop{
  0%   { transform:scale(.92); opacity:.6; }
  100% { transform:scale(1); opacity:1; }
}

/* ✅ SHOW = only show */
 #floatingBar.show{
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
  visibility: visible; /* 🔴 FIX: เพราะ default ตั้ง hidden ไว้ */ 
 }

/* ✅ HIDE (scroll) */
#floatingBar.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

/* ✅ HIGHEST PRIORITY: show + scroll-hide must hide */
#floatingBar.show.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}
  
#floatingBar:active{
  transform: translateY(0) scale(.98);
}
  
/* 🔴 NEW: เมื่อมี sheet เปิดอยู่ → ให้ floatingBar ซ่อน */
.sheet.show ~ #floatingBar{
  opacity: 0 !important;
  transform: translateY(20px) !important;
  pointer-events: none !important;
  visibility: hidden !important; /* 🔴 FIX: ซ่อนแบบ deterministic */
}  
  
 /* ================= REDUCED MOTION SUPPORT ================= */
 @media (prefers-reduced-motion: reduce){

   /* 🔴 Disable global transitions */
   * {
     transition: none !important;
     animation: none !important;   /* 🔴 ADD */
   }

   /* 🔴 Disable product card motion */
   .product-card{
     transition: none !important;
   }

   .product-card:hover{
     transform: none !important;
     box-shadow: var(--shadow-card) !important;
   }

   .product-card:active{
     transform: none !important;
   }

   /* 🔴 Disable floating bar animations */
   #floatingBar,
   #floatingBar.bounce-in,
   #floatingBar.cart-added-pulse{
     transition: none !important;
     animation: none !important;
   }

   #floatingBar .total-animate{
     animation: none !important;
   }

   #floatingBar .cart-badge.cart-badge-pop{
     animation: none !important;
   }

   /* 🔴 Disable toast slide animation */
   .toast{
     animation: none !important;
   }

   /* 🔴 Disable spinner rotation */
   .spinner{
     animation: none !important;
   }
 }

.btnTop{
  position: fixed;
  left: 50%;
  bottom: calc(env(safe-area-inset-bottom) + 84px); /* ✅ ลอยเหนือ floatingBar */
  width: 44px;

function getCurrentLang() {
  try {
    const savedLang = localStorage.getItem(LANG_KEY);
    return savedLang === "en" || savedLang === "th" ? savedLang : DEFAULT_LANG;
  } catch (err) {
    console.warn("getCurrentLang: localStorage unavailable", err);
    return DEFAULT_LANG;
  }
}

function setCurrentLang(lang) {
  const safeLang = lang === "en" ? "en" : "th";
  try {
    localStorage.setItem(LANG_KEY, safeLang);
  } catch (err) {
    console.warn("setCurrentLang: localStorage unavailable", err);
  }
  syncStaticUiLabels();
  renderHeader();
  if (mainMenuSheet?.classList?.contains("show")) {
    openMainMenu();
  }
  if (adminLoginSheet?.classList?.contains("show")) {
    renderAdminLogin();
  }
  if (adminPartnersSheet?.classList?.contains("show")) {
    renderPartnerAdminSheet();
  }
  if (adminPartnerCatalogSheet?.classList?.contains("show")) {
    renderPartnerCatalogSheet();
  }
  if (adminPartnerRequestsSheet?.classList?.contains("show")) {
    renderPartnerRequestsSheet();
  }
  if (state.mode === "viewer" && Array.isArray(state.products)) {
    renderProducts();
    if (productSheet?.classList?.contains("show") && state.selectedProduct) {
      renderProductSheet();
    }
    if (cartSheet?.classList?.contains("show")) {
      renderCart();
    }
    if (confirmSheet?.classList?.contains("show") && state.cart.length > 0) {
      renderConfirmSheet();
    } else if (confirmSheet?.classList?.contains("show") && state.lastOrder) {
      renderLastOrderSheet();
    }
    if (qtySheet?.classList?.contains("show")) {
      const qtyTitle = document.getElementById("qtySheetTitle");
      const qtyLabel = qtySheet.querySelector(".form-group label");
      const qtyButton = qtySheet.querySelector(".qty-action .btn-primary");
      const closeButton = qtySheet.querySelector(".sheet-nav-btn");

      if (closeButton) closeButton.setAttribute("aria-label", t("close", "ปิด"));

  }

function t(key, fallback = "") {
  const lang = getCurrentLang();
  return UI_TEXT[lang]?.[key] ?? UI_TEXT[DEFAULT_LANG]?.[key] ?? fallback;

function formatUiText(key, values = {}, fallback = "") {
  return Object.entries(values).reduce(

    t(key, fallback)
  );
}

const MOTION = Object.freeze({
  CARD_ENTRANCE_LIMIT: 24,
  CARD_STAGGER_MS: 18,
  DURATION_NORMAL_MS: 260,
  EASING_STANDARD: "cubic-bezier(.22,.61,.36,1)"
});

function isReducedMotion() {
  return !!(
    window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches
  );
}

function replayMotionClass(el, className, duration = MOTION.DURATION_NORMAL_MS) {
  if (!el || !className || isReducedMotion()) return;
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
  window.setTimeout(() => el.classList.remove(className), duration + 80);
}

function escapeHtml(value = "") {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
} 

function blurActiveElementForMobileKeyboard() {
  try {
    document.activeElement?.blur?.();
  } catch (_) {}
}

function waitForMobileViewportSettle() {
  return new Promise(resolve => {
    requestAnimationFrame(() => setTimeout(resolve, 50));
  });
}

function waitForAnimationFrames(count = 1) {
  return new Promise(resolve => {
    let remaining = Math.max(1, Number(count) || 1);
    const step = () => {
      remaining -= 1;
      if (remaining <= 0) {
        resolve();
        return;
      }
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}

async function repairMobileViewportAfterAdminLogin() {
  blurActiveElementForMobileKeyboard();
  await waitForAnimationFrames(2);
  await new Promise(resolve => setTimeout(resolve, 150));
  window.dispatchEvent(new Event("resize"));
  await waitForAnimationFrames(1);

  if (window.visualViewport || window.innerWidth <= 768) {
    try {
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
    } catch (_) {
      window.scrollTo(0, 0);
    }
  }
}

// 🔴 ADDED: หา SKU ถัดไปจาก state.products เช่น A001 -> A002
function getNextProductId(currentValue = "") {
  const raw = String(currentValue || "").trim().toUpperCase();

  // ใช้ prefix จากค่าปัจจุบันก่อน เช่น A001 => A
  // ถ้าไม่มี ให้ fallback จากสินค้าที่มีอยู่ หรือใช้ "A"
  let prefix = "";
  const currentMatch = raw.match(/^([A-Z]+)(\d+)$/);
  if (currentMatch) {
    prefix = currentMatch[1];
  }

  const productIds = Array.isArray(state.products)
    ? state.products
        .map(p => String(p.productId || "").trim().toUpperCase())
        .filter(Boolean)
    : [];

  if (!prefix) {
    const lastMatch = [...productIds]
      .reverse()
      .map(id => id.match(/^([A-Z]+)(\d+)$/))
      .find(Boolean);

    prefix = lastMatch ? lastMatch[1] : "A";
  }

  const samePrefixMatches = productIds
    .map(id => id.match(/^([A-Z]+)(\d+)$/))
    .filter(match => match && match[1] === prefix);

  let maxNum = 0;
  samePrefixMatches.forEach(match => {
    const num = Number(match[2]);
    if (Number.isFinite(num) && num > maxNum) {
      maxNum = num;
    }
  });

  const nextNum = maxNum + 1;
  return `${prefix}${String(nextNum).padStart(3, "0")}`;
}

function showToast(message, type = 'info', timeout = 2500) {
  const container = document.getElementById('toast-container');
  if (!container) return;

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;

  toast.setAttribute("aria-live", type === "error" ? "assertive" : "polite");

  container.appendChild(toast);

  // 🔒 limit toast count (optional but pro)
  if (container.children.length > 3) {
    container.removeChild(container.firstChild);
  }

  setTimeout(() => {

    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

// ---------- Central loading timer ----------
let _loadingTimer = null;
let _loadingShownAt = 0;
const MIN_LOADING_MS = 350; // กันกระพริบ

function showLoading(message, timeoutMs = 60000) {
  const overlay = document.getElementById("loading-overlay");
  const text = document.getElementById("loading-text");
  if (!overlay || !text) return;

  text.textContent = message;
  overlay.classList.remove("hidden");
  overlay.setAttribute("aria-hidden", "false");
  overlay.setAttribute("aria-busy", "true");

  // บังคับ render

  _loadingShownAt = Date.now();
  state.ui.backdropLocked = true;
  if (backdrop) backdrop.style.display = "block";

  clearTimeout(_loadingTimer);
  _loadingTimer = setTimeout(() => {
    console.warn("[showLoading] auto-hide after timeout");
    safeHideLoading(true);
    showToast(t("connectionSlowCancelled", "การเชื่อมต่อล่าช้า ระบบยกเลิกแล้ว"), "warning", 1800);
  }, timeoutMs);

/* ================= SAFE HIDE LOADING (SINGLE SOURCE OF TRUTH) ================= */
/**
 * ❗ IMPORTANT
 * - ต้องมี safeHideLoading แค่ตัวเดียวในระบบ
 * - ตัวนี้คือเวอร์ชันเดียวที่อนุญาตให้ใช้
 */

function safeHideLoading(fromTimeout = false) {
  const overlay = document.getElementById("loading-overlay");

  const elapsed = Date.now() - (_loadingShownAt || 0);
  const delay = Math.max(0, MIN_LOADING_MS - elapsed);

  setTimeout(() => {
    try {
      if (overlay) {
        overlay.classList.add("hidden");
        overlay.setAttribute("aria-hidden", "true");
        overlay.setAttribute("aria-busy", "false");
      }

      // 🔥 หัวใจ: เคลียร์ timer ของ showLoading
      if (_loadingTimer) {
        clearTimeout(_loadingTimer);
        _loadingTimer = null;
      }
      // 🔒 ปลด lock เฉพาะเมื่อไม่มี overlay เปิดอยู่ (กัน confirm/flow หลุด)
      if (state.ui.overlayCount === 0) {
        state.ui.backdropLocked = false;
      }

      if (state.ui.overlayCount === 0 && backdrop) {
        backdrop.style.display = "none";
      }

      console.log(
        "[safeHideLoading] loading closed",
        fromTimeout ? "(timeout)" : ""
      );

    } catch (e) {
      console.error("[safeHideLoading] failed", e);
    }
  }, delay);
}


// ---------- fetchWithTimeout ----------
async function fetchWithTimeout(input, init = {}, ms = 30000) {
  const controller = new AbortController();
  const signal = controller.signal;
  const id = setTimeout(() => controller.abort(), ms);

  try {
    const res = await fetch(input, { ...init, signal });

    // 🔒 เช็ค HTTP status ชัดเจน
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    return res;

  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error(t("connectionSlowRetry", "การเชื่อมต่อช้าเกินไป กรุณาลองใหม่อีกครั้ง"));
    }
    throw err;
  } finally {
    clearTimeout(id);
  }
}

function isAuthError(message = "") {
   return [
     "Session expired",
     "Invalid token",
     "Missing token"
   ].includes(String(message || "").trim());
 }

 async function postFormAction(form, { timeout = 30000 } = {}) {
   const res = await fetchWithTimeout(API_URL, {
     method: "POST",
     body: form
   }, timeout);

   let json;
   try {
     json = await res.json();
   } catch (err) {
     throw new Error("รูปแบบข้อมูลตอบกลับไม่ถูกต้อง");
   }

   if (json?.error || json?.success === false) {
     if (isAuthError(json.error)) {
       showToast(t("sessionExpiredLoginAgain", "Session หมดอายุ กรุณา login ใหม่"), "warning");
       exitAdmin({ silent: true });
     }
     throw new Error(json.message || json.error || "Request failed");
   }

   return json;
 }

async function createOrder() {

  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      throw new Error(`ไม่พบสินค้า ${item.name}`);
    }

    if (Number(product.stock) < Number(item.qty)) {
      throw new Error(
        `${item.name} คงเหลือ ${product.stock} ชิ้น (คุณเลือก ${item.qty})`
      );
    }
  }

  const total = state.cart.reduce(
   (s,i)=> s + Number(i.price) * Number(i.qty),
   0
 );

  const form = new URLSearchParams();
  form.append("action", "createOrder");
  form.append("items", JSON.stringify(state.cart));
  form.append("total", total);
  form.append("poNumber", String(state.poNumber || "").trim());
 
  // ใช้ fetchWithTimeout เพื่อป้องกัน request แขวน
  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 15000);

  // 🔴 FIX: เช็ค HTTP status ก่อน
  if (!res.ok) {
    const text = await res.text();
    throw new Error(
      `CreateOrder HTTP ${res.status}: ${text}`
    );

  const json = await res.json();

  // 🔴 FIX: validate response shape
  if (!json || json.success !== true || !json.data?.orderId) {
    throw new Error("Invalid createOrder response");
  }

  return json;
}

    if (closedCartSheet && typeof renderFloatingBar === "function") {

/* ================= RENDER FUNCTIONS ================= */
// 🔒 Global HTML Escape (XSS Guard) — micro polish: escape &, <, >, ", '
 const esc = (s) =>
   String(s ?? "")
     .replace(/&/g, "&amp;")
     .replace(/</g, "&lt;")
     .replace(/>/g, "&gt;")
     .replace(/"/g, "&quot;")
     .replace(/'/g, "&#39;");

 // 🔒 Attribute-safe (สำหรับ src/alt/href)
 const escAttr = (s) => esc(s);

function toInlineJsStringLiteral(value) {
  return "'" + String(value ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "\\x22")
    .replace(/&/g, "\\x26")
    .replace(/</g, "\\x3C")
    .replace(/>/g, "\\x3E")
    .replace(/\r/g, "\\r")
    .replace(/\n/g, "\\n")
    .replace(/\u2028/g, "\\u2028")
    .replace(/\u2029/g, "\\u2029") + "'";
}

function handleKeyboardActivation(event, element) {
  if (!event || !element) return;
  if (event.key !== "Enter" && event.key !== " ") return;
  event.preventDefault();
  element.click();
}

function getResolvedProductStatus(product) {
  const stockNum = Number(product?.stock);
  return stockNum <= 0
    ? "out"
    : String(product?.status || "ready").trim().toLowerCase();
}

function isViewerVariantProduct(product) {
  return !!(
    product &&
    String(product.parentProductId || "").trim() &&
    String(product.displayName || "").trim() &&
    String(product.variantType || "").trim().toLowerCase() === "size" &&
    String(product.variantValue || "").trim()
  );
}

function getVariantGroupKey(product) {
  return [
    String(product?.parentProductId || "").trim(),
    String(product?.displayName || "").trim(),
    String(product?.variantType || "").trim().toLowerCase()
  ].join("::");
}

function sortVariantsByOrder(variants) {
  return [...(variants || [])].sort((a, b) => {
    const aOrder = Number(a.variantSortOrder);
    const bOrder = Number(b.variantSortOrder);
    const safeA = Number.isFinite(aOrder) ? aOrder : 9999;
    const safeB = Number.isFinite(bOrder) ? bOrder : 9999;
    if (safeA !== safeB) return safeA - safeB;
    return String(a.variantValue || "").localeCompare(String(b.variantValue || ""));
  });
}

function buildViewerProductGroups(products) {
  const groups = new Map();
  const output = [];

  (Array.isArray(products) ? products : []).forEach(product => {
    if (!product || product.active === false) return;
    const resolvedStatus = getResolvedProductStatus(product);
    const safeProduct = { ...product, resolvedStatus };

    if (!isViewerVariantProduct(safeProduct)) {
      output.push(safeProduct);
      return;
    }

    const groupKey = getVariantGroupKey(safeProduct);
    if (!groups.has(groupKey)) {
      const group = {
        isVariantGroup: true,
        groupKey,
        parentProductId: String(safeProduct.parentProductId || "").trim(),
        displayName: String(safeProduct.displayName || safeProduct.name || "").trim(),
        variantType: "size",
        variants: [],
        image: "",
        resolvedStatus: "ready"
      };
      groups.set(groupKey, group);
      output.push(group);
    }

    groups.get(groupKey).variants.push(safeProduct);
  });

  groups.forEach(group => {
    group.variants = sortVariantsByOrder(group.variants);
    group.image = String(group.variants.find(item => item.image)?.image || "").trim();
    group.resolvedStatus = getVariantGroupResolvedStatus(group);
  });

  return output;
}

function getVariantGroupResolvedStatus(group) {
  const variants = group?.variants || [];
  if (!variants.length) return "out";
  const available = variants.find(variant => getResolvedProductStatus(variant) !== "out" && Number(variant.stock) > 0);
  return available ? getResolvedProductStatus(available) : "out";
}

function getVariantGroupPriceLabel(group) {
  const prices = (group?.variants || [])
    .map(variant => Number(variant.price))
    .filter(price => Number.isFinite(price));
  if (!prices.length) return "฿0";
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  return min === max
    ? `฿${min.toLocaleString()}`
    : `฿${min.toLocaleString()} - ฿${max.toLocaleString()}`;
}

function getVariantGroupTotalStock(group) {
  return (group?.variants || []).reduce((sum, variant) => sum + (Number(variant.stock) || 0), 0);
}

function getSelectedVariantFromGroup(group) {
  if (!group?.isVariantGroup) return null;
  const selectedId = state.viewerVariantSelections[group.groupKey];
  return group.variants.find(variant => String(variant.productId) === String(selectedId)) || null;
}

function getViewerVariantGroupByKey(groupKey) {
  return buildViewerProductGroups(state.products)
    .find(item => item.isVariantGroup && item.groupKey === groupKey) || null;
}

function getViewerVariantSummaryText(group, mode = "card") {
  const selectedVariant = getSelectedVariantFromGroup(group);
  const emptyText = mode === "detail"
    ? `${t("selectSize", "เลือกไซส์")}: ${t("selectSizeFirst", "กรุณาเลือกไซส์ก่อน")}`
    : t("selectSizeFirst", "กรุณาเลือกไซส์ก่อน");

  if (!selectedVariant) return emptyText;

  const value = selectedVariant.variantValue || "-";
  const productId = selectedVariant.productId || "-";
  const stock = Number(selectedVariant.stock) || 0;

  return mode === "detail"
    ? `${t("selectSize", "เลือกไซส์")}: ${value} · SKU ${productId} · ${t("remaining", "เหลือ")} ${stock}`
    : `${t("selected", "เลือก")}: ${value} · SKU ${productId} · ${t("remaining", "เหลือ")} ${stock}`;
}

function updateViewerVariantSelectionDom(groupKey) {
  const group = getViewerVariantGroupByKey(groupKey);
  if (!group) return;

  const selectedId = String(state.viewerVariantSelections[groupKey] || "");

  document.querySelectorAll("[data-variant-group-key]").forEach(container => {
    if (container.dataset.variantGroupKey !== groupKey) return;

    container.querySelectorAll("[data-variant-product-id]").forEach(button => {
      const isSelected = String(button.dataset.variantProductId || "") === selectedId;
      button.classList.toggle("selected", isSelected);
      button.setAttribute("aria-pressed", isSelected ? "true" : "false");
    });
  });

  document.querySelectorAll("[data-variant-selected-summary]").forEach(summary => {
    if (summary.dataset.variantSelectedSummary !== groupKey) return;
    summary.textContent = getViewerVariantSummaryText(
      group,
      summary.dataset.variantSummaryMode || "card"
    );
  });
}

function getViewerItemSearchText(item) {
  if (item?.isVariantGroup) {
    return [
      item.displayName,
      item.parentProductId,
      ...(item.variants || []).flatMap(variant => [
        variant.productId,
        variant.name,
        variant.variantValue,
        variant.displayName,
        variant.parentProductId
      ])
    ].join(" ").toLowerCase();
  }
  return [
    item?.name,
    item?.productId,
    item?.displayName,
    item?.parentProductId,
    item?.variantValue
  ].join(" ").toLowerCase();
}

function matchesViewerFilters(item) {
  const search = String(state.search || "").trim().toLowerCase();
  if (search && !getViewerItemSearchText(item).includes(search)) return false;

  const statusFilter = state.viewerFilter?.status || "all";
  if (statusFilter === "all") return true;

  if (item?.isVariantGroup) {
    return (item.variants || []).some(variant => getResolvedProductStatus(variant) === statusFilter);
  }
  return item.resolvedStatus === statusFilter;
}

function selectViewerVariant(groupKey, productId, event) {

  state.viewerVariantSelections[groupKey] = productId;

function getViewerCopyProductTarget(product = state.selectedProduct) {
  if (!product) return null;

    if (selectedVariant) {
      return {
        ...selectedVariant,
        image: selectedVariant.image || product.image || fallbackVariant.image || ""

    return {
      name: product.displayName || fallbackVariant.name || "",
      productId: product.parentProductId || fallbackVariant.productId || "",
      stock: getVariantGroupTotalStock(product),
      image: product.image || fallbackVariant.image || "",

    };
  }

  return product;
}

async function copyViewerProductInfo(type, event) {
  if (event) event.stopPropagation();

  if (type === "costPrice" && !canCopyViewerCostPrice()) {
    showToast(t("adminOnlyCopyCostPrice", "เฉพาะแอดมินเท่านั้นที่คัดลอกราคาทุนได้"), "warning");
    return;
  }

  const { label, value } = getViewerCopyInfoValue(type);
  const text = String(value ?? "").trim();

  if (!text) {
    showToast(formatUiText("copyNoValue", { label }, "ไม่มี{label}ให้คัดลอก"), "warning");
    return;
  }

  try {
    if (!navigator.clipboard?.writeText) {
      throw new Error("Clipboard API unavailable");
    }
    await navigator.clipboard.writeText(text);
    showToast(formatUiText("copyValueSuccess", { label }, "คัดลอก{label}แล้ว"), "success");
  } catch (err) {
    showToast(formatUiText("copyValueFailed", { label }, "คัดลอก{label}ไม่สำเร็จ"), "error");
  }
}

function renderProducts(){
  const app = document.getElementById("app");

  const escapeHTML = (str="") =>
    String(str ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  
  // 🔒 GUARD สำคัญที่สุด
  if (!Array.isArray(state.products)) {
    console.error("renderProducts: products is not array", state.products);
    app.innerHTML = `
      <div role="alert" style="
        text-align:center;
        color:#d93025;
        margin-top:40px;
        font-size:15px;
      ">
        ไม่สามารถโหลดรายการสินค้าได้
      </div>
    `;
    return;
  }

  const filteredProducts = [];

  if (state.mode === "viewer") {
    buildViewerProductGroups(state.products)
      .filter(matchesViewerFilters)
      .forEach(item => filteredProducts.push(item));
  } else {
    state.products.forEach(p => {
      const resolvedStatus = getResolvedProductStatus(p);

      // 🔍 SEARCH FILTER (ชื่อ + รหัส)
      if (state.search) {
        const text = (p.name + p.productId).toLowerCase();
        if (!text.includes(String(state.search).toLowerCase())) return;
      }

      // 🔴 CHANGED: admin filter (ต้องอยู่หลัง resolvedStatus เสมอ)
      if (
        state.admin.filters &&
        state.admin.filters.status !== "all"
      ) {
        if (resolvedStatus !== state.admin.filters.status) return;
      }

      filteredProducts.push({
        ...p,
        resolvedStatus
      });
    });
  }

  const pageSize = Number(state.pagination?.pageSize) || 100;
  const totalItems = filteredProducts.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
  const safePage = Math.min(Math.max(1, Number(state.pagination?.page) || 1), totalPages);
  state.pagination.page = safePage;

  const startIndex = (safePage - 1) * pageSize;
  const pageItems = filteredProducts.slice(startIndex, startIndex + pageSize);

  app.innerHTML = "";
  let found = false;

  pageItems.forEach(p => {
    const statusKey = p.isVariantGroup ? getVariantGroupResolvedStatus(p) : p.resolvedStatus;
    const allowedStatusClasses = new Set([
      "ready",
      "ready_plus",
      "shipping",
      "warehouse",
      "out"
    ]);
    const statusClass = allowedStatusClasses.has(statusKey)
      ? statusKey
      : "ready";
    let statusText  = getViewerStatusLabel(statusKey);

    /* ================= CARD ================= */
    const card = document.createElement("div");
    card.className = "product-card";
    card.setAttribute("role", "button");
    card.setAttribute("tabindex", "0");

    card.onclick = () => {
      if (state.mode === "admin") {
        openAdminProductAction(p);
      } else {
        openProduct(p);
      }
    };
    card.onkeydown = event => handleKeyboardActivation(event, card);

    if (p.isVariantGroup) {
      const selectedVariant = getSelectedVariantFromGroup(p);
      card.innerHTML = `
        <img class="thumb"
          src="${p.image ? escAttr(p.image) : "about:blank"}"
          alt="${escAttr(p.displayName)}"
          onerror="this.style.display='none'">

        <div class="info">
          <div class="name">${escapeHTML(p.displayName)}</div>
          <div class="sku">${t("productGroup", "กลุ่ม")}: ${escapeHTML(p.parentProductId)}</div>
          <div class="price">${t("price", "ราคา")}: ${escapeHTML(getVariantGroupPriceLabel(p))}</div>
          <div class="variant-group-summary">
            ${t("selectSize", "เลือกไซส์")} · ${t("totalStock", "สต็อกรวม")} ${getVariantGroupTotalStock(p)}
          </div>
          ${renderVariantSizeOptions(p)}
          ${
            selectedVariant
              ? `<div class="variant-selected-summary" data-variant-selected-summary="${escAttr(p.groupKey)}" data-variant-summary-mode="card">${t("selected", "เลือก")}: ${escapeHTML(selectedVariant.variantValue || "-")} · SKU ${escapeHTML(selectedVariant.productId || "-")} · ${t("remaining", "เหลือ")} ${Number(selectedVariant.stock) || 0}</div>`
              : `<div class="variant-selected-summary" data-variant-selected-summary="${escAttr(p.groupKey)}" data-variant-summary-mode="card">${t("selectSizeFirst", "กรุณาเลือกไซส์ก่อน")}</div>`
          }
          <button class="btn btn-primary variant-add-btn" type="button"
            onclick="addVariantGroupToCart(${toInlineJsStringLiteral(p.groupKey)}, event)">
            ${t("addToCart", "เพิ่มลงตะกร้า")}
          </button>
        </div>
      `;
    } else {
      card.innerHTML = `
      <img class="thumb"
        src="${p.image ? escAttr(p.image) : "about:blank"}"
        alt="${escAttr(p.name)}"
        onerror="this.style.display='none'">

      <div class="info">
        <div class="name">${escapeHTML(p.name)}</div>
        <div class="sku">${t("productCode", "รหัส")}: ${escapeHTML(p.productId)}</div>
        ${renderAdminProductVariantMeta(p)}
        <div class="price">${t("price", "ราคา")}: ฿${Number(p.price).toLocaleString()}</div>

        <div class="meta">
          <span class="qty">${t("quantity", "จำนวน")}: ${Number(p.stock) || 0}</span>
          <span class="status ${statusClass}">
            ${statusText}
          </span>
        </div>
      </div>
    `;
    }

    app.appendChild(card);
    found = true;
  });

  // ❌ ไม่พบสินค้า
  if (!found) {
    const hasSearch = String(state.search || "").trim().length > 0;
    const activeFilter = state.mode === "admin"
      ? state.admin?.filters?.status
      : state.viewerFilter?.status;
    const hasFilter = activeFilter && activeFilter !== "all";
    const emptyMessage = hasSearch
      ? t("noSearchResults", "ไม่พบสินค้าที่ค้นหา")
      : hasFilter
        ? t("noFilterResults", "ไม่มีสินค้าที่ตรงกับตัวกรอง")
        : t("noProductsToShow", "ยังไม่มีสินค้าให้แสดง");

    app.innerHTML = `
      <div role="status" style="
        text-align:center;
        color:var(--muted);
        margin-top:40px;
        font-size:15px;
      ">
        ${emptyMessage}
      </div>
    `;
    return;   
  }

  if (totalItems > pageSize) {
    const pagination = document.createElement("div");
    pagination.className = "pagination";
    pagination.innerHTML = `
      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === 1 ? "disabled" : ""}
        onclick="changePage(-1)">
        ${t("previousPage", "ก่อนหน้า")}
      </button>

      <div class="pagination-info">
        ${t("pageLabel", "หน้า")} ${safePage} / ${totalPages}
        <br>
        <span style="font-size:12px;color:var(--text-soft)">
          ${totalItems.toLocaleString()} รายการ
        </span>
      </div>

      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === totalPages ? "disabled" : ""}
        onclick="changePage(1)">
        ${t("nextPage", "ถัดไป")}
      </button>
    `;
    app.appendChild(pagination);
  }

  // Product card entrance is intentionally limited for mobile performance.
  if (!isReducedMotion()) {
    const cards = Array.from(document.querySelectorAll(".product-card"))
      .slice(0, MOTION.CARD_ENTRANCE_LIMIT);

    cards.forEach((card, index) => {
      card.animate(
        [
          {
            opacity: 0,
            transform: "translateY(10px)"
          },
          {
            opacity: 1,
            transform: "translateY(0)"
          }
        ],
        {
          duration: MOTION.DURATION_NORMAL_MS,
          delay: index * MOTION.CARD_STAGGER_MS,
          easing: MOTION.EASING_STANDARD,
          fill: "both"
        }
      );
    });
  }

}

function changePage(delta){
  const nextPage = (Number(state.pagination.page) || 1) + Number(delta || 0);
  if (nextPage < 1) return;

  state.pagination.page = nextPage;
  renderProducts();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

Object.assign(window, {
  changePage
});

function getCartItemImageUrl(item) {
  const existingImage = String(item?.image || "").trim();
  if (existingImage) return existingImage;

  const product = Array.isArray(state.products)
    ? state.products.find(p => String(p.productId || "") === String(item?.productId || ""))
    : null;
  return String(product?.image || "").trim();
}

function renderCartItemThumb(item) {
  const imageUrl = getCartItemImageUrl(item);
  const placeholder = `<div class="cart-thumb-placeholder" aria-hidden="true">รูป</div>`;
  if (!imageUrl) {
    return `<div class="cart-thumb">${placeholder}</div>`;
  }
  return `
    <div class="cart-thumb">
      <img
        src="${escAttr(imageUrl)}"
        alt="${escAttr(item?.name || "สินค้า")}"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';">
      <div class="cart-thumb-placeholder" aria-hidden="true" style="display:none">รูป</div>
    </div>
  `;
}

 let lastFocusTrigger = null;

 function rememberTrigger(el){
   if (el instanceof HTMLElement) lastFocusTrigger = el;
 }

 function restoreTriggerFocus(){
   if (lastFocusTrigger && typeof lastFocusTrigger.focus === "function") {
     lastFocusTrigger.focus();
   }
 }

 function syncExpanded(button, expanded){
   if (button) button.setAttribute("aria-expanded", String(!!expanded));
 }

 function focusFirstInteractive(container){
   if (!container) return;
   const first = container.querySelector(
     'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
   );
   (first || container).focus();
 } 
  
/* 🔍 viewer search toggle (เฉพาะ UI) */
function toggleViewerSearch(triggerEl){
  const wrap  = document.getElementById("viewerSearchWrap");
  const input = document.getElementById("viewerSearchInput");
  if(!wrap || !input) return;

  rememberTrigger(triggerEl || document.querySelector("#viewerSearchWrap .search-btn")); 
  const opened = wrap.classList.contains("active");

  if(opened){
    input.value = "";
    state.search = "";
    state.pagination.page = 1;
    state.viewerSearchOpen = false;
    renderProducts();
    wrap.classList.remove("active");
    syncExpanded(wrap.querySelector(".search-btn"), false);
    restoreTriggerFocus();   
  }else{
    state.viewerSearchOpen = true;
    wrap.classList.add("active");
    syncExpanded(wrap.querySelector(".search-btn"), true);   
    setTimeout(()=>input.focus(),80);
  }
}

/* 🔍 admin search toggle (ICON EXPAND) */

function toggleAdminSearch(triggerEl){
  const wrap = document.getElementById("adminSearchWrap");
  if (!wrap) return;

  rememberTrigger(triggerEl || wrap.querySelector(".search-btn")); 
  const opening = !wrap.classList.contains("active");

  wrap.classList.toggle("active");
  syncExpanded(wrap.querySelector(".search-btn"), opening);

  if (opening) {
    const input = wrap.querySelector("input");
    // 🕒 รอ animation เริ่มก่อน focus (iOS trick)
    setTimeout(() => input && input.focus(), 120);
   } else {
     restoreTriggerFocus();   
  }
}

function toggleFilterDropdown(triggerEl){
  const el = document.getElementById("filterDropdown");
  if(!el) return;

  const btn = triggerEl || document.querySelector(".filter-btn");
  rememberTrigger(btn);
  const isOpen = el.classList.contains("show");

  document.querySelectorAll(".filter-dropdown.show")
    .forEach(d => d.classList.remove("show"));
  document.querySelectorAll(".filter-btn[aria-expanded='true']")
    .forEach(b => syncExpanded(b, false));

  if(!isOpen){
    el.classList.add("show");
     syncExpanded(btn, true);
     setTimeout(() => focusFirstInteractive(el), 0);   

    // 🔴 auto close on outside click
    setTimeout(()=>{
      document.addEventListener("click", closeFilterOnOutside, { once:true });
    }, 0);
   } else {
     restoreTriggerFocus();   
  }
}

function closeFilterOnOutside(e){
  const wrap = document.querySelector(".filter-wrap");
  if(!wrap || wrap.contains(e.target)) return;

  const el = document.getElementById("filterDropdown");
  if(el) el.classList.remove("show");
   document.querySelectorAll(".filter-btn[aria-expanded='true']")
     .forEach(b => syncExpanded(b, false)); 
}

function confirmAddToCart(){
  const p = state.selectedProduct;
  if (!p) return;

  const qty = Number(state.qty);

  if (!Number.isInteger(qty) || qty <= 0) {
    showToast(
      t("quantityMustBePositive", "จำนวนสินค้าต้องเป็นจำนวนเต็มมากกว่า 0"),
      "warning"
    );
    return;
  }

  // 🔒 GUARD: ห้ามเกิน stock
  const existing = state.cart.find(i => i.productId === p.productId);
  const currentQty = existing ? existing.qty : 0;

  if (currentQty + qty > Number(p.stock)) {
    // ❌ เดิม: alert
    // alert(`สินค้า "${p.name}" มีคงเหลือ ${p.stock} ชิ้น`);

    // ✅ ใหม่: toast warning
    showToast(
      formatUiText("stockRemainingMessage", { name: p.name, stock: p.stock }, `สินค้า "${p.name}" คงเหลือ ${p.stock} ชิ้น`),
      "warning"
    );
    return;
  }

  if(existing){
    existing.qty += qty;
  }else{
    state.cart.push({
      productId: p.productId,
      name: p.name,
      price: p.price,
      qty: qty
    });
  }

  if (typeof renderBadge === "function") renderBadge();
  saveCart();
  // 🔴 CHANGED: ให้ floating cart bar อัปเดตทันทีหลังเพิ่มตะกร้า
  if (typeof renderFloatingBar === "function") renderFloatingBar();

  // ✅ Feedback สำเร็จ (หัวใจของ STEP 2️⃣)
  showToast(
    formatUiText("addedToCart", { name: p.name }, `เพิ่ม "${p.name}" ลงตะกร้าแล้ว`),
    "success"
  );

  resetToHome();
  requestAnimationFrame(triggerCartAddedFeedback);
}

async function submitChangePassword(btn){
  if (state.admin.isSubmitting) return;

  const currentPassword = document.getElementById("currentPassword")?.value || "";
  const newPassword = document.getElementById("newPassword")?.value || "";
  const confirmNewPassword = document.getElementById("confirmNewPassword")?.value || "";

  if (!currentPassword || !newPassword || !confirmNewPassword) {
    showToast(t("fillAllFields", "กรุณากรอกข้อมูลให้ครบ"), "warning");
    return;
  }

  if (newPassword !== confirmNewPassword) {
    showToast(t("passwordMismatch", "รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน"), "warning");
    return;
  }

  if (newPassword.length < 4) {
    showToast(t("passwordTooShort", "รหัสผ่านใหม่สั้นเกินไป"), "warning");
    return;
  }

  state.admin.isSubmitting = true;
  if (btn) btn.disabled = true;

  try {
    const form = new URLSearchParams();
    form.append("action", "changePassword");
    form.append("token", state.admin.token);
    form.append("currentPassword", currentPassword);
    form.append("newPassword", newPassword);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success) {
      throw new Error(json.error || json.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ");
    }

    showToast(t("passwordChangedLoginAgain", "เปลี่ยนรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบใหม่"), "success");
    exitAdmin();

  } catch (err) {
    console.error(err);
    showToast(err.message || t("passwordChangeFailed", "เปลี่ยนรหัสผ่านไม่สำเร็จ"), "error");
  } finally {
    state.admin.isSubmitting = false;
    if (btn) btn.disabled = false;
  }
}

async function handleAdminLogin(btn){
  // 🔒 กันกดซ้ำ
  if (state.admin.isSubmitting) return;

  // 🔒 force global rate limit (scope-safe)
  if (typeof window.isLoginRateLimited === "function") {
    if (window.isLoginRateLimited()) {
      showToast(t("tooManyLoginAttempts", "พยายามเข้าสู่ระบบบ่อยเกินไป กรุณารอสักครู่"), "warning");
      return;
    }
  }

  const userInput = document.getElementById("adminUser");
  const passInput = document.getElementById("adminPass");
  const cancelBtn = document.getElementById("adminCancelBtn");

  const username = userInput.value.trim();
  const password = passInput.value;

  if (!username || !password) {
    showToast(t("adminCredentialsRequired", "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน"), "warning");
    return;
  }

  // ================= UX START =================
  state.admin.isSubmitting = true;

  if (btn) {
    btn.disabled = true;
    btn.textContent = "กำลังเข้าสู่ระบบ...";
  }
  if (cancelBtn) cancelBtn.disabled = true;

  blurActiveElementForMobileKeyboard();
  await waitForMobileViewportSettle();

  showLoading("กำลังเข้าสู่ระบบแอดมิน...");
  // ================= UX END ===================

  try {
    // 🔐 CALL BACKEND LOGIN
    const form = new URLSearchParams();
    form.append("action", "adminLogin");
    form.append("username", username);
    form.append("password", password);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success || !json.token) {
      throw new Error(json.error || json.message || "Login failed");
    }

    // ✅ SAVE SESSION (STATE)
    state.admin.loggedIn = true;
    state.admin.user = json.username;
    state.admin.token = json.token;
    state.admin.expiredAt = json.expiredAt;

    // ✅ SAVE SESSION (PERSIST)
    saveAdminSession(json);

    // 🧹 CLOSE LOGIN SHEET
    closeOverlay(adminLoginSheet);

    // 🔓 reset lock เผื่อมีค้าง
    state.ui.backdropLocked = false;

    // 🚀 ENTER ADMIN MODE
    await enterAdmin();
    await repairMobileViewportAfterAdminLogin();

  } catch (err) {
    console.error(err);
    showToast(err.message || t("loginFailed", "ไม่สามารถเข้าสู่ระบบได้"), "error");

  } finally {
    // ================= CLEANUP =================
    safeHideLoading();
    state.admin.isSubmitting = false;

    if (btn) {
      btn.disabled = false;
      btn.textContent = "Login";
    }
    if (cancelBtn) cancelBtn.disabled = false;
  }
}

function toYmdLocal(value) {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return "";
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function formatThaiDate(value) {

  if (!value) return "-";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) {
    return String(value);
  }

  return d.toLocaleString(
    "th-TH",
    {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }
  );
}
 
function getOrderDateValue(order) {
  return (
    order?.createdAt ||
    order?.created_at ||
    order?.timestamp ||
    order?.date ||
    ""
  );
}
 

function isOrderInRange(order, fromYmd, toYmd) {
  const raw = getOrderDateValue(order);

 console.log(
   "ORDER DATE:",
   order.orderId,
   raw
 );
 
  if (!raw) return false;

  const d = new Date(raw);

 console.log(
   "PARSED:",
   order.orderId,
   d,
   Number.isNaN(d.getTime())
 ); 
 
  if (Number.isNaN(d.getTime())) return false;

  const orderYmd = toYmdLocal(d);
  if (fromYmd && orderYmd < fromYmd) return false;
  if (toYmd && orderYmd > toYmd) return false;
  return true;
}

function getDashboardProductCostMap() {
  return new Map(
    (Array.isArray(state.products) ? state.products : []).map(p => [
      String(p.productId || "").trim(),
      Number(p.costPrice || 0)
    ])
  );
}

function calculateDashboardSummary(orders) {
  const safeOrders = Array.isArray(orders) ? orders : [];
  const productCostMap = getDashboardProductCostMap();

  let totalSales = 0;
  let totalCost = 0;
  let totalProfit = 0;
  let totalQty = 0;

  safeOrders.forEach(order => {
    const items = Array.isArray(order.items) ? order.items : [];

    items.forEach(item => {
      const qty = Number(item.qty || 0);
      const sellPrice = Number(item.price || 0);
      const fallbackCost = productCostMap.get(String(item.productId || "").trim()) || 0;
      const costPrice = Number(
        item.costPrice ?? item.unitCost ?? fallbackCost
      );

      const lineSales = sellPrice * qty;
      const lineCost = costPrice * qty;

      totalSales += lineSales;
      totalCost += lineCost;
      totalProfit += (lineSales - lineCost);
      totalQty += qty;
    });
  });

  return {
    orderCount: safeOrders.length,
    totalQty,
    totalSales,
    totalCost,
    totalProfit
  };
}

function getDuplicatePoOrderMap() {
  const map = new Map();
  const orders = Array.isArray(state.admin.orders) ? state.admin.orders : [];

  orders.forEach(order => {
    const key = normalizePoNumberForCompare(order?.poNumber);
    if (!key) return;

    if (!map.has(key)) {
      map.set(key, []);
    }
    map.get(key).push(order);
  });

  return map;
}

function getDuplicatePoInfo(order, duplicatePoMap = getDuplicatePoOrderMap()) {
  const key = normalizePoNumberForCompare(order?.poNumber);
  if (!key) return null;

  const duplicates = duplicatePoMap.get(key) || [];
  if (duplicates.length < 2) return null;

  const currentOrderId = String(order?.orderId || "").trim();
  const otherOrder = duplicates.find(item =>
    String(item?.orderId || "").trim() !== currentOrderId
  );

  return {
    count: duplicates.length,
    otherOrderId: otherOrder?.orderId || ""
  };
}

function renderDuplicatePoBadge(order, duplicatePoMap) {

function formatAdminPoSummaryMoney(value) {
  const amount = Number(value);
  if (!Number.isFinite(amount)) return "-";
  return `฿${amount.toLocaleString("th-TH")}`;
}

function buildAdminPoSummaryText(order) {
  const items = Array.isArray(order?.items) ? order.items : [];
  const lines = [
    `PO: ${order?.poNumber || "-"}`,
    `${t("orderNumber", "เลขออเดอร์")}: ${order?.orderId || "-"}`,
    `${t("status", "สถานะ")}: ${order?.status || "-"}`,
    `${t("source", "แหล่งที่มา")}: ${getAdminOrderSourceLabel(order)}`
  ];

  const partnerName = String(order?.partnerNameSnapshot || order?.partnerId || "").trim();
  const partnerRequestId = String(order?.partnerRequestId || "").trim();

  if (partnerName) {
    lines.push(`${t("partner", "คู่ค้า")}: ${partnerName}`);
  }
  if (partnerRequestId) {
    lines.push(`${t("partnerRequestId", "เลขคำขอคู่ค้า")}: ${partnerRequestId}`);
  }

  lines.push("", `${t("itemList", "รายการสินค้า")}:`);

  if (items.length) {
    items.forEach((item, index) => {
      const productId = String(item?.productId || "").trim() || "-";
      const name = String(item?.name || "").trim();
      const qty = Number(item?.qty) || 0;
      const price = Number(item?.price);
      const lineTotal = Number.isFinite(price)
        ? formatAdminPoSummaryMoney(price * qty)
        : "-";
      const itemName = name ? ` - ${name}` : "";

      lines.push(`${index + 1}. [${productId}]${itemName} x ${qty} = ${lineTotal}`);
    });
  } else {
    lines.push("-");
  }

  lines.push("", `${t("total", "รวม")}: ${formatAdminPoSummaryMoney(order?.total)}`);
  return lines.join("\n");
}

function copyAdminPoSummary(orderId) {

}

function getAdminPoPrintItemImage(item) {
  const directImage = String(item?.imageSnapshot || item?.image || item?.imageUrl || "").trim();

  if (!productId) return "";

  const products = [

    ...(Array.isArray(state.admin?.products) ? state.admin.products : [])

async function openStockTimeline(force = false, options = {}) {
  // ❌ ต้องมี intent จริง
  if (!force && !allowOpenStockTimeline) return;

  // 🔐 session guard
  if (
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast(t("sessionExpiredLoginAgain", "Session หมดอายุ กรุณา login ใหม่"), "warning");
    exitAdmin();
    return;
  }

  if (!ensureAdminUiContext()) return;

  // 🔒 ใช้แล้วปิดทันที (กันเด้งซ้ำ)
  allowOpenStockTimeline = false;
  adminStockSheet.classList.remove("stock-menu-return-side");

  const targetSheet = adminStockSheet;
  const returnToAdminMenu = options.returnToAdminMenu === true;
  const backAction = returnToAdminMenu
    ? "closeStockTimelineToAdminMenu()"
    : "closeStockTimelineSheet()";
  const stockTimelineTitleId = "adminStockSheetTitle";
  const tr = t;
  const stockTimelineTitle = t("stockMovementHistory", "ประวัติความเคลื่อนไหวสต๊อก");
  const backLabel = t("back", "กลับ");
  const viewMoreLabel = t("viewMoreDetails", "ดูรายละเอียดเพิ่มเติม");
  const hideDetailsLabel = t("hideDetails", "ซ่อนรายละเอียด");

  closeOverlay(adminDashboardSheet);

  targetSheet.innerHTML = `
    <h3 id="${stockTimelineTitleId}">${stockTimelineTitle}</h3>
    <div class="loading has-lottie">${renderLottieLoading(t("loading", "กำลังโหลด..."))}</div>
  `;

  openOverlay(targetSheet);

  try {
    const logs = await fetchStockLogs();
    const safeLogs = Array.isArray(logs) ? logs : [];

    const money = (value) => `฿${Number(value || 0).toLocaleString("th-TH")}`;
    const esc = (value) => escapeHtml(value ?? "");   

    // ✅ ensure orders พร้อมใช้สำหรับ fallback ราคา/ยอดรวม
    if (!Array.isArray(state.admin.orders) || state.admin.orders.length === 0) {
      try {
        const freshOrders = await fetchOrders();
        state.admin.orders = Array.isArray(freshOrders) ? freshOrders : [];
      } catch (orderErr) {
        console.warn("openStockTimeline: preload orders failed", orderErr);
      }
    }
   
    // ✅ fallback ราคา/ยอดรวมจาก order จริง ถ้า stock log ไม่มีราคา
    const orderLookup = new Map(
      (Array.isArray(state.admin.orders) ? state.admin.orders : []).map(o => [
        String(o.orderId || "").trim(),
        o
      ])
    );   

    /* ================= GROUP ORDER OUT ================= */
    const orderMap = {};
    const singles = [];

 safeLogs.forEach(l => {
  const time = l.timestamp ? new Date(l.timestamp) : new Date();

  // ✅ ใช้ orderId จริงจาก sheet (fallback เผื่อของเก่า)
  const orderRef = l.orderId || l.ref || null;

  if (l.type === "OUT" && orderRef) {
    const matchedOrder = orderLookup.get(String(orderRef).trim());
    const matchedOrderItem = Array.isArray(matchedOrder?.items)
      ? matchedOrder.items.find(item =>
          String(item.productId || "").trim() === String(l.productId || "").trim()
        )
      : null;

    const fallbackSalePrice = Number(
      l.salePrice ??
      l.price ??
      matchedOrderItem?.price ??
      0
    );

    const fallbackLineTotal = Number(
      l.lineTotal ??
      (fallbackSalePrice * Math.abs(Number(l.qty || 0)))
    );
   
    if (!orderMap[orderRef]) {
      orderMap[orderRef] = {
        orderId: orderRef,
        time,
        by: l.by || "-",
        note: l.note || l.reason || "",
        totalSalesAmount: Number(matchedOrder?.total || 0),
        items: []
      };
    }

    if (!orderMap[orderRef].note && (l.note || l.reason)) {
      orderMap[orderRef].note = l.note || l.reason || "";
    }   

    // ใช้เวลาล่าสุดของ item ใน order เดียวกัน
    if (time.getTime() > orderMap[orderRef].time.getTime()) {
      orderMap[orderRef].time = time;
    }

    // ✅ ถ้า order.total ไม่มี ค่อยสะสมจากรายการย่อย
    if (!Number(orderMap[orderRef].totalSalesAmount)) {
      orderMap[orderRef].totalSalesAmount += fallbackLineTotal;
    }   

    orderMap[orderRef].items.push({
      productId: l.productId,
      productName: l.productName || l.name || matchedOrderItem?.name || "",
      image: l.image || matchedOrderItem?.image || "",
      qty: Math.abs(Number(l.qty || 0)),
      before: l.before,
      after: l.after,
      salePrice: fallbackSalePrice,
      lineTotal: fallbackLineTotal
    });
  } else {
    singles.push({
      ...l,
      _time: time
    });
  }
});

    /* ================= BUILD TIMELINE ================= */
    const timeline = [];

    Object.values(orderMap).forEach(o => {
      timeline.push({
        kind: "ORDER",
        type: "OUT",
        orderId: o.orderId,

        totalSalesAmount: o.totalSalesAmount
      });
    });

    singles.forEach(l => {
      timeline.push({
        kind: "STOCK",
        type: l.type,

        productName: l.productName || l.name || "",
        image: l.image || "",

        after: l.after,

        note: l.note || l.reason || ""
      });
    });

    // 🕒 latest first (safe)
    timeline.sort((a, b) => b.time.getTime() - a.time.getTime());

    /* ================= RENDER ================= */
    targetSheet.innerHTML = `

                    <div class="timeline-summary">

                    </div>                    

                    ${t.items.map(i => `

 async function submitBulkPendingDelivery() {
   if (state.admin.isSubmitting) return;
   state.admin.isSubmitting = true;

   try {
     const order =
       state.admin.pendingDeliveryOrder;

     if (!order) return;

     const items =
       state.admin.bulkPendingItems
         .filter(i => i.selected);

     if (!items.length) {
       showToast(
         t("selectProductsWarning", "กรุณาเลือกสินค้า"),
         "warning"
       );
       return;
     }

     const invalidItem = items.find(item => {
       const qty = Number(item.qty);

       return (
         !Number.isInteger(qty) ||
         qty <= 0
       );
     });

     if (invalidItem) {
       showToast(
         formatUiText(
           t("invalidPendingQtyRange", "จำนวนค้างส่งของ \"{name}\" ต้องเป็นจำนวนเต็ม 1-{qty}"),
           {
             name: invalidItem.name || invalidItem.productId,
             qty: invalidItem.orderedQty
           }
         ),
         "warning"
       );
       return;
     }

     let pendingDeliveries =
       state.admin.pendingDeliveries;

     if (!Array.isArray(pendingDeliveries)) {
       try {
         pendingDeliveries =
           await fetchPendingDeliveries();
         state.admin.pendingDeliveries =
           pendingDeliveries;
       } catch (err) {
         console.error(err);
         showToast(
           err.message ||
           t("pendingDeliveryCheckError", "ไม่สามารถตรวจสอบรายการค้างส่งได้"),
           "error"
         );
         return;
       }
     }
     const batchQtyByProduct = new Map();
     const cumulativeInvalidItem = items.find(item => {
       const productId = String(item.productId || "");
       const qty = Number(item.qty);
       const orderedQty = Number(item.orderedQty);
       const existingOpenQty = pendingDeliveries
         .filter(pending =>
           String(pending.status || "").toUpperCase() === "OPEN" &&
           String(pending.orderId || "") === String(order.orderId || "") &&
           String(pending.productId || "") === productId
         )
         .reduce(
           (sum, pending) =>
             sum + Math.max(0, Number(pending.qty) || 0),
           0
         );
       const batchQty =
         (batchQtyByProduct.get(productId) || 0) + qty;

       batchQtyByProduct.set(productId, batchQty);

       return existingOpenQty + batchQty > orderedQty;
     });

     if (cumulativeInvalidItem) {
       showToast(
         formatUiText(
           t("pendingQtyExceedsPoForProduct", "จำนวนค้างส่งของ \"{name}\" เกินจำนวนใน PO"),
           {
             name: cumulativeInvalidItem.name || cumulativeInvalidItem.productId
           }
         ),
         "warning"
       );
       return;
     }

     showLoading(
       t("creatingPendingDelivery", "กำลังสร้างรายการค้างส่ง...")
     );

     const succeededItems = [];
     const failedItems = [];

     for (const item of items) {
       try {
         const form =
           new URLSearchParams();

         form.append("action", "createPendingDelivery");
         form.append("token", state.admin.token);
         form.append("orderId", order.orderId);
         form.append("poNumber", order.poNumber || "");
         form.append("productId", item.productId);
         form.append("qty", item.qty);
         form.append("orderedQty", item.orderedQty);
         form.append("note", "Bulk Pending Delivery");

         const result =
           await postFormAction(form);

         if (!result?.success) {
           throw new Error(
             result?.error ||
             t("createPendingFailed", "สร้างรายการไม่สำเร็จ")
           );
         }

         succeededItems.push(item);
       } catch (err) {
         failedItems.push({
           item,
           error: err.message || t("createPendingFailed", "สร้างรายการไม่สำเร็จ")
         });
       }
     }

     if (failedItems.length === 0) {
       showToast(
         t("createPendingSuccess", "สร้างรายการสำเร็จ"),
         "success"
       );

       closeOverlay(
         bulkPendingDeliverySheet
       );

       openPendingDeliverySheet();
       return;
     }

     if (succeededItems.length > 0) {
       const successText = succeededItems
         .map(item => `- ${item.name || item.productId}`)
         .join("\n");
       const failureText = failedItems
         .map(({ item, error }) =>
           `- ${item.name || item.productId}: ${error}`
         )
         .join("\n");

       showToast(
         `${t("createPendingPartialSuccess", "สร้างสำเร็จ:")}\n${successText}\n\n${t("createPendingPartialFailed", "สร้างไม่สำเร็จ:")}\n${failureText}`,
         "warning",
         7000
       );

       closeOverlay(
         bulkPendingDeliverySheet
       );

       openPendingDeliverySheet();
       return;
     }

     showToast(
       t("createPendingFailed", "สร้างรายการไม่สำเร็จ") + "\n" +
         failedItems
           .map(({ item, error }) =>
             `- ${item.name || item.productId}: ${error}`
           )
           .join("\n"),
       "error",
       7000
     );

   } finally {
     state.admin.isSubmitting = false;
     safeHideLoading();
   }
 }

function openCreatePendingDelivery(
  orderId,
  poNumber,
  productId,
  maxQty
) {

const orderedQty = Number(maxQty) || 0;
const existingOpenQty = (
  Array.isArray(state.admin.pendingDeliveries)
    ? state.admin.pendingDeliveries
    : []
)
  .filter(item =>
    String(item.status || "").toUpperCase() === "OPEN" &&
    String(item.orderId || "") === String(orderId || "") &&
    String(item.productId || "") === String(productId || "")
  )
  .reduce(
    (sum, item) =>
      sum + Math.max(0, Number(item.qty) || 0),
    0
  );
const remainingQty = Math.max(
  0,
  orderedQty - existingOpenQty
);

createPendingDeliverySheet.dataset.orderId =
  orderId;

createPendingDeliverySheet.dataset.poNumber =
  poNumber;

createPendingDeliverySheet.dataset.productId =
  productId;

   orderedQty;

    t("creatingPendingDelivery", "กำลังสร้างรายการค้างส่ง...")

      createPendingDeliverySheet.dataset.poNumber;

 const existingOpenQty = pendingDeliveries

   .reduce(

   );
 }
   
    const form = new URLSearchParams();

    );

    form.append(
      "orderId",
      orderId
    );

    form.append(
      "poNumber",
      poNumber || ""
    );

    form.append(
      "productId",
      productId
    );

 form.append(
   "orderedQty",
   orderedQty
 );
   
    form.append(
      "qty",
      qty
    );

    form.append(
      "note",
      note
    );

    const result =
      await postFormAction(form);

      throw new Error(
        result?.error ||

    }

 showToast(
   t("createPendingDeliverySuccess", "สร้างรายการค้างส่งเรียบร้อย"),
   "success"
 );

 closeOverlay(
   createPendingDeliverySheet
 );

 openPendingDeliverySheet();

  } catch (err) {

    console.error(err);

    showToast(
      err.message ||
        t("createPendingDeliveryError", "ไม่สามารถสร้างรายการค้างส่งได้"),

      5000
    );
} finally {

  }
