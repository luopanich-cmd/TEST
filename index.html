  --status-shipping-text: #64b5ff;

  --status-warehouse-bg: rgba(90,140,255,.18);

  --status-warehouse-border: rgba(90,140,255,.28);
  --status-out-bg: rgba(255,59,48,.15);
  --status-out-text: #ff6961;
  --status-out-border: rgba(255,59,48,.28);
  --status-pending-bg: rgba(255,214,10,.14);
  --status-pending-text: #ffd60a;
  --status-pending-border: rgba(255,214,10,.28);
  --status-approved-bg: rgba(52,199,89,.14);
  --status-approved-text: #63d471;
  --status-approved-border: rgba(52,199,89,.26);
  --status-rejected-bg: rgba(255,59,48,.14);
  --status-rejected-text: #ff6961;
  --status-rejected-border: rgba(255,59,48,.28);
  --status-neutral-bg: rgba(142,142,147,.14);
  --status-neutral-text: rgba(245,245,247,.82);
  --status-neutral-border: rgba(142,142,147,.24);

  /* ================= PHASE 3: TYPOGRAPHY / HIERARCHY ================= */
  --text-primary:   var(--text);
  --text-secondary: var(--text-soft);
  --title-size:     22px;
  --subtitle-size:  12.5px;
  --title-weight:   700;
  --subtitle-weight:500;
    
  /* ================= STEP 2: SHADOW/DEPTH TOKENS (UNIFIED) ================= */
  --shadow-card:            0 10px 34px rgba(0,0,0,.65);
  --shadow-control:         0 8px 22px rgba(0,0,0,.60);
  --shadow-image:           0 6px 18px rgba(0,0,0,.65);
  --shadow-header:          0 8px 32px rgba(0,0,0,.50);
  --shadow-header-scrolled: 0 16px 42px rgba(0,0,0,.65);
  --shadow-card-pressed:    0 6px 18px rgba(0,0,0,.55);
  --shadow-side:            -6px 0 24px rgba(0,0,0,.60);
  --shadow-floating:        0 10px 34px rgba(0,0,0,.60);
  --shadow-fab:             0 12px 34px rgba(0,0,0,.60);
  --shadow-canvas-card:     var(--shadow-card);
 
  /* legacy alias (keep old refs working + follow unified override) */
  --shadow-float:           var(--shadow-floating);  
   
   /* ================= STEP 1: INTERACTION TOKENS ================= */
   /* Tap scale */
   --tap-scale-primary: .97;   /* primary / confirm */
   --tap-scale-icon:    .95;   /* icon circle buttons */
   --tap-scale-card:    .98;   /* cards should feel heavier */

   /* Motion tokens */
   --motion-duration-fast: 140ms;
   --motion-duration-normal: 300ms;
   --motion-duration-slow: 360ms;
   --motion-duration-toast: 220ms;
   --motion-ease-standard: cubic-bezier(.22,.61,.36,1);
   --motion-ease-emphasized: cubic-bezier(.2,.8,.2,1);

   /* Legacy aliases */
   --dur-tap:   var(--motion-duration-fast);
   --dur-sheet: var(--motion-duration-normal);
   --dur-chrome:var(--motion-duration-slow);

   --ease-tap:   var(--motion-ease-emphasized);
   --ease-out:   var(--motion-ease-standard);
   --ease-chrome:var(--motion-ease-standard);
 }

 html, body {
   margin: 0;
   padding: 0;
   width: 100%;
   max-width: 100%;
   overflow-x: hidden;
   font-family: -apple-system, BlinkMacSystemFont, sans-serif;
   background: var(--bg);
   color: var(--text);
   color-scheme: var(--theme-color-scheme);
   height: 100%;
   min-height: 100%;
 }

  body{
   min-height: 100dvh;
  }
  
  header{
  padding:
    calc(env(safe-area-inset-top, 0px) + 14px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    12px
    calc(env(safe-area-inset-left, 0px) + 16px);
  font-size: inherit;
  font-weight: inherit;

  /* 🔹 Visual */
  background: var(--header-bg); /* 🔴 CHANGED: dark glass */
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-bottom: 1px solid var(--header-border); /* 🔴 CHANGED: subtle dark divider */

  box-shadow:
    var(--shadow-header),
    inset 0 -1px 0 var(--header-border); /* 🔴 CHANGED: reduce white glow */

  /* 🔹 Position */
  position: sticky;
  top: 0;
  z-index: 50;

  /* 🔹 Layout (สำคัญ) */
  display: flex;
  justify-content: space-between;
  align-items: center;

  /* 🔴 FIX สำคัญ */
  min-height: 96px; /* compact but still supports search + filter */
  box-sizing: border-box;

  transition:
    padding var(--dur-chrome) var(--ease-chrome),
    min-height var(--dur-chrome) var(--ease-chrome),
    background var(--dur-chrome) ease,
    box-shadow var(--dur-chrome) ease;
}

header.scrolled{
  padding:
    calc(env(safe-area-inset-top, 0px) + 10px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    8px
    calc(env(safe-area-inset-left, 0px) + 16px);
  min-height: 64px;
  background: var(--header-bg-scrolled); /* 🔴 CHANGED: darker when scrolled */
  box-shadow:
    var(--shadow-header-scrolled),
    inset 0 -1px 0 var(--header-border-strong); /* 🔴 CHANGED: subtle inner edge */
}
  
/* ================= SHOP TITLE GLOW ================= */
.shop-title,
.admin-title{
  font-weight: var(--title-weight);
  font-size: var(--title-size);
  letter-spacing: .15px;
  color: var(--text-primary);

  display: inline-flex;
  align-items: center;
  padding: 6px 11px;
  border-radius: 999px;
  position: relative;
  overflow: hidden;
  isolation: isolate; /* 🔴 FIX: กัน layer เพี้ยน */

  /* 🔴 CHANGED: dark glass base */
  background: var(--surface-glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  /* 🔴 CHANGED: softer dark-depth inner rim */
  box-shadow:
    var(--shadow-control),
    inset 0 1px 0 var(--inner-highlight),
    inset 0 -1px 0 var(--header-border);

  /* 🔴 CHANGED: remove white glow feeling */
  text-shadow: 0 1px 0 rgba(0,0,0,.35);

  z-index: 0;
}

/* ✅ Glass highlight (top-left glare) */
.shop-title::before,
.admin-title::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0; /* 🔴 FIX: ไม่ใช้ -1 */
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.20) 0%,
      rgba(255,255,255,.10) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.55;
  pointer-events:none;
  mix-blend-mode: screen;
}

body[data-theme="cute"] .shop-title,
body[data-theme="cute"] .admin-title{
  color: var(--text);
  text-shadow: none;
  background: var(--surface-glass);
  border-color: var(--border-strong);
}

body[data-theme="cute"] .shop-title::before,
body[data-theme="cute"] .admin-title::before{
  opacity:.28;
  mix-blend-mode: normal;
}

body[data-theme="cute"] .shop-subtitle{
  color: var(--muted);
  opacity: 1;
  text-shadow: none;
}

/* PHASE 3: Supporting line under title */
.shop-subtitle{
  margin-top: 4px;
  font-size: var(--subtitle-size);
  font-weight: var(--subtitle-weight);
  color: var(--text-secondary);
  letter-spacing: .2px;
}

/* ================= PHASE 3: HEADER HIERARCHY LAYOUT ================= */
.header-left{
  flex: 1;
  min-width: 0;
}
.header-stack{
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.header-actions{
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 10px;
}  
  
/* ================= ADMIN TITLE (only delta) ================= */
 .admin-title{
   /* 🔴 CHANGED: ให้เหมือน shop-title 100% → ไม่ดันซ้ายด้วย margin */
   margin-left: 0;
 }

    color:var(--primary-text);
  border-radius:999px;
  padding:3px 10px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.2px;
  background: var(--primary);
  border: 1px solid var(--border-strong);
  box-shadow:
    0 10px 24px rgba(0,0,0,.14),
    inset 0 1px 0 rgba(255,255,255,.35);
  margin-left:8px;
  flex-shrink:0;   
  }

  .badge-count{
    background:#d70015;
  }
  .container{padding:12px 16px 16px;display:grid;gap:16px;}

.section-title{
  margin: 18px 0 10px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .1px;
  color: var(--text);
}

.text-muted,
.helper-text{
  color: var(--muted);
}

.helper-text{
  font-size: 13px;
  line-height: 1.45;
}

.empty-state{
  margin-top: 24px;
  text-align: center;
  color: var(--muted);
  line-height: 1.45;
}

.action-row{
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.pagination{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-top:8px;

.pagination-info{

  font-size:14px;

}

  padding:14px;

  box-shadow: var(--shadow-card);
  }

  }

  }

  .partner-order-source-badge{
    display:grid;
    gap:4px;
    margin-top:8px;
    padding:10px 12px;
    border-radius:14px;

    line-height:1.45;
  }

  }

    margin-top:14px;

    border-radius:16px;

  }

    color:var(--text);
    font-size:15px;
    font-weight:700;
  }

  .admin-item-list{
    display:grid;
    gap:10px;
  }

    align-items:flex-start;

  }

  .info-card{
    margin-top:12px;

    gap:12px;
  }

    display:grid;

  }

  .info-label{

  .name{
  font-weight:600;
  line-height:1.35;

  display:-webkit-box;
  -webkit-line-clamp:2;      /* จำกัด 2 บรรทัด */
  -webkit-box-orient:vertical;

  overflow:hidden;
  word-break:break-word;
}

 .price{
  margin-top:4px;

  font-weight:700;
  letter-spacing:.15px;

  background:
    linear-gradient(
      135deg,
      #4da3ff 0%,
      #78b8ff 45%,
      #b9d8ff 100%
    );

  -webkit-background-clip:text;
  background-clip:text;

  -webkit-text-fill-color:transparent;
  color:transparent;

  text-shadow:
    0 0 12px rgba(77,163,255,.18);
}
 
  .stock{font-size:14px;color:var(--text-soft);}

  .backdrop{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.25);
  backdrop-filter: blur(2px);
  display: none;
  z-index: 100;
}

.sheet{
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  background: var(--sheet-bg);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 22px 22px 0 0;
  box-shadow: var(--shadow-float);

  padding:
    16px
    max(16px, env(safe-area-inset-right, 0px))
    calc(24px + env(safe-area-inset-bottom, 0px))
    max(16px, env(safe-area-inset-left, 0px));

  max-height: calc(100dvh - max(24px, env(safe-area-inset-top, 0px)));
  overflow-y: auto;
  overscroll-behavior: contain;
  scroll-padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
  -webkit-overflow-scrolling: touch;
  box-sizing: border-box;

  transform: translate3d(0, 100%, 0);
  opacity: 0;
  transition:
    transform var(--dur-sheet) var(--ease-out),
    opacity var(--motion-duration-fast) var(--motion-ease-standard);
  will-change: transform, opacity;
  backface-visibility: hidden;

  z-index: 101;
}

.sheet.show{
  transform: translate3d(0, 0, 0);

/* ================= BASE INPUT (NEUTRAL) ================= */
input,
select {
  width: 100%;
  box-sizing: border-box;
  outline: none;
  font-family: inherit;
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}

/* 🔴 NEW: textarea base style (Light mode fix) */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
}
  
input::placeholder,
textarea::placeholder {
  color: var(--placeholder);                 /* 🔴 FIX: placeholder ไม่จางเกินไป */
}  

input:focus,
select:focus {
  border-color: var(--focus-color);
}

/* ================= STEP 3: FORM CONSISTENT ================= */

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.form-group label {
  font-size: 13px;
  color: var(--text-soft);
}

/* ================= FORM INPUT (UNIFIED) ================= */

/* ทุก input / select ใน form + กัน iOS zoom */
.form-group input,
.form-group select {
  width: 100%;
  height: 44px;
  padding: 10px 12px;

  font-size: 16px;          /* 🔴 FIX iOS ZOOM */
  line-height: 1.2;

  border-radius: 12px;
  border: 1px solid var(--border);
  box-sizing: border-box;
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit;
}

/* number ต้องเหมือน text (iOS / Android) */
.form-group input[type="number"] {
  appearance: textfield;
  -moz-appearance: textfield;
}

/* focus state */
.form-group input:focus,
.form-group select:focus {
  border-color: var(--focus-color);
  outline: none;
}

  /* ✅ เพิ่มตรงนี้ */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

 .btn-remove{
  min-width:44px;
  min-height:44px;
  padding:6px 12px;
  border-radius:10px;
  background:#d70015;
  color:#fff;
  border:none;

  font-size:13px;
  font-weight:600;
  line-height:1;

  cursor:pointer;
 }
  /* ✅ เพิ่มตรงนี้ */
.btn-remove:active {
  transform: scale(var(--tap-scale-icon));
}

/* interaction: use .btn:active as single source of truth */
  
/* ================= BUTTON SYSTEM ================= */

.btn {
  padding: 12px;
  min-height: 44px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition:
    transform var(--dur-tap) var(--ease-tap),
    box-shadow var(--dur-tap) ease,
    filter var(--dur-tap) ease;
}

/* Primary */
.btn-primary {
  background: var(--primary);
  color: var(--primary-text);
}

/* Secondary / neutral utility */
.btn-secondary {
  background: var(--secondary);
  color: var(--text);
  border: 1px solid var(--border);
}

/* Success / completed action */
.btn-success {
  background: var(--success);
  color: var(--primary-text);
}

/* Outline / low-emphasis action */
.btn-outline {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border-strong);
}

/* Danger (logout / destructive) */
.btn-danger{
  background:var(--danger);
  color:var(--primary-text);
}
.btn-danger:active{
  transform: scale(var(--tap-scale-primary));
}

/* Interaction */
.btn:active {
  transform: scale(var(--tap-scale-primary));
  filter: brightness(.96);
  box-shadow: var(--shadow-card-pressed);
}

.btn.is-submitting{
  filter: saturate(.9) brightness(.92);
  cursor: wait;
  box-shadow: var(--shadow-card-pressed);
}

/* ================= HEADER SEARCH (iOS-LIKE) ================= */
.viewer-search-wrap{
   margin-top:4px;
   max-width:100%;
 }  

.search-wrap {
  display: flex;
  align-items: center;
  position: relative;
  max-width: 100%;
  min-width: 0;          /* 🔴 กันดัน layout */
  overflow: visible;     /* ✅ ให้เงาปุ่มวงกลมไม่โดนตัดเป็นเหลี่ยม */
}

.search-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;

  /* ✅ Match filter/menu: Apple-nimble glass */
  background: var(--surface-glass);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  box-shadow: var(--shadow-control);
  cursor: pointer;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;
}

/* ✅ Glass highlight (same language as filter/menu) */
.search-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
.search-btn::after{
  content:none;
}
.search-btn > *{ position: relative; z-index: 2; }
  
.search-btn:active {
  transform: scale(var(--tap-scale-icon));
  background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
}

@media (hover:hover){
  .search-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
.search-input {
   width: 0;             /* 🔴 สำคัญ: ตอนยังไม่ active ต้องไม่กินพื้นที่ */
   opacity: 0;
   margin-left: 0;
   height: 44px;
   padding: 0;

   font-size: 16px;
   border-radius: 12px;
   border: 0;

   background: var(--surface-2);
   color: var(--text);
   backdrop-filter: blur(14px);

  pointer-events: none;

  transform: translateX(-6px) scaleX(.6);
  transform-origin: left center;

  transition:
    opacity .18s ease,
    transform .45s cubic-bezier(.34,1.56,.64,1),
    width .35s ease,
    margin-left .35s ease,
    padding .35s ease;
}

/* 🔥 ACTIVE STATE */
.search-wrap.active .search-input {
  opacity: 1;
  transform: translateX(0) scaleX(1);
  pointer-events: auto;
  width: min(210px, calc(100vw - 176px)); /* compact mobile width without pushing filter+menu */
  margin-left: 6px;
  padding: 8px 12px;
  border: 1px solid var(--border);
}

/* 🔹 subtle focus glow (iOS feel) */
.search-input:focus {
  border-color: var(--focus-color);
  box-shadow:
    var(--focus-ring);
  outline: none;
}

/* ✅ STEP 3+4: SVG icon (monochrome) */
.icon-sf{
  width: 18px;
  height: 18px;
  display: block;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;

}

.filter-btn{
   width:44px;

   border-radius:50%;
   border:none;
   position: relative;          /* ✅ needed for glass layers */

  background: var(--surface-glass);
  backdrop-filter: blur(16px) saturate(170%);

   cursor:pointer;
   color: var(--text);

   transition:
     transform var(--dur-tap) var(--ease-tap),

  border: 1px solid var(--border);

 }

}

 .filter-btn:active{

 /* ================= PRODUCT INFO SHEET (DETAILS) ================= */

 .status.ready{

/* พร้อมส่ง */
.status.ready::before{
  content:"";

  display:inline-block;

  width:6px;
  height:6px;

  margin-right:6px;

  border-radius:50%;

  background: var(--status-ready-dot);

  box-shadow:
    0 0 8px var(--status-ready-border);

}

@keyframes pulse{
  0%{
    transform:scale(1);
    opacity:1;

  50%{
    transform:scale(1.2);
    opacity:.8;
  }

  100%{
    transform:scale(1);
    opacity:1;

 .status.ready_plus {

 }

/* ================= SIDE ADMIN MENU ================= */
.side-menu {
  position: fixed;
  top: 0;
  right: 0;

  width: min(65vw, 260px);
   /* ✅ ลดลงอีกนิด กำลังพอดี */
  height: 100dvh;
  max-height: 100dvh;

  background: var(--side-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: var(--shadow-side);

  z-index: 102;
  padding:
    calc(env(safe-area-inset-top, 0px) + 16px)
    max(16px, env(safe-area-inset-right, 0px))
    calc(env(safe-area-inset-bottom, 0px) + 24px)
    16px;
  box-sizing:border-box;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;

  transform: translate3d(100%, 0, 0);
  opacity: 0;
  transition:
    transform var(--dur-sheet) var(--ease-out),
    opacity var(--motion-duration-fast) var(--motion-ease-standard);
  will-change: transform, opacity;
  backface-visibility: hidden;
}

.side-menu.show {
  transform: translate3d(0, 0, 0);
  opacity: 1;
}

.sheet.stock-menu-return-side {
  position: fixed;
  inset: 0 0 auto auto;
  left: auto;
  width: min(65vw, 260px);
  max-width: none;
  height: 100dvh;
  max-height: 100dvh;
  border-radius: 0;
  padding:
    calc(env(safe-area-inset-top, 0px) + 16px)
    max(16px, env(safe-area-inset-right, 0px))
    calc(env(safe-area-inset-bottom, 0px) + 24px)
    16px;
  background: var(--side-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: var(--shadow-side);
  box-sizing: border-box;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  scroll-padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  transform: translate3d(100%, 0, 0);
  transition:
    transform var(--dur-sheet) var(--ease-out),
    opacity var(--motion-duration-fast) var(--motion-ease-standard);
  z-index: 102;
}

.sheet.stock-menu-return-side.show {
  transform: translate3d(0, 0, 0);
  opacity: 1;
}

.stock-menu-return-side .side-menu-topbar{
  top:calc(-16px - env(safe-area-inset-top, 0px));
}

.side-menu-topbar{
  position:sticky;
  top:calc(-16px - env(safe-area-inset-top, 0px));
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:
    calc(-16px - env(safe-area-inset-top, 0px))
    -16px
    16px;
  padding:
    calc(env(safe-area-inset-top, 0px) + 12px)
    16px
    12px;
  background:var(--side-bg);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid var(--border);
}

.side-menu .side-menu-topbar h3{
  margin:0;
}

/* ================= TOAST SYSTEM (GLOBAL FEEDBACK) ================= */

#toast-container {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 24px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 3000;

  display: flex;
  flex-direction: column;
  gap: 8px;

  pointer-events: none; /* 🔒 ไม่บัง interaction */
}

.toast {
  min-width: 260px;
  max-width: 90vw;
  padding: 12px 16px;

  border-radius: 14px;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  white-space: pre-line;

  box-shadow: var(--shadow-float);              /* 🔴 ใช้ token เดียวกับระบบ */

  backdrop-filter: blur(18px) saturate(160%);   /* 🔴 เพิ่ม glass */
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  animation: toast-slide-down var(--motion-duration-toast) var(--motion-ease-standard);
  transform-origin: top center;
}

/* ===== Toast Variants ===== */
.toast.success { background: rgba(52,199,89,.92); }
.toast.error   { background: rgba(255,59,48,.92); }
.toast.warning { background: rgba(255,159,10,.92); }
.toast.info    { background: rgba(0,122,255,.92); }

/* ===== Animation (namespaced) ===== */
@keyframes toast-slide-down {
  from {
    opacity: 0;
    transform: translateY(-8px) scale(.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.hidden {
  display: none;
}

#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: loading-fade-in var(--motion-duration-fast) var(--motion-ease-standard);
}

#loading-overlay.hidden {
  display: none !important;
}

.loading-box {
  background: var(--sheet-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 20px 24px;
  border-radius: 12px;
  box-shadow: var(--shadow-float);
  text-align: center;
  min-width: 200px;
  animation: loading-pop var(--motion-duration-normal) var(--motion-ease-standard);
}

@keyframes loading-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes loading-pop {
  from {
    opacity: 0;
    transform: translateY(6px) scale(.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.skeleton-list{
  display:grid;
  gap:16px;
}
.skeleton-card{
  height:104px;
  border-radius:16px;
  background: var(--surface-glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  box-shadow: var(--shadow-card);
  position: relative;
  overflow:hidden;
}
.skeleton-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,.16) 45%,
      rgba(255,255,255,0) 90%);
  transform: translateX(-120%);
  animation: shimmer 1.15s infinite;
}
.skeleton-row{
  display:flex;
  gap:12px;
  padding:12px;
}
.skeleton-thumb{
  width:80px;height:80px;border-radius:12px;
  background: var(--surface-2);
  flex-shrink:0;
}
.skeleton-lines{flex:1;display:flex;flex-direction:column;gap:10px;padding-top:6px;}
.skeleton-line{
  height:12px;border-radius:999px;
  background: var(--surface-2);
}
.skeleton-line.w70{width:70%}
.skeleton-line.w45{width:45%}
.skeleton-line.w30{width:30%}

@keyframes shimmer{
  to { transform: translateX(120%); }
}
  
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,.18);
  border-top-color: rgba(255,255,255,.82);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

 /* ================= QTY INPUT (CART / ADD TO CART) ================= */

 /* wrapper เฉพาะช่องจำนวน */
 .qty-input {
   position: relative;
 }

 /* input number สำหรับจำนวน */
 .qty-input input[type="number"] {
   height: 52px;                    /* สูงขึ้น → ดูเป็น control */
   padding: 12px 44px;              /* เผื่อพื้นที่ icon */
   text-align: center;              /* จำนวนต้องอยู่กลาง */

   font-size: 18px;
   font-weight: 600;

   border-radius: 16px;
   border: 1px solid var(--border);
   background: var(--surface-2);
   color: var(--text);
   backdrop-filter: blur(6px);

   box-shadow:
     inset 0 1px 2px rgba(0,0,0,.05),
     var(--shadow-control);

   transition: box-shadow .2s ease, border-color .2s ease;
 }

 /* focus = glow */
 .qty-input input[type="number"]:focus {
   border-color: var(--focus-color);
   box-shadow:
     var(--focus-ring),
     inset 0 1px 2px rgba(0,0,0,.05);
 }

 /* ซ่อน spin button เดิม */
 .qty-input input[type="number"]::-webkit-inner-spin-button,
 .qty-input input[type="number"]::-webkit-outer-spin-button {
   -webkit-appearance: none;
   margin: 0;
 }

/* ================= FLOATING BOTTOM BAR ================= */

/* 🔴 CHANGED: Clean + deterministic cascade (กัน opacity สลับทิศ) */
#floatingBar{
  position: fixed !important;
  left: 16px;
  right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 18px) !important;
  max-width: 520px;
  margin: 0 auto;

  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 18px;

  background: var(--sheet-bg);
backdrop-filter: blur(36px) saturate(220%);
-webkit-backdrop-filter: blur(36px);

border: 1px solid var(--border-strong);
  box-shadow:
    var(--shadow-floating),
    inset 0 1px 0 var(--inner-highlight);
  color: var(--text);

  z-index: 999;

  /* default = hidden */
  transform: translateY(120%);
  opacity: 0;
  pointer-events: none;
  visibility: hidden;            /* 🔍 FIX: บังคับซ่อนจริง (กัน opacity ค้าง) */
  
  transition:
    transform .48s cubic-bezier(.34,1.56,.64,1),
    opacity .3s ease;
  will-change: transform, opacity;
}

/* ✅ Cart bar text readability (เฉพาะ floatingBar) */
#floatingBar .bar-left{
  min-width: 0;
}
#floatingBar .bar-subtext{
  font-size: 13px;
  color: var(--text-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

#floatingBar .cart-badge{
  position:absolute;
  top:-8px;
  right:12px;
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#e53935;
  color:#fff;
  font-size:11px;
  font-weight:900;
  line-height:1;
  box-shadow:0 8px 18px rgba(229,57,53,.32);
  border:2px solid var(--surface);
  pointer-events:none;
}

#floatingBar .cart-badge.cart-badge-pop{
  animation:cart-badge-pop var(--motion-duration-normal) var(--motion-ease-emphasized);
}

@keyframes cart-badge-pop{
  0%   { transform:scale(.72); }
  55%  { transform:scale(1.22); }
  100% { transform:scale(1); }
}

#floatingBar.bounce-in{
  animation: float-bounce .65s cubic-bezier(.34,1.56,.64,1);
}
#floatingBar.cart-added-pulse{
  animation: cart-added-pulse var(--motion-duration-normal) var(--motion-ease-emphasized);
}
@keyframes float-bounce{
  0%   { transform:translateY(120%) scale(.94); }
  60%  { transform:translateY(-6px) scale(1.02); }
  100% { transform:translateY(0) scale(1); }
}
@keyframes cart-added-pulse{
  0%   { transform:translateY(0) scale(1); }
  45%  { transform:translateY(-2px) scale(1.018); }
  100% { transform:translateY(0) scale(1); }
}

#floatingBar .total-animate{ animation: total-pop .25s ease; }
@keyframes total-pop{
  0%   { transform:scale(.92); opacity:.6; }
  100% { transform:scale(1); opacity:1; }
}

/* ✅ SHOW = only show */
 #floatingBar.show{
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
  visibility: visible; /* 🔴 FIX: เพราะ default ตั้ง hidden ไว้ */ 
 }

/* ✅ HIDE (scroll) */
#floatingBar.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

/* ✅ HIGHEST PRIORITY: show + scroll-hide must hide */
#floatingBar.show.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}
  
#floatingBar:active{
  transform: translateY(0) scale(.98);
}
  
/* 🔴 NEW: เมื่อมี sheet เปิดอยู่ → ให้ floatingBar ซ่อน */
.sheet.show ~ #floatingBar{
  opacity: 0 !important;
  transform: translateY(20px) !important;
  pointer-events: none !important;
  visibility: hidden !important; /* 🔴 FIX: ซ่อนแบบ deterministic */
}  
  
 /* ================= REDUCED MOTION SUPPORT ================= */
 @media (prefers-reduced-motion: reduce){

   /* 🔴 Disable global transitions */
   * {
     transition: none !important;
     animation: none !important;   /* 🔴 ADD */
   }

   /* 🔴 Disable product card motion */
   .product-card{
     transition: none !important;
   }

   .product-card:hover{
     transform: none !important;
     box-shadow: var(--shadow-card) !important;
   }

   .product-card:active{
     transform: none !important;
   }

   /* 🔴 Disable floating bar animations */
   #floatingBar,
   #floatingBar.bounce-in,
   #floatingBar.cart-added-pulse{
     transition: none !important;
     animation: none !important;
   }

   #floatingBar .total-animate{
     animation: none !important;
   }

   #floatingBar .cart-badge.cart-badge-pop{
     animation: none !important;
   }

   /* 🔴 Disable toast slide animation */
   .toast{
     animation: none !important;
   }

   /* 🔴 Disable spinner rotation */
   .spinner{
     animation: none !important;
   }
 }

/* ================= BACK TO TOP (FLOAT) ================= */
.btnTop{
  position: fixed;
  left: 50%;
  bottom: calc(env(safe-area-inset-bottom) + 84px); /* ✅ ลอยเหนือ floatingBar */
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  z-index: 46; /* ✅ สูงกว่า floatingBar (45) แต่ต่ำกว่า backdrop (100) */

  /* iOS glass */
  background: var(--surface-glass);
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  border: 1px solid var(--border);
  box-shadow:
    var(--shadow-fab),
    inset 0 1px 0 var(--inner-highlight);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;

  opacity: 0;
  transform: translateX(-50%) translateY(10px) scale(.96);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}
.btnTop.show{
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
  pointer-events: auto;
}
.btnTop:active{
  transform: translateX(-50%) translateY(1px) scale(.97);
}

const MOTION = Object.freeze({
  CARD_ENTRANCE_LIMIT: 24,
  CARD_STAGGER_MS: 18,
  DURATION_NORMAL_MS: 260,
  EASING_STANDARD: "cubic-bezier(.22,.61,.36,1)"
});

function isReducedMotion() {
  return !!(
    window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches
  );
}

function replayMotionClass(el, className, duration = MOTION.DURATION_NORMAL_MS) {
  if (!el || !className || isReducedMotion()) return;
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
  window.setTimeout(() => el.classList.remove(className), duration + 80);
}

function escapeHtml(value = "") {

}

// 🔴 ADDED: หา SKU ถัดไปจาก state.products เช่น A001 -> A002
function getNextProductId(currentValue = "") {
  const raw = String(currentValue || "").trim().toUpperCase();

  // ใช้ prefix จากค่าปัจจุบันก่อน เช่น A001 => A
  // ถ้าไม่มี ให้ fallback จากสินค้าที่มีอยู่ หรือใช้ "A"
  let prefix = "";
  const currentMatch = raw.match(/^([A-Z]+)(\d+)$/);
  if (currentMatch) {
    prefix = currentMatch[1];
  }

  const productIds = Array.isArray(state.products)
    ? state.products
        .map(p => String(p.productId || "").trim().toUpperCase())
        .filter(Boolean)
    : [];

  if (!prefix) {
    const lastMatch = [...productIds]
      .reverse()
      .map(id => id.match(/^([A-Z]+)(\d+)$/))
      .find(Boolean);

    prefix = lastMatch ? lastMatch[1] : "A";
  }

  const samePrefixMatches = productIds
    .map(id => id.match(/^([A-Z]+)(\d+)$/))
    .filter(match => match && match[1] === prefix);

  let maxNum = 0;
  samePrefixMatches.forEach(match => {
    const num = Number(match[2]);
    if (Number.isFinite(num) && num > maxNum) {
      maxNum = num;
    }
  });

  const nextNum = maxNum + 1;
  return `${prefix}${String(nextNum).padStart(3, "0")}`;
}

  toast.textContent = message;
  toast.setAttribute("role", type === "error" ? "alert" : "status");
  toast.setAttribute("aria-live", type === "error" ? "assertive" : "polite");

  container.appendChild(toast);

  // 🔒 limit toast count (optional but pro)
  if (container.children.length > 3) {
    container.removeChild(container.firstChild);
  }

  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

// ---------- Central loading timer ----------
let _loadingTimer = null;
let _loadingShownAt = 0;
const MIN_LOADING_MS = 350; // กันกระพริบ

function showLoading(message, timeoutMs = 60000) {
  const overlay = document.getElementById("loading-overlay");
  const text = document.getElementById("loading-text");
  if (!overlay || !text) return;

  text.textContent = message;
  overlay.classList.remove("hidden");
  overlay.setAttribute("aria-hidden", "false");
  overlay.setAttribute("aria-busy", "true");

  // บังคับ render
  overlay.offsetHeight;

  _loadingShownAt = Date.now();
  state.ui.backdropLocked = true;
  if (backdrop) backdrop.style.display = "block";

  clearTimeout(_loadingTimer);
  _loadingTimer = setTimeout(() => {
    console.warn("[showLoading] auto-hide after timeout");
    safeHideLoading(true);
    showToast("การเชื่อมต่อล่าช้า ระบบยกเลิกแล้ว", "warning", 1800);
  }, timeoutMs);
}

/* ================= SAFE HIDE LOADING (SINGLE SOURCE OF TRUTH) ================= */
/**
 * ❗ IMPORTANT
 * - ต้องมี safeHideLoading แค่ตัวเดียวในระบบ
 * - ตัวนี้คือเวอร์ชันเดียวที่อนุญาตให้ใช้
 */

function safeHideLoading(fromTimeout = false) {
  const overlay = document.getElementById("loading-overlay");

  const elapsed = Date.now() - (_loadingShownAt || 0);
  const delay = Math.max(0, MIN_LOADING_MS - elapsed);

  setTimeout(() => {
    try {
      if (overlay) {
        overlay.classList.add("hidden");
        overlay.setAttribute("aria-hidden", "true");
        overlay.setAttribute("aria-busy", "false");
      }

      // 🔥 หัวใจ: เคลียร์ timer ของ showLoading
      if (_loadingTimer) {
        clearTimeout(_loadingTimer);
        _loadingTimer = null;
      }
      // 🔒 ปลด lock เฉพาะเมื่อไม่มี overlay เปิดอยู่ (กัน confirm/flow หลุด)
      if (state.ui.overlayCount === 0) {
        state.ui.backdropLocked = false;
      }

      if (state.ui.overlayCount === 0 && backdrop) {
        backdrop.style.display = "none";
      }

      console.log(
        "[safeHideLoading] loading closed",
        fromTimeout ? "(timeout)" : ""
      );

    } catch (e) {
      console.error("[safeHideLoading] failed", e);
    }
  }, delay);
}


// ---------- fetchWithTimeout ----------
async function fetchWithTimeout(input, init = {}, ms = 30000) {
  const controller = new AbortController();
  const signal = controller.signal;
  const id = setTimeout(() => controller.abort(), ms);

  try {
    const res = await fetch(input, { ...init, signal });

    // 🔒 เช็ค HTTP status ชัดเจน
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    return res;

  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error("การเชื่อมต่อช้าเกินไป กรุณาลองใหม่อีกครั้ง");
    }
    throw err;
  } finally {
    clearTimeout(id);
  }
}

   if (json?.error || json?.success === false) {

       showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
       exitAdmin({ silent: true });
     }
     throw new Error(json.message || json.error || "Request failed");
   }

   return json;
 }

// 🔒 Global HTML Escape (XSS Guard) — micro polish: escape &, <, >, ", '
 const esc = (s) =>
   String(s ?? "")
     .replace(/&/g, "&amp;")
     .replace(/</g, "&lt;")
     .replace(/>/g, "&gt;")
     .replace(/"/g, "&quot;")
     .replace(/'/g, "&#39;");

 // 🔒 Attribute-safe (สำหรับ src/alt/href)
 const escAttr = (s) => esc(s);

function toInlineJsStringLiteral(value) {
  return "'" + String(value ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "\\x22")
    .replace(/&/g, "\\x26")
    .replace(/</g, "\\x3C")
    .replace(/>/g, "\\x3E")
    .replace(/\r/g, "\\r")
    .replace(/\n/g, "\\n")
    .replace(/\u2028/g, "\\u2028")
    .replace(/\u2029/g, "\\u2029") + "'";
}

function getResolvedProductStatus(product) {
  const stockNum = Number(product?.stock);
  return stockNum <= 0
    ? "out"
    : String(product?.status || "ready").trim().toLowerCase();
}

function isViewerVariantProduct(product) {
  return !!(
    product &&
    String(product.parentProductId || "").trim() &&
    String(product.displayName || "").trim() &&
    String(product.variantType || "").trim().toLowerCase() === "size" &&
    String(product.variantValue || "").trim()
  );
}

function getVariantGroupKey(product) {
  return [
    String(product?.parentProductId || "").trim(),
    String(product?.displayName || "").trim(),
    String(product?.variantType || "").trim().toLowerCase()
  ].join("::");
}

function sortVariantsByOrder(variants) {
  return [...(variants || [])].sort((a, b) => {
    const aOrder = Number(a.variantSortOrder);
    const bOrder = Number(b.variantSortOrder);
    const safeA = Number.isFinite(aOrder) ? aOrder : 9999;
    const safeB = Number.isFinite(bOrder) ? bOrder : 9999;
    if (safeA !== safeB) return safeA - safeB;
    return String(a.variantValue || "").localeCompare(String(b.variantValue || ""));
  });
}

function buildViewerProductGroups(products) {
  const groups = new Map();
  const output = [];

  (Array.isArray(products) ? products : []).forEach(product => {
    if (!product || product.active === false) return;
    const resolvedStatus = getResolvedProductStatus(product);
    const safeProduct = { ...product, resolvedStatus };

    if (!isViewerVariantProduct(safeProduct)) {
      output.push(safeProduct);
      return;
    }

    const groupKey = getVariantGroupKey(safeProduct);
    if (!groups.has(groupKey)) {
      const group = {
        isVariantGroup: true,
        groupKey,
        parentProductId: String(safeProduct.parentProductId || "").trim(),
        displayName: String(safeProduct.displayName || safeProduct.name || "").trim(),
        variantType: "size",
        variants: [],
        image: "",
        resolvedStatus: "ready"
      };
      groups.set(groupKey, group);
      output.push(group);
    }

    groups.get(groupKey).variants.push(safeProduct);
  });

  groups.forEach(group => {
    group.variants = sortVariantsByOrder(group.variants);
    group.image = String(group.variants.find(item => item.image)?.image || "").trim();
    group.resolvedStatus = getVariantGroupResolvedStatus(group);
  });

  return output;
}

function getVariantGroupResolvedStatus(group) {
  const variants = group?.variants || [];
  if (!variants.length) return "out";
  const available = variants.find(variant => getResolvedProductStatus(variant) !== "out" && Number(variant.stock) > 0);
  return available ? getResolvedProductStatus(available) : "out";
}

function getVariantGroupPriceLabel(group) {
  const prices = (group?.variants || [])
    .map(variant => Number(variant.price))
    .filter(price => Number.isFinite(price));
  if (!prices.length) return "฿0";
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  return min === max
    ? `฿${min.toLocaleString()}`
    : `฿${min.toLocaleString()} - ฿${max.toLocaleString()}`;
}

function getVariantGroupTotalStock(group) {
  return (group?.variants || []).reduce((sum, variant) => sum + (Number(variant.stock) || 0), 0);
}

function getSelectedVariantFromGroup(group) {
  if (!group?.isVariantGroup) return null;
  const selectedId = state.viewerVariantSelections[group.groupKey];
  return group.variants.find(variant => String(variant.productId) === String(selectedId)) || null;
}

function getViewerVariantGroupByKey(groupKey) {
  return buildViewerProductGroups(state.products)
    .find(item => item.isVariantGroup && item.groupKey === groupKey) || null;
}

function getViewerVariantSummaryText(group, mode = "card") {
  const selectedVariant = getSelectedVariantFromGroup(group);
  const emptyText = mode === "detail"
    ? "เลือกไซส์: กรุณาเลือกไซส์ก่อน"
    : "กรุณาเลือกไซส์ก่อน";

  if (!selectedVariant) return emptyText;

  const value = selectedVariant.variantValue || "-";
  const productId = selectedVariant.productId || "-";
  const stock = Number(selectedVariant.stock) || 0;

  return mode === "detail"
    ? `เลือกไซส์: ${value} · SKU ${productId} · เหลือ ${stock}`
    : `เลือก: ${value} · SKU ${productId} · เหลือ ${stock}`;
}

function updateViewerVariantSelectionDom(groupKey) {
  const group = getViewerVariantGroupByKey(groupKey);
  if (!group) return;

  const selectedId = String(state.viewerVariantSelections[groupKey] || "");

  document.querySelectorAll("[data-variant-group-key]").forEach(container => {
    if (container.dataset.variantGroupKey !== groupKey) return;

    container.querySelectorAll("[data-variant-product-id]").forEach(button => {
      const isSelected = String(button.dataset.variantProductId || "") === selectedId;
      button.classList.toggle("selected", isSelected);
      button.setAttribute("aria-pressed", isSelected ? "true" : "false");
    });
  });

  document.querySelectorAll("[data-variant-selected-summary]").forEach(summary => {
    if (summary.dataset.variantSelectedSummary !== groupKey) return;
    summary.textContent = getViewerVariantSummaryText(
      group,
      summary.dataset.variantSummaryMode || "card"
    );
  });
}

function getViewerItemSearchText(item) {
  if (item?.isVariantGroup) {
    return [
      item.displayName,
      item.parentProductId,
      ...(item.variants || []).flatMap(variant => [
        variant.productId,
        variant.name,
        variant.variantValue,
        variant.displayName,
        variant.parentProductId
      ])
    ].join(" ").toLowerCase();
  }
  return [
    item?.name,
    item?.productId,
    item?.displayName,
    item?.parentProductId,
    item?.variantValue
  ].join(" ").toLowerCase();
}

function matchesViewerFilters(item) {
  const search = String(state.search || "").trim().toLowerCase();
  if (search && !getViewerItemSearchText(item).includes(search)) return false;

  const statusFilter = state.viewerFilter?.status || "all";
  if (statusFilter === "all") return true;

  if (item?.isVariantGroup) {
    return (item.variants || []).some(variant => getResolvedProductStatus(variant) === statusFilter);
  }
  return item.resolvedStatus === statusFilter;
}

function selectViewerVariant(groupKey, productId, event) {
  if (event) event.stopPropagation();
  state.viewerVariantSelections[groupKey] = productId;
  updateViewerVariantSelectionDom(groupKey);
}

function addVariantGroupToCart(groupKey, event) {
  if (event) event.stopPropagation();
  const group = buildViewerProductGroups(state.products)
    .find(item => item.isVariantGroup && item.groupKey === groupKey);
  const selected = getSelectedVariantFromGroup(group);
  if (!selected) {
    showToast("กรุณาเลือกไซส์ก่อน", "warning");
    return;
  }
  state.selectedProduct = selected;
  openQtySheet();
}

function openQtyForSelectedVariantFromDetail() {
  const group = state.selectedProduct;
  if (!group?.isVariantGroup) {
    openQtySheet();
    return;
  }
  const selected = getSelectedVariantFromGroup(group);

  }

}

function renderVariantSizeOptions(group) {

        const selectedClass = selected && String(selected.productId) === String(variant.productId) ? "selected" : "";
        return `
          <button
            type="button"

function canCopyViewerCostPrice() {
  return state.mode === "admin" && !!state.admin?.loggedIn;
}

function getViewerCopyProductTarget(product = state.selectedProduct) {
  if (!product) return null;

  if (product.isVariantGroup) {
    const selectedVariant = getSelectedVariantFromGroup(product);
    const fallbackVariant = product.variants?.[0] || {};
    if (selectedVariant) {
      return {
        ...selectedVariant,
        image: selectedVariant.image || product.image || fallbackVariant.image || ""
      };
    }

    return {
      name: product.displayName || fallbackVariant.name || "",
      productId: product.parentProductId || fallbackVariant.productId || "",
      stock: getVariantGroupTotalStock(product),
      image: product.image || fallbackVariant.image || "",
      costPrice: ""
    };
  }

  return product;
}

function getViewerCopyInfoValue(type) {
  const product = getViewerCopyProductTarget();

    },

    },

      label: "ราคาทุน",

  return map[type] || { label: "ข้อมูลสินค้า", value: "" };
}

function toggleViewerCopyInfoSection(event) {
  if (event) event.stopPropagation();
  const button = event?.currentTarget;
  const root = button?.closest(".viewer-copy-actions");
  if (!root) return;

  const panel = root.querySelector(".viewer-copy-panel");
  const expanded = !root.classList.contains("expanded");
  root.classList.toggle("expanded", expanded);
  if (panel) panel.hidden = !expanded;
  if (button) button.setAttribute("aria-expanded", expanded ? "true" : "false");
}

async function copyViewerProductInfo(type, event) {
  if (event) event.stopPropagation();

  if (type === "costPrice" && !canCopyViewerCostPrice()) {
    showToast("เฉพาะแอดมินเท่านั้นที่คัดลอกราคาทุนได้", "warning");
    return;
  }

  const { label, value } = getViewerCopyInfoValue(type);
  const text = String(value ?? "").trim();

  if (!text) {
    showToast(`ไม่มี${label}ให้คัดลอก`, "warning");
    return;
  }

  try {
    if (!navigator.clipboard?.writeText) {
      throw new Error("Clipboard API unavailable");
    }
    await navigator.clipboard.writeText(text);
    showToast(`คัดลอก${label}แล้ว`, "success");
  } catch (err) {
    showToast(`คัดลอก${label}ไม่สำเร็จ`, "error");
  }
}

function renderProducts(){
  const app = document.getElementById("app");

  const escapeHTML = (str="") =>
    String(str ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  
  // 🔒 GUARD สำคัญที่สุด
  if (!Array.isArray(state.products)) {
    console.error("renderProducts: products is not array", state.products);
    app.innerHTML = `
      <div role="alert" style="
        text-align:center;
        color:#d93025;
        margin-top:40px;
        font-size:15px;
      ">
        ไม่สามารถโหลดรายการสินค้าได้
      </div>
    `;
    return;
  }

  const filteredProducts = [];

  if (state.mode === "viewer") {
    buildViewerProductGroups(state.products)
      .filter(matchesViewerFilters)
      .forEach(item => filteredProducts.push(item));
  } else {
    state.products.forEach(p => {
      const resolvedStatus = getResolvedProductStatus(p);

      // 🔍 SEARCH FILTER (ชื่อ + รหัส)
      if (state.search) {
        const text = (p.name + p.productId).toLowerCase();
        if (!text.includes(String(state.search).toLowerCase())) return;
      }

      // 🔴 CHANGED: admin filter (ต้องอยู่หลัง resolvedStatus เสมอ)
      if (
        state.admin.filters &&
        state.admin.filters.status !== "all"
      ) {
        if (resolvedStatus !== state.admin.filters.status) return;
      }

      filteredProducts.push({
        ...p,
        resolvedStatus
      });
    });
  }

  const pageSize = Number(state.pagination?.pageSize) || 100;
  const totalItems = filteredProducts.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
  const safePage = Math.min(Math.max(1, Number(state.pagination?.page) || 1), totalPages);
  state.pagination.page = safePage;

  const startIndex = (safePage - 1) * pageSize;
  const pageItems = filteredProducts.slice(startIndex, startIndex + pageSize);

  app.innerHTML = "";
  let found = false;

  pageItems.forEach(p => {
    const statusMap = {
      ready:     "พร้อมส่ง",
      ready_plus:
        "พร้อมส่ง สามารถบวกเพิ่มได้",
      shipping:  "อยู่ระหว่างจัดส่ง",
      warehouse: "อยู่โกดังไทย",
      out:       "หมด"
    };
 
    const statusKey = p.isVariantGroup ? getVariantGroupResolvedStatus(p) : p.resolvedStatus;
    const allowedStatusClasses = new Set([
      "ready",
      "ready_plus",
      "shipping",
      "warehouse",
      "out"
    ]);
    const statusClass = allowedStatusClasses.has(statusKey)
      ? statusKey
      : "ready";
    let statusText  = statusMap[statusKey] || "พร้อมส่ง";

    /* ================= CARD ================= */
    const card = document.createElement("div");
    card.className = "product-card";
    card.setAttribute("role", "button");
    card.setAttribute("tabindex", "0");

    card.onclick = () => {
      if (state.mode === "admin") {
        openAdminProductAction(p);
      } else {
        openProduct(p);
      }
    };
    card.onkeydown = event => handleKeyboardActivation(event, card);

    if (p.isVariantGroup) {
      const selectedVariant = getSelectedVariantFromGroup(p);
      card.innerHTML = `
        <img class="thumb"
          src="${p.image ? escAttr(p.image) : "about:blank"}"
          alt="${escAttr(p.displayName)}"
          onerror="this.style.display='none'">

        <div class="info">
          <div class="name">${escapeHTML(p.displayName)}</div>
          <div class="sku">กลุ่ม: ${escapeHTML(p.parentProductId)}</div>
          <div class="price">ราคา: ${escapeHTML(getVariantGroupPriceLabel(p))}</div>
          <div class="variant-group-summary">
            เลือกไซส์ · สต็อกรวม ${getVariantGroupTotalStock(p)} ชิ้น
          </div>
          ${renderVariantSizeOptions(p)}
          ${
            selectedVariant
              ? `<div class="variant-selected-summary" data-variant-selected-summary="${escAttr(p.groupKey)}" data-variant-summary-mode="card">เลือก: ${escapeHTML(selectedVariant.variantValue || "-")} · SKU ${escapeHTML(selectedVariant.productId || "-")} · เหลือ ${Number(selectedVariant.stock) || 0}</div>`
              : `<div class="variant-selected-summary" data-variant-selected-summary="${escAttr(p.groupKey)}" data-variant-summary-mode="card">กรุณาเลือกไซส์ก่อน</div>`
          }
          <button class="btn btn-primary variant-add-btn" type="button"
            onclick="addVariantGroupToCart(${toInlineJsStringLiteral(p.groupKey)}, event)">
            เพิ่มลงตะกร้า
          </button>
        </div>
      `;
    } else {
      card.innerHTML = `
      <img class="thumb"
        src="${p.image ? escAttr(p.image) : "about:blank"}"
        alt="${escAttr(p.name)}"
        onerror="this.style.display='none'">

      <div class="info">
        <div class="name">${escapeHTML(p.name)}</div>
        <div class="sku">รหัส: ${escapeHTML(p.productId)}</div>
        ${renderAdminProductVariantMeta(p)}
        <div class="price">ราคา: ฿${Number(p.price).toLocaleString()}</div>

        <div class="meta">
          <span class="qty">จำนวน: ${Number(p.stock) || 0}</span>
          <span class="status ${statusClass}">
            ${statusText}
          </span>
        </div>
      </div>
    `;
    }

    app.appendChild(card);
    found = true;
  });

  // ❌ ไม่พบสินค้า
  if (!found) {
    const hasSearch = String(state.search || "").trim().length > 0;
    const activeFilter = state.mode === "admin"
      ? state.admin?.filters?.status
      : state.viewerFilter?.status;
    const hasFilter = activeFilter && activeFilter !== "all";
    const emptyMessage = hasSearch
      ? "ไม่พบสินค้าที่ค้นหา"
      : hasFilter
        ? "ไม่มีสินค้าที่ตรงกับตัวกรอง"
        : "ยังไม่มีสินค้าให้แสดง";

    app.innerHTML = `
      <div role="status" style="
        text-align:center;
        color:var(--muted);
        margin-top:40px;
        font-size:15px;
      ">
        ${emptyMessage}
      </div>
    `;
    return;   
  }

  if (totalItems > pageSize) {
    const pagination = document.createElement("div");
    pagination.className = "pagination";
    pagination.innerHTML = `
      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === 1 ? "disabled" : ""}
        onclick="changePage(-1)">
        ก่อนหน้า
      </button>

      <div class="pagination-info">
        หน้า ${safePage} / ${totalPages}
        <br>
        <span style="font-size:12px;color:var(--text-soft)">
          ${totalItems.toLocaleString()} รายการ
        </span>
      </div>

      <button
        class="btn btn-outline"
        style="width:auto;padding:10px 14px"
        ${safePage === totalPages ? "disabled" : ""}
        onclick="changePage(1)">
        ถัดไป
      </button>
    `;
    app.appendChild(pagination);
  }

  // Product card entrance is intentionally limited for mobile performance.
  if (!isReducedMotion()) {
    const cards = Array.from(document.querySelectorAll(".product-card"))
      .slice(0, MOTION.CARD_ENTRANCE_LIMIT);

    cards.forEach((card, index) => {
      card.animate(
        [
          {
            opacity: 0,
            transform: "translateY(10px)"
          },
          {
            opacity: 1,
            transform: "translateY(0)"
          }
        ],
        {
          duration: MOTION.DURATION_NORMAL_MS,
          delay: index * MOTION.CARD_STAGGER_MS,
          easing: MOTION.EASING_STANDARD,
          fill: "both"
        }
      );
    });
  }

}

function changePage(delta){
  const nextPage = (Number(state.pagination.page) || 1) + Number(delta || 0);
  if (nextPage < 1) return;

  state.pagination.page = nextPage;
  renderProducts();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

Object.assign(window, {
  changePage
});

function getCartItemImageUrl(item) {
  const existingImage = String(item?.image || "").trim();
  if (existingImage) return existingImage;

  const product = Array.isArray(state.products)

    : null;
  return String(product?.image || "").trim();
}

  return `

        src="${escAttr(imageUrl)}"

        onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';">

 let lastFocusTrigger = null;

 function rememberTrigger(el){
   if (el instanceof HTMLElement) lastFocusTrigger = el;
 }

 function restoreTriggerFocus(){
   if (lastFocusTrigger && typeof lastFocusTrigger.focus === "function") {
     lastFocusTrigger.focus();
   }
 }

 function syncExpanded(button, expanded){
   if (button) button.setAttribute("aria-expanded", String(!!expanded));
 }

 function focusFirstInteractive(container){
   if (!container) return;
   const first = container.querySelector(
     'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
   );
   (first || container).focus();
 } 
  
/* 🔍 viewer search toggle (เฉพาะ UI) */
function toggleViewerSearch(triggerEl){
  const wrap  = document.getElementById("viewerSearchWrap");
  const input = document.getElementById("viewerSearchInput");
  if(!wrap || !input) return;

  rememberTrigger(triggerEl || document.querySelector("#viewerSearchWrap .search-btn")); 
  const opened = wrap.classList.contains("active");

  if(opened){
    input.value = "";
    state.search = "";
    state.pagination.page = 1;
    state.viewerSearchOpen = false;
    renderProducts();
    wrap.classList.remove("active");
    syncExpanded(wrap.querySelector(".search-btn"), false);
    restoreTriggerFocus();   
  }else{
    state.viewerSearchOpen = true;
    wrap.classList.add("active");
    syncExpanded(wrap.querySelector(".search-btn"), true);   
    setTimeout(()=>input.focus(),80);
  }
}

/* 🔍 admin search toggle (ICON EXPAND) */

function toggleAdminSearch(triggerEl){
  const wrap = document.getElementById("adminSearchWrap");
  if (!wrap) return;

  rememberTrigger(triggerEl || wrap.querySelector(".search-btn")); 
  const opening = !wrap.classList.contains("active");

  wrap.classList.toggle("active");
  syncExpanded(wrap.querySelector(".search-btn"), opening);

  if (opening) {
    const input = wrap.querySelector("input");
    // 🕒 รอ animation เริ่มก่อน focus (iOS trick)
    setTimeout(() => input && input.focus(), 120);
   } else {
     restoreTriggerFocus();   
  }
}
  
function handleSearch(keyword){
  state.search = keyword.toLowerCase();
  state.pagination.page = 1;
  renderProducts();
}

function toggleFilterDropdown(triggerEl){
  const el = document.getElementById("filterDropdown");
  if(!el) return;

  const btn = triggerEl || document.querySelector(".filter-btn");
  rememberTrigger(btn);
  const isOpen = el.classList.contains("show");

  document.querySelectorAll(".filter-dropdown.show")
    .forEach(d => d.classList.remove("show"));
  document.querySelectorAll(".filter-btn[aria-expanded='true']")
    .forEach(b => syncExpanded(b, false));

  if(!isOpen){
    el.classList.add("show");
     syncExpanded(btn, true);
     setTimeout(() => focusFirstInteractive(el), 0);   

    // 🔴 auto close on outside click
    setTimeout(()=>{
      document.addEventListener("click", closeFilterOnOutside, { once:true });
    }, 0);
   } else {
     restoreTriggerFocus();   
  }
}

function closeFilterOnOutside(e){
  const wrap = document.querySelector(".filter-wrap");
  if(!wrap || wrap.contains(e.target)) return;

  const el = document.getElementById("filterDropdown");
  if(el) el.classList.remove("show");
   document.querySelectorAll(".filter-btn[aria-expanded='true']")
     .forEach(b => syncExpanded(b, false)); 
}

     .forEach(b => syncExpanded(b, false));

}

      "จำนวนสินค้าต้องเป็นจำนวนเต็มมากกว่า 0",

    );

  }

  // 🔒 GUARD: ห้ามเกิน stock
  const existing = state.cart.find(i => i.productId === p.productId);
  const currentQty = existing ? existing.qty : 0;

  if (currentQty + qty > Number(p.stock)) {

    // alert(`สินค้า "${p.name}" มีคงเหลือ ${p.stock} ชิ้น`);

async function submitChangePassword(btn){
  if (state.admin.isSubmitting) return;

  const currentPassword = document.getElementById("currentPassword")?.value || "";
  const newPassword = document.getElementById("newPassword")?.value || "";
  const confirmNewPassword = document.getElementById("confirmNewPassword")?.value || "";

  if (!currentPassword || !newPassword || !confirmNewPassword) {
    showToast("กรุณากรอกข้อมูลให้ครบ", "warning");
    return;
  }

  if (newPassword !== confirmNewPassword) {
    showToast("รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน", "warning");
    return;
  }

  if (newPassword.length < 4) {
    showToast("รหัสผ่านใหม่สั้นเกินไป", "warning");
    return;
  }

  state.admin.isSubmitting = true;
  if (btn) btn.disabled = true;

  try {
    const form = new URLSearchParams();
    form.append("action", "changePassword");
    form.append("token", state.admin.token);
    form.append("currentPassword", currentPassword);
    form.append("newPassword", newPassword);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success) {
      throw new Error(json.error || json.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ");
    }

    showToast("เปลี่ยนรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบใหม่", "success");
    exitAdmin();

  } catch (err) {
    console.error(err);
    showToast(err.message || "เปลี่ยนรหัสผ่านไม่สำเร็จ", "error");
  } finally {
    state.admin.isSubmitting = false;
    if (btn) btn.disabled = false;
  }
}

function toYmdLocal(value) {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return "";
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function formatThaiDate(value) {

  if (!value) return "-";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) {
    return String(value);
  }

  return d.toLocaleString(
    "th-TH",
    {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }
  );
}
 
function getOrderDateValue(order) {
  return (
    order?.createdAt ||
    order?.created_at ||
    order?.timestamp ||
    order?.date ||
    ""
  );
}
 

function isOrderInRange(order, fromYmd, toYmd) {
  const raw = getOrderDateValue(order);

 console.log(
   "ORDER DATE:",
   order.orderId,
   raw
 );
 
  if (!raw) return false;

  const d = new Date(raw);

 console.log(
   "PARSED:",
   order.orderId,
   d,
   Number.isNaN(d.getTime())
 ); 
 
  if (Number.isNaN(d.getTime())) return false;

  const orderYmd = toYmdLocal(d);
  if (fromYmd && orderYmd < fromYmd) return false;
  if (toYmd && orderYmd > toYmd) return false;
  return true;
}

function getDashboardProductCostMap() {
  return new Map(
    (Array.isArray(state.products) ? state.products : []).map(p => [
      String(p.productId || "").trim(),
      Number(p.costPrice || 0)
    ])
  );
}

function calculateDashboardSummary(orders) {
  const safeOrders = Array.isArray(orders) ? orders : [];
  const productCostMap = getDashboardProductCostMap();

  let totalSales = 0;
  let totalCost = 0;
  let totalProfit = 0;
  let totalQty = 0;

  safeOrders.forEach(order => {
    const items = Array.isArray(order.items) ? order.items : [];

    items.forEach(item => {
      const qty = Number(item.qty || 0);
      const sellPrice = Number(item.price || 0);
      const fallbackCost = productCostMap.get(String(item.productId || "").trim()) || 0;
      const costPrice = Number(
        item.costPrice ?? item.unitCost ?? fallbackCost
      );

      const lineSales = sellPrice * qty;
      const lineCost = costPrice * qty;

      totalSales += lineSales;
      totalCost += lineCost;
      totalProfit += (lineSales - lineCost);
      totalQty += qty;
    });
  });

  return {
    orderCount: safeOrders.length,
    totalQty,
    totalSales,
    totalCost,
    totalProfit
  };
}

async function openStockTimeline(force = false, options = {}) {
  // ❌ ต้องมี intent จริง
  if (!force && !allowOpenStockTimeline) return;

  // 🔐 session guard
  if (
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast("Session หมดอายุ กรุณา login ใหม่", "warning");
    exitAdmin();
    return;
  }

  if (!ensureAdminUiContext()) return;

  // 🔒 ใช้แล้วปิดทันที (กันเด้งซ้ำ)
  allowOpenStockTimeline = false;
  adminStockSheet.classList.remove("stock-menu-return-side");

  const targetSheet = adminStockSheet;
  const returnToAdminMenu = options.returnToAdminMenu === true;
  const backAction = returnToAdminMenu
    ? "closeStockTimelineToAdminMenu()"
    : "closeStockTimelineSheet()";
  const stockTimelineTitleId = "adminStockSheetTitle";

  closeOverlay(adminDashboardSheet);

  targetSheet.innerHTML = `
    <h3 id="${stockTimelineTitleId}">📦 ประวัติความเคลื่อนไหวสต๊อก</h3>
    <div class="loading">กำลังโหลด...</div>
  `;

  openOverlay(targetSheet);

  try {
    const logs = await fetchStockLogs();
    const safeLogs = Array.isArray(logs) ? logs : [];

    const money = (value) => `฿${Number(value || 0).toLocaleString("th-TH")}`;
    const esc = (value) => escapeHtml(value ?? "");   

    // ✅ ensure orders พร้อมใช้สำหรับ fallback ราคา/ยอดรวม
    if (!Array.isArray(state.admin.orders) || state.admin.orders.length === 0) {
      try {
        const freshOrders = await fetchOrders();
        state.admin.orders = Array.isArray(freshOrders) ? freshOrders : [];
      } catch (orderErr) {
        console.warn("openStockTimeline: preload orders failed", orderErr);
      }
    }
   
    // ✅ fallback ราคา/ยอดรวมจาก order จริง ถ้า stock log ไม่มีราคา
    const orderLookup = new Map(
      (Array.isArray(state.admin.orders) ? state.admin.orders : []).map(o => [
        String(o.orderId || "").trim(),
        o
      ])
    );   

    /* ================= GROUP ORDER OUT ================= */
    const orderMap = {};
    const singles = [];

 safeLogs.forEach(l => {
  const time = l.timestamp ? new Date(l.timestamp) : new Date();

  // ✅ ใช้ orderId จริงจาก sheet (fallback เผื่อของเก่า)
  const orderRef = l.orderId || l.ref || null;

  if (l.type === "OUT" && orderRef) {
    const matchedOrder = orderLookup.get(String(orderRef).trim());
    const matchedOrderItem = Array.isArray(matchedOrder?.items)
      ? matchedOrder.items.find(item =>
          String(item.productId || "").trim() === String(l.productId || "").trim()
        )
      : null;

    const fallbackSalePrice = Number(
      l.salePrice ??
      l.price ??
      matchedOrderItem?.price ??
      0
    );

    const fallbackLineTotal = Number(
      l.lineTotal ??
      (fallbackSalePrice * Math.abs(Number(l.qty || 0)))
    );
   
    if (!orderMap[orderRef]) {
      orderMap[orderRef] = {
        orderId: orderRef,
        time,
        by: l.by || "-",
        note: l.note || l.reason || "",
        totalSalesAmount: Number(matchedOrder?.total || 0),
        items: []
      };
    }

    if (!orderMap[orderRef].note && (l.note || l.reason)) {
      orderMap[orderRef].note = l.note || l.reason || "";
    }   

    // ใช้เวลาล่าสุดของ item ใน order เดียวกัน
    if (time.getTime() > orderMap[orderRef].time.getTime()) {
      orderMap[orderRef].time = time;
    }

    // ✅ ถ้า order.total ไม่มี ค่อยสะสมจากรายการย่อย
    if (!Number(orderMap[orderRef].totalSalesAmount)) {
      orderMap[orderRef].totalSalesAmount += fallbackLineTotal;
    }   

    orderMap[orderRef].items.push({
      productId: l.productId,
      productName: l.productName || l.name || matchedOrderItem?.name || "",
      image: l.image || matchedOrderItem?.image || "",
      qty: Math.abs(Number(l.qty || 0)),
      before: l.before,
      after: l.after,
      salePrice: fallbackSalePrice,
      lineTotal: fallbackLineTotal
    });
  } else {
    singles.push({
      ...l,
      _time: time
    });
  }
});

    /* ================= BUILD TIMELINE ================= */
    const timeline = [];

    Object.values(orderMap).forEach(o => {
      timeline.push({
        kind: "ORDER",
        type: "OUT",
        orderId: o.orderId,
        time: o.time,
        by: o.by,
        note: o.note || "",
        items: o.items,
        totalLines: o.items.length,
        totalQty: o.items.reduce((sum, item) => sum + Number(item.qty || 0), 0),
        totalSalesAmount: o.totalSalesAmount
      });
    });

    singles.forEach(l => {
      timeline.push({
        kind: "STOCK",
        type: l.type,
        productId: l.productId,
        productName: l.productName || l.name || "",
        image: l.image || "",
        qty: l.qty,
        before: l.before,
        after: l.after,
        time: l._time,
        by: l.by || "-",
        note: l.note || l.reason || ""
      });
    });

    // 🕒 latest first (safe)
    timeline.sort((a, b) => b.time.getTime() - a.time.getTime());

    /* ================= RENDER ================= */
    targetSheet.innerHTML = `
      <h3 id="${stockTimelineTitleId}">📦 ประวัติความเคลื่อนไหวสต๊อก</h3>

      <button class="btn btn-outline"
        style="width:100%;margin-bottom:12px"
        onclick="${backAction}">
        ← กลับ
      </button>

      ${
        timeline.length
          ? timeline.map((t, timelineIndex) => {

              if (t.kind === "ORDER") {
                const detailId = `stock-detail-${timelineIndex}`;
               
                return `
                  <div class="card">
                    <div class="timeline-tag tag-out">
                      🧾 ขายออก (ออเดอร์ ${esc(t.orderId)})
                    </div>

                    <div class="timeline-summary">
                      ${Number(t.totalLines) || 0} รายการ · ${Number(t.totalQty) || 0} ชิ้น · ${money(t.totalSalesAmount)}
                    </div>                    

                    ${t.items.map(i => `
                      <div class="timeline-product-row">
                        ${renderCartItemThumb({
                          productId: i.productId,
                          name: i.productName || i.productId || "สินค้า",
                          image: i.image || ""
                        })}
                        <div class="timeline-main">
                          <div class="timeline-row">
                            <strong>${esc(i.productId)}</strong>
                            ${i.productName ? ` — ${esc(i.productName)}` : ""}
                          </div>
                          <div class="timeline-row">
                            จำนวนที่เปลี่ยน: -${Number(i.qty || 0)}
                            ${
                              Number.isFinite(Number(i.before)) &&
                              Number.isFinite(Number(i.after))
                                ? `<span class="timeline-muted">
                                    · สต็อก ${Number(i.before)} → ${Number(i.after)}
                                  </span>`
                                : ""
                            }
                          </div>
                        </div>
                      </div>
                    `).join("")}

                    <div class="timeline-detail-wrap">
                      <button
                        type="button"
                        class="timeline-detail-toggle"
                        onclick="
                          const panel = document.getElementById(${toInlineJsStringLiteral(detailId)});
                          if (!panel) return;
                          panel.classList.toggle('show');
                          this.textContent = panel.classList.contains('show')
                            ? 'ซ่อนรายละเอียด'
                            : 'ดูรายละเอียดเพิ่มเติม';
                        "
                      >
                        ดูรายละเอียดเพิ่มเติม
                      </button>

                      <div id="${escAttr(detailId)}" class="timeline-detail-panel">
                        <div class="timeline-detail-meta">
                          ยอดรวมสินค้า: ${Number(t.totalLines) || 0} รายการ<br>
                          ยอดรวมจำนวนชิ้น: ${Number(t.totalQty) || 0}<br>
                          ยอดขายรวม: ${money(t.totalSalesAmount)}
                          ${t.note ? `<br>หมายเหตุ: ${esc(t.note)}` : ""}
                        </div>

                        <div class="timeline-detail-list" style="margin-top:10px">
                          ${t.items.map(i => `
                            <div class="timeline-row">
                              ${esc(i.productId)}
                              ${i.productName ? ` — ${esc(i.productName)}` : ""} |
                              ${Number(i.qty || 0)} ชิ้น
                              ${
                                Number.isFinite(Number(i.before)) &&
                                Number.isFinite(Number(i.after))
                                  ? ` | ${Number(i.before)} → ${Number(i.after)}`
                                  : ""
                              }
                              | ${money(i.salePrice)}/ชิ้น
                              | รวม ${money(i.lineTotal)}
                            </div>
                          `).join("")}
                        </div>
                      </div>
                    </div>                    

                    <div style="font-size:12px;color:var(--muted);margin-top:6px">
                      ${t.time.toLocaleDateString("th-TH")}
                      ${t.time.toLocaleTimeString("th-TH")}
                      · โดย ${esc(t.by)}
                    </div>
                  </div>
                `;
              }

              const typeMap = {
                IN:     { text: "➕ รับสต๊อกเข้า", class: "tag-in" },
                CREATE: { text: "🆕 เพิ่มสินค้าใหม่", class: "tag-create" },
                ADJUST: { text: "✏️ ปรับสต๊อก", class: "tag-adjust" }
              };

              typeMap.OUT = { text: "ลดสต็อก", class: "tag-out" };

              const cfg = typeMap[t.type] || { text: t.type, class: "" };

              return `
                <div class="card">
                  <div class="timeline-card-with-thumb">
                    ${renderCartItemThumb({
                      productId: t.productId,
                      name: t.productName || t.productId || "สินค้า",

                    })}
                    <div class="timeline-main">

                        ${

                        ${

                            ? `<span class="timeline-muted">
                                · สต็อก ${Number(t.before)} → ${Number(t.after)}
                              </span>`
                            : ""
                        }
                      </div>

                  ${
                    t.note
                      ? `
                        <div class="timeline-detail-wrap">
                          <button
                            type="button"
                            class="timeline-detail-toggle"
                            onclick="
                              const panel = this.nextElementSibling;
                              if (!panel) return;
                              panel.classList.toggle('show');
                              this.textContent = panel.classList.contains('show')

 async function submitBulkPendingDelivery() {
   if (state.admin.isSubmitting) return;
   state.admin.isSubmitting = true;

   try {
     const order =
       state.admin.pendingDeliveryOrder;

     if (!order) return;

     const items =
       state.admin.bulkPendingItems
         .filter(i => i.selected);

     if (!items.length) {
       showToast(
         "กรุณาเลือกสินค้า",
         "warning"
       );
       return;
     }

     const invalidItem = items.find(item => {
       const qty = Number(item.qty);

       return (
         !Number.isInteger(qty) ||
         qty <= 0
       );
     });

     if (invalidItem) {
       showToast(
         `จำนวนค้างส่งของ "${invalidItem.name || invalidItem.productId}" ต้องเป็นจำนวนเต็ม 1-${invalidItem.orderedQty}`,
         "warning"
       );
       return;
     }

     let pendingDeliveries =
       state.admin.pendingDeliveries;

     if (!Array.isArray(pendingDeliveries)) {
       try {
         pendingDeliveries =
           await fetchPendingDeliveries();
         state.admin.pendingDeliveries =
           pendingDeliveries;
       } catch (err) {
         console.error(err);
         showToast(
           err.message ||
           "ไม่สามารถตรวจสอบรายการค้างส่งได้",
           "error"
         );
         return;
       }
     }
     const batchQtyByProduct = new Map();
     const cumulativeInvalidItem = items.find(item => {
       const productId = String(item.productId || "");
       const qty = Number(item.qty);
       const orderedQty = Number(item.orderedQty);
       const existingOpenQty = pendingDeliveries
         .filter(pending =>
           String(pending.status || "").toUpperCase() === "OPEN" &&
           String(pending.orderId || "") === String(order.orderId || "") &&
           String(pending.productId || "") === productId
         )
         .reduce(
           (sum, pending) =>
             sum + Math.max(0, Number(pending.qty) || 0),
           0
         );
       const batchQty =
         (batchQtyByProduct.get(productId) || 0) + qty;

       batchQtyByProduct.set(productId, batchQty);

       return existingOpenQty + batchQty > orderedQty;
     });

     if (cumulativeInvalidItem) {
       showToast(
         `จำนวนค้างส่งของ "${cumulativeInvalidItem.name || cumulativeInvalidItem.productId}" เกินจำนวนใน PO`,
         "warning"
       );
       return;
     }

     showLoading(
       "กำลังสร้างรายการค้างส่ง..."
     );

     const succeededItems = [];
     const failedItems = [];

     for (const item of items) {
       try {
         const form =
           new URLSearchParams();

         form.append("action", "createPendingDelivery");
         form.append("token", state.admin.token);
         form.append("orderId", order.orderId);
         form.append("poNumber", order.poNumber || "");
         form.append("productId", item.productId);
         form.append("qty", item.qty);
         form.append("orderedQty", item.orderedQty);
         form.append("note", "Bulk Pending Delivery");

         const result =
           await postFormAction(form);

         if (!result?.success) {
           throw new Error(
             result?.error ||
             "Create pending failed"
           );
         }

         succeededItems.push(item);
       } catch (err) {
         failedItems.push({
           item,
           error: err.message || "Create pending failed"
         });
       }
     }

     if (failedItems.length === 0) {
       showToast(
         "สร้างรายการสำเร็จ",
         "success"
       );

       closeOverlay(
         bulkPendingDeliverySheet
       );

       openPendingDeliverySheet();
       return;
     }

     if (succeededItems.length > 0) {
       const successText = succeededItems
         .map(item => `- ${item.name || item.productId}`)
         .join("\n");
       const failureText = failedItems
         .map(({ item, error }) =>
           `- ${item.name || item.productId}: ${error}`
         )
         .join("\n");

       showToast(
         `สร้างสำเร็จ:\n${successText}\n\nสร้างไม่สำเร็จ:\n${failureText}`,
         "warning",
         7000
       );

       closeOverlay(
         bulkPendingDeliverySheet
       );

       openPendingDeliverySheet();
       return;
     }

     showToast(
       "สร้างรายการไม่สำเร็จ\n" +
         failedItems
           .map(({ item, error }) =>
             `- ${item.name || item.productId}: ${error}`
           )
           .join("\n"),
       "error",
       7000
     );

   } finally {
     state.admin.isSubmitting = false;
     safeHideLoading();
   }
 }
