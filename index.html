      throw new Error("ราคา ราคาต้นทุน และจำนวน ต้องเป็นตัวเลขจำนวนเต็ม");
    }

    if (price < 0 || costPrice < 0 || stock < 0) {
      throw new Error("ราคา ราคาต้นทุน และจำนวน ต้องมากกว่าหรือเท่ากับ 0");
    }

    validateProductVariantFormValues(variantMetadata);

    const dup = state.products.find(
      p => normalizeProductId(p.productId) === productId
    );
    if (dup) {
      document.getElementById("addProductId").focus();
      throw new Error("รหัสสินค้า (SKU) นี้มีอยู่แล้ว");
    }

    /* ================= AUTO STATUS ================= */
    if (stock === 0) {
      status = "out";
    }

    /* ================= IMAGE UPLOAD ================= */

    let imageUrl = "";
    if (state.addImageFile) {
      validateProductImageFile(state.addImageFile);
      showLoading("กำลังอัปโหลดรูปสินค้า...");
      imageUrl = await uploadProductImage(state.addImageFile);
      if (!imageUrl) {
        throw new Error("อัปโหลดรูปไม่สำเร็จ");
      }
    }

    /* ================= SEND TO BACKEND ================= */
    showLoading("กำลังบันทึกข้อมูลสินค้า...");
    
    const form = new URLSearchParams();
    form.append("action", "addProduct"); // ✅ FIX จุดเดียวที่เป็นปัญหา
    form.append("token", state.admin.token);
    form.append("productId", productId);
    form.append("name", name);
    form.append("price", price);
    form.append("costPrice", costPrice);
    form.append("stock", stock);
  form.append("active", active);
    form.append("status", status);
    form.append("image", imageUrl);
    form.append("note", note);
    appendProductVariantFieldsToForm(form, variantMetadata);

    const res = await postFormAction(form);

    if (res.error || res.success === false) {
      throw new Error(res.message || res.error || "เพิ่มสินค้าไม่สำเร็จ");
    }

    showToast(t("addProductSuccess", "เพิ่มสินค้าเรียบร้อย 🎉"), "success");

    state.addImageFile = null;
// 🧠 SMART MODE SAVE (จำค่าล่าสุดเสมอ)
 state.smartAddDraft = {
   name: "",
   price,
   costPrice,
   stock,
   status,
   note,
   ...variantMetadata
 };
 await refreshProducts();

 if (continueMode) {
   // 🔴 CHANGED: คำนวณ SKU ถัดไปจาก state.products หลัง refreshProducts() แล้ว
   const nextProductId = getNextProductId(productId);

   document.getElementById("addProductId").value = nextProductId;
   document.getElementById("addName").value = state.smartAddDraft.name ?? "";
   document.getElementById("addPrice").value = state.smartAddDraft.price ?? "";
   document.getElementById("addCostPrice").value = state.smartAddDraft.costPrice ?? "";
   document.getElementById("addStock").value = state.smartAddDraft.stock ?? "";
   document.getElementById("addStatus").value = state.smartAddDraft.status ?? "ready";
   document.getElementById("addNote").value = state.smartAddDraft.note ?? "";
   PRODUCT_VARIANT_FIELDS.forEach(field => {
     const input = document.getElementById(`add${field}`);
     if (input) input.value = state.smartAddDraft[field] ?? "";
   });

   const img = document.getElementById("addImagePreview");
   if (img) {
     img.src = "";
     img.style.display = "none";
   }

   const fileInput = document.getElementById("addImageFile");
   if (fileInput) {
     fileInput.value = "";
   }
  
   state.addImageFile = null;
   document.getElementById("addProductId").focus();
   document.getElementById("addProductId").select();
 } else {
   closeAddProduct();
 }

  } catch(err){
    console.error(err);
    showToast(err.message || t("unexpectedError", "เกิดข้อผิดพลาด"), "error");
  } finally {
    safeHideLoading(); // 🔒 สำคัญ: ปิด loading ทุกกรณี
    state.admin.isSubmitting = false;

    if(btn){
      btn.disabled = false;
      btn.textContent = "บันทึกสินค้า";
    }
  }
}

function createDefaultMultiSizeRows() {
  return [
    { variantValue: "S / อก 44", stock: "", variantSortOrder: "1", nameOverride: "" },
    { variantValue: "M / อก 46", stock: "", variantSortOrder: "2", nameOverride: "" },
    { variantValue: "L / อก 48", stock: "", variantSortOrder: "3", nameOverride: "" },
    { variantValue: "XL / อก 50", stock: "", variantSortOrder: "4", nameOverride: "" }
  ];
}

function resetMultiSizeProductState() {
  state.admin.multiSizeProduct = {
    parentProductId: "",
    displayName: "",
    nameTemplate: "",
    price: "",
    costPrice: "",
    image: "",
    imageFile: null,
    status: "ready",
    active: true,
    note: "",
    detailsText: "",
    rows: createDefaultMultiSizeRows(),
    hasPreview: false,
    errors: [],
    summary: "",
    createdCount: 0
  };
}

function ensureAdminSessionForMultiSizeProduct() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
    exitAdmin();
    return false;
  }
  return true;
}

function openMultiSizeProductSheet() {
  if (!ensureAdminSessionForMultiSizeProduct()) return;
  resetMultiSizeProductState();
  renderMultiSizeProductSheet();
  openOverlay(adminMultiSizeProductSheet);
}

function closeMultiSizeProductSheet() {
  if (state.admin.multiSizeProduct?.createdCount > 0) {
    resetMultiSizeProductState();
  }
  closeOverlay(adminMultiSizeProductSheet);
  state.ui.backdropLocked = false;
  requestAnimationFrame(syncOverlayBackdropState);
}

function backToAdminMenuFromMultiSizeProduct() {
  closeOverlay(adminMultiSizeProductSheet);
  resetMultiSizeProductState();
  state.ui.backdropLocked = false;
  syncOverlayBackdropState();
  requestAnimationFrame(() => openMainMenu());
}

function startNewMultiSizeProductBatch() {
  resetMultiSizeProductState();
  renderMultiSizeProductSheet();
  state.ui.backdropLocked = false;
  requestAnimationFrame(syncOverlayBackdropState);
}

function updateMultiSizeProductField(field, value) {
  if (!state.admin.multiSizeProduct) resetMultiSizeProductState();
  state.admin.multiSizeProduct[field] =
    field === "active" ? value === true : value || "";
  state.admin.multiSizeProduct.hasPreview = false;
  state.admin.multiSizeProduct.errors = [];
  state.admin.multiSizeProduct.summary = "";
  state.admin.multiSizeProduct.createdCount = 0;
}

function handleMultiSizeImagePreview(input) {
  const file = input.files?.[0];
  if (!file) return;

  try {
    validateProductImageFile(file);
  } catch (err) {
    input.value = "";
    state.admin.multiSizeProduct.imageFile = null;
    const img = document.getElementById("multiSizeImagePreview");
    if (img) {
      img.removeAttribute("src");
      img.style.display = "none";
    }
    showToast(err.message || t("invalidImageFile", "ไฟล์รูปไม่ถูกต้อง"), "error");
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("multiSizeImagePreview");
    if (img) {
      img.src = reader.result;
      img.style.display = "block";
    }
    state.admin.multiSizeProduct.imageFile = file;
    state.admin.multiSizeProduct.hasPreview = false;
    state.admin.multiSizeProduct.errors = [];
    state.admin.multiSizeProduct.summary = "";
    state.admin.multiSizeProduct.createdCount = 0;
  };
  reader.readAsDataURL(file);
}

function updateMultiSizeProductRowField(index, field, value) {
  const rows = state.admin.multiSizeProduct.rows || [];
  if (!rows[index]) return;
  rows[index][field] = value || "";
  state.admin.multiSizeProduct.hasPreview = false;
  state.admin.multiSizeProduct.errors = [];
  state.admin.multiSizeProduct.summary = "";
  state.admin.multiSizeProduct.createdCount = 0;
}

function addMultiSizeProductRow() {
  if (!Array.isArray(state.admin.multiSizeProduct.rows)) {
    state.admin.multiSizeProduct.rows = [];
  }
  state.admin.multiSizeProduct.rows.push({
    variantValue: "",
    stock: "",
    variantSortOrder: String(state.admin.multiSizeProduct.rows.length + 1),
    nameOverride: ""
  });
  state.admin.multiSizeProduct.hasPreview = false;
  renderMultiSizeProductSheet();
}

function removeMultiSizeProductRow(index) {
  const rows = state.admin.multiSizeProduct.rows || [];
  if (rows.length <= 1) {
    showToast(t("multiSizeNeedsOneRow", "ต้องมีไซส์อย่างน้อย 1 แถว"), "warning");
    return;
  }
  rows.splice(index, 1);
  state.admin.multiSizeProduct.hasPreview = false;
  state.admin.multiSizeProduct.errors = [];
  renderMultiSizeProductSheet();
}

function getMultiSizeSkuSuffix(variantValue) {
  const firstPart = String(variantValue || "")
    .split("/")
    .shift()
    .trim();
  return firstPart
    .replace(/\s+/g, "")
    .replace(/[^A-Za-z0-9ก-๙_-]/g, "")
    .toUpperCase();
}

function getMultiSizeGeneratedSku(parentProductId, variantValue) {
  return normalizeProductId(
    String(parentProductId || "") + getMultiSizeSkuSuffix(variantValue)
  );
}

function getMultiSizePreviewItems() {
  const multiState = state.admin.multiSizeProduct;
  const parentProductId = normalizeProductId(multiState.parentProductId);
  const displayName = String(multiState.displayName || "").trim();
  const nameTemplate = String(multiState.nameTemplate || "").trim();
  const baseName = nameTemplate || displayName;

  return (multiState.rows || [])
    .map((row, index) => {
      const variantValue = String(row.variantValue || "").trim();
      const productId = getMultiSizeGeneratedSku(parentProductId, variantValue);
      const nameOverride = String(row.nameOverride || "").trim();
      return {
        rowNumber: index + 1,
        productId,
        name: nameOverride || (variantValue ? `${baseName} ${variantValue}` : baseName),
        price: String(multiState.price || "").trim(),
        costPrice: String(multiState.costPrice || "").trim(),
        stock: String(row.stock || "").trim(),
        status: String(multiState.status || "ready").trim(),
        image: String(multiState.image || "").trim(),
        active: String(multiState.active !== false),
        note: String(multiState.note || "").trim(),
        detailsText: String(multiState.detailsText || "").trim(),
        compareImages: "",
        parentProductId,
        variantType: "size",
        variantValue,
        displayName,
        variantSortOrder: String(row.variantSortOrder || "").trim()
      };
    });
}

function validateMultiSizePreviewItems(items) {
  const errors = [];
  const multiState = state.admin.multiSizeProduct;
  const parentProductId = normalizeProductId(multiState.parentProductId);
  const displayName = String(multiState.displayName || "").trim();
  const price = Number(multiState.price);
  const costPrice = Number(multiState.costPrice);
  const existingSkus = new Set(
    (Array.isArray(state.products) ? state.products : [])
      .map(product => normalizeProductId(product.productId))
      .filter(Boolean)
  );
  const batchSkus = new Set();

  if (!parentProductId) errors.push("กรุณากรอกรหัสสินค้าแม่ / รหัสกลุ่ม");
  if (!displayName) errors.push("กรุณากรอกชื่อแสดงรวมของสินค้าแม่");
  if (!Number.isInteger(price) || price < 0) errors.push("ราคาขายต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป");
  if (!Number.isInteger(costPrice) || costPrice < 0) errors.push("ราคาต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป");
  if (!items.length) errors.push("กรุณาเพิ่มไซส์อย่างน้อย 1 แถว");

  items.forEach(item => {
    const rowLabel = `แถว ${item.rowNumber}`;
    const stock = Number(item.stock);
    const sortOrder = Number(item.variantSortOrder);

    if (!item.variantValue) errors.push(`${rowLabel}: กรุณากรอกไซส์/ตัวเลือก`);
    if (!item.productId || item.productId === parentProductId) errors.push(`${rowLabel}: ไม่สามารถสร้าง SKU ได้`);
    if (item.stock === "" || !Number.isInteger(stock) || stock < 0) errors.push(`${rowLabel}: สต็อกต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป`);
    if (item.variantSortOrder === "" || !Number.isInteger(sortOrder)) errors.push(`${rowLabel}: ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม`);
    if (existingSkus.has(item.productId)) errors.push(`${rowLabel}: SKU ${item.productId} มีอยู่แล้ว`);
    if (batchSkus.has(item.productId)) errors.push(`${rowLabel}: SKU ${item.productId} ซ้ำในชุดนี้`);
    if (!item.name) errors.push(`${rowLabel}: กรุณากรอกชื่อสินค้า`);
    batchSkus.add(item.productId);
  });

  return errors;
}

function previewMultiSizeProducts() {
  const items = getMultiSizePreviewItems();
  const errors = validateMultiSizePreviewItems(items);
  state.admin.multiSizeProduct.hasPreview = true;
  state.admin.multiSizeProduct.errors = errors;
  state.admin.multiSizeProduct.summary = "";
  renderMultiSizeProductSheet();
}

function renderMultiSizeProductPreview(items, errors) {
  if (!state.admin.multiSizeProduct.hasPreview) {
    return `<div class="empty-state">กรอกข้อมูลแล้วกด “ตรวจสอบรายการ” เพื่อดู SKU ที่จะสร้าง</div>`;
  }

  return `
    ${errors.length ? `<ul class="bulk-error-list">${errors.map(error => `<li>${esc(error)}</li>`).join("")}</ul>` : ""}
    <div class="bulk-preview-list">
      ${items.map(item => `
        <div class="bulk-preview-card ${errors.length ? "" : "status-approved"}">
          <div class="name">${esc(item.productId || "-")}</div>
          <div class="bulk-preview-meta">
            ${esc(item.name || "-")}<br>
            กลุ่ม: ${esc(item.parentProductId || "-")} · ${esc(item.variantType)}: ${esc(item.variantValue || "-")} · ลำดับ: ${esc(item.variantSortOrder || "-")}<br>
            ราคา: ฿${esc(item.price || "0")} · ต้นทุน: ฿${esc(item.costPrice || "0")} · สต็อก: ${esc(item.stock || "0")}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

const SIZE_VARIANT_DETECTION = Object.freeze({
  S: { value: "S / อก 44", order: 1 },
  M: { value: "M / อก 46", order: 2 },
  L: { value: "L / อก 48", order: 3 },
  XL: { value: "XL / อก 50", order: 4 },
  XXL: { value: "XXL", order: 5 }
});

function parseLegacySizeVariant(product) {
  const productId = normalizeProductId(product?.productId);
  const name = String(product?.name || "").trim();
  const sizeFromName = name.match(/^\s*\(?\s*Size\s+(XXL|XL|L|M|S)(?:\s*\/\s*อก\s*([0-9]+))?\s*\)?\s*/i);
  const sizeFromSku = productId.match(/^(.*?)(XXL|XL|L|M|S)$/i);
  const sizeCode = String(sizeFromName?.[1] || sizeFromSku?.[2] || "").toUpperCase();
  const sizeMeta = SIZE_VARIANT_DETECTION[sizeCode];

  if (!productId || !sizeMeta || !sizeFromSku) return null;

  const parentProductId = normalizeProductId(sizeFromSku[1]);
  if (!parentProductId) return null;

  const chest = sizeFromName?.[2] || "";
  const variantValue = chest
    ? `${sizeCode} / อก ${chest}`
    : sizeMeta.value;
  const displayName = name
    .replace(/^\s*\(?\s*Size\s+(XXL|XL|L|M|S)(?:\s*\/\s*อก\s*[0-9]+)?\s*\)?\s*/i, "")
    .trim() || name;

  return {
    product,
    parentProductId,
    variantType: "size",
    variantValue,
    variantSortOrder: sizeMeta.order,
    displayName,
    sizeCode
  };
}

function getVariantScanResults() {
  const grouped = new Map();
  const singles = [];

  (Array.isArray(state.products) ? state.products : []).forEach(product => {
    if (isViewerVariantProduct(product)) return;
    const suggestion = parseLegacySizeVariant(product);
    if (!suggestion) return;

    if (!grouped.has(suggestion.parentProductId)) {
      grouped.set(suggestion.parentProductId, []);
    }
    grouped.get(suggestion.parentProductId).push(suggestion);
  });

  const groups = [];
  grouped.forEach((items, parentProductId) => {
    const sorted = items.sort((a, b) => a.variantSortOrder - b.variantSortOrder);
    if (sorted.length < 2) {
      singles.push(...sorted);
      return;
    }

    const displayNames = [...new Set(sorted.map(item => item.displayName).filter(Boolean))];
    const sizeCounts = sorted.reduce((map, item) => {
      map[item.sizeCode] = (map[item.sizeCode] || 0) + 1;
      return map;
    }, {});
    const warnings = [];
    if (displayNames.length > 1) {
      warnings.push("ชื่อสินค้าในกลุ่มไม่เหมือนกันทั้งหมด ควรตรวจสอบก่อนบันทึกจริง");
    }
    Object.entries(sizeCounts).forEach(([sizeCode, count]) => {
      if (count > 1) warnings.push(`พบไซส์ ${sizeCode} ซ้ำในกลุ่มนี้`);
    });

    groups.push({
      parentProductId,
      displayName: displayNames[0] || sorted[0]?.displayName || "",
      items: sorted,
      warnings
    });
  });

  return {
    groups: groups.sort((a, b) => a.parentProductId.localeCompare(b.parentProductId)),
    singles: singles.sort((a, b) => a.parentProductId.localeCompare(b.parentProductId))
  };
}

function ensureVariantScanState() {
  if (!state.admin.variantScan) {
    state.admin.variantScan = {
      selectedGroups: [],
      message: "",
      error: "",
      appliedGroups: []
    };
  }
  if (!Array.isArray(state.admin.variantScan.selectedGroups)) {
    state.admin.variantScan.selectedGroups = [];
  }
  if (!Array.isArray(state.admin.variantScan.appliedGroups)) {
    state.admin.variantScan.appliedGroups = [];
  }
  return state.admin.variantScan;
}

function getSelectedVariantScanGroups(results = getVariantScanResults()) {
  const scanState = ensureVariantScanState();
  const selected = new Set(scanState.selectedGroups || []);
  return (results.groups || []).filter(group => selected.has(group.parentProductId));
}

function getVariantScanApplyItems(groups) {
  const seen = new Set();
  const errors = [];
  const items = [];

  (groups || []).forEach(group => {
    if (!group || !group.parentProductId || !group.displayName || !Array.isArray(group.items) || group.items.length < 2) {
      errors.push(`กลุ่ม ${group?.parentProductId || "-"} ไม่พร้อมบันทึก`);
      return;
    }

    group.items.forEach(item => {
      const productId = normalizeProductId(item.product?.productId);
      const sortOrder = Number(item.variantSortOrder);
      if (!productId) errors.push(`กลุ่ม ${group.parentProductId}: ไม่พบ SKU`);
      if (seen.has(productId)) errors.push(`SKU ${productId} ซ้ำในรายการบันทึก`);
      if (!item.parentProductId) errors.push(`${productId}: ไม่พบ parentProductId`);
      if (!item.variantValue) errors.push(`${productId}: ไม่พบไซส์/ตัวเลือก`);
      if (!Number.isInteger(sortOrder)) errors.push(`${productId}: ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม`);
      if (!group.displayName) errors.push(`${productId}: ไม่พบชื่อแสดงรวม`);
      if (productId) seen.add(productId);

      items.push({
        productId,
        parentProductId: item.parentProductId,
        variantType: "size",
        variantValue: item.variantValue,
        displayName: group.displayName,
        variantSortOrder: sortOrder
      });
    });
  });

  return { items, errors };
}

function toggleVariantScanGroup(parentProductId, checked) {
  const scanState = ensureVariantScanState();
  const selected = new Set(scanState.selectedGroups);
  const cleanId = normalizeProductId(parentProductId);
  if (checked) {
    selected.add(cleanId);
  } else {
    selected.delete(cleanId);
  }
  scanState.selectedGroups = Array.from(selected);
  scanState.message = "";
  scanState.error = "";
  renderVariantScanSheet();
}

async function applySelectedVariantScanGroups(btn) {
  if (!ensureAdminSessionForMultiSizeProduct()) return;
  if (state.admin.isSubmitting) return;

  const scanState = ensureVariantScanState();
  const results = getVariantScanResults();
  const selectedGroups = getSelectedVariantScanGroups(results);
  const { items, errors } = getVariantScanApplyItems(selectedGroups);

  if (!selectedGroups.length) {
    scanState.error = "กรุณาเลือกกลุ่มที่ต้องการบันทึก";
    renderVariantScanSheet();
    showToast(scanState.error, "warning");
    return;
  }

  if (errors.length) {
    scanState.error = errors.join(" / ");
    renderVariantScanSheet();
    showToast(t("variantScanItemsNotReady", "ข้อมูลบางรายการยังไม่พร้อมบันทึก"), "warning");
    return;
  }

  const confirmed = window.confirm(
    formatUiText(
      "variantScanApplyConfirm",
      { groups: selectedGroups.length, skus: items.length },

    )
  );
  if (!confirmed) return;

  state.admin.isSubmitting = true;
  scanState.error = "";
  scanState.message = "";
  renderVariantScanSheet();

  try {
    showLoading("กำลังบันทึกข้อมูลกลุ่มไซส์...");
    const form = new URLSearchParams();
    form.append("action", "bulkUpdateProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const updated = Number(json.updated || json.data?.updated || items.length || 0);
      scanState.message = `บันทึกข้อมูลกลุ่มไซส์สำเร็จ ${updated} SKU`;
      scanState.appliedGroups = selectedGroups.map(group => group.parentProductId);
      scanState.selectedGroups = [];
      showToast(scanState.message, "success");
      await refreshProducts();
      renderVariantScanSheet();
      return;
    }

    scanState.error = json?.error || json?.message || "บันทึกข้อมูลกลุ่มไซส์ไม่สำเร็จ";
    renderVariantScanSheet();
    showToast(scanState.error, "error");

    console.error(err);
    scanState.error = err.message || "บันทึกข้อมูลกลุ่มไซส์ไม่สำเร็จ";
    renderVariantScanSheet();
    showToast(scanState.error, "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderVariantScanSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

async function copyTextToClipboard(text, successMessage, failureMessage) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }
    showToast(successMessage, "success");
  } catch (err) {
    console.error(err);
    showToast(failureMessage || t("copyFailedRetry", "คัดลอกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง"), "error");
  }
}

    console.warn(err);
    if (input) input.focus();
    showToast(t("clipboardReadFailedManual", "ไม่สามารถอ่านคลิปบอร์ดได้ กรุณาวางข้อมูลด้วยตนเอง"), "warning");
  }
}

function downloadBulkProductTemplate() {
  const blob = new Blob([BULK_PRODUCT_SAMPLE], {
    type: "text/tab-separated-values;charset=utf-8"
  });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "bulk-product-template.tsv";
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  showToast(t("bulkTemplateDownloaded", "ดาวน์โหลดแม่แบบแล้ว"), "success");
}

function handleBulkProductFileUpload(event) {
  const file = event?.target?.files?.[0];
  if (!file) return;

  const fileName = String(file.name || "").toLowerCase();
  if (!fileName.endsWith(".tsv") && !fileName.endsWith(".txt")) {
    showToast(t("tsvOnly", "เวอร์ชันนี้รองรับเฉพาะไฟล์ .tsv หรือ .txt"), "warning");
    event.target.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    state.admin.bulkProductImport.rawText = String(reader.result || "");
    invalidateBulkProductImportPreview();
    renderBulkProductImportSheet();
    showToast(t("fileReadReviewBeforeImport", "อ่านไฟล์แล้ว กรุณาตรวจสอบข้อมูลก่อนนำเข้า"), "success");
  };
  reader.onerror = () => {
    showToast(t("fileReadFailedRetry", "ไม่สามารถอ่านไฟล์ได้ กรุณาลองใหม่อีกครั้ง"), "error");
  };
  reader.readAsText(file, "UTF-8");
}

function resetBulkProductImport() {
  clearBulkProductImportWorkingState();
  renderBulkProductImportSheet();
}

function invalidateBulkProductImportPreview() {
  const bulkState = state.admin.bulkProductImport;
  bulkState.items = [];
  bulkState.errors = [];
  bulkState.backendErrors = [];
  bulkState.summary = "";
  bulkState.importedCount = 0;
  bulkState.hasPreview = false;
  bulkState.previewValid = false;
}

function clearBulkProductImportWorkingState(options = {}) {
  const bulkState = state.admin.bulkProductImport;
  const keepSuccess = options.keepSuccess === true;
  const preservedSummary = keepSuccess ? bulkState.summary : "";
  const preservedImportedCount = keepSuccess ? bulkState.importedCount : 0;

  bulkState.rawText = "";
  bulkState.items = [];
  bulkState.errors = [];
  bulkState.backendErrors = [];
  bulkState.summary = preservedSummary;
  bulkState.importedCount = preservedImportedCount;
  bulkState.hasPreview = false;
  bulkState.previewValid = false;
}

function parseBulkProductImportText(rawText) {
  const text = String(rawText || "").replace(/\r/g, "").trimEnd();
  const errors = [];
  const items = [];

  if (!text.trim()) {
    return { items, errors };
  }

  const lines = text
    .split("\n")
    .filter(line => line.trim());

  const firstCells = splitTsvLine(lines[0]);
  const hasHeader = isBulkProductHeaderRow(firstCells);
  const dataLines = hasHeader ? lines.slice(1) : lines;
  const columns = hasHeader
    ? firstCells.map(normalizeBulkHeader)
    : BULK_PRODUCT_COLUMNS;
  const seenSkus = new Set();

  if (dataLines.length > 100) {
    errors.push(bulkImportError(0, "", "items", t("bulkImportMaxRows", "นำเข้าได้สูงสุด 100 รายการต่อครั้ง")));
    return { items, errors };
  }

  dataLines.forEach((line, index) => {
    const rowNumber = index + 1;
    const cells = splitTsvLine(line);
    const row = {};

    columns.forEach((column, cellIndex) => {
      if (!column) return;
      row[column] = String(cells[cellIndex] || "").trim();
    });

    const item = normalizeBulkProductImportRow(row);
    validateBulkProductImportRow(item, rowNumber, seenSkus, errors);
    items.push(item);
  });

  if (items.length === 0) {
    errors.push(bulkImportError(1, "", "items", t("bulkImportNeedOneRow", "กรุณาเพิ่มข้อมูลสินค้าอย่างน้อย 1 รายการ")));
  }

  return { items, errors };
}

function splitTsvLine(line) {
  return String(line || "").split("\t");
}

function isBulkProductHeaderRow(cells) {
  const normalized = cells.map(normalizeBulkHeader).filter(Boolean);
  return normalized.includes("productId") &&
    normalized.includes("name") &&
    normalized.includes("price");
}

function normalizeBulkHeader(value) {
  const key = String(value || "").trim().toLowerCase();
  const map = {
    productid: "productId",
    sku: "productId",
    name: "name",
    price: "price",
    costprice: "costPrice",
    cost: "costPrice",
    stock: "stock",
    qty: "stock",
    status: "status",
    image: "image",
    active: "active",
    note: "note",
    detailstext: "detailsText",
    details: "detailsText",
    compareimages: "compareImages",
    parentproductid: "parentProductId",
    parent: "parentProductId",
    groupid: "parentProductId",
    varianttype: "variantType",
    variantvalue: "variantValue",
    size: "variantValue",
    displayname: "displayName",
    groupname: "displayName",
    variantsortorder: "variantSortOrder",
    sortorder: "variantSortOrder"
  };
  return map[key] || "";
}

function normalizeBulkProductImportRow(row) {
  const stock = Number(row.stock);
  const status = Number.isInteger(stock) && stock === 0
    ? "out"
    : String(row.status || "").trim();

  return {
    productId: normalizeProductId(row.productId || ""),
    name: String(row.name || "").trim(),
    price: String(row.price || "").trim(),
    costPrice: String(row.costPrice || "").trim(),
    stock: String(row.stock || "").trim(),
    status,
    image: String(row.image || "").trim(),
    active: String(row.active || "").trim(),
    note: String(row.note || "").trim(),
    detailsText: String(row.detailsText || "").trim(),
    compareImages: String(row.compareImages || "").trim(),
    parentProductId: String(row.parentProductId || "").trim(),
    variantType: String(row.variantType || "").trim(),
    variantValue: String(row.variantValue || "").trim(),
    displayName: String(row.displayName || "").trim(),
    variantSortOrder: String(row.variantSortOrder || "").trim()
  };
}

function validateBulkProductImportRow(item, rowNumber, seenSkus, errors) {
  const allowedStatuses = ["ready", "ready_plus", "shipping", "warehouse", "out"];
  const productId = item.productId;
  const price = Number(item.price);
  const costPrice = Number(item.costPrice);
  const stock = Number(item.stock);

  if (!productId) {
    errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkImportSkuRequired", "กรุณากรอกรหัสสินค้า")));
  } else if (seenSkus.has(productId)) {
    errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkImportDuplicateSku", "รหัสสินค้าซ้ำในข้อมูลที่วาง")));
  }

  if (productId) {
    seenSkus.add(productId);
  }

  if (!item.name) {
    errors.push(bulkImportError(rowNumber, productId, "name", t("bulkImportNameRequired", "กรุณากรอกชื่อสินค้า")));
  }

  if (item.price === "" || !Number.isInteger(price) || price < 0) {
    errors.push(bulkImportError(rowNumber, productId, "price", t("bulkImportPriceInvalid", "ราคาต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป")));
  }

  if (item.costPrice === "" || !Number.isInteger(costPrice) || costPrice < 0) {
    errors.push(bulkImportError(rowNumber, productId, "costPrice", t("bulkImportCostInvalid", "ต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป")));
  }

  if (item.stock === "" || !Number.isInteger(stock) || stock < 0) {
    errors.push(bulkImportError(rowNumber, productId, "stock", t("bulkImportStockInvalid", "จำนวนสต๊อกต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป")));
  }

  if (!item.status || !allowedStatuses.includes(item.status)) {
    errors.push(bulkImportError(rowNumber, productId, "status", t("bulkImportStatusInvalid", "สถานะสินค้าไม่ถูกต้อง")));
  }

  if (
    item.active &&
    !["true", "false", "1", "0"].includes(item.active.toLowerCase())
  ) {
    errors.push(bulkImportError(rowNumber, productId, "active", t("bulkImportActiveInvalid", "active ต้องเป็น true/false/1/0 หรือเว้นว่าง")));
  }
  if (
    item.variantSortOrder !== "" &&
    !Number.isInteger(Number(item.variantSortOrder))
  ) {
    errors.push(bulkImportError(rowNumber, productId, "variantSortOrder", t("bulkImportSortOrderInvalid", "ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม")));
  }
}

function bulkImportError(row, productId, field, message) {
  return { row, productId, field, message };

      <table>
        <thead>
          <tr>${columns.map(column => `<th>${esc(column)}</th>`).join("")}<th>${t("status", "สถานะ")}</th></tr>
        </thead>
        <tbody>
          ${
            items.length
              ? items.map((item, index) => {
                  const rowNumber = index + 1;
                  const rowErrors = errorsByRow.get(rowNumber) || [];
                  return `
                    <tr class="${rowErrors.length ? "has-error" : ""}">
                      ${columns.map(column => `<td>${esc(item[column] || "-")}</td>`).join("")}
                      <td>
                        <span class="status-badge ${rowErrors.length ? "status-rejected" : "status-approved"} compact">
                          ${rowErrors.length ? t("errorFound", "พบข้อผิดพลาด") : t("readyToImport", "พร้อมนำเข้า")}
                        </span>
                      </td>
                    </tr>
                  `;
                }).join("")
              : `
                <tr class="placeholder-row">
                  <td colspan="${columns.length + 1}">${t("previewUploadPrompt", "วาง/อัปโหลดข้อมูลเพื่อแสดงตัวอย่าง")}</td>
                </tr>
              `
          }
        </tbody>
      </table>
    </div>
  `;
}

function renderBulkProductImportPreview(items, errors) {
  if (!items.length && !errors.length) {
    return `
      ${renderBulkProductDataPreviewTable(items, new Map())}
      <div class="empty-state">
        ${t("previewTsvPrompt", "วางข้อมูล TSV หรืออัปโหลดไฟล์ แล้วกดตรวจสอบข้อมูล")}
      </div>
    `;
  }

  const errorsByRow = new Map();
  errors.forEach(error => {
    const row = Number(error.row) || 0;
    if (!errorsByRow.has(row)) errorsByRow.set(row, []);
    errorsByRow.get(row).push(error);
  });

  const cards = items.map((item, index) => {
    const rowNumber = index + 1;
    const rowErrors = errorsByRow.get(rowNumber) || [];
    return `
      <div class="bulk-preview-card ${rowErrors.length ? "has-error" : ""}">
        <div class="name">${esc(item.productId || t("missingProductId", "(ยังไม่มีรหัสสินค้า)"))}</div>
        <div class="bulk-preview-meta">
          ${esc(item.name || t("missingProductName", "(ยังไม่มีชื่อสินค้า)"))}<br>
          ${t("price", "ราคา")}: ${esc(item.price)} | ${t("bulkFieldCostPrice", "ต้นทุน")}: ${esc(item.costPrice)} | ${t("stock", "สต๊อก")}: ${esc(item.stock)} | ${t("status", "สถานะ")}: ${esc(item.status || "-")}
        </div>
        ${
          rowErrors.length
            ? `<ul class="bulk-error-list">${rowErrors.map(error => `<li>${esc(error.field)}: ${esc(getBulkImportErrorMessage(error))}</li>`).join("")}</ul>`
            : `<div class="status-badge status-approved compact" style="margin-top:8px">${t("readyToImport", "พร้อมนำเข้า")}</div>`
        }
      </div>
    `;
  }).join("");

  const globalErrors = errorsByRow.get(0) || [];

  return `
    ${globalErrors.length ? `<ul class="bulk-error-list">${globalErrors.map(error => `<li>${esc(getBulkImportErrorMessage(error))}</li>`).join("")}</ul>` : ""}
    ${renderBulkProductDataPreviewTable(items, errorsByRow)}
    <div class="bulk-preview-list">${cards}</div>
  `;
}

async function submitBulkProductImport(btn) {
  if (!ensureAdminSessionForBulkImport()) return;
  if (state.admin.isSubmitting) return;

  const bulkState = state.admin.bulkProductImport;
  if (
    !bulkState.hasPreview ||
    !bulkState.previewValid ||
    !bulkState.items.length ||
    bulkState.errors.length ||
    bulkState.backendErrors.length
  ) {
    showToast(t("fixErrorsBeforeImport", "กรุณาแก้ไขข้อผิดพลาดก่อนนำเข้าสินค้า"), "warning");
    return;
  }

  state.admin.isSubmitting = true;
  renderBulkProductImportSheet();

  try {
    showLoading(t("bulkImportLoading", "กำลังนำเข้าสินค้า..."));
    const form = new URLSearchParams();
    form.append("action", "bulkAddProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(bulkState.items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const imported = Number(json.imported || json.data?.imported || 0);
      bulkState.backendErrors = [];
      bulkState.importedCount = imported;
      bulkState.summary = formatUiText("bulkImportSuccessCount", { count: imported }, "นำเข้าสำเร็จ {count} รายการ");
      showToast(bulkState.summary, "success");
      clearBulkProductImportWorkingState({ keepSuccess: true });
      await refreshProducts();
      renderBulkProductImportSheet();
      return;
    }

    bulkState.backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors
      : [];
    bulkState.summary = "";
    bulkState.importedCount = 0;
    renderBulkProductImportSheet();
    if (isAuthError(json?.error)) {
      showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(getBulkImportErrorMessage({ message: json?.error }) || t("bulkImportFailedRetry", "นำเข้าสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง"), "error");
  } catch (err) {
    console.error(err);
    showToast(t("bulkImportFailedRetry", "นำเข้าสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง"), "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderBulkProductImportSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

function ensureAdminSessionForBulkUpdate() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
    exitAdmin();
    return false;
  }
  return true;
}

  bulkState.pickerSearch = "";

  bulkState.summary = "";

function clearBulkProductUpdateWorkingState(options = {}) {
  const bulkState = state.admin.bulkProductUpdate;
  const keepSuccess = options.keepSuccess === true;
  const preservedSummary = keepSuccess ? bulkState.summary : "";
  const preservedUpdatedCount = keepSuccess ? bulkState.updatedCount : 0;

  bulkState.skuText = "";
  bulkState.selectedSkus = [];
  bulkState.value = "";
  bulkState.items = [];
  bulkState.errors = [];
  bulkState.backendErrors = [];
  bulkState.summary = preservedSummary;
  bulkState.updatedCount = preservedUpdatedCount;

  bulkState.previewValid = false;
}

function getBulkProductUpdateSelectedSkus() {
  const selectedSkus = Array.isArray(state.admin.bulkProductUpdate.selectedSkus)
    ? state.admin.bulkProductUpdate.selectedSkus
    : [];
  const seen = new Set();
  return selectedSkus
    .map(normalizeProductId)
    .filter(productId => {
      if (!productId || seen.has(productId)) return false;
      seen.add(productId);
      return true;
    });
}

function getBulkProductUpdateManualSkus() {
  return String(state.admin.bulkProductUpdate.skuText || "")
    .split(/[\s,]+/)
    .map(normalizeProductId)
    .filter(Boolean);
}

function getBulkProductUpdateCombinedSkus() {
  return getBulkProductUpdateSelectedSkus().concat(getBulkProductUpdateManualSkus());
}

function getBulkProductUpdatePickerProducts() {
  const bulkState = state.admin.bulkProductUpdate;
  const searchText = String(bulkState.pickerSearch || "").trim().toLowerCase();
  const rawStatusFilter = String(bulkState.pickerStatus || "all").trim().toLowerCase();
  const statusFilter = rawStatusFilter === "all" ? "all" : normalizeProductStatus(rawStatusFilter);
  const products = Array.isArray(state.products) ? state.products : [];

  return products.filter(product => {
    const productId = normalizeProductId(product.productId);
    const name = String(product.name || "").toLowerCase();
    const status = normalizeProductStatus(product.status);
    const matchesSearch = !searchText ||
      productId.toLowerCase().includes(searchText) ||
      name.includes(searchText);
    const matchesStatus = !statusFilter ||
      statusFilter === "all" ||
      status === statusFilter;
    return matchesSearch && matchesStatus;
  });
}

function setBulkProductUpdatePickerSearch(value) {
  state.admin.bulkProductUpdate.pickerSearch = value || "";
  invalidateBulkProductUpdatePreview();
  updateBulkProductUpdatePickerList();

}

function setBulkProductUpdatePickerStatus(value) {

  updateBulkProductUpdatePickerList();

}

function toggleBulkProductUpdateProduct(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(getBulkProductUpdateSelectedSkus());
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.bulkProductUpdate.selectedSkus = Array.from(selected);
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheetPreservingPickerScroll();
}

function selectVisibleBulkProductUpdateProducts() {
  const selected = new Set(getBulkProductUpdateSelectedSkus());
  getBulkProductUpdatePickerProducts().forEach(product => {
    const productId = normalizeProductId(product.productId);
    if (productId) selected.add(productId);
  });
  state.admin.bulkProductUpdate.selectedSkus = Array.from(selected);
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheet();
}

function clearBulkProductUpdateSelection() {
  state.admin.bulkProductUpdate.selectedSkus = [];
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheet();
}

function getBulkProductUpdateFieldLabel(field) {
  return {
    price: t("bulkFieldPrice", "ราคาขาย"),
    costPrice: t("bulkFieldCostPrice", "ต้นทุน"),
    status: t("bulkFieldStatus", "สถานะสินค้า"),
    active: t("bulkFieldActive", "สถานะการขาย")
  }[field] || t("productData", "ข้อมูลสินค้า");
}

function getBulkProductUpdateStatusLabel(status) {
  return getViewerStatusLabel(status);
}

function getBulkProductUpdateStatusClass(status) {
  const key = normalizeProductStatus(status);
  if (key === "out") return "status-rejected";
  if (key === "shipping") return "status-pending";
  if (key === "warehouse") return "status-neutral";
  return "status-approved";
}

function formatBulkProductUpdateValue(field, value) {
  if (field === "price" || field === "costPrice") {
    return `฿${Number(value || 0).toLocaleString("th-TH")}`;
  }
  if (field === "status") {
    return getBulkProductUpdateStatusLabel(value);
  }
  if (field === "active") {
    return value === true ? t("openForSale", "เปิดขาย") : t("closedForSale", "ปิดขาย");
  }
  return String(value ?? "-");
}

function renderBulkProductUpdateValueDisplay(field, value) {
  if (field === "status") {
    return `<span class="status-badge compact ${getBulkProductUpdateStatusClass(value)}">${esc(getBulkProductUpdateStatusLabel(value))}</span>`;
  }
  if (field === "active") {
    const isActive = value === true;
    return `<span class="status-badge compact ${isActive ? "status-approved" : "status-neutral"}">${isActive ? t("openForSale", "เปิดขาย") : t("closedForSale", "ปิดขาย")}</span>`;
  }
  return esc(formatBulkProductUpdateValue(field, value));
}

function parseBulkProductUpdateActive(value) {
  if (value === true || value === false) {
    return { valid: true, value };
  }

  const normalized = String(value || "").trim().toLowerCase();
  if (["true", "1", "เปิดขาย", "active", "yes"].includes(normalized)) {
    return { valid: true, value: true };
  }
  if (["false", "0", "ปิดขาย", "inactive", "no"].includes(normalized)) {
    return { valid: true, value: false };
  }
  return { valid: false, value: null };
}

function parseBulkProductUpdateValue(field, rawValue) {
  const valueText = String(rawValue ?? "").trim();
  if (!valueText) {
    return {
      valid: false,
      value: null,
      message: t("bulkUpdateValueRequired", "กรุณาระบุค่าใหม่")
    };
  }

  if (field === "price" || field === "costPrice") {
    const value = Number(valueText);
    if (!Number.isInteger(value) || value < 0) {
      return {
        valid: false,
        value: null,
        message: formatUiText("bulkUpdateFieldNumberInvalid", { field: getBulkProductUpdateFieldLabel(field) }, "{field}ต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป")
      };
    }
    return { valid: true, value };
  }

  if (field === "status") {
    const status = normalizeProductStatus(valueText);
    const allowed = ["ready", "ready_plus", "shipping", "warehouse", "out"];
    if (!allowed.includes(status)) {
      return {
        valid: false,
        value: null,
        message: t("bulkImportStatusInvalid", "สถานะสินค้าไม่ถูกต้อง")
      };
    }
    return { valid: true, value: status };
  }

  if (field === "active") {
    const active = parseBulkProductUpdateActive(valueText);
    if (!active.valid) {
      return {
        valid: false,
        value: null,
        message: t("bulkUpdateActiveInvalid", "สถานะการขายต้องเป็น เปิดขาย/ปิดขาย หรือ true/false")
      };
    }
    return active;
  }

  return {
    valid: false,
    value: null,
    message: t("bulkUpdateTypeInvalid", "ประเภทการอัปเดตไม่ถูกต้อง")
  };
}

function parseBulkProductUpdateInput() {
  const bulkState = state.admin.bulkProductUpdate;
  const field = bulkState.field || "price";
  const valueResult = parseBulkProductUpdateValue(field, bulkState.value);
  const skus = getBulkProductUpdateCombinedSkus();
  const errors = [];
  const items = [];
  const seenSkus = new Set();
  const products = Array.isArray(state.products) ? state.products : [];
  const productMap = new Map(
    products.map(product => [
      normalizeProductId(product.productId),
      product
    ])
  );

  if (!skus.length && !String(bulkState.value ?? "").trim()) {
    return { items, errors };
  }

  if (!skus.length) {
    errors.push(bulkImportError(1, "", "productId", t("bulkUpdateSkuRequiredOne", "กรุณาระบุ SKU อย่างน้อย 1 รายการ")));
    return { items, errors };
  }

  if (skus.length > 100) {
    errors.push(bulkImportError(0, "", "items", t("bulkUpdateMaxRows", "อัปเดตได้สูงสุด 100 รายการต่อครั้ง")));
    return { items, errors };
  }

  skus.forEach((productId, index) => {
    const rowNumber = index + 1;
    const product = productMap.get(productId) || null;
    const item = {
      row: rowNumber,
      productId,
      product,
      field,
      oldValue: product ? product[field] : "",
      newValue: valueResult.value
    };

    if (!productId) {
      errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkUpdateSkuRequired", "กรุณาระบุ SKU")));
    } else if (seenSkus.has(productId)) {
      errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkUpdateDuplicateSku", "SKU ซ้ำในรายการที่เลือก")));
    }

    if (productId) {
      seenSkus.add(productId);
    }

    if (products.length && !product) {
      errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkUpdateProductNotFound", "ไม่พบสินค้าในรายการปัจจุบัน")));
    }

    if (!valueResult.valid) {
      errors.push(bulkImportError(rowNumber, productId, field, valueResult.message));
    }

    items.push(item);
  });

  if (!items.length) {
    errors.push(bulkImportError(1, "", "productId", t("bulkUpdateSkuRequiredOne", "กรุณาระบุ SKU อย่างน้อย 1 รายการ")));
  }

  return { items, errors };
}

  const known = {
    "Bulk update validation failed": t("bulkUpdateValidationFailed", "ตรวจสอบข้อมูลอัปเดตไม่ผ่าน"),
    "Items must be valid JSON": t("invalidData", "ข้อมูลไม่ถูกต้อง"),
    "Items must be an array": t("invalidData", "ข้อมูลไม่ถูกต้อง"),
    "At least one product update is required": t("bulkUpdateSkuRequiredOne", "กรุณาระบุสินค้าอย่างน้อย 1 รายการ"),
    "Batch size limit is 100 rows": t("bulkUpdateMaxRows", "อัปเดตได้สูงสุด 100 รายการต่อครั้ง"),
    "Item must be an object": t("invalidData", "ข้อมูลรายการไม่ถูกต้อง"),
    "SKU is required": t("bulkUpdateSkuRequired", "กรุณาระบุ SKU"),
    "Duplicate SKU inside update batch": t("bulkUpdateDuplicateSku", "SKU ซ้ำในรายการอัปเดต"),
    "Product not found": t("bulkUpdateProductNotFound", "ไม่พบสินค้า"),
    "Unknown field is not allowed": t("bulkUpdateTypeInvalid", "มีฟิลด์ที่ไม่อนุญาตให้อัปเดต"),
    "Stock cannot be updated by bulkUpdateProducts": t("bulkUpdateStockNotAllowed", "ไม่สามารถอัปเดตสต็อกในหน้าจอนี้ได้"),
    "At least one allowed field is required": t("bulkUpdateAllowedFieldRequired", "กรุณาเลือกข้อมูลที่ต้องการอัปเดต"),
    "Price must be an integer >= 0": t("bulkImportPriceInvalid", "ราคาขายต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"),
    "Cost price must be an integer >= 0": t("bulkImportCostInvalid", "ต้นทุนต้องเป็นตัวเลขจำนวนเต็ม 0 ขึ้นไป"),
    "Invalid product status": t("bulkImportStatusInvalid", "สถานะสินค้าไม่ถูกต้อง"),
    "Active must be true/false or 1/0": t("bulkUpdateActiveInvalid", "สถานะการขายต้องเป็น true/false หรือ 1/0")
  };
  return known[message] || message || t("invalidData", "ข้อมูลไม่ถูกต้อง");
}

function getBulkProductUpdateStatus(items, errors) {
  if (state.admin.isSubmitting) {
    return {
      label: t("bulkUpdateLoading", "กำลังอัปเดตสินค้า..."),
      detail: t("bulkUpdateLoadingDetail", "กรุณารอสักครู่ ระบบกำลังส่งข้อมูลไปยังหลังบ้าน"),
      type: "loading"
    };
  }
  if (state.admin.bulkProductUpdate.summary) {
    return {
      label: t("bulkUpdateSuccess", "อัปเดตสินค้าสำเร็จ"),
      detail: state.admin.bulkProductUpdate.summary,
      type: "success"
    };
  }
  if (errors.length) {
    return {
      label: formatUiText("bulkImportErrorCount", { count: errors.length }, "พบข้อผิดพลาด {count} รายการ"),
      detail: t("bulkUpdateErrorDetail", "กรุณาตรวจสอบ SKU และค่าใหม่ก่อนอัปเดต"),
      type: "error"
    };
  }
  if (items.length) {
    return {
      label: formatUiText("bulkUpdateReady", { count: items.length }, "พร้อมอัปเดต {count} รายการ"),
      detail: formatUiText("bulkUpdateReadyDetail", { count: items.length }, "ตรวจสอบแล้ว {count} รายการ พร้อมส่งไปอัปเดต"),
      type: "ready"
    };
  }
  return {
    label: t("bulkImportIdle", "ยังไม่ได้ตรวจสอบข้อมูล"),
    detail: t("bulkUpdateIdleDetail", "ระบุ SKU เลือกข้อมูลที่ต้องการแก้ไข แล้วกดตรวจสอบข้อมูล"),
    type: "idle"
  };
}

function renderBulkProductUpdateStatus(items, errors) {
  const status = getBulkProductUpdateStatus(items, errors);
  const badgeClass = status.type === "success" || status.type === "ready"
    ? "status-approved"
    : status.type === "error"
      ? "status-rejected"
      : "status-pending";
  return `
    <div class="bulk-import-status" role="status" aria-live="polite">
      <span class="status-badge ${badgeClass} compact">${esc(status.label)}</span>
      <div class="helper-text" style="margin-top:8px">${esc(status.detail)}</div>
    </div>
  `;
}

function renderBulkProductUpdateSuccessCard() {
  const updated = Number(state.admin.bulkProductUpdate.updatedCount || 0);
  if (!state.admin.bulkProductUpdate.summary) return "";
  return `
    <div class="bulk-import-success-card" role="status" aria-live="polite">
      <strong>${t("bulkUpdateSuccess", "อัปเดตสินค้าสำเร็จ")}</strong>

function renderBulkProductUpdatePreview(items, errors) {
  if (!items.length && !errors.length) {
    return `
      <div class="empty-state">
        ${t("bulkUpdatePreviewEmpty", "ระบุ SKU แล้วกดตรวจสอบข้อมูล เพื่อดูค่าเดิมและค่าใหม่ก่อนบันทึก")}
      </div>
    `;
  }

  const errorsByRow = new Map();
  errors.forEach(error => {
    const row = Number(error.row) || 0;
    if (!errorsByRow.has(row)) errorsByRow.set(row, []);
    errorsByRow.get(row).push(error);
  });

  const globalErrors = errorsByRow.get(0) || [];
  const cards = items.map((item, index) => {
    const rowNumber = item.row || index + 1;
    const rowErrors = errorsByRow.get(rowNumber) || [];
    const product = item.product || {};
    const oldValue = item.product
      ? renderBulkProductUpdateValueDisplay(item.field, item.oldValue)
      : "-";
    const newValue = item.newValue !== null && item.newValue !== undefined
      ? renderBulkProductUpdateValueDisplay(item.field, item.newValue)
      : "-";

    return `
      <div class="bulk-preview-card bulk-update-preview-card ${rowErrors.length ? "has-error" : ""}">
        ${renderCartItemThumb({
          productId: item.productId,
          name: product.name || item.productId || "สินค้า",
          image: product.image || ""
        })}
        <div>
          <div class="name">${esc(product.name || item.productId || "-")}</div>
          <div class="bulk-preview-meta">
            SKU: ${esc(item.productId || "-")}<br>
            ${t("bulkUpdateTarget", "อัปเดต")}: ${esc(getBulkProductUpdateFieldLabel(item.field))}
          </div>
          <div class="bulk-update-values">
            <div class="bulk-update-value">
              ${t("oldValue", "ค่าเดิม")}
              <strong>${oldValue}</strong>
            </div>
            <div class="bulk-update-value">
              ${t("newValue", "ค่าใหม่")}
              <strong>${newValue}</strong>
            </div>
          </div>
          ${
            rowErrors.length
              ? `<ul class="bulk-error-list">${rowErrors.map(error => `<li>${esc(error.field)}: ${esc(error.message || getBulkProductUpdateBackendErrorMessage(error))}</li>`).join("")}</ul>`
              : `<div class="status-badge status-approved compact" style="margin-top:8px">${t("readyToUpdate", "พร้อมอัปเดต")}</div>`
          }
        </div>
      </div>
    `;
  }).join("");

  return `
    ${globalErrors.length ? `<ul class="bulk-error-list">${globalErrors.map(error => `<li>${esc(error.message || getBulkProductUpdateBackendErrorMessage(error))}</li>`).join("")}</ul>` : ""}
    <div class="bulk-preview-list">${cards}</div>
  `;
}

async function submitBulkProductUpdate(btn) {
  if (!ensureAdminSessionForBulkUpdate()) return;
  if (state.admin.isSubmitting) return;

  const bulkState = state.admin.bulkProductUpdate;
  if (
    !bulkState.hasPreview ||
    !bulkState.previewValid ||
    !bulkState.items.length ||
    bulkState.errors.length ||
    bulkState.backendErrors.length
  ) {
    showToast(t("fixErrorsBeforeUpdate", "กรุณาแก้ไขข้อผิดพลาดก่อนอัปเดตสินค้า"), "warning");
    return;
  }

  state.admin.isSubmitting = true;
  renderBulkProductUpdateSheet();

  try {
    showLoading(t("bulkUpdateLoading", "กำลังอัปเดตสินค้า..."));
    const items = bulkState.items.map(item => ({
      productId: item.productId,
      [item.field]: item.newValue
    }));

    const form = new URLSearchParams();
    form.append("action", "bulkUpdateProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const updated = Number(json.updated || json.data?.updated || 0);
      const successSummary = formatUiText("bulkUpdateSuccessCount", { count: updated }, "อัปเดตสำเร็จ {count} รายการ");
      bulkState.summary = successSummary;
      bulkState.updatedCount = updated;
      clearBulkProductUpdateWorkingState({ keepSuccess: true });
      showToast(bulkState.summary, "success");
      await refreshProducts();
      renderBulkProductUpdateSheet();
      return;
    }

    bulkState.backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors
      : [];
    bulkState.summary = "";
    bulkState.updatedCount = 0;
    renderBulkProductUpdateSheet();
    if (isAuthError(json?.error)) {
      showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(getBulkProductUpdateBackendErrorMessage({ message: json?.error }) || t("bulkUpdateFailedRetry", "อัปเดตสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง"), "error");
  } catch (err) {
    console.error(err);
    showToast(t("bulkUpdateFailedRetry", "อัปเดตสินค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง"), "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderBulkProductUpdateSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

function ensureAdminSessionForLandedCost() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
    exitAdmin();
    return false;
  }
  return true;
}

function createEmptyLandedCostRow() {
  return {
    productId: "",
    name: "",
    currentPrice: null,
    currentCostPrice: null,
    image: "",
    stock: null,
    status: "",
    active: true,
    qty: "",
    chinaUnitCost: ""
  };
}

function getLandedCostProductName(productId) {
  const cleanId = normalizeProductId(productId);
  if (!cleanId) return "";
  const products = Array.isArray(state.products) ? state.products : [];
  const product = products.find(item => normalizeProductId(item.productId) === cleanId);
  return product ? String(product.name || "").trim() : "";
}

function getLandedCostProductSnapshot(productId) {
  const cleanId = normalizeProductId(productId);
  if (!cleanId) return null;
  const products = Array.isArray(state.products) ? state.products : [];
  return products.find(item => normalizeProductId(item.productId) === cleanId) || null;
}

function getLandedCostRowProductName(row) {
  const rowName = String(row?.name || "").trim();
  if (rowName) return rowName;
  return getLandedCostProductName(row?.productId);
}

function isEmptyLandedCostRow(row) {
  return (
    !normalizeProductId(row?.productId) &&
    String(row?.qty ?? "").trim() === "" &&
    String(row?.chinaUnitCost ?? "").trim() === ""
  );
}

function createLandedCostRowFromProduct(product) {
  const productId = normalizeProductId(product?.productId);
  const costPrice =
    product?.costPrice !== null &&
    product?.costPrice !== undefined &&
    product?.costPrice !== ""
      ? Number(product.costPrice) || 0
      : 0;

  return {
    productId,
    name: String(product?.name || "").trim(),
    currentPrice: Number(product?.price || 0),
    currentCostPrice: costPrice,
    image: product?.image || "",
    stock: product?.stock !== null && product?.stock !== undefined ? Number(product.stock || 0) : null,
    status: product?.status || "",
    active: product?.active !== false,
    qty: "1",
    chinaUnitCost: String(costPrice)
  };
}

function clearLandedCostApplyStatus(calcState = state.admin.landedCost) {
  calcState.applyStatus = "";
  calcState.applyError = "";
  calcState.appliedCount = 0;
}

function parseNonNegativeNumber(value) {
  const text = String(value ?? "").trim();
  if (text === "") return { valid: true, value: 0 };
  const number = Number(text);
  return { valid: Number.isFinite(number) && number >= 0, value: number };
}

function roundLandedCostValue(value, mode) {
  const safeValue = Number.isFinite(value) ? value : 0;
  if (mode === "floor") return Math.floor(safeValue);
  if (mode === "round") return Math.round(safeValue);
  return Math.ceil(safeValue);
}

function updateLandedCostField(field, value) {
  const calcState = state.admin.landedCost;
  if (!Object.prototype.hasOwnProperty.call(calcState, field)) return;
  calcState[field] = value;
  calcState.result = null;
  calcState.errors = [];
  calcState.applyPreviewRows = [];
  calcState.applySelectedIds = [];
  calcState.applyMessage = "";
  clearLandedCostApplyStatus(calcState);
}

function updateLandedCostRow(index, field, value) {
  const rowIndex = Number(index);
  const row = state.admin.landedCost.rows[rowIndex];
  if (!row || !["productId", "qty", "chinaUnitCost"].includes(field)) return;
  if (field === "productId") {
    const productId = normalizeProductId(value);
    const product = getLandedCostProductSnapshot(productId);
    row.productId = productId;
    row.name = product ? String(product.name || "").trim() : "";
    row.currentPrice = product ? Number(product.price || 0) : null;
    row.currentCostPrice = product ? Number(product.costPrice || 0) : null;
    row.image = product?.image || "";
    row.stock = product ? Number(product.stock || 0) : null;
    row.status = product?.status || "";
    row.active = product ? product.active !== false : true;
  } else {
    row[field] = value;
  }
  state.admin.landedCost.result = null;
  state.admin.landedCost.errors = [];
  state.admin.landedCost.applyPreviewRows = [];
  state.admin.landedCost.applySelectedIds = [];
  state.admin.landedCost.applyMessage = "";
  clearLandedCostApplyStatus();
}

function addLandedCostRow() {
  state.admin.landedCost.rows.push(createEmptyLandedCostRow());
  state.admin.landedCost.result = null;
  state.admin.landedCost.errors = [];
  state.admin.landedCost.applyPreviewRows = [];
  state.admin.landedCost.applySelectedIds = [];

function addSelectedLandedCostProducts() {
  const calcState = state.admin.landedCost;
  const selectedSkus = getLandedCostSelectedSkus();
  const products = Array.isArray(state.products) ? state.products : [];
  const productMap = new Map(
    products.map(product => [normalizeProductId(product.productId), product])
  );
  const nextRows = Array.isArray(calcState.rows)
    ? calcState.rows.filter(row => !isEmptyLandedCostRow(row))
    : [];
  const existingSkus = new Set(
    nextRows
      .map(row => normalizeProductId(row.productId))
      .filter(Boolean)
  );

  let added = 0;
  let skipped = 0;
  selectedSkus.forEach(productId => {
    if (!productId || existingSkus.has(productId)) {
      skipped += 1;
      return;
    }

    const product = productMap.get(productId);
    if (!product) {
      skipped += 1;
      return;
    }

    nextRows.push(createLandedCostRowFromProduct(product));
    existingSkus.add(productId);
    added += 1;
  });

  calcState.rows = nextRows.length ? nextRows : [createEmptyLandedCostRow()];
  calcState.selectedSkus = [];
  calcState.result = null;
  calcState.errors = [];
  calcState.applyPreviewRows = [];
  calcState.applySelectedIds = [];
  calcState.applyMessage = "";
  clearLandedCostApplyStatus(calcState);
  calcState.pickerMessage = added
    ? `${formatUiText("addedToLandedCostBatch", { count: added }, "เพิ่มสินค้าเข้ารอบคำนวณแล้ว {count} รายการ")}${skipped ? ` · ${formatUiText("skippedDuplicateRows", { count: skipped }, "ข้ามรายการซ้ำ {count} รายการ")}` : ""}`

  renderLandedCostSheet();
}

function validateLandedCostInput() {
  const calcState = state.admin.landedCost;
  const errors = [];
  const feeFields = [
    ["chinaDomesticShipping", t("chinaDomesticShippingLabel", "ค่าส่งในจีน")],
    ["chinaToThailandShipping", t("chinaToThailandShippingLabel", "ค่าส่งจีนมาไทย")],
    ["thailandShipping", t("thailandShippingLabel", "ค่าส่งในไทย")],
    ["otherFees", t("otherFees", "ค่าใช้จ่ายอื่น ๆ")]
  ];
  const fees = {};

  feeFields.forEach(([field, label]) => {
    const parsed = parseNonNegativeNumber(calcState[field]);
    if (!parsed.valid) errors.push(formatUiText("fieldNonNegative", { field: label }, "{field} ต้องเป็นตัวเลข 0 ขึ้นไป"));
    fees[field] = parsed.value;
  });

  const profit = parseNonNegativeNumber(calcState.profitPercent);
  if (!profit.valid) errors.push(t("landedCostProfitInvalid", "% กำไรที่ต้องการต้องเป็นตัวเลข 0 ขึ้นไป"));

  const rows = calcState.rows.map((row, index) => {
    const rowNumber = index + 1;
    const productId = normalizeProductId(row.productId);
    const productSnapshot = getLandedCostProductSnapshot(productId);
    const qty = Number(row.qty);
    const chinaUnitCost = Number(row.chinaUnitCost);

    if (!Number.isInteger(qty) || qty <= 0) {
      errors.push(formatUiText("landedCostRowQtyInvalid", { row: rowNumber }, "แถว {row}: จำนวนต้องเป็นจำนวนเต็มมากกว่า 0"));
    }
    if (!Number.isFinite(chinaUnitCost) || chinaUnitCost < 0) {
      errors.push(formatUiText("landedCostRowChinaCostInvalid", { row: rowNumber }, "แถว {row}: ต้นทุนจีน/ชิ้นต้องเป็นตัวเลข 0 ขึ้นไป"));
    }

    return {
      productId,
      name: getLandedCostRowProductName(row) || String(productSnapshot?.name || "").trim(),
      currentPrice: Number(row.currentPrice ?? productSnapshot?.price ?? 0),
      currentCostPrice: Number(row.currentCostPrice ?? productSnapshot?.costPrice ?? 0),
      image: row.image || productSnapshot?.image || "",
      stock: row.stock ?? productSnapshot?.stock ?? null,
      status: row.status || productSnapshot?.status || "",
      active: row.active !== false && productSnapshot?.active !== false,
      qty,
      chinaUnitCost,
      itemBaseCost: Number.isFinite(chinaUnitCost) && Number.isFinite(qty)
        ? chinaUnitCost * qty
        : 0
    };
  });

  const usableRows = rows.filter(row =>
    Number.isInteger(row.qty) &&
    row.qty > 0 &&
    Number.isFinite(row.chinaUnitCost) &&
    row.chinaUnitCost >= 0
  );
  const batchBaseCost = usableRows.reduce((sum, row) => sum + row.itemBaseCost, 0);

  if (!usableRows.length) errors.push(t("landedCostNeedOneRow", "กรุณาเพิ่มสินค้าอย่างน้อย 1 แถว"));
  if (batchBaseCost <= 0) errors.push(t("landedCostBaseCostPositive", "มูลค่าสินค้ารวมต้องมากกว่า 0 ก่อนคำนวณ"));

  return { errors, fees, profitPercent: profit.value, rows: usableRows, batchBaseCost };
}

function calculateLandedCost() {
  if (!ensureAdminSessionForLandedCost()) return;

  const calcState = state.admin.landedCost;
  const validation = validateLandedCostInput();
  calcState.errors = validation.errors;
  calcState.result = null;

  if (validation.errors.length) {
    renderLandedCostSheet();
    return;
  }

  const sharedFees =
    validation.fees.chinaDomesticShipping +
    validation.fees.chinaToThailandShipping +
    validation.fees.thailandShipping +
    validation.fees.otherFees;
  const roundingMode = calcState.roundingMode || "ceil";
  const rows = validation.rows.map(row => {
    const allocationRatio = row.itemBaseCost / validation.batchBaseCost;
    const allocatedFee = sharedFees * allocationRatio;
    const landedCostPerItem = (row.itemBaseCost + allocatedFee) / row.qty;
    const suggestedCostPrice = roundLandedCostValue(landedCostPerItem, roundingMode);
    const suggestedSellingPrice = roundLandedCostValue(
      suggestedCostPrice * (1 + validation.profitPercent / 100),
      roundingMode
    );

    return {
      ...row,
      allocatedFee,
      landedCostPerItem,
      suggestedCostPrice,
      suggestedSellingPrice
    };
  });

  calcState.result = {
    batchName: String(calcState.batchName || "").trim(),
    batchBaseCost: validation.batchBaseCost,
    sharedFees,
    totalLandedCost: validation.batchBaseCost + sharedFees,
    profitPercent: validation.profitPercent,
    roundingMode,
    rows
  };
  calcState.applyPreviewRows = [];
  calcState.applySelectedIds = [];
  calcState.applyMessage = "";
  clearLandedCostApplyStatus(calcState);
  renderLandedCostSheet();
}

function prepareLandedCostApplyPreview() {
  if (!ensureAdminSessionForLandedCost()) return;

  const calcState = state.admin.landedCost;
  const resultRows = Array.isArray(calcState.result?.rows)
    ? calcState.result.rows
    : [];

  if (!resultRows.length) {
    calcState.applyPreviewRows = [];
    calcState.applySelectedIds = [];
    calcState.applyMessage = t("calculateCostFirst", "กรุณาคำนวณต้นทุนก่อนเตรียมรายการอัปเดต");
    renderLandedCostSheet();
    return;
  }

  const productMap = getLandedCostProductMap();
  const previewRows = [];
  const skippedRows = [];
  resultRows.forEach(row => {
    const productId = normalizeProductId(row.productId);
    const product = productMap.get(productId) || row;
    if (!productId || !product) {
      skippedRows.push(productId || "(ไม่มี SKU)");
      return;
    }

    const currentCostPrice = Number(product.costPrice ?? product.currentCostPrice ?? 0);
    const currentPrice = Number(product.price ?? product.currentPrice ?? 0);
    const suggestedCostPrice = Number(row.suggestedCostPrice || 0);
    const suggestedPrice = Number(row.suggestedSellingPrice || 0);

    previewRows.push({
      productId,
      name: row.name || product.name || "",
      qty: Number(row.qty || 0),
      currentCostPrice,
      suggestedCostPrice,
      costPriceDiff: suggestedCostPrice - currentCostPrice,
      currentPrice,
      suggestedPrice,
      priceDiff: suggestedPrice - currentPrice,
      landedCostPerItem: Number(row.landedCostPerItem || 0)
    });
  });

  calcState.applyPreviewRows = previewRows;
  calcState.applySelectedIds = previewRows.map(row => row.productId);
  calcState.applyMessage = previewRows.length
    ? `${formatUiText("preparedUpdateRows", { count: previewRows.length }, "เตรียมรายการอัปเดตแล้ว {count} รายการ")}${skippedRows.length ? ` · ${formatUiText("skippedMissingProducts", { count: skippedRows.length }, "ข้าม {count} รายการที่ไม่พบสินค้าในระบบ")}` : ""}`
    : t("noReadyUpdateRows", "ไม่มีรายการที่พร้อมอัปเดต กรุณาตรวจสอบ SKU ในรอบคำนวณ");
  clearLandedCostApplyStatus(calcState);
  renderLandedCostSheet();
}

function buildLandedCostApplyItems() {
  const productMap = getLandedCostProductMap();
  const errors = [];
  const items = [];
  const seen = new Set();

  getSelectedLandedCostApplyRows().forEach(row => {
    const productId = normalizeProductId(row.productId);
    const suggestedCostPrice = Number(row.suggestedCostPrice);
    const suggestedPrice = Number(row.suggestedPrice);

    if (!productId) {
      errors.push(t("landedCostMissingSku", "พบรายการที่ไม่มี SKU / Product ID"));
      return;
    }
    if (seen.has(productId)) {
      errors.push(formatUiText("landedCostDuplicateSku", { sku: productId }, "SKU {sku} ซ้ำในรายการที่จะบันทึก"));
      return;
    }
    if (!productMap.has(productId)) {
      errors.push(formatUiText("landedCostProductMissing", { sku: productId }, "ไม่พบสินค้า {sku} ในระบบ จึงไม่สามารถบันทึกได้"));
      return;
    }
    if (!Number.isInteger(suggestedCostPrice) || suggestedCostPrice < 0) {
      errors.push(formatUiText("landedCostNewCostInvalid", { sku: productId }, "ต้นทุนใหม่ของ {sku} ต้องเป็นจำนวนเต็ม 0 ขึ้นไป"));
      return;
    }
    if (!Number.isInteger(suggestedPrice) || suggestedPrice < 0) {
      errors.push(formatUiText("landedCostNewPriceInvalid", { sku: productId }, "ราคาขายใหม่ของ {sku} ต้องเป็นจำนวนเต็ม 0 ขึ้นไป"));
      return;
    }

    seen.add(productId);
    items.push({
      productId,
      costPrice: suggestedCostPrice,
      price: suggestedPrice
    });
  });

  if (!items.length && !errors.length) {
    errors.push(t("selectAtLeastOneBeforeSave", "กรุณาเลือกรายการอย่างน้อย 1 รายการก่อนบันทึก"));
  }

  return { items, errors };
}

async function applyLandedCostPreview() {
  if (!ensureAdminSessionForLandedCost()) return;
  if (state.admin.isSubmitting) return;

  const calcState = state.admin.landedCost;
  const { items, errors } = buildLandedCostApplyItems();
  if (errors.length) {
    calcState.applyError = errors.join(" · ");
    calcState.applyStatus = "";
    calcState.appliedCount = 0;
    renderLandedCostSheet();
    showToast(calcState.applyError, "warning");
    return;
  }

  const confirmed = window.confirm(
    formatUiText(
      "landedCostApplyConfirm",
      { count: items.length },
      "ยืนยันบันทึกราคาทุน/ราคาขายจริง {count} รายการ?\n\nระบบจะอัปเดต costPrice และ price ใน Products จริง\nกรุณาตรวจสอบก่อนบันทึกจริง"
    )
  );
  if (!confirmed) return;

  state.admin.isSubmitting = true;
  calcState.applyError = "";
  calcState.applyStatus = "";
  calcState.appliedCount = 0;
  renderLandedCostSheet();

  try {
    showLoading(t("savingCostSalePrices", "กำลังบันทึกราคาทุน/ราคาขาย..."));
    const form = new URLSearchParams();
    form.append("action", "bulkUpdateProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const updated = Number(json.updated || json.data?.updated || items.length);
      calcState.applyStatus = formatUiText("landedCostSaveSuccess", { count: updated }, "บันทึกสำเร็จ {count} รายการ");
      calcState.applyError = "";
      calcState.appliedCount = updated;
      showToast(calcState.applyStatus, "success");
      await refreshProducts();
      renderLandedCostSheet();
      return;
    }

    const backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors.join(" · ")
      : "";
    calcState.applyError = backendErrors || json?.message || json?.error || t("landedCostSaveFailed", "บันทึกราคาทุน/ราคาขายไม่สำเร็จ");
    calcState.applyStatus = "";
    calcState.appliedCount = 0;
    renderLandedCostSheet();
    if (isAuthError(json?.error)) {
      showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(calcState.applyError, "error");
  } catch (err) {
    console.error(err);
    calcState.applyError = t("landedCostSaveFailedRetry", "บันทึกราคาทุน/ราคาขายไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
    calcState.applyStatus = "";
    calcState.appliedCount = 0;
    renderLandedCostSheet();
    showToast(calcState.applyError, "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderLandedCostSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

function formatLandedCostDiff(value) {
  const number = Number(value || 0);
  const prefix = number > 0 ? "+" : "";
  return `${prefix}${number.toLocaleString("th-TH")}`;
}

function ensureAdminSessionForPartnerAdmin() {
  if (
    state.mode !== "admin" ||
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()

    showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
    exitAdmin();
    return false;
  }
  return true;
}

}

  refreshPartners();

function updateNewPartnerField(field, value) {
  const draft = state.admin.partners.newPartner;
  if (!Object.prototype.hasOwnProperty.call(draft, field)) return;
  draft[field] = value || "";
  state.admin.partners.error = "";
}

function getPartnerStatusLabel(status) {
  const normalized = String(status || "").trim().toLowerCase();
  if (normalized === "active") return t("activeDisplay", "เปิดใช้งาน");
  if (normalized === "disabled") return t("disabledDisplay", "ปิดใช้งาน");
  return normalized || "-";
}

function getPartnerStatusClass(status) {
  const normalized = String(status || "").trim().toLowerCase();
  if (normalized === "active") return "status-ready";
  if (normalized === "disabled") return "status-neutral";
  return "status-neutral";
}

async function fetchPartners() {
  if (!ensureAdminSessionForPartnerAdmin()) return;
  const partnerState = state.admin.partners;
  partnerState.loading = true;
  partnerState.error = "";
  renderPartnerAdminSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "listPartners");
    form.append("token", state.admin.token);
    if (String(partnerState.q || "").trim()) {
      form.append("q", partnerState.q.trim());
    }
    if (partnerState.status && partnerState.status !== "all") {
      form.append("status", partnerState.status);
    }

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || t("partnerLoadDeployError", "ยังไม่สามารถโหลดคู่ค้าได้ กรุณาตรวจสอบการ Deploy Apps Script"));
    }

    partnerState.items = Array.isArray(json.data?.partners)
      ? json.data.partners
      : [];
    partnerState.total = Number(json.data?.total || partnerState.items.length || 0);
  } catch (err) {
    console.error(err);
    partnerState.items = [];
    partnerState.total = 0;
    partnerState.error = t("partnerLoadDeployError", "ยังไม่สามารถโหลดคู่ค้าได้ กรุณาตรวจสอบการ Deploy Apps Script");
  } finally {
    partnerState.loading = false;
    renderPartnerAdminSheet();
  }
}

async function createPartnerFromAdmin() {
  if (!ensureAdminSessionForPartnerAdmin()) return;
  const partnerState = state.admin.partners;
  const draft = partnerState.newPartner;
  const partnerId = String(draft.partnerId || "").trim();
  const partnerName = String(draft.partnerName || "").trim();

  if (!partnerId) {
    partnerState.error = t("partnerIdRequired", "กรุณาระบุรหัสคู่ค้า");
    renderPartnerAdminSheet();
    return;
  }
  if (!partnerName) {
    partnerState.error = t("partnerNameRequired", "กรุณาระบุชื่อคู่ค้า");
    renderPartnerAdminSheet();
    return;
  }

  partnerState.isCreating = true;
  partnerState.error = "";
  partnerState.message = "";
  renderPartnerAdminSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "createPartner");
    form.append("token", state.admin.token);
    [
      "partnerId",
      "partnerName",
      "contactName",
      "email",
      "phone",
      "company",
      "status",
      "note"
    ].forEach(field => {
      form.append(field, String(draft[field] || "").trim());
    });

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast(t("sessionExpiredLoginAgain", "เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง"), "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || t("addPartnerFailed", "เพิ่มคู่ค้าไม่สำเร็จ"));
    }

    resetNewPartnerDraft();
    partnerState.isCreating = false;
    showToast(t("addPartnerSuccess", "เพิ่มคู่ค้าสำเร็จ"), "success");
    await fetchPartners();
    partnerState.message = t("addPartnerSuccess", "เพิ่มคู่ค้าสำเร็จ");
    renderPartnerAdminSheet();
  } catch (err) {
    console.error(err);
    partnerState.error = err.message || t("addPartnerFailed", "เพิ่มคู่ค้าไม่สำเร็จ");
    renderPartnerAdminSheet();
  } finally {
    partnerState.isCreating = false;
    renderPartnerAdminSheet();
  }
}

function getPartnerCatalogSelectedSkus() {
  const selectedSkus = Array.isArray(state.admin.partnerCatalog.selectedSkus)
    ? state.admin.partnerCatalog.selectedSkus
    : [];
  const seen = new Set();
  return selectedSkus
    .map(normalizeProductId)
    .filter(productId => {
      if (!productId || seen.has(productId)) return false;
      seen.add(productId);
      return true;
    });
}

function getPartnerCatalogPickerProducts() {
  const partnerState = state.admin.partnerCatalog;
  const searchText = String(partnerState.pickerSearch || "").trim().toLowerCase();
  const rawStatusFilter = String(partnerState.pickerStatus || "all").trim().toLowerCase();
  const statusFilter = rawStatusFilter === "all" ? "all" : normalizeProductStatus(rawStatusFilter);
  const products = Array.isArray(state.products) ? state.products : [];

  return products.filter(product => {
    const productId = normalizeProductId(product.productId);
    const name = String(product.name || "").toLowerCase();
    const status = normalizeProductStatus(product.status);
    const matchesSearch = !searchText ||
      productId.toLowerCase().includes(searchText) ||
      name.includes(searchText);
    const matchesStatus = !statusFilter ||
      statusFilter === "all" ||
      status === statusFilter;
    return matchesSearch && matchesStatus;
  });
}

function togglePartnerCatalogProduct(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(getPartnerCatalogSelectedSkus());
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.partnerCatalog.selectedSkus = Array.from(selected);
  renderPartnerCatalogSheetPreservingPickerScroll();
}

function selectVisiblePartnerCatalogProducts() {
  const selected = new Set(getPartnerCatalogSelectedSkus());
  getPartnerCatalogPickerProducts().forEach(product => {
    const productId = normalizeProductId(product.productId);
    if (productId) selected.add(productId);
  });
  state.admin.partnerCatalog.selectedSkus = Array.from(selected);
  renderPartnerCatalogSheet();
}

function clearPartnerCatalogSelection() {
  state.admin.partnerCatalog.selectedSkus = [];
  renderPartnerCatalogSheet();
}

function getPartnerCatalogExpiresAt() {
  const partnerState = state.admin.partnerCatalog;
  if (partnerState.expiryMode === "custom") {
    const value = String(partnerState.customExpiresAt || "").trim();
    if (!value) return "";
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? "" : date.toISOString();
  }

  const days = Number(partnerState.expiryMode || 14);
  if (![7, 14, 30].includes(days)) return "";
  return new Date(Date.now() + days * 24 * 60 * 60 * 1000).toISOString();
}

function getPartnerCatalogResultUrl(data) {
  const rawToken = String(data?.token || "").trim();
  if (!rawToken) return "";
  const url = new URL("partner.html", window.location.href);
  url.searchParams.set("token", rawToken);
  return url.toString();
}
