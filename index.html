 async function createAllPendingDelivery() {
   if (state.admin.isSubmitting) return;
   state.admin.isSubmitting = true;

   try {
     const order =
       state.admin.pendingDeliveryOrder;

     if (!order) {
       showToast(
         t("orderNotFound", "ไม่พบข้อมูลออเดอร์"),
         "warning"
       );
       return;
     }

     const items =
       Array.isArray(order.items)
         ? order.items
         : [];

     if (!items.length) {
       showToast(
         "ไม่มีรายการสินค้า",
         "warning"
       );
       return;
     }

     showLoading(
       t("creatingPendingDelivery", "กำลังสร้างรายการค้างส่ง...")
     );

     const succeededItems = [];
     const failedItems = [];

     for (const item of items) {
       try {
         const form =
           new URLSearchParams();

         form.append("action", "createPendingDelivery");
         form.append("token", state.admin.token);
         form.append("orderId", order.orderId);
         form.append("poNumber", order.poNumber || "");
         form.append("productId", item.productId);
         form.append("orderedQty", Number(item.qty) || 0);
         form.append("qty", Number(item.qty) || 0);
         form.append("note", "Bulk Pending Delivery");

         const result =
           await postFormAction(form);

         if (!result?.success) {
           throw new Error(
             result?.error ||
             t("createPendingDeliveryError", "ไม่สามารถสร้างรายการค้างส่งได้")
           );
         }

         succeededItems.push(item);
       } catch (err) {
         failedItems.push({
           item,
           error: err.message || t("createPendingDeliveryError", "ไม่สามารถสร้างรายการค้างส่งได้")
         });
       }
     }

     if (failedItems.length === 0) {
       showToast(
         t("createAllPendingDeliverySuccess", "สร้างรายการค้างส่งทั้งหมดสำเร็จ"),
         "success"
       );

       openPendingDeliverySheet();
       return;
     }

     if (succeededItems.length > 0) {
       const successText = succeededItems
         .map(item => `- ${item.name || item.productId}`)
         .join("\n");
       const failureText = failedItems
         .map(({ item, error }) =>
           `- ${item.name || item.productId}: ${error}`
         )
         .join("\n");

       showToast(
         `สร้างสำเร็จ:\n${successText}\n\nสร้างไม่สำเร็จ:\n${failureText}`,
         "warning",
         7000
       );

       openPendingDeliverySheet();
       return;
     }

     showToast(
       t("createPendingDeliveryError", "ไม่สามารถสร้างรายการค้างส่งได้") + "\n" +
         failedItems
           .map(({ item, error }) =>
             `- ${item.name || item.productId}: ${error}`
           )
           .join("\n"),
       "error",
       7000
     );

   } finally {
     state.admin.isSubmitting = false;
     safeHideLoading();
   }
 }

async function handleApprove() {
  // 🔒 GUARD: ต้องอยู่ใน admin mode และมี order
  if (state.mode !== "admin" || !state.admin.selectedOrder) return;

  try {
    const o = state.admin.selectedOrder;

    // ✅ CORE: ใช้ API เวอร์ชันใหม่ (มี loading + toast + guard)
    await adminApproveOrder(o.orderId);

    // ✅ ปิดหน้า Order Detail ผ่าน Overlay Manager
    closeOverlay(adminOrderSheet);

    // 🔄 refresh stock + product list
    await refreshProducts();

    // ✅ อนุญาตให้เปิด Orders (เฉพาะ flow นี้)
    allowOpenOrders = true;

    // ✅ กลับไปหน้า Pending Orders เพื่อทำรายการต่อได้ทันที
    await openAdminDashboard("PENDING", true);

  } catch (err) {
    // ❌ ไม่ต้อง alert ซ้ำ
    // toast + error handling จัดการใน adminApproveOrder แล้ว
    console.warn("handleApprove aborted:", err);
  }
}

async function handleReject() {
  // 🔒 GUARD: ต้องอยู่ใน admin mode และมี order
  if (state.mode !== "admin" || !state.admin.selectedOrder) return;

  try {
    const o = state.admin.selectedOrder;

  } catch (err) {
    // ❌ ไม่ต้อง alert ซ้ำ
    // toast + error handling จัดการใน adminRejectOrder แล้ว
    console.warn("handleReject aborted:", err);
  }
}

async function submitStockIn(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.selectedProduct) {
    showToast(t("noPermission", "ไม่มีสิทธิ์ใช้งานส่วนนี้"), "error");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const qty    = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(qty) || qty <= 0) {
    showToast(t("invalidQty", "จำนวนไม่ถูกต้อง"), "warning");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockIn(
      state.selectedProduct.productId,
      qty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

    showToast(t("stockInSuccess", "รับสต๊อกเข้าแล้ว"), "success");

    // 🔄 sync ข้อมูลหลัก + ข้อมูลย้อนหลังทันที
    await refreshProducts();
    await refreshAdminAuditSnapshot();

    // 🧹 reset input
    qtyInput.value = "";
    reasonInput.value = "";

    // ✅ ปิด Stock Action ผ่าน Overlay Manager
    closeOverlay(adminStockActionSheet);

    // ✅ กลับสู่หน้าแม่ของ admin แบบนิ่ง
    finishAdminAction({ refresh: true });

  } catch (err) {
    console.error(err);
    showToast(err.message || t("stockInError", "ไม่สามารถรับสต๊อกได้"), "error");
  } finally {
    // 🔓 เปิดปุ่มกลับทุกกรณี
    buttons.forEach(b => b.disabled = false);
  }
}

  try {

  if (noteState.imageExportProgress === undefined) noteState.imageExportProgress = null;
  if (noteState.imageExportSessionId === undefined) noteState.imageExportSessionId = 0;
  if (noteState.imageExportWarningPopupDismissedSessionId === undefined) noteState.imageExportWarningPopupDismissedSessionId = 0;
  if (noteState.imageExportWarningPopupShown === undefined) noteState.imageExportWarningPopupShown = false;
  if (noteState.imageExportWarningPopupActiveSessionId === undefined) noteState.imageExportWarningPopupActiveSessionId = 0;
  if (!Array.isArray(noteState.imageExportPages)) noteState.imageExportPages = [];
  if (noteState.imageExportReady === undefined) noteState.imageExportReady = false;
  return state.admin.deliveryNote;
}

function parseDeliveryNotePoInput(value) {
  const seen = new Set();
  return String(value || "")
    .split(/[\s,]+/)
    .map(item => item.trim())
    .filter(Boolean)
    .filter(item => {
      const key = normalizePoNumberForCompare(item);
      if (!key || seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

async function ensureDeliveryNotePickerOrders() {
  const noteState = getDeliveryNoteState();
  if (Array.isArray(state.admin.orders) && state.admin.orders.length) return;
  if (noteState.poPickerLoading) return;

  noteState.poPickerLoading = true;
  noteState.poPickerError = "";
  renderDeliveryNoteSheet();

  try {
    const orders = await fetchOrders();
    state.admin.orders = Array.isArray(orders) ? orders : [];
  } catch (err) {
    console.error("delivery note PO picker load failed:", err);
    noteState.poPickerError = err.message || t("deliveryNotePickerLoadError", "ไม่สามารถโหลดออเดอร์ได้");
  } finally {
    noteState.poPickerLoading = false;
    renderDeliveryNoteSheet();
  }
}

function getDeliveryNoteOrderDate(order) {
  const value = getOrderDateValue(order);
  const date = value ? new Date(value) : null;
  return date && !Number.isNaN(date.getTime()) ? date : null;
}

function isDeliveryNoteOrderInRange(order, range) {
  if (range === "all") return true;
  const date = getDeliveryNoteOrderDate(order);
  if (!date) return true;

  const today = new Date();
  const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const orderDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());

  if (range === "today") {
    return orderDay.getTime() === start.getTime();
  }

  const last7Start = new Date(start);
  last7Start.setDate(last7Start.getDate() - 6);
  return orderDay >= last7Start;
}

function getDeliveryNotePickerOrders() {
  const noteState = getDeliveryNoteState();
  const query = String(noteState.poPickerQuery || "").trim().toLowerCase();
  const orders = Array.isArray(state.admin.orders) ? state.admin.orders : [];

  return orders
    .filter(order => isDeliveryNoteOrderInRange(order, noteState.poPickerRange || "last7"))
    .filter(order => {
      if (!query) return true;
      return [
        order?.poNumber,
        order?.orderId
      ].some(value => String(value || "").toLowerCase().includes(query));
    })
    .sort((a, b) => {
      const aDate = getDeliveryNoteOrderDate(a);
      const bDate = getDeliveryNoteOrderDate(b);
      return (bDate ? bDate.getTime() : 0) - (aDate ? aDate.getTime() : 0);
    });
}

function updateDeliveryNotePoPickerQuery(value) {
  getDeliveryNoteState().poPickerQuery = String(value || "");

}

function setDeliveryNotePoPickerRange(range) {
  const safeRange = ["today", "last7", "all"].includes(range) ? range : "last7";
  getDeliveryNoteState().poPickerRange = safeRange;
  renderDeliveryNoteSheet();
}

function toggleDeliveryNotePoSelection(poNumber, checked) {
  const noteState = getDeliveryNoteState();
  const cleanPo = String(poNumber || "").trim();
  const key = normalizePoNumberForCompare(cleanPo);
  const selected = new Map(
    (Array.isArray(noteState.selectedPoNumbers) ? noteState.selectedPoNumbers : [])
      .map(po => [normalizePoNumberForCompare(po), po])
      .filter(([poKey]) => poKey)
  );

  if (checked && key) {
    selected.set(key, cleanPo);
  } else {
    selected.delete(key);
  }

  noteState.selectedPoNumbers = Array.from(selected.values());
  noteState.poInput = noteState.selectedPoNumbers.join("\n");
  renderDeliveryNoteSheet();
}

function buildDeliveryNoteFromPicker() {
  const noteState = getDeliveryNoteState();

    noteState.poInput = noteState.selectedPoNumbers.join("\n");
  }
  renderDeliveryNoteSheet();

}

function getDeliveryNoteItemKey(order, item, index) {
  return [
    String(order?.orderId || "").trim(),
    String(item?.productId || "").trim(),
    index
  ].join("::");
}

function getDeliveryNoteItemQtyValue(noteState, key, item) {
  const current = noteState.itemQty?.[key];
  if (current !== undefined) return current;
  return String(Number(item?.qty) || 0);
}

function getDeliveryNoteQtyError(key, item) {
  const noteState = getDeliveryNoteState();
  const rawQty = String(getDeliveryNoteItemQtyValue(noteState, key, item) ?? "").trim();
  const qty = Number(rawQty);
  const orderedQty = Number(item?.qty) || 0;

  if (rawQty === "" || !Number.isInteger(qty) || qty < 0 || qty > orderedQty) {
    return formatUiText(
      "deliveryNoteInvalidQty",
      { sku: String(item?.productId || "-"), max: orderedQty },
      "จำนวนส่งของ {sku} ต้องเป็นจำนวนเต็ม 0 ถึง {max}"
    );
  }

  return "";
}

async function prepareDeliveryNoteSearch() {
  const noteState = getDeliveryNoteState();
  const input = document.getElementById("deliveryNotePoInput");
  noteState.poInput = String(input?.value || noteState.poInput || "");
  const poList = parseDeliveryNotePoInput(noteState.poInput);
  noteState.selectedItems = {};
  noteState.itemQty = {};
  noteState.itemNotes = {};
  noteState.poNotes = {};
  noteState.error = "";
  noteState.isBuilding = true;
  renderDeliveryNoteSheet();

  if (!poList.length) {
    noteState.matchedOrders = [];
    noteState.error = t("deliveryNotePoRequired", "กรุณากรอกเลข PO อย่างน้อย 1 รายการ");
    noteState.isBuilding = false;
    renderDeliveryNoteSheet();
    return;
  }

  try {
    if (!Array.isArray(state.admin.orders) || state.admin.orders.length === 0) {
      const orders = await fetchOrders();
      state.admin.orders = Array.isArray(orders) ? orders : [];
    }

    const requestedPoKeys = new Set(poList.map(normalizePoNumberForCompare));
    const matchedOrders = (Array.isArray(state.admin.orders) ? state.admin.orders : [])
      .filter(order => requestedPoKeys.has(normalizePoNumberForCompare(order?.poNumber)));
    const matchedPoKeys = new Set(matchedOrders.map(order => normalizePoNumberForCompare(order?.poNumber)));
    const missingPo = poList.filter(po => !matchedPoKeys.has(normalizePoNumberForCompare(po)));

    noteState.matchedOrders = matchedOrders;
    noteState.error = missingPo.length
      ? missingPo.map(po => formatUiText("deliveryNotePoNotFound", { po }, "ไม่พบ PO: {po}")).join(" · ")
      : "";

    matchedOrders.forEach(order => {
      const orderId = String(order?.orderId || "").trim();
      if (orderId && noteState.poNotes[orderId] === undefined) {
        noteState.poNotes[orderId] = "";
      }

      (Array.isArray(order?.items) ? order.items : []).forEach((item, index) => {
        const key = getDeliveryNoteItemKey(order, item, index);
        noteState.selectedItems[key] = true;
        noteState.itemQty[key] = String(Number(item?.qty) || 0);
        noteState.itemNotes[key] = "";
      });
    });
  } catch (err) {
    console.error("prepare delivery note search failed:", err);
    noteState.matchedOrders = [];
    noteState.error = err.message || t("loadDataFailed", "โหลดข้อมูลไม่สำเร็จ");
  } finally {
    noteState.isBuilding = false;
    renderDeliveryNoteSheet();
  }
}

function findDeliveryNoteProductMeta(productId) {
  const cleanProductId = normalizeProductId(productId || "");
  if (!cleanProductId) return null;
  const products = [
    ...(Array.isArray(state.products) ? state.products : []),
    ...(Array.isArray(state.admin?.products) ? state.admin.products : [])
  ];
  return products.find(product =>
    normalizeProductId(product?.productId || "") === cleanProductId
  ) || null;
}

function getDeliveryNoteVariantMeta(item) {
  const productId = String(item?.productId || "").trim();
  const product = findDeliveryNoteProductMeta(productId) || {};
  const parentProductId = String(item?.parentProductId || product.parentProductId || "").trim();
  const variantType = String(item?.variantType || product.variantType || "").trim().toLowerCase();
  const variantValue = String(item?.variantValue || product.variantValue || "").trim();
  const displayName = String(item?.displayName || product.displayName || "").trim();
  const variantSortOrder = Number(item?.variantSortOrder ?? product.variantSortOrder);

  if (!parentProductId || variantType !== "size" || !variantValue) {
    return null;
  }

  return {
    groupCode: parentProductId,
    groupName: displayName || String(item?.name || product.name || "").trim(),
    size: variantValue,
    sortOrder: Number.isFinite(variantSortOrder) ? variantSortOrder : 9999
  };
}

function buildDeliveryNoteData() {
  const noteState = getDeliveryNoteState();
  const orders = [];
  const errors = [];

  (Array.isArray(noteState.matchedOrders) ? noteState.matchedOrders : []).forEach(order => {
    const orderId = String(order?.orderId || "").trim();
    const poNumber = String(order?.poNumber || "").trim();
    const orderItems = [];

    (Array.isArray(order?.items) ? order.items : []).forEach((item, index) => {
      const key = getDeliveryNoteItemKey(order, item, index);
      if (noteState.selectedItems[key] === false) return;

      const qtyError = getDeliveryNoteQtyError(key, item);
      if (qtyError) {
        errors.push(qtyError);
        return;
      }

      const deliveryQty = Number(getDeliveryNoteItemQtyValue(noteState, key, item));
      if (!deliveryQty) return;

      const productId = String(item?.productId || "").trim();
      const name = String(item?.name || "").trim();
      orderItems.push({
        key,
        orderId,
        poNumber,
        productId,
        name,
        deliveryQty,
        itemNote: String(noteState.itemNotes?.[key] || "").trim(),
        imageUrl: getAdminPoPrintItemImage(item),
        variantMeta: getDeliveryNoteVariantMeta(item)
      });
    });

    if (orderItems.length) {
      orders.push({
        orderId,
        poNumber,
        orderDate: getOrderDateValue(order),
        poNote: String(noteState.poNotes?.[orderId] || "").trim(),
        items: orderItems
      });
    }
  });

  return { orders, errors };
}

function getValidatedDeliveryNoteData() {
  const data = buildDeliveryNoteData();

  if (data.errors.length) {
    showToast(data.errors[0], "warning");
    return null;
  }

  const itemCount = data.orders.reduce((sum, order) => sum + order.items.length, 0);
  if (!itemCount) {
    showToast(t("deliveryNoteNoSelectedItems", "กรุณาเลือกรายการที่มีจำนวนส่งมากกว่า 0 อย่างน้อย 1 รายการ"), "warning");
    return null;
  }

  return data;
}

function formatDeliveryNoteShortDate(value) {

  if (Number.isNaN(date.getTime())) return String(value || "").trim();

          columnHeaderHtml: ${toInlineJsStringLiteral(columnHeaderHtml)},

        function closePrintPage() {
          try {
            if (window.opener && !window.opener.closed) {
              window.opener.focus();
            }
          } catch (err) {}
          window.close();
          setTimeout(function() {
            if (history.length > 1) {
              history.back();

        function escapePrintHtml(value) {
          return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function buildDeliveryNotePage(orderEl, pageNumber) {
          var cfg = DELIVERY_NOTE_PRINT;
          var poNumber = escapePrintHtml(orderEl.dataset.poNumber || "-");
          var orderDate = escapePrintHtml(orderEl.dataset.orderDate || "-");
          var orderId = escapePrintHtml(orderEl.dataset.orderId || "");

            '<div class="delivery-note-page-head">' +
              '<div class="doc-header">' +
                '<div>' +
                  '<img class="delivery-note-logo" src="' + escapePrintHtml(cfg.logoUrl) + '" alt="Luopanich" loading="eager" decoding="sync" onerror="this.remove();">' +
                  '<div class="shop-name">' + escapePrintHtml(cfg.shopName) + '</div>' +
                  '<h1>' + escapePrintHtml(cfg.title) + '</h1>' +
                '</div>' +
                '<div class="doc-meta">' +
                  '<div><strong>' + escapePrintHtml(cfg.printedAt) + '</strong><span>' + escapePrintHtml(cfg.printDateTime) + '</span></div>' +
                '</div>' +
              '</div>' +
              '<div class="po-heading">' +
                '<div>' +
                  '<h2>' + poNumber + '</h2>' +
                  '<div class="muted">' +
                    orderDate +
                    (orderId ? ' · ' + escapePrintHtml(cfg.orderNumber) + ': ' + orderId : '') +
                  '</div>' +
                '</div>' +
              '</div>' +
              (poNote ? '<div class="note-box"><strong>' + escapePrintHtml(cfg.note) + ':</strong> ' + poNote + '</div>' : '') +
              cfg.columnHeaderHtml +
            '</div>' +
            '<div class="delivery-note-page-body"></div>' +
            '<div class="delivery-note-page-footer">' + escapePrintHtml(cfg.pageLabel) + ' <span class="page-current">' + pageNumber + '</span> ' + escapePrintHtml(cfg.ofLabel) + ' <span class="page-total">?</span></div>' +
            '</div>';
          return {
            page: page,
            body: page.querySelector(".delivery-note-page-body")
          };
        }

        function paginateDeliveryNotePrint() {
          var pagesRoot = document.getElementById("deliveryNotePrintPages");
          var sourceRoot = document.getElementById("deliveryNotePrintSource");
          var orders = Array.prototype.slice.call(sourceRoot.querySelectorAll(".delivery-note-source-order"));
          var current = null;
          var pageNumber = 0;
          var maxRowsPerPage = 8;

          pagesRoot.innerHTML = "";

          orders.forEach(function(orderEl) {
            var rows = Array.prototype.slice.call(orderEl.querySelectorAll(".delivery-note-source-row"));
            rows.forEach(function(rowEl) {
              if (!current || current.orderEl !== orderEl) {
                pageNumber += 1;
                current = buildDeliveryNotePage(orderEl, pageNumber);
                current.orderEl = orderEl;
                pagesRoot.appendChild(current.page);
              }

              var row = rowEl.cloneNode(true);
              row.classList.remove("delivery-note-source-row");
              row.classList.add("delivery-note-page-row");
              current.body.appendChild(row);

              if (
                (current.body.scrollHeight > current.body.clientHeight ||
                  current.body.children.length > maxRowsPerPage) &&
                current.body.children.length > 1
              ) {
                row.remove();
                pageNumber += 1;
                current = buildDeliveryNotePage(orderEl, pageNumber);
                current.orderEl = orderEl;
                pagesRoot.appendChild(current.page);
                current.body.appendChild(row);
              }
            });
          });

          Array.prototype.slice.call(document.querySelectorAll(".page-total")).forEach(function(el) {
            el.textContent = String(pageNumber || 1);
          });
          sourceRoot.remove();
        }

        window.onload = function() {
          paginateDeliveryNotePrint();
          if (DELIVERY_NOTE_PRINT.autoPrint) {
            requestAnimationFrame(function() {
              window.print();
            });
          }
        };
      <\/script>

function buildDeliveryNoteCopyText(data) {
  const noteLabel = t("note", "หมายเหตุ");
  const lines = [
    t("deliveryNote", "ใบส่งของ"),
    t("shopTitle", "ร้านค้า Luopanich"),
    ""
  ];

  data.orders.forEach(order => {
    const shortDate = formatDeliveryNoteShortDate(order.orderDate);
    lines.push([order.poNumber || "-", shortDate].filter(Boolean).join(" "));
    if (order.poNote) lines.push(`${noteLabel}: ${order.poNote}`);

    buildDeliveryNoteDisplayRows(order.items).forEach(item => {
      const noteText = item.note ? `  ${noteLabel}: ${item.note}` : "";
      lines.push(`${item.displayText || "-"}${noteText}`);
    });

    lines.push("");
  });

  return lines.join("\n").trim();
}

  printWindow.document.write(buildDeliveryNotePrintHtml(data));

function isDeliveryNoteImageExportSessionActive(noteState, sessionId) {

function getSafeDeliveryNoteImageFilePart(value) {
  return String(value || "")
    .trim()
    .replace(/[^a-zA-Z0-9ก-๙_-]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "") || "delivery-note";
}

function getDeliveryNoteImageExportBaseName(data) {
  const poNumbers = [];
  const seen = new Set();

  (Array.isArray(data?.orders) ? data.orders : []).forEach(order => {
    const poNumber = String(order?.poNumber || "").trim();
    const key = normalizePoNumberForCompare(poNumber);
    if (!key || seen.has(key)) return;
    seen.add(key);
    poNumbers.push(poNumber);
  });

  if (poNumbers.length === 1) {
    return `delivery-note-${getSafeDeliveryNoteImageFilePart(poNumbers[0])}`;
  }

  return `delivery-note-${new Date().toISOString().slice(0, 10)}`;
}

function waitForAnimationFrames(count = 2) {
  return new Promise(resolve => {
    const next = remaining => {
      if (remaining <= 0) {
        resolve();
        return;
      }
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(() => next(remaining - 1));
      } else {
        setTimeout(() => next(remaining - 1), 16);
      }
    };
    next(Math.max(1, Number(count) || 1));
  });
}

async function waitForDeliveryNotePreCaptureRepaint() {
  await waitForAnimationFrames(3);
  await new Promise(resolve => setTimeout(resolve, 120));
}

function isDeliveryNoteImageRendered(img) {
  return !!(
    img &&
    img.complete === true &&
    Number(img.naturalWidth || 0) > 0 &&
    Number(img.naturalHeight || 0) > 0
  );
}

function getDeliveryNoteImageRenderFailureReason(img, index) {
  const label = `image ${index + 1}`;
  if (!img) return `${label}: missing image node`;
  if (img.complete !== true) return `${label}: not complete`;
  if (!Number(img.naturalWidth || 0) || !Number(img.naturalHeight || 0)) {
    return `${label}: natural size is 0`;
  }
  return "";
}

async function waitForDeliveryNoteImageRender(img, index) {
  const waitForLoad = () => new Promise(resolve => {
    if (!img || img.complete) {
      resolve();
      return;
    }
    const done = () => {
      img.removeEventListener("load", done);
      img.removeEventListener("error", done);
      resolve();
    };
    img.addEventListener("load", done, { once: true });
    img.addEventListener("error", done, { once: true });
    setTimeout(done, 2500);
  });

  await waitForLoad();

  if (img && typeof img.decode === "function") {
    try {
      await img.decode();
    } catch (err) {
      // A decode rejection can happen for failed images; natural size below decides success.
    }
  }

  await waitForAnimationFrames(1);

  const ok = isDeliveryNoteImageRendered(img);
  return {
    ok,
    reason: ok ? "" : getDeliveryNoteImageRenderFailureReason(img, index),
    isDataUrl: /^data:image\//i.test(String(img?.getAttribute("src") || img?.src || ""))
  };
}

async function waitForDeliveryNoteExportImages(doc) {
  const images = Array.from(doc?.querySelectorAll("img") || []);
  const results = await Promise.all(images.map(waitForDeliveryNoteImageRender));
  const dataUrlResults = results.filter(result => result.isDataUrl);
  return {
    failedCount: results.filter(result => !result.ok).length,
    renderedDataUrlCount: dataUrlResults.filter(result => result.ok).length,
    dataUrlNaturalSizeFailCount: dataUrlResults.filter(result => !result.ok).length,
    failureReasons: results
      .filter(result => !result.ok && result.reason)
      .map(result => result.reason)
      .slice(0, 3)
  };
}

function isDeliveryNoteImageExportCorsRisk(src) {
  const value = String(src || "").trim();
  if (!value || /^(data:|blob:)/i.test(value)) return false;
  try {
    return new URL(value, window.location.href).origin !== window.location.origin;
  } catch (err) {
    return true;
  }
}

function collectDeliveryNoteExportImageUrls(doc) {
  const seen = new Set();
  const urls = [];

  Array.from(doc?.querySelectorAll(".delivery-note-thumb") || []).forEach(img => {
    const src = String(img?.currentSrc || img?.src || img?.getAttribute("src") || "").trim();
    if (!src || /^(data:|blob:)/i.test(src) || seen.has(src)) return;
    seen.add(src);
    urls.push(src);
  });

  return urls;
}

function getDeliveryNoteCurrentImageExportDebug(noteState = getDeliveryNoteState()) {

function roundDeliveryNoteLayoutValue(value) {
  const number = Number(value);
  if (!Number.isFinite(number)) return 0;
  return Math.round(number * 10) / 10;
}

function getDeliveryNoteLayoutMetrics(node) {
  if (!node) return null;
  const rect = node.getBoundingClientRect();
  return {
    left: roundDeliveryNoteLayoutValue(rect.left),
    right: roundDeliveryNoteLayoutValue(rect.right),
    width: roundDeliveryNoteLayoutValue(rect.width),
    scrollWidth: roundDeliveryNoteLayoutValue(node.scrollWidth || 0),
    offsetWidth: roundDeliveryNoteLayoutValue(node.offsetWidth || 0),
    rectWidth: roundDeliveryNoteLayoutValue(rect.width)
  };
}

function interpretDeliveryNotePaperLayout(layout) {
  if (!layout?.paper) return "UNKNOWN";
  if (layout.tableExceedsFrame || layout.tableExceedsPaper) return "TABLE_OVERFLOWS_FRAME";
  if (layout.captureWidthExpanded) return "CAPTURE_WIDTH_EXPANDED";
  if (Math.abs(Number(layout.frameLeftGap || 0) - Number(layout.frameRightGap || 0)) > 8) return "FRAME_OFFSET";
  if (Number(layout.tableLeftGap || 0) > Number(layout.tableRightGap || 0) + 12) return "LEFT_GAP_LARGER";
  if (Number(layout.tableRightGap || 0) < 8) return "RIGHT_GAP_SMALL";
  return "UNKNOWN";
}

function measureDeliveryNotePaperLayout(doc) {
  const page = doc?.querySelector(".delivery-note-print-page");
  if (!page) return { interpretation: "UNKNOWN" };

  const contentFrame = page.querySelector(".delivery-note-content-frame");
  const head = page.querySelector(".delivery-note-page-head");
  const body = page.querySelector(".delivery-note-page-body");
  const footer = page.querySelector(".delivery-note-page-footer");
  const docHeader = page.querySelector(".doc-header");
  const docMeta = page.querySelector(".doc-meta");
  const tableHeader = page.querySelector(".delivery-note-column-header");
  const firstRow = page.querySelector(".delivery-note-print-row");
  const tableWrapper = tableHeader?.closest(".po-section") ||
    tableHeader?.parentElement ||
    body;

  const paper = getDeliveryNoteLayoutMetrics(page);
  const frame = getDeliveryNoteLayoutMetrics(contentFrame);
  const table = getDeliveryNoteLayoutMetrics(tableHeader);
  const fixedPaperWidth = Math.max(Number(page.offsetWidth || 0), Number(paper?.rectWidth || 0));
  const layout = {
    paper,
    contentFrame: frame,
    head: getDeliveryNoteLayoutMetrics(head),
    body: getDeliveryNoteLayoutMetrics(body),
    footer: getDeliveryNoteLayoutMetrics(footer),
    docHeader: getDeliveryNoteLayoutMetrics(docHeader),
    docMeta: getDeliveryNoteLayoutMetrics(docMeta),
    tableHeader: table,
    firstRow: getDeliveryNoteLayoutMetrics(firstRow),
    tableWrapper: getDeliveryNoteLayoutMetrics(tableWrapper),
    tableLeftGap: paper && table ? roundDeliveryNoteLayoutValue(table.left - paper.left) : 0,
    tableRightGap: paper && table ? roundDeliveryNoteLayoutValue(paper.right - table.right) : 0,
    frameLeftGap: paper && frame ? roundDeliveryNoteLayoutValue(frame.left - paper.left) : 0,
    frameRightGap: paper && frame ? roundDeliveryNoteLayoutValue(paper.right - frame.right) : 0,
    tableExceedsFrame: !!(table && frame && (
      table.width > frame.width + 1 ||
      table.scrollWidth > frame.width + 1
    )),
    tableExceedsPaper: !!(table && paper && (
      table.width > paper.width + 1 ||
      table.scrollWidth > paper.width + 1
    )),
    pageScrollWidth: roundDeliveryNoteLayoutValue(page.scrollWidth || 0),
    pageOffsetWidth: roundDeliveryNoteLayoutValue(page.offsetWidth || 0),
    pageRectWidth: roundDeliveryNoteLayoutValue(paper?.rectWidth || 0),
    captureWidthExpanded: !!(
      fixedPaperWidth &&
      Number(page.scrollWidth || 0) > fixedPaperWidth + 1
    )
  };
  layout.interpretation = interpretDeliveryNotePaperLayout(layout);
  return layout;
}

function getDeliveryNoteProxyFailureReason(result) {
  const message = String(result?.error || result?.message || "").trim();
  if (message) return message.slice(0, 120);
  return result?.ok ? "" : "Image proxy failed";
}

function isDeliveryNoteProxyActionUnavailable(error) {
  const message = String(error?.message || error || "").toLowerCase();
  return message.includes("invalid action") ||
    message.includes("unknown action") ||
    message.includes("deliverynoteimagedataurls");
}

async function fetchDeliveryNoteImageDataUrls(urls) {
  if (!Array.isArray(urls) || !urls.length) return [];
  if (!state.admin?.token) {
    throw new Error("Missing admin token");
  }

  const form = new URLSearchParams();
  form.append("action", "deliveryNoteImageDataUrls");
  form.append("token", state.admin.token);
  form.append("urls", JSON.stringify(urls));

  const json = await postFormAction(form);
  return {
    ok: json?.ok !== false,
    results: Array.isArray(json?.results) ? json.results : []
  };
}

function applyDeliveryNoteImageDataUrls(doc, results) {
  const dataUrlsByUrl = new Map();

  (Array.isArray(results) ? results : []).forEach(result => {
    const url = String(result?.url || "").trim();
    const dataUrl = String(result?.dataUrl || "").trim();
    if (result?.ok && url && /^data:image\//i.test(dataUrl)) {
      dataUrlsByUrl.set(url, dataUrl);
    }
  });

  let applied = 0;
  Array.from(doc?.querySelectorAll(".delivery-note-thumb") || []).forEach(img => {
    const src = String(img?.currentSrc || img?.src || img?.getAttribute("src") || "").trim();
    const dataUrl = dataUrlsByUrl.get(src);
    if (!dataUrl) return;
    img.removeAttribute("crossorigin");
    img.removeAttribute("onerror");
    try { img.crossOrigin = null; } catch (err) {}
    img.onerror = null;
    img.loading = "eager";
    img.decoding = "sync";
    img.style.display = img.style.display || "block";
    img.style.visibility = "visible";
    img.style.opacity = "1";
    img.src = dataUrl;
    applied += 1;
  });

  return applied;
}

function getDeliveryNoteImageWaitFailedCount(doc) {
  return Array.from(doc?.querySelectorAll(".delivery-note-thumb") || [])
    .filter(img => !img.complete || !img.naturalWidth || !img.naturalHeight)
    .length;
}

function prepareDeliveryNoteExportImageNodes(doc) {
  const images = Array.from(doc?.querySelectorAll(".delivery-note-thumb") || []);
  images.forEach(img => {
    const src = img.getAttribute("src");
    if (!src || /^(data:|blob:)/i.test(src) || img.getAttribute("crossorigin")) return;
    img.setAttribute("crossorigin", "anonymous");
    img.crossOrigin = "anonymous";
    img.src = src;
  });
}

function hasDeliveryNoteExportImageWarning(doc) {
  return Array.from(doc?.querySelectorAll(".delivery-note-thumb") || [])
    .some(img => {
      const src = img.getAttribute("src") || "";
      return !img.complete ||
        !img.naturalWidth ||
        !img.naturalHeight ||
        isDeliveryNoteImageExportCorsRisk(src);
    });
}

function getDeliveryNoteFinalProductImageStatus(doc) {
  const images = Array.from(doc?.querySelectorAll(".delivery-note-thumb") || []);
  const details = images.map((img, index) => {
    const src = String(img?.getAttribute("src") || img?.src || "");
    const isDataUrl = /^data:image\//i.test(src);
    const isReady = isDeliveryNoteImageRendered(img);
    return {
      img,
      isDataUrl,
      isReady,
      reason: isReady ? "" : getDeliveryNoteImageRenderFailureReason(img, index)
    };
  });
  const failures = details.filter(item => item.reason);
  const dataUrlImages = details.filter(item => item.isDataUrl);
  return {
    total: images.length,
    ready: images.length - failures.length,
    failed: failures.length,
    dataUrlCount: dataUrlImages.length,
    dataUrlReady: dataUrlImages.filter(item => item.isReady).length,
    failureReasons: failures.map(item => item.reason).slice(0, 3)
  };
}

function applyDeliveryNoteFinalProductImageStatus(debug, doc) {
  const status = getDeliveryNoteFinalProductImageStatus(doc);
  if (debug) {
    debug.finalProductImageCount = status.total;
    debug.finalProductImageReadyCount = status.ready;
    debug.finalProductImageFailedCount = status.failed;
    debug.finalProductImageDataUrlCount = status.dataUrlCount;
    debug.finalProductImageDataUrlReadyCount = status.dataUrlReady;
    debug.finalProductImageFailureReasons = status.failureReasons;
  }
  return status;
}

function isDeliveryNoteProductImagesSafeForPng(debug, sessionId = 0) {
  if (!debug) return false;
  const expectedSessionId = Number(sessionId || 0);
  const debugSessionId = Number(debug.sessionId || 0);
  if (expectedSessionId && debugSessionId && expectedSessionId !== debugSessionId) return false;
  const finalTotal = Number(debug.finalProductImageCount || 0);
  const validExportPages = Number(debug.validExportPageCount || 0);
  if (!finalTotal) return true;
  if (!validExportPages || Number(debug.finalProductImageFailedCount || 0) !== 0) return false;
  const finalDataUrlsReady =
    Number(debug.finalProductImageDataUrlCount || 0) === finalTotal &&
    Number(debug.finalProductImageDataUrlReadyCount || 0) === finalTotal;
  return Number(debug.imageUrlCount || 0) > 0 &&
    Number(debug.proxyFailureCount || 0) === 0 &&
    finalDataUrlsReady;
}

function isDeliveryNoteExportPageStable(pageNode) {
  const images = Array.from(pageNode?.querySelectorAll("img") || []);
  return images.every(isDeliveryNoteImageRendered);
}

function getDeliveryNoteExportPageSize(pageNode) {
  const rect = pageNode.getBoundingClientRect();
  const fixedWidth = Math.max(pageNode.offsetWidth, rect.width);
  const width = Math.ceil(fixedWidth || pageNode.scrollWidth);
  const height = Math.ceil(Math.max(
    pageNode.scrollHeight,
    pageNode.offsetHeight,
    rect.height
  ));
  return { width, height };
}

async function captureDeliveryNoteExportPage(pageNode, debug) {
  pageNode.style.overflow = "visible";
  pageNode.style.maxWidth = "none";
  pageNode.style.background = "#ffffff";
  const pageBody = pageNode.querySelector(".delivery-note-page-body");
  if (pageBody) pageBody.style.overflow = "visible";

  let lastBlob = null;
  for (let attempt = 0; attempt < 2; attempt += 1) {
    const pageSize = getDeliveryNoteExportPageSize(pageNode);
    const blob = await window.htmlToImage.toBlob(pageNode, {
      backgroundColor: "#ffffff",
      pixelRatio: 2,
      cacheBust: true,
      width: pageSize.width,
      height: pageSize.height,
      style: {
        width: `${pageSize.width}px`,
        height: `${pageSize.height}px`,
        maxWidth: "none",
        overflow: "visible",
        background: "#ffffff"
      }
    });

    if (!blob) return null;

    lastBlob = blob;
    const stable = isDeliveryNoteExportPageStable(pageNode);
    if (stable || attempt === 1) return lastBlob;

    if (debug) {
      debug.captureRetryCount = Number(debug.captureRetryCount || 0) + 1;
      debug.captureUnstableBeforeRetry = true;
    }
    await waitForDeliveryNoteExportImages(pageNode.ownerDocument);
    await waitForDeliveryNotePreCaptureRepaint();
  }

  return lastBlob;
}

function prepareDeliveryNoteImageExport() {
  const data = getValidatedDeliveryNoteData();
  if (!data) return;

  const noteState = getDeliveryNoteState();
  const sessionId = Number(noteState.imageExportSessionId || 0) + 1;
  noteState.imageExportSessionId = sessionId;
  noteState.imageExportLoading = true;
  resetDeliveryNoteImageExportState(noteState, "preparing");
  updateDeliveryNoteImageExportProgress(noteState, { step: "preparing" });
  noteState.imageExportDebug = createDeliveryNoteImageExportDebug(sessionId);
  renderDeliveryNoteSheet();

  if (!window.htmlToImage || typeof window.htmlToImage.toBlob !== "function") {
    noteState.imageExportLoading = false;
    setDeliveryNoteImageExportPhase(noteState, "failed");
    updateDeliveryNoteImageExportProgress(noteState, { step: "failed" });
    noteState.imageExportError = t("deliveryNoteImageExportFailed", "ไม่สามารถส่งออกเป็นรูปภาพได้");
    renderDeliveryNoteSheet();
    return;
  }

  const frame = document.createElement("iframe");
  frame.title = "Delivery Note image export preview";
  frame.setAttribute("aria-hidden", "true");
  frame.style.position = "fixed";
  frame.style.left = "-10000px";
  frame.style.top = "0";
  frame.style.width = "820px";
  frame.style.height = "1180px";
  frame.style.opacity = "0";
  frame.style.pointerEvents = "none";
  frame.style.border = "0";

  const cleanup = () => {
    if (frame.parentNode) frame.parentNode.removeChild(frame);
  };

  frame.onload = () => {
    window.setTimeout(async () => {
      try {
        if (!isDeliveryNoteImageExportSessionActive(noteState, sessionId)) return;
        const doc = frame.contentDocument || frame.contentWindow?.document;
        const pages = doc
          ? Array.from(doc.querySelectorAll(".delivery-note-print-page"))
          : [];

        if (!pages.length) {
          throw new Error(t("deliveryNoteImageExportFailed", "ไม่สามารถส่งออกเป็นรูปภาพได้"));
        }

        let imageWarning = false;
        const debug = createDeliveryNoteImageExportDebug(sessionId);
        noteState.imageExportDebug = debug;
        const imageUrls = collectDeliveryNoteExportImageUrls(doc);
        debug.imageUrlCount = imageUrls.length;
        updateDeliveryNoteImageExportProgress(noteState, {
          step: "loading",
          imageTotal: imageUrls.length,
          imageConverted: 0,
          imageFailed: 0,
          capturePage: 0,
          captureTotal: pages.length
        });
        renderDeliveryNoteSheet();
        if (imageUrls.length) {
          debug.proxyAttempted = true;
          try {
            const proxyResponse = await fetchDeliveryNoteImageDataUrls(imageUrls);
            const proxyResults = Array.isArray(proxyResponse?.results) ? proxyResponse.results : [];
            debug.backendOk = proxyResponse?.ok !== false;
            debug.proxySuccessCount = proxyResults.filter(result => !!result?.ok).length;
            debug.proxyFailureCount = Math.max(0, imageUrls.length - debug.proxySuccessCount);
            debug.failureReasons = proxyResults
              .filter(result => !result?.ok)
              .map(getDeliveryNoteProxyFailureReason)
              .filter(Boolean)
              .slice(0, 3);
            const appliedCount = applyDeliveryNoteImageDataUrls(doc, proxyResults);
            debug.dataUrlAppliedCount = appliedCount;
            updateDeliveryNoteImageExportProgress(noteState, {
              step: "converting",
              imageTotal: imageUrls.length,
              imageConverted: debug.proxySuccessCount,
              imageFailed: debug.proxyFailureCount
            });
            renderDeliveryNoteSheet();
            imageWarning = debug.proxyFailureCount > 0 ||
              appliedCount < imageUrls.length;
          } catch (err) {
            console.warn("delivery note image proxy unavailable:", err);
            debug.backendError = String(err?.message || err || "").slice(0, 160);
            debug.actionUnavailable = isDeliveryNoteProxyActionUnavailable(err);
            debug.proxyFailureCount = imageUrls.length;
            debug.failureReasons = debug.backendError ? [debug.backendError] : [];
            updateDeliveryNoteImageExportProgress(noteState, {
              step: "converting",
              imageTotal: imageUrls.length,
              imageConverted: 0,
              imageFailed: imageUrls.length
            });
            renderDeliveryNoteSheet();
            imageWarning = true;
          }
        }

        if (!isDeliveryNoteImageExportSessionActive(noteState, sessionId)) return;
        setDeliveryNoteImageExportPhase(noteState, "decoding");
        updateDeliveryNoteImageExportProgress(noteState, {
          step: "loading",
          imageTotal: imageUrls.length,
          imageConverted: debug.proxySuccessCount,
          imageFailed: debug.proxyFailureCount
        });
        renderDeliveryNoteSheet();
        prepareDeliveryNoteExportImageNodes(doc);
        const imageWaitSummary = await waitForDeliveryNoteExportImages(doc);
        debug.imageWaitFailedCount = Number(imageWaitSummary.failedCount || 0);
        debug.dataUrlRenderedCount = Number(imageWaitSummary.renderedDataUrlCount || 0);
        debug.dataUrlNaturalSizeFailCount = Number(imageWaitSummary.dataUrlNaturalSizeFailCount || 0);
        debug.renderFailureReasons = Array.isArray(imageWaitSummary.failureReasons)
          ? imageWaitSummary.failureReasons.slice(0, 3)
          : [];
        await waitForDeliveryNotePreCaptureRepaint();
        debug.preCaptureRepaintWaited = true;
        imageWarning = imageWarning || hasDeliveryNoteExportImageWarning(doc);
        debug.paperLayout = measureDeliveryNotePaperLayout(doc);
        updateDeliveryNoteImageExportProgress(noteState, {
          step: "loading",
          imageTotal: imageUrls.length,
          imageConverted: debug.dataUrlRenderedCount || debug.proxySuccessCount,
          imageFailed: Math.max(debug.proxyFailureCount, debug.imageWaitFailedCount, debug.dataUrlNaturalSizeFailCount)
        });
        renderDeliveryNoteSheet();

        if (!isDeliveryNoteImageExportSessionActive(noteState, sessionId)) return;
        setDeliveryNoteImageExportPhase(noteState, "capturing");
        const baseName = getDeliveryNoteImageExportBaseName(data);
        const exportedPages = [];

        for (const [index, pageNode] of pages.entries()) {
          if (!isDeliveryNoteImageExportSessionActive(noteState, sessionId)) return;
          updateDeliveryNoteImageExportProgress(noteState, {
            step: "capturing",
            capturePage: index + 1,
            captureTotal: pages.length
          });
          renderDeliveryNoteSheet();
          const blob = await captureDeliveryNoteExportPage(pageNode, debug);

          if (!blob) {
            throw new Error(t("deliveryNoteImageExportFailed", "ไม่สามารถส่งออกเป็นรูปภาพได้"));
          }

          exportedPages.push({
            pageNumber: index + 1,
            fileName: `${baseName}-page-${index + 1}.png`,
            blob,
            objectUrl: URL.createObjectURL(blob)
          });
        }

        if (!isDeliveryNoteImageExportSessionActive(noteState, sessionId)) {
          exportedPages.forEach(page => {
            if (page?.objectUrl) URL.revokeObjectURL(page.objectUrl);
          });
          return;
        }
        const finalProductImageStatus = applyDeliveryNoteFinalProductImageStatus(debug, doc);
        debug.exportPageCount = exportedPages.length;
        debug.validExportPageCount = exportedPages
          .filter(page => page?.blob && page?.objectUrl)
          .length;
        debug.pngImageSafe = isDeliveryNoteProductImagesSafeForPng(debug, sessionId);
        noteState.imageExportPages = exportedPages;
        noteState.imageExportReady = exportedPages.length > 0;
        setDeliveryNoteImageExportPhase(noteState, noteState.imageExportReady ? "ready" : "failed");
        updateDeliveryNoteImageExportProgress(noteState, {
          step: noteState.imageExportReady ? "ready" : "failed",
          capturePage: exportedPages.length,
          captureTotal: pages.length,
          imageTotal: finalProductImageStatus.total || imageUrls.length,
          imageConverted: finalProductImageStatus.ready || debug.dataUrlRenderedCount || debug.proxySuccessCount,
          imageFailed: finalProductImageStatus.failed
        });
        noteState.imageExportError = "";
        noteState.imageExportDebug = debug;
        const latestIncompleteWarning = getDeliveryNoteImageIncompleteWarning(debug, sessionId);
        const productImagesSafeForPng = debug.pngImageSafe === true;
        const finalProductImagesDomReady = finalProductImageStatus.total > 0 &&
          finalProductImageStatus.failed === 0;
        if (!noteState.imageExportReady) {
          setDeliveryNoteImageExportWarning(noteState, "", sessionId);
        } else if (productImagesSafeForPng) {
          setDeliveryNoteImageExportWarning(noteState, "", sessionId);
        } else if (latestIncompleteWarning) {
          setDeliveryNoteImageExportWarning(noteState, latestIncompleteWarning, sessionId);
        } else if (finalProductImagesDomReady) {
          setDeliveryNoteImageExportWarning(
            noteState,
            t(
              "deliveryNoteImageExportImageEmbedWarning",
              "รูปสินค้าบางรูปอาจยังไม่ถูกฝังในไฟล์ภาพ กรุณาลองส่งออกใหม่"
            ),
            sessionId
          );
        } else if (debug.dataUrlAppliedCount > 0 && debug.dataUrlRenderedCount === 0) {
          setDeliveryNoteImageExportWarning(
            noteState,
            t(
              "deliveryNoteImageExportDataUrlNotRenderedWarning",
              "แปลงรูปสินค้าได้แล้ว แต่เบราว์เซอร์ยังไม่แสดงรูปก่อนจับภาพ"
            ),
            sessionId
          );
        } else {
          setDeliveryNoteImageExportWarning(
            noteState,
            imageWarning
              ? t("deliveryNoteImageExportImageWarning", "รูปสินค้าบางรูปอาจไม่แสดงในไฟล์ภาพ")
              : "",
            sessionId
          );
        }
      } catch (err) {
        console.error("delivery note image export prepare failed:", err);
        if (!isDeliveryNoteImageExportSessionActive(noteState, sessionId)) return;
        revokeDeliveryNoteImageExportUrls(noteState);
        noteState.imageExportError = [
          err.message || t("deliveryNoteImageExportFailed", "ไม่สามารถส่งออกเป็นรูปภาพได้"),
          t("deliveryNoteImageExportCorsHint", "อาจเกิดจากรูปสินค้าบางรูปไม่รองรับการแปลงเป็นภาพ")
        ].filter(Boolean).join(" ");
        noteState.imageExportReady = false;
        setDeliveryNoteImageExportPhase(noteState, "failed");
        updateDeliveryNoteImageExportProgress(noteState, { step: "failed" });
        setDeliveryNoteImageExportWarning(noteState, "", sessionId);
        noteState.imageExportDebug = getDeliveryNoteCurrentImageExportDebug(noteState) ||
          createDeliveryNoteImageExportDebug(sessionId);
      } finally {
        if (isDeliveryNoteImageExportSessionActive(noteState, sessionId)) {
          noteState.imageExportLoading = false;
        }
        cleanup();
        renderDeliveryNoteSheet();
      }
    }, 250);
  };

  frame.srcdoc = buildDeliveryNotePrintHtml(data, { autoPrint: false, imageExport: true });
  document.body.appendChild(frame);
}

function getDeliveryNoteImageExportProgressText(noteState) {
  const progress = noteState.imageExportProgress || {};
  const phase = String(noteState.imageExportPhase || "").trim();
  const totalImages = Number(progress.imageTotal || 0);
  const convertedImages = Number(progress.imageConverted || 0);
  const failedImages = Number(progress.imageFailed || 0);
  const loadedImages = Math.max(0, totalImages - failedImages);

  if (phase === "capturing") {
    return formatUiText(
      "deliveryNoteImageProgressCapturing",
      {
        page: Number(progress.capturePage || 0),
        total: Number(progress.captureTotal || 0)
      },
      "กำลังสร้างไฟล์ภาพ หน้า {page}/{total}"
    );
  }

  if (progress.step === "converting" && totalImages) {
    return formatUiText(
      "deliveryNoteImageProgressConverting",
      { done: convertedImages, total: totalImages },
      "กำลังแปลงรูปสินค้า {done}/{total} รูป"
    );
  }

  if ((phase === "decoding" || progress.step === "loading") && totalImages) {
    return formatUiText(
      "deliveryNoteImageProgressLoading",
      { done: loadedImages, total: totalImages },
      "กำลังโหลดรูปสินค้า {done}/{total} รูป"
    );
  }

  if (phase === "failed") {
    return t("deliveryNoteImageExportFailed", "ไม่สามารถส่งออกเป็นรูปภาพได้");
  }

  return t("deliveryNoteImageProgressPreparing", "กำลังเตรียมใบส่งของ...");
}

function getDeliveryNoteImageIncompleteWarning(debug, sessionId = 0) {
  const counts = getDeliveryNoteImageIncompleteCounts(debug, sessionId);
  const total = counts.total;
  if (!total) return "";
  if (!counts.failed) return "";
  return formatUiText(
    "deliveryNoteImageIncompleteWarning",
    { failed: counts.failed, total },
    "รูปสินค้าบางรูปโหลดไม่สำเร็จ {failed} รูป จาก {total} รูป กรุณาลองส่งออกใหม่"
  );
}

function getDeliveryNoteImageIncompleteCounts(debug, sessionId = 0) {
  if (!debug) return { failed: 0, total: 0 };
  const expectedSessionId = Number(sessionId || 0);
  const debugSessionId = Number(debug.sessionId || 0);
  if (expectedSessionId && debugSessionId && expectedSessionId !== debugSessionId) {
    return { failed: 0, total: 0 };
  }
  const finalTotal = Number(debug?.finalProductImageCount || 0);
  if (finalTotal) {
    if (isDeliveryNoteProductImagesSafeForPng(debug, sessionId)) {
      return { failed: 0, total: finalTotal };
    }
    const dataUrlReady = Number(debug?.finalProductImageDataUrlReadyCount || 0);
    return {
      failed: Math.max(
        Number(debug?.finalProductImageFailedCount || 0),
        Math.max(0, finalTotal - dataUrlReady)
      ),
      total: finalTotal
    };
  }
  const total = Number(debug?.imageUrlCount || 0);
  const converted = Number(debug?.proxySuccessCount || 0);
  const rendered = Number(debug?.dataUrlRenderedCount || 0);
  const failed = total ? Math.max(
    Number(debug?.proxyFailureCount || 0),
    Number(debug?.dataUrlNaturalSizeFailCount || 0),
    Number(debug?.imageWaitFailedCount || 0),
    Math.max(0, total - Math.max(converted, rendered))
  ) : 0;
  return { failed, total };
}

function shouldShowDeliveryNoteImageWarningPopup(noteState) {
  if (!noteState || noteState.imageExportLoading) return false;
  if (noteState.imageExportPhase !== "ready" && !noteState.imageExportReady) return false;
  if (!getDeliveryNoteCurrentImageExportWarning(noteState)) return false;
  const sessionId = Number(noteState.imageExportSessionId || 0);
  if (Number(noteState.imageExportWarningPopupDismissedSessionId || 0) === sessionId) return false;
  if (
    noteState.imageExportWarningPopupShown &&
    Number(noteState.imageExportWarningPopupActiveSessionId || 0) !== sessionId
  ) return false;
  return true;
}

    return `<div class="card"><div class="loading has-lottie">${renderLottieLoading(t("deliveryNoteSearching", "กำลังค้นหา PO..."))}</div></div>`;
  }

  if (noteState.error && !orders.length) {

  }

  if (!orders.length) {
    return `

function buildPendingDeliveryPoSummary(entries) {
  const safeEntries = Array.isArray(entries) ? entries : [];
  const uniqueValues = (field) => Array.from(new Set(
    safeEntries
      .map(item => String(item?.[field] || "").trim())
      .filter(Boolean)
  ));
  const openEntries = safeEntries.filter(item =>
    String(item?.status || "").toUpperCase() === "OPEN"
  );
  const closedEntries = safeEntries.filter(item =>
    String(item?.status || "").toUpperCase() === "CLOSED"
  );
  const sumQty = (items) => items.reduce(
    (sum, item) => sum + Math.max(0, Number(item?.qty) || 0),
    0
  );
  const latestDate = (field) => safeEntries
    .map(item => new Date(item?.[field]))
    .filter(date => !Number.isNaN(date.getTime()))
    .sort((a, b) => b - a)[0] || null;

  return {
    entryCount: safeEntries.length,
    openCount: openEntries.length,
    closedCount: closedEntries.length,
    totalPendingQty: sumQty(safeEntries),
    openPendingQty: sumQty(openEntries),
    closedPendingQty: sumQty(closedEntries),
    skuList: uniqueValues("productId"),
    orderIdList: uniqueValues("orderId"),
    latestCreatedAt: latestDate("createdAt"),
    latestClosedAt: latestDate("closedAt")
  };
}

function getPendingDeliveryPoStatusText(summary) {
  if (!summary || summary.entryCount === 0) return "-";
  if (summary.openCount === summary.entryCount) return t("allPendingOpen", "ทั้งหมดยังค้างส่ง");
  if (summary.openCount === 0) return t("allPendingClosed", "ปิดครบแล้ว");
  return t("mixedPendingClosed", "บางรายการปิดแล้ว");
}

function buildPendingDeliveryPoSummaryText(poNumber, entries) {
  const safeEntries = Array.isArray(entries) ? entries : [];
  const summary = buildPendingDeliveryPoSummary(safeEntries);
  const statusText = getPendingDeliveryPoStatusText(summary);
  const lines = [
    `PO: ${poNumber || "-"}`,
    `${t("totalStatus", "สถานะรวม")}: ${statusText}`,
    `${t("allEntries", "รายการทั้งหมด")}: ${summary.entryCount}`,
    `${t("openClosed", "เปิด / ปิดแล้ว")}: ${summary.openCount} / ${summary.closedCount}`,
    `${t("totalPendingQty", "จำนวนค้างส่งรวม")}: ${summary.totalPendingQty}`,
    `${t("openClosedQty", "จำนวนเปิด / ปิดแล้ว")}: ${summary.openPendingQty} / ${summary.closedPendingQty}`,
    `SKU: ${summary.skuList.join(", ") || "-"}`,
    `${t("orderNumber", "เลขออเดอร์")}: ${summary.orderIdList.join(", ") || "-"}`
  ];

  if (summary.latestCreatedAt) {
    lines.push(`${t("latestCreated", "สร้างล่าสุด")}: ${formatThaiDate(summary.latestCreatedAt)}`);
  }
  if (summary.latestClosedAt) {
    lines.push(`${t("latestClosed", "ปิดล่าสุด")}: ${formatThaiDate(summary.latestClosedAt)}`);
  }
  if (summary.orderIdList.length > 1) {
    lines.push(`⚠️ ${t("multipleOrderWarning", "PO นี้มีหลาย Order")}`);
  }

  lines.push("", `${t("pendingDetailTitle", "รายละเอียดสินค้า")}:`);
  safeEntries.forEach(item => {
    const detail = [
      `- ${String(item?.productId || "-").trim() || "-"}`,
      `${t("pendingInPo", "ใน PO")}: ${Number(item?.orderedQty || 0)}`,
      `${t("pendingDeliveryShort", "ค้างส่ง")}: ${Number(item?.qty || 0)}`,
      getPendingDeliveryStatusLabel(item?.status)
    ];
    lines.push(detail.join(" | "));
    const note = String(item?.note || "").trim();
    if (note) {
      lines.push(`  ${t("note", "หมายเหตุ")}: ${note}`);
    }
  });

  return lines.join("\n");
}

function handleAddImagePreview(input){
  const file = input.files[0];
  if(!file) return;

 try {
   validateProductImageFile(file);
 } catch (err) {
   input.value = "";
   state.addImageFile = null;
   const img = document.getElementById("addImagePreview");
   if (img) {
     img.removeAttribute("src");
     img.style.display = "none";
   }
   showToast(err.message || t("invalidImageFile", "ไฟล์รูปไม่ถูกต้อง"), "error");
   return;
 }
 
  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("addImagePreview");
    img.src = reader.result;
    img.style.display = "block";

    state.addImageFile = file; // เก็บไว้ใช้ upload
  };
  reader.readAsDataURL(file);
}

 // ================= GLOBAL KEYBOARD SUPPORT =================
 document.addEventListener("keydown", (e) => {
   const activeOverlay = [...document.querySelectorAll(".sheet.show, .side-menu.show")].pop();

   if (e.key === "Escape") {
     const filter = document.getElementById("filterDropdown");
     if (filter?.classList.contains("show")) {
       filter.classList.remove("show");
       document.querySelectorAll(".filter-btn[aria-expanded='true']")
         .forEach(b => syncExpanded(b, false));
       restoreTriggerFocus();
       return;
     }

     const viewerSearch = document.getElementById("viewerSearchWrap");
     if (viewerSearch?.classList.contains("active")) {
       toggleViewerSearch(viewerSearch.querySelector(".search-btn"));
       return;
     }

     const adminSearch = document.getElementById("adminSearchWrap");
     if (adminSearch?.classList.contains("active")) {
       toggleAdminSearch(adminSearch.querySelector(".search-btn"));
       return;
     }

    if (activeOverlay && !state.ui.backdropLocked) {
      if (activeOverlay === mainMenuSheet) return closeMainMenu();
      if (activeOverlay === adminStockSheet) return closeStockTimelineSheet();
      return closeOverlay(activeOverlay);
    }
   }

   if (e.key === "Tab" && activeOverlay) {
     const focusables = activeOverlay.querySelectorAll(
       'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
     );
     if (!focusables.length) return;

     const first = focusables[0];
     const last = focusables[focusables.length - 1];
    
    if (!activeOverlay.contains(document.activeElement)) {
      e.preventDefault();
      first.focus();
      return;
    }

     if (e.shiftKey && document.activeElement === first) {
       e.preventDefault();
       last.focus();
     } else if (!e.shiftKey && document.activeElement === last) {
       e.preventDefault();
       first.focus();
     }
   }
 });

async function submitOrder(){
  // ❌ ห้ามใช้ state.loading เป็น guard
  if (state.isSubmitting || state.cart.length === 0) return;
 
 const poNumber = String(state.poNumber || "").trim();
 if (!poNumber) {
   showToast(t("poRequired", "กรุณากรอกเลข PO"), "warning");
   const poInput = document.getElementById("poInput");
   if (poInput) poInput.focus();
   return;
 }

  state.isSubmitting = true;
  state.ui.backdropLocked = true;
  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.classList.add("is-submitting");
    submitBtn.setAttribute("aria-busy", "true");
  }

  try {
    // ================= STEP 1: CHECK STOCK =================
    showLoading(t("checkingStock", "กำลังตรวจสอบสต๊อก..."));
    const stockCheck = await checkStockBeforeSubmit();

    if (!stockCheck.ok) {
      showToast(stockCheck.message, 'warning');
      throw new Error("STOCK_CHECK_FAILED");
    }

    if (!await confirmDuplicatePoBeforeCreateOrder(poNumber)) {
      showToast(t("duplicatePoCancelled", "ยกเลิกการสร้างใบสั่งซื้อ เนื่องจากพบเลข PO ซ้ำ"), "warning");
      return;
    }

    // ================= STEP 2: CREATE ORDER =================
    updateLoadingText(t("creatingOrder", "กำลังสร้างใบสั่งซื้อ..."));
    const res = await createOrder();

    if (!res || res.success !== true || !res.data?.orderId) {
      throw new Error("Invalid order response");
    }

    // ================= SUCCESS =================
    const localItems = JSON.parse(JSON.stringify(state.cart));
    const localTotal = state.cart.reduce(
      (sum, item) => sum + Number(item.price) * Number(item.qty),
      0
    );
    const backendItems = res.data.items;
    const hasValidBackendItems =
      Array.isArray(backendItems) &&
      backendItems.length > 0 &&
      backendItems.every(item =>
        item &&
        typeof item === "object" &&
        String(item.productId || "").trim() &&
        Number.isInteger(Number(item.qty)) &&
        Number(item.qty) > 0 &&
        Number.isFinite(Number(item.price))
      );
    const backendTotal = Number(res.data.total);
    const hasValidBackendTotal =
      res.data.total !== null &&
      res.data.total !== "" &&
      Number.isFinite(backendTotal) &&
      backendTotal >= 0;

    state.lastOrder = {
      orderId: res.data.orderId,
      items: JSON.parse(JSON.stringify(
        hasValidBackendItems ? backendItems : localItems
      )),
      total: hasValidBackendTotal ? backendTotal : localTotal,
 createdAt: new Date(),
 poNumber: state.poNumber || ""
    };
   
    saveLastOrder();

    showToast(t("orderCreated", "สร้างใบสั่งซื้อเรียบร้อยแล้ว"), 'success');
    showToast(t("downloadOrderHint", "กดปุ่มเพื่อดาวน์โหลดใบสั่งซื้อ"), "info", 3000);

    renderLastOrderSheet();
   
// confirmSheet เปิดอยู่แล้ว ไม่ต้อง reopen

    state.cart = [];
    clearCartStorage();
    state.poNumber = "";
    if (typeof renderBadge === "function") renderBadge();
    // 🔴 CHANGED: เคลียร์ตะกร้าแล้วต้องซ่อน/รีเฟรช floating bar
    if (typeof renderFloatingBar === "function") renderFloatingBar();
    
  // ❌ ห้าม auto reset หลังสร้าง order สำเร็จ
    
  } catch(err){
    console.error(err);
    // 🔒 ถ้า fail เพราะ stock-check เรา toast ไปแล้ว ไม่ต้องซ้ำ
    if (err && err.message === "STOCK_CHECK_FAILED") return;

    showToast(
      err.message || t("createOrderError", "เกิดข้อผิดพลาดในการสร้างใบสั่งซื้อ"),
      'error'
    );
  } finally {
    safeHideLoading();
    state.isSubmitting = false;
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.classList.remove("is-submitting");
      submitBtn.setAttribute("aria-busy", "false");
    }
    // 🔒 ปลด lock เฉพาะเมื่อไม่มี sheet เปิดอยู่ (กัน race condition)
    if (state.ui.overlayCount === 0) {
      state.ui.backdropLocked = false;
    }
  }
}

async function uploadProductImage(file) {
  return new Promise((resolve, reject) => {
    try {
      validateProductImageFile(file);
    } catch (err) {
      reject(err);
      return;
    }

    // 🔴 CHANGED: ให้ error เป็น Error object เสมอ
    if (!state.admin || !state.admin.token) {
      reject(new Error("Missing admin token"));
      return;
    }

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        // 🔴 CHANGED: กัน reader.result ว่าง/ผิดรูปแบบ
        const result = String(reader.result || "");
        const base64 = result.includes(",") ? result.split(",")[1] : "";
        if (!base64) {
          throw new Error("ไม่สามารถอ่านข้อมูลรูปภาพได้");
        }

        const formData = new FormData();
        formData.append("action", "uploadProductImage");
        formData.append("token", state.admin.token);
        formData.append("filename", file.name);
        formData.append("mimeType", file.type || "image/jpeg");
        formData.append("data", base64);

        // 🔴 CHANGED: ใช้ fetchWithTimeout แบบเดียวกับ API อื่น
        const res = await fetchWithTimeout(API_URL, {
          method: "POST",
          body: formData
        }, 30000);

        let json;
        try {
          json = await res.json();
        } catch (_) {
          throw new Error("รูปแบบข้อมูลตอบกลับจากการอัปโหลดไม่ถูกต้อง");
        }

        if (!json || json.success !== true || !json.data?.imageUrl) {
          const rawMessage = json?.message || json?.error || "Upload failed";

          // 🔴 CHANGED: แปลง DriveApp error ให้ debug ง่าย
          if (String(rawMessage).includes("DriveApp")) {
            throw new Error("อัปโหลดรูปไม่สำเร็จ: Apps Script ยังไม่มีสิทธิ์ใช้ DriveApp");
          }

          throw new Error(rawMessage);
        }

        resolve(json.data.imageUrl);
      } catch (err) {
        reject(err instanceof Error ? err : new Error(String(err || "Upload failed")));
      }
    };

    reader.onerror = () => {
      reject(new Error("File read error"));
    };

    reader.readAsDataURL(file);
  });
}
  
async function submitProductEdit(){
  // 🔒 GUARD: กันกดซ้ำ (admin scope only)
  if (state.admin.isSubmitting) return;

  const p = state.selectedProduct;
  if (!p) return;

  state.admin.isSubmitting = true;

  // 🔒 LOCK BUTTON
  const saveBtn = adminProductEditSheet.querySelector(".btn-primary");
  const originalText = saveBtn?.textContent;
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = "กำลังบันทึก...";
  }

  const name   = document.getElementById("editName").value.trim();
  const price  = Number(document.getElementById("editPrice").value);
  const rawCostPrice = document.getElementById("editCostPrice").value.trim();
  const costPrice = rawCostPrice === "" ? null : Number(rawCostPrice);
  const stock  = Number(document.getElementById("editStock").value);
  let status = normalizeProductStatus(
    document.getElementById("editStatus").value
  );
  const newProductId = normalizeProductId(
    document.getElementById("editProductId").value
  );
  const oldProductId = normalizeProductId(p.productId);
  const note   = document.getElementById("editNote")?.value.trim() || "";
  const variantMetadata = getProductVariantFormValues("edit");
  const detailsText =
  document.getElementById("editDetailsText")?.value.trim() || "";

 const compareImages =
   Array.isArray(state.compareImagesDraft)
     ? state.compareImagesDraft.join(",")
     : "";

  // 🔒 Validate
  if (
   !name ||
   !newProductId ||
   !Number.isInteger(price) ||
   costPrice === null ||
   !Number.isInteger(costPrice) ||
   !Number.isInteger(stock) ||
   price < 0 ||
   costPrice < 0 || 
   stock < 0
 ) {
    showToast(t("invalidData", "ข้อมูลไม่ถูกต้อง"), "error");

    // 🔓 คืนสภาพทันที
    state.admin.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  // 🔒 SKU Duplicate Check (วางตรงนี้เท่านั้น)
  try {
    validateProductVariantFormValues(variantMetadata);
  } catch (err) {
    showToast(err.message || t("invalidProductOptions", "ข้อมูลตัวเลือกสินค้าไม่ถูกต้อง"), "error");
    state.admin.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

 const duplicate = state.products.find(x =>
   normalizeProductId(x.productId) === newProductId &&
   normalizeProductId(x.productId) !== oldProductId
 );
 
  if (duplicate) {
    showToast(t("duplicateProductIdError", "รหัสสินค้านี้มีอยู่แล้ว"), "error");
    state.admin.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  if (stock === 0) {
    status = "out";
  }
 
  let imageUrl = p.image || "";

  try {
    showLoading("กำลังบันทึกการแก้ไขสินค้า...");

    // ถ้ามีการเลือกภาพใหม่ → upload ก่อน
    if (state.editImageFile) {
      validateProductImageFile(state.editImageFile);
      imageUrl = await uploadProductImage(state.editImageFile);
      if (!imageUrl) {
        throw new Error("ไม่สามารถอัปโหลดรูปได้");
      }
    }

    // Update product
    const form = new URLSearchParams();
    form.append("action", "updateProduct");
    form.append("token", state.admin.token);
    form.append("oldProductId", oldProductId);
    form.append("newProductId", newProductId);
    form.append("name", name);
    form.append("price", price);
    form.append("costPrice", costPrice);
    form.append("stock", stock);
    form.append("status", status);
    form.append("image", imageUrl);
    form.append("note", note);
    appendProductVariantFieldsToForm(form, variantMetadata);
    form.append("detailsText", detailsText);
    form.append("compareImages", compareImages);

    const res = await postFormAction(form);

    showToast(t("editSaved", "บันทึกการแก้ไขเรียบร้อย"), "success");

    state.selectedProduct = null;

    // cleanup
    state.editImageFile = null;
    closeProductEdit();
    await refreshProducts();
    await refreshAdminAuditSnapshot();

  } catch (err) {
    console.error(err);
    showToast(
      err.message || t("saveProductFailed", "เกิดข้อผิดพลาดในการบันทึกสินค้า"),
      "error"
    );

  } finally {
    // ✅ CLEANUP กลางเดียว (หัวใจ STEP 9)
    safeHideLoading();
    state.admin.isSubmitting = false;

    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
  }
}

function normalizeProductId(value = "") {
   return String(value || "").trim().toUpperCase();
 }

const ALLOWED_PRODUCT_STATUS = ["ready", "ready_plus", "shipping", "warehouse", "out"];
const PRODUCT_VARIANT_FIELDS = [
  "parentProductId",
  "variantType",
  "variantValue",
  "displayName",
  "variantSortOrder"
];

function normalizeProductStatus(value = "") {
  const normalized = String(value || "").trim().toLowerCase();
  return ALLOWED_PRODUCT_STATUS.includes(normalized) ? normalized : "ready";
}

function getProductVariantFormValues(prefix) {
  const values = {};
  PRODUCT_VARIANT_FIELDS.forEach(field => {
    const input = document.getElementById(`${prefix}${field}`);
    values[field] = input ? input.value.trim() : "";
  });
  return values;
}

function validateProductVariantFormValues(values) {
  const sortValue = String(values?.variantSortOrder || "").trim();
  if (sortValue !== "" && !Number.isInteger(Number(sortValue))) {
    throw new Error("ลำดับไซส์ต้องเป็นตัวเลขจำนวนเต็ม");
  }
}

function appendProductVariantFieldsToForm(form, values) {
  PRODUCT_VARIANT_FIELDS.forEach(field => {
    form.append(field, values?.[field] || "");
  });
}

function renderAdminProductVariantMeta(product) {
  if (state.mode !== "admin" || !product) return "";

  const parentProductId = String(product.parentProductId || "").trim();
  const variantType = String(product.variantType || "").trim();
  const variantValue = String(product.variantValue || "").trim();
  const displayName = String(product.displayName || "").trim();
  const variantSortOrder = String(product.variantSortOrder || "").trim();

  if (!parentProductId && !variantType && !variantValue && !displayName && !variantSortOrder) {
    return "";
  }

  return `

      ${parentProductId ? `กลุ่ม: ${escapeHtml(parentProductId)}` : ""}

      ${displayName ? `<br>ชื่อรวม: ${escapeHtml(displayName)}` : ""}
    </div>
  `;
}

function validateProductImageFile(file) {
  if (!file) return;

  const allowedTypes = ["image/jpeg", "image/png", "image/webp"];
  const maxBytes = 5 * 1024 * 1024;

  if (!allowedTypes.includes(file.type)) {
    throw new Error("รองรับเฉพาะไฟล์ JPG, PNG, WEBP");
  }

  if (file.size > maxBytes) {
    throw new Error("รูปสินค้าต้องมีขนาดไม่เกิน 5MB");
  }
}
