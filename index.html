function validateLandedCostInput() {
  const calcState = state.admin.landedCost;
  const errors = [];
  const feeFields = [
    ["chinaDomesticShipping", "ค่าส่งในจีน"],
    ["chinaToThailandShipping", "ค่าส่งจีนมาไทย"],
    ["thailandShipping", "ค่าส่งในไทย"],
    ["otherFees", "ค่าใช้จ่ายอื่น ๆ"]
  ];
  const fees = {};

  feeFields.forEach(([field, label]) => {
    const parsed = parseNonNegativeNumber(calcState[field]);
    if (!parsed.valid) errors.push(`${label} ต้องเป็นตัวเลข 0 ขึ้นไป`);
    fees[field] = parsed.value;
  });

  const profit = parseNonNegativeNumber(calcState.profitPercent);
  if (!profit.valid) errors.push("% กำไรที่ต้องการต้องเป็นตัวเลข 0 ขึ้นไป");

  const rows = calcState.rows.map((row, index) => {
    const rowNumber = index + 1;
    const productId = normalizeProductId(row.productId);
    const productSnapshot = getLandedCostProductSnapshot(productId);
    const qty = Number(row.qty);
    const chinaUnitCost = Number(row.chinaUnitCost);

    if (!Number.isInteger(qty) || qty <= 0) {
      errors.push(`แถว ${rowNumber}: จำนวนต้องเป็นจำนวนเต็มมากกว่า 0`);
    }
    if (!Number.isFinite(chinaUnitCost) || chinaUnitCost < 0) {
      errors.push(`แถว ${rowNumber}: ต้นทุนจีน/ชิ้นต้องเป็นตัวเลข 0 ขึ้นไป`);
    }

    return {
      productId,
      name: getLandedCostRowProductName(row) || String(productSnapshot?.name || "").trim(),
      currentPrice: Number(row.currentPrice ?? productSnapshot?.price ?? 0),
      currentCostPrice: Number(row.currentCostPrice ?? productSnapshot?.costPrice ?? 0),
      image: row.image || productSnapshot?.image || "",
      stock: row.stock ?? productSnapshot?.stock ?? null,
      status: row.status || productSnapshot?.status || "",
      active: row.active !== false && productSnapshot?.active !== false,
      qty,
      chinaUnitCost,
      itemBaseCost: Number.isFinite(chinaUnitCost) && Number.isFinite(qty)
        ? chinaUnitCost * qty
        : 0
    };
  });

  const usableRows = rows.filter(row =>
    Number.isInteger(row.qty) &&
    row.qty > 0 &&
    Number.isFinite(row.chinaUnitCost) &&
    row.chinaUnitCost >= 0
  );
  const batchBaseCost = usableRows.reduce((sum, row) => sum + row.itemBaseCost, 0);

  if (!usableRows.length) errors.push("กรุณาเพิ่มสินค้าอย่างน้อย 1 แถว");
  if (batchBaseCost <= 0) errors.push("มูลค่าสินค้ารวมต้องมากกว่า 0 ก่อนคำนวณ");

  return { errors, fees, profitPercent: profit.value, rows: usableRows, batchBaseCost };
}

function calculateLandedCost() {
  if (!ensureAdminSessionForLandedCost()) return;

  const calcState = state.admin.landedCost;
  const validation = validateLandedCostInput();
  calcState.errors = validation.errors;
  calcState.result = null;

  if (validation.errors.length) {
    renderLandedCostSheet();
    return;
  }

  const sharedFees =
    validation.fees.chinaDomesticShipping +
    validation.fees.chinaToThailandShipping +
    validation.fees.thailandShipping +
    validation.fees.otherFees;
  const roundingMode = calcState.roundingMode || "ceil";
  const rows = validation.rows.map(row => {
    const allocationRatio = row.itemBaseCost / validation.batchBaseCost;
    const allocatedFee = sharedFees * allocationRatio;
    const landedCostPerItem = (row.itemBaseCost + allocatedFee) / row.qty;
    const suggestedCostPrice = roundLandedCostValue(landedCostPerItem, roundingMode);
    const suggestedSellingPrice = roundLandedCostValue(
      suggestedCostPrice * (1 + validation.profitPercent / 100),
      roundingMode
    );

    return {
      ...row,
      allocatedFee,
      landedCostPerItem,
      suggestedCostPrice,
      suggestedSellingPrice
    };
  });

  calcState.result = {
    batchName: String(calcState.batchName || "").trim(),
    batchBaseCost: validation.batchBaseCost,
    sharedFees,
    totalLandedCost: validation.batchBaseCost + sharedFees,
    profitPercent: validation.profitPercent,
    roundingMode,
    rows
  };
  calcState.applyPreviewRows = [];
  calcState.applySelectedIds = [];
  calcState.applyMessage = "";
  clearLandedCostApplyStatus(calcState);
  renderLandedCostSheet();
}

function getLandedCostProductMap() {
  const products = Array.isArray(state.products) ? state.products : [];
  return new Map(
    products.map(product => [normalizeProductId(product.productId), product])
  );
}

function prepareLandedCostApplyPreview() {
  if (!ensureAdminSessionForLandedCost()) return;

  const calcState = state.admin.landedCost;
  const resultRows = Array.isArray(calcState.result?.rows)
    ? calcState.result.rows
    : [];

  if (!resultRows.length) {
    calcState.applyPreviewRows = [];
    calcState.applySelectedIds = [];
    calcState.applyMessage = "กรุณาคำนวณต้นทุนก่อนเตรียมรายการอัปเดต";
    renderLandedCostSheet();
    return;
  }

  const productMap = getLandedCostProductMap();
  const previewRows = [];
  const skippedRows = [];
  resultRows.forEach(row => {
    const productId = normalizeProductId(row.productId);
    const product = productMap.get(productId) || row;
    if (!productId || !product) {
      skippedRows.push(productId || "(ไม่มี SKU)");
      return;
    }

    const currentCostPrice = Number(product.costPrice ?? product.currentCostPrice ?? 0);
    const currentPrice = Number(product.price ?? product.currentPrice ?? 0);
    const suggestedCostPrice = Number(row.suggestedCostPrice || 0);
    const suggestedPrice = Number(row.suggestedSellingPrice || 0);

    previewRows.push({
      productId,
      name: row.name || product.name || "",
      qty: Number(row.qty || 0),
      currentCostPrice,
      suggestedCostPrice,
      costPriceDiff: suggestedCostPrice - currentCostPrice,
      currentPrice,
      suggestedPrice,
      priceDiff: suggestedPrice - currentPrice,
      landedCostPerItem: Number(row.landedCostPerItem || 0)
    });
  });

  calcState.applyPreviewRows = previewRows;
  calcState.applySelectedIds = previewRows.map(row => row.productId);
  calcState.applyMessage = previewRows.length
    ? `เตรียมรายการอัปเดตแล้ว ${previewRows.length} รายการ${skippedRows.length ? ` · ข้าม ${skippedRows.length} รายการที่ไม่พบสินค้าในระบบ` : ""}`
    : "ไม่มีรายการที่พร้อมอัปเดต กรุณาตรวจสอบ SKU ในรอบคำนวณ";
  clearLandedCostApplyStatus(calcState);
  renderLandedCostSheet();
}

function toggleLandedCostApplyRow(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(
    Array.isArray(state.admin.landedCost.applySelectedIds)
      ? state.admin.landedCost.applySelectedIds
      : []
  );
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.landedCost.applySelectedIds = Array.from(selected);
  clearLandedCostApplyStatus();
  renderLandedCostSheet();
}

function getSelectedLandedCostApplyRows() {
  const calcState = state.admin.landedCost;
  const selected = new Set(
    Array.isArray(calcState.applySelectedIds)
      ? calcState.applySelectedIds.map(normalizeProductId).filter(Boolean)
      : []
  );
  const rows = Array.isArray(calcState.applyPreviewRows)
    ? calcState.applyPreviewRows
    : [];
  return rows.filter(row => selected.has(normalizeProductId(row.productId)));
}

function buildLandedCostApplyItems() {
  const productMap = getLandedCostProductMap();
  const errors = [];
  const items = [];
  const seen = new Set();

  getSelectedLandedCostApplyRows().forEach(row => {
    const productId = normalizeProductId(row.productId);
    const suggestedCostPrice = Number(row.suggestedCostPrice);
    const suggestedPrice = Number(row.suggestedPrice);

    if (!productId) {
      errors.push("พบรายการที่ไม่มี SKU / Product ID");
      return;
    }
    if (seen.has(productId)) {
      errors.push(`SKU ${productId} ซ้ำในรายการที่จะบันทึก`);
      return;
    }
    if (!productMap.has(productId)) {
      errors.push(`ไม่พบสินค้า ${productId} ในระบบ จึงไม่สามารถบันทึกได้`);
      return;
    }
    if (!Number.isInteger(suggestedCostPrice) || suggestedCostPrice < 0) {
      errors.push(`ต้นทุนใหม่ของ ${productId} ต้องเป็นจำนวนเต็ม 0 ขึ้นไป`);
      return;
    }
    if (!Number.isInteger(suggestedPrice) || suggestedPrice < 0) {
      errors.push(`ราคาขายใหม่ของ ${productId} ต้องเป็นจำนวนเต็ม 0 ขึ้นไป`);
      return;
    }

    seen.add(productId);
    items.push({
      productId,
      costPrice: suggestedCostPrice,
      price: suggestedPrice
    });
  });

  if (!items.length && !errors.length) {
    errors.push("กรุณาเลือกรายการอย่างน้อย 1 รายการก่อนบันทึก");
  }

  return { items, errors };
}

async function applyLandedCostPreview() {
  if (!ensureAdminSessionForLandedCost()) return;
  if (state.admin.isSubmitting) return;

  const calcState = state.admin.landedCost;
  const { items, errors } = buildLandedCostApplyItems();
  if (errors.length) {
    calcState.applyError = errors.join(" · ");
    calcState.applyStatus = "";
    calcState.appliedCount = 0;
    renderLandedCostSheet();
    showToast(calcState.applyError, "warning");
    return;
  }

  const confirmed = window.confirm(
    `ยืนยันบันทึกราคาทุน/ราคาขายจริง ${items.length} รายการ?\n\nระบบจะอัปเดต costPrice และ price ใน Products จริง\nกรุณาตรวจสอบก่อนบันทึกจริง`
  );
  if (!confirmed) return;

  state.admin.isSubmitting = true;
  calcState.applyError = "";
  calcState.applyStatus = "";
  calcState.appliedCount = 0;
  renderLandedCostSheet();

  try {
    showLoading("กำลังบันทึกราคาทุน/ราคาขาย...");
    const form = new URLSearchParams();
    form.append("action", "bulkUpdateProducts");
    form.append("token", state.admin.token);
    form.append("items", JSON.stringify(items));

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      const updated = Number(json.updated || json.data?.updated || items.length);
      calcState.applyStatus = `บันทึกสำเร็จ ${updated} รายการ`;
      calcState.applyError = "";
      calcState.appliedCount = updated;
      showToast(calcState.applyStatus, "success");
      await refreshProducts();
      renderLandedCostSheet();
      return;
    }

    const backendErrors = Array.isArray(json?.data?.errors)
      ? json.data.errors.join(" · ")
      : "";
    calcState.applyError = backendErrors || json?.message || json?.error || "บันทึกราคาทุน/ราคาขายไม่สำเร็จ";
    calcState.applyStatus = "";
    calcState.appliedCount = 0;
    renderLandedCostSheet();
    if (isAuthError(json?.error)) {
      showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
      exitAdmin({ silent: true });
      return;
    }
    showToast(calcState.applyError, "error");
  } catch (err) {
    console.error(err);
    calcState.applyError = "บันทึกราคาทุน/ราคาขายไม่สำเร็จ กรุณาลองใหม่อีกครั้ง";
    calcState.applyStatus = "";
    calcState.appliedCount = 0;
    renderLandedCostSheet();
    showToast(calcState.applyError, "error");
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderLandedCostSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

function getPartnerCatalogSelectedSkus() {
  const selectedSkus = Array.isArray(state.admin.partnerCatalog.selectedSkus)
    ? state.admin.partnerCatalog.selectedSkus
    : [];
  const seen = new Set();
  return selectedSkus
    .map(normalizeProductId)
    .filter(productId => {
      if (!productId || seen.has(productId)) return false;
      seen.add(productId);
      return true;
    });
}

function getPartnerCatalogPickerProducts() {
  const partnerState = state.admin.partnerCatalog;
  const searchText = String(partnerState.pickerSearch || "").trim().toLowerCase();
  const rawStatusFilter = String(partnerState.pickerStatus || "all").trim().toLowerCase();
  const statusFilter = rawStatusFilter === "all" ? "all" : normalizeProductStatus(rawStatusFilter);
  const products = Array.isArray(state.products) ? state.products : [];

  return products.filter(product => {
    const productId = normalizeProductId(product.productId);
    const name = String(product.name || "").toLowerCase();
    const status = normalizeProductStatus(product.status);
    const matchesSearch = !searchText ||
      productId.toLowerCase().includes(searchText) ||
      name.includes(searchText);
    const matchesStatus = !statusFilter ||
      statusFilter === "all" ||
      status === statusFilter;
    return matchesSearch && matchesStatus;
  });
}

function setPartnerCatalogPickerSearch(value) {
  state.admin.partnerCatalog.pickerSearch = value || "";
  updatePartnerCatalogPickerList();
}

function setPartnerCatalogPickerStatus(value) {
  state.admin.partnerCatalog.pickerStatus = value || "all";
  updatePartnerCatalogPickerList();
}

function togglePartnerCatalogProduct(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(getPartnerCatalogSelectedSkus());
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.partnerCatalog.selectedSkus = Array.from(selected);
  renderPartnerCatalogSheetPreservingPickerScroll();
}

function selectVisiblePartnerCatalogProducts() {
  const selected = new Set(getPartnerCatalogSelectedSkus());
  getPartnerCatalogPickerProducts().forEach(product => {
    const productId = normalizeProductId(product.productId);
    if (productId) selected.add(productId);
  });
  state.admin.partnerCatalog.selectedSkus = Array.from(selected);
  renderPartnerCatalogSheet();
}

function clearPartnerCatalogSelection() {
  state.admin.partnerCatalog.selectedSkus = [];
  renderPartnerCatalogSheet();
}

function getPartnerCatalogExpiresAt() {
  const partnerState = state.admin.partnerCatalog;
  if (partnerState.expiryMode === "custom") {
    const value = String(partnerState.customExpiresAt || "").trim();
    if (!value) return "";
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? "" : date.toISOString();
  }

  const days = Number(partnerState.expiryMode || 14);
  if (![7, 14, 30].includes(days)) return "";
  return new Date(Date.now() + days * 24 * 60 * 60 * 1000).toISOString();
}

function getPartnerCatalogResultUrl(data) {
  const rawToken = String(data?.token || "").trim();
  if (!rawToken) return "";
  const url = new URL("partner.html", window.location.href);
  url.searchParams.set("token", rawToken);
  return url.toString();
}

function renderPartnerCatalogPickerRows() {
  const products = getPartnerCatalogPickerProducts();
  const selectedSkus = new Set(getPartnerCatalogSelectedSkus());

  return products.length
    ? products.map(product => {
        const productId = normalizeProductId(product.productId);
        const selected = selectedSkus.has(productId);
        const isActive = product.active !== false;
        return `
          <label class="bulk-product-picker-row ${selected ? "is-selected" : ""}">
            <input
              type="checkbox"
              ${selected ? "checked" : ""}
              onchange="togglePartnerCatalogProduct(${toInlineJsStringLiteral(productId)}, this.checked)">
            ${renderCartItemThumb({
              productId,
              name: product.name || productId || "สินค้า",
              image: product.image || ""

            <div class="bulk-product-picker-main">
              <div class="name">${esc(product.name || productId || "-")}</div>
              <div class="bulk-product-picker-meta">
                <span>SKU: ${esc(productId || "-")}</span>
                <span>ราคา: ${esc(formatBulkProductUpdateValue("price", product.price))}</span>

                ${renderBulkProductUpdateValueDisplay("status", product.status)}
                ${renderBulkProductUpdateValueDisplay("active", isActive)}

            </div>
          </label>
        `;
      }).join("")
    : `<div class="bulk-product-picker-empty">ไม่พบสินค้าตามเงื่อนไขที่ค้นหา</div>`;
}

function validatePartnerCatalogInput() {
  const partnerState = state.admin.partnerCatalog;
  const partnerId = String(partnerState.partnerId || "").trim();
  const productIds = getPartnerCatalogSelectedSkus();
  const expiresAt = getPartnerCatalogExpiresAt();
  const expiresTime = expiresAt ? new Date(expiresAt).getTime() : NaN;

  if (!partnerId) {
    return { valid: false, message: "กรุณาระบุ Partner ID" };
  }
  if (!expiresAt || Number.isNaN(expiresTime) || expiresTime <= Date.now()) {
    return { valid: false, message: "กรุณาระบุวันหมดอายุที่อยู่ในอนาคต" };
  }
  if (!productIds.length) {
    return { valid: false, message: "กรุณาเลือกสินค้าอย่างน้อย 1 รายการ" };
  }
  if (productIds.length > 100) {
    return { valid: false, message: "เลือกรายการสินค้าได้สูงสุด 100 รายการต่อหนึ่งลิงก์" };
  }
  if (!state.admin.token) {
    return { valid: false, message: "ไม่พบ admin token กรุณาเข้าสู่ระบบใหม่" };
  }

  return {
    valid: true,
    partnerId,
    expiresAt,
    productIds,
    label: String(partnerState.label || "").trim()
  };
}

async function createPartnerCatalogLink(btn) {
  if (!ensureAdminSessionForPartnerCatalog()) return;
  if (state.admin.isSubmitting) return;

  const validation = validatePartnerCatalogInput();
  if (!validation.valid) {
    state.admin.partnerCatalog.error = validation.message;
    renderPartnerCatalogSheet();
    return;
  }

  state.admin.isSubmitting = true;
  state.admin.partnerCatalog.error = "";
  renderPartnerCatalogSheet();

  try {
    showLoading("กำลังสร้างลิงก์คู่ค้า...");
    const form = new URLSearchParams();
    form.append("action", "createPartnerLink");
    form.append("token", state.admin.token);
    form.append("partnerId", validation.partnerId);
    form.append("expiresAt", validation.expiresAt);
    form.append("productIds", JSON.stringify(validation.productIds));
    form.append("label", validation.label);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 45000);
    const json = await res.json();

    if (json?.success === true) {
      state.admin.partnerCatalog.result = json.data || {};
      state.admin.partnerCatalog.error = "";
      showToast("สร้างลิงก์คู่ค้าสำเร็จ", "success");
      renderPartnerCatalogSheet();
      return;
    }

    if (isAuthError(json?.error)) {
      showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
      exitAdmin({ silent: true });
      return;
    }

    state.admin.partnerCatalog.error = json?.error || json?.message || "สร้างลิงก์คู่ค้าไม่สำเร็จ";
    renderPartnerCatalogSheet();
  } catch (err) {
    console.error(err);
    state.admin.partnerCatalog.error = err.message || "สร้างลิงก์คู่ค้าไม่สำเร็จ กรุณาลองใหม่อีกครั้ง";
    renderPartnerCatalogSheet();
  } finally {
    safeHideLoading();
    state.ui.backdropLocked = false;
    state.admin.isSubmitting = false;
    renderPartnerCatalogSheet();
    requestAnimationFrame(syncOverlayBackdropState);
  }
}

async function copyPartnerCatalogLink() {
  const result = state.admin.partnerCatalog.result;
  const url = getPartnerCatalogResultUrl(result);
  if (!url) {
    showToast("ไม่พบลิงก์สำหรับคัดลอก", "warning");
    return;
  }

  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(url);
    } else {
      const textarea = document.createElement("textarea");
      textarea.value = url;
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }
    showToast("คัดลอกลิงก์แล้ว", "success");
  } catch (err) {
    console.error(err);
    showToast("คัดลอกลิงก์ไม่สำเร็จ กรุณาคัดลอกจากช่องข้อความ", "warning");
  }
}

async function loadPartnerLinks() {
  if (!ensureAdminSessionForPartnerCatalog()) return;

  const partnerState = state.admin.partnerCatalog;
  partnerState.linkLoading = true;
  partnerState.linkError = "";
  partnerState.linkStatusMessage = "";
  partnerState.view = "links";
  partnerState.linkDetail = null;
  renderPartnerCatalogSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "listPartnerLinks");
    form.append("token", state.admin.token);
    form.append("limit", String(partnerState.linkLimit || 50));
    form.append("offset", String(partnerState.linkOffset || 0));
    if (partnerState.linkStatus && partnerState.linkStatus !== "all") {
      form.append("status", partnerState.linkStatus);
    }
    if (String(partnerState.linkPartnerId || "").trim()) {
      form.append("partnerId", partnerState.linkPartnerId.trim());
    }
    if (String(partnerState.linkQ || "").trim()) {
      form.append("q", partnerState.linkQ.trim());
    }

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || "โหลดลิงก์คู่ค้าไม่สำเร็จ");
    }

    partnerState.links = Array.isArray(json.data?.links)
      ? json.data.links
      : [];
    partnerState.linkTotal = Number(json.data?.total || 0);
    partnerState.linkLimit = Number(json.data?.limit || partnerState.linkLimit || 50);
    partnerState.linkOffset = Number(json.data?.offset || 0);
    partnerState.linkError = "";
  } catch (err) {
    console.error(err);
    partnerState.links = [];
    partnerState.linkTotal = 0;
    partnerState.linkError = err.message || "โหลดลิงก์คู่ค้าไม่สำเร็จ";
  } finally {
    partnerState.linkLoading = false;
    renderPartnerCatalogSheet();
  }
}

async function updatePartnerLinkStatusFromAdmin(linkId, status) {
  if (!ensureAdminSessionForPartnerCatalog()) return;

  const partnerState = state.admin.partnerCatalog;
  if (partnerState.linkStatusSubmitting) return;

  const cleanLinkId = String(linkId || "").trim();
  const cleanStatus = String(status || "").trim().toLowerCase();
  if (!cleanLinkId || !cleanStatus) return;

  partnerState.linkStatusSubmitting = true;
  partnerState.linkStatusMessage = "กำลังอัปเดตสถานะลิงก์...";
  partnerState.linkError = "";
  renderPartnerCatalogSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "updatePartnerLinkStatus");
    form.append("token", state.admin.token);
    form.append("linkId", cleanLinkId);
    form.append("status", cleanStatus);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || "อัปเดตสถานะลิงก์ไม่สำเร็จ");
    }

    const updatedLink = json.data?.link || null;
    if (updatedLink) {
      if (partnerState.linkDetail?.link?.linkId === updatedLink.linkId) {
        partnerState.linkDetail.link = {
          ...partnerState.linkDetail.link,
          ...updatedLink
        };
      }
      partnerState.links = partnerState.links.map(link =>
        link.linkId === updatedLink.linkId
          ? { ...link, ...updatedLink }
          : link
      );
    }

    partnerState.linkStatusMessage = "อัปเดตสถานะลิงก์แล้ว";
    showToast("อัปเดตสถานะลิงก์แล้ว", "success");
  } catch (err) {
    console.error(err);
    partnerState.linkStatusMessage = "";
    partnerState.linkError = err.message || "อัปเดตสถานะลิงก์ไม่สำเร็จ";
    showToast(partnerState.linkError, "error");
  } finally {
    partnerState.linkStatusSubmitting = false;
    renderPartnerCatalogSheet();
  }
}

async function updatePartnerRequestStatusFromAdmin(requestId, status) {
  if (!ensureAdminSessionForPartnerRequests()) return;
  if (state.admin.partnerRequests.statusSubmitting) return;

  const cleanRequestId = String(requestId || "").trim();
  const cleanStatus = String(status || "").trim().toLowerCase();
  if (!cleanRequestId || !cleanStatus) return;

  const requestState = state.admin.partnerRequests;
  requestState.statusSubmitting = true;
  requestState.statusMessage = "กำลังอัปเดตสถานะ...";
  requestState.error = "";
  renderPartnerRequestsSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "updatePartnerRequestStatus");
    form.append("token", state.admin.token);
    form.append("requestId", cleanRequestId);
    form.append("status", cleanStatus);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || "อัปเดตสถานะคำขอไม่สำเร็จ");
    }

    const updatedRequest = json.data?.request || null;
    if (updatedRequest) {
      if (requestState.detail?.request?.requestId === updatedRequest.requestId) {
        requestState.detail.request = {
          ...requestState.detail.request,
          ...updatedRequest
        };
      }
      requestState.requests = requestState.requests.map(request =>
        request.requestId === updatedRequest.requestId
          ? { ...request, ...updatedRequest }
          : request
      );
    }

    requestState.statusMessage = "อัปเดตสถานะแล้ว";
    showToast("อัปเดตสถานะคำขอแล้ว", "success");
  } catch (err) {
    console.error(err);
    requestState.statusMessage = "";
    requestState.error = err.message || "อัปเดตสถานะคำขอไม่สำเร็จ";
    showToast(requestState.error, "error");
  } finally {
    requestState.statusSubmitting = false;
    renderPartnerRequestsSheet();
  }
}

async function convertPartnerRequestToOrderFromAdmin(requestId) {
  if (!ensureAdminSessionForPartnerRequests()) return;

  const requestState = state.admin.partnerRequests;
  if (requestState.convertSubmitting) return;

  const cleanRequestId = String(requestId || "").trim();
  const poInput = document.getElementById("partnerRequestConvertPoNumber");
  const poNumber = String(poInput?.value || requestState.convertPoNumber || "").trim();

  if (!cleanRequestId) return;

  if (!poNumber) {
    requestState.convertError = "กรุณาระบุเลข PO ก่อนสร้างออเดอร์";
    requestState.convertResult = null;
    renderPartnerRequestsSheet();
    return;
  }

  requestState.convertPoNumber = poNumber;
  requestState.convertSubmitting = true;
  requestState.convertError = "";
  requestState.convertResult = null;
  renderPartnerRequestsSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "convertPartnerRequestToOrder");
    form.append("token", state.admin.token);
    form.append("requestId", cleanRequestId);
    form.append("poNumber", poNumber);

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || "สร้างออเดอร์จากคำขอไม่สำเร็จ");
    }

    requestState.convertResult = json.data || null;
    requestState.convertError = "";
    requestState.convertPoNumber = "";
    showToast("สร้างออเดอร์แล้ว รออนุมัติใน Pending Orders", "success");

    try {
      state.admin.orders = await fetchOrders();
    } catch (refreshErr) {
      console.error("refresh orders after partner conversion failed:", refreshErr);
    }
  } catch (err) {
    console.error(err);
    requestState.convertResult = null;
    requestState.convertError = err.message || "สร้างออเดอร์จากคำขอไม่สำเร็จ";
    showToast(requestState.convertError, "error");
  } finally {
    requestState.convertSubmitting = false;
    renderPartnerRequestsSheet();
  }
}

async function loadPartnerRequests() {
  if (!ensureAdminSessionForPartnerRequests()) return;

  const requestState = state.admin.partnerRequests;
  requestState.loading = true;
  requestState.error = "";
  requestState.view = "list";
  renderPartnerRequestsSheet();

  try {
    const form = new URLSearchParams();
    form.append("action", "listPartnerRequests");
    form.append("token", state.admin.token);
    form.append("limit", String(requestState.limit || 50));
    form.append("offset", String(requestState.offset || 0));
    if (requestState.status && requestState.status !== "all") {
      form.append("status", requestState.status);
    }
    if (String(requestState.partnerId || "").trim()) {
      form.append("partnerId", requestState.partnerId.trim());
    }
    if (String(requestState.q || "").trim()) {
      form.append("q", requestState.q.trim());
    }

    const res = await fetchWithTimeout(API_URL, {
      method: "POST",
      body: form
    }, 30000);
    const json = await res.json();

    if (json?.success !== true) {
      if (isAuthError(json?.error)) {
        showToast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่อีกครั้ง", "warning");
        exitAdmin({ silent: true });
        return;
      }
      throw new Error(json?.error || json?.message || "โหลดคำขอคู่ค้าไม่สำเร็จ");
    }

    requestState.requests = Array.isArray(json.data?.requests)
      ? json.data.requests
      : [];
    requestState.total = Number(json.data?.total || 0);
    requestState.limit = Number(json.data?.limit || requestState.limit || 50);
    requestState.offset = Number(json.data?.offset || 0);
    requestState.error = "";
  } catch (err) {
    console.error(err);
    requestState.requests = [];
    requestState.total = 0;
    requestState.error = err.message || "โหลดคำขอคู่ค้าไม่สำเร็จ";
  } finally {
    requestState.loading = false;
    renderPartnerRequestsSheet();
  }
}

/* =========================================================
   🔤 THAI BAHT TEXT CONVERTER
========================================================= */
function numberToThaiText(num) {
  if (isNaN(num)) return "";

  const digit = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
  const position = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];

  function convert(n) {
    let result = "";
    const str = parseInt(n, 10).toString();
    const len = str.length;

    for (let i = 0; i < len; i++) {
      const d = parseInt(str.charAt(i));
      const pos = len - i - 1;

      if (d === 0) continue;

      if (pos === 0 && d === 1 && len > 1) {
        result += "เอ็ด";
      } else if (pos === 1 && d === 2) {
        result += "ยี่";
      } else if (pos === 1 && d === 1) {
        result += "";
      } else {
        result += digit[d];
      }

      result += position[pos];
    }

    return result;
  }

  if (num === 0) return "ศูนย์บาทถ้วน";

  return convert(num) + "บาทถ้วน";
}

function exportOrderPNG() {
  const order = state.lastOrder;
  if (!order) return;

  /* ================= A4 CONFIG (FIXED) ================= */
  const cfg = {
    width: 794,          // A4 width @96dpi
    height: 1123,        // 🔥 A4 height fixed
    padding: 64,
    titleSize: 32,
    textSize: 18,
    lineHeight: 34
  };
  /* ================= CANVAS SIZE ================= */
  const items = Array.isArray(order.items) ? order.items : [];

  const po = order.poNumber
    ? String(order.poNumber)
    : "-";

  const canvas = document.createElement("canvas");
  canvas.width = cfg.width;
  canvas.height = cfg.height;  // 🔥 FIXED A4

  const ctx = canvas.getContext("2d");

  /* ================= BACKGROUND ================= */
  ctx.fillStyle = "#f2f2f7";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

/* ================= CARD ================= */
  ctx.fillStyle = "#ffffff";

  // ✅ Canvas shadow uses token (sync light/dark)
  const getToken = (name) =>
    getComputedStyle(document.documentElement)
      .getPropertyValue(name)
      .trim();

  const parseShadowToken = (v) => {
    // expects: "0 10px 30px rgba(0,0,0,.08)" (single shadow)
    const m = String(v).match(
      /^\s*(-?\d+(?:\.\d+)?)px?\s+(-?\d+(?:\.\d+)?)px?\s+(\d+(?:\.\d+)?)px?\s+(.+)\s*$/i
    );
    if (!m) return null;
    return {
      x: Number(m[1]) || 0,
      y: Number(m[2]) || 0,
      blur: Number(m[3]) || 0,
      color: (m[4] || "rgba(0,0,0,.08)").trim()
    };
  };

  let canvasShadowRaw =
    getToken("--shadow-canvas-card") || getToken("--shadow-card");

  // ✅ resolve var(--shadow-*) for custom properties (Safari/Chrome may return literal "var(...)")
  const varMatch = String(canvasShadowRaw).match(/var\((--[^)]+)\)/);
  if (varMatch && varMatch[1]) {
    canvasShadowRaw = getToken(varMatch[1]) || canvasShadowRaw;
  }
  const sh = parseShadowToken(canvasShadowRaw);
  if (sh) {
    ctx.shadowColor = sh.color;
    ctx.shadowBlur = sh.blur;
    ctx.shadowOffsetX = sh.x;
    ctx.shadowOffsetY = sh.y;
  } else {
    // fallback (should rarely happen)
    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 6;
  }

  ctx.beginPath();

  if (typeof ctx.roundRect === "function") {
    ctx.roundRect(8, 8, canvas.width - 16, canvas.height - 16, 18);
  } else {
    const x = 8;
    const y0 = 8;
    const w = canvas.width - 16;
    const h = canvas.height - 16;
    const r = 18;

    ctx.moveTo(x + r, y0);
    ctx.lineTo(x + w - r, y0);
    ctx.quadraticCurveTo(x + w, y0, x + w, y0 + r);
    ctx.lineTo(x + w, y0 + h - r);
    ctx.quadraticCurveTo(x + w, y0 + h, x + w - r, y0 + h);
    ctx.lineTo(x + r, y0 + h);
    ctx.quadraticCurveTo(x, y0 + h, x, y0 + h - r);
    ctx.lineTo(x, y0 + r);
    ctx.quadraticCurveTo(x, y0, x + r, y0);
  }

  ctx.fill();
  ctx.shadowColor = "transparent";

  /* ================= TEXT ================= */
  let y = cfg.padding + cfg.lineHeight;
  ctx.fillStyle = "#000";

  /* ===== TITLE ===== */
  ctx.font = `700 ${cfg.titleSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillText("ใบสั่งซื้อ", cfg.padding, y);
  y += cfg.lineHeight + 8;

  /* ===== HEADER BASE LINE ===== */
  const headerTopY = y;

  /* ===== COMPANY BLOCK ===== */
ctx.font = `700 ${cfg.textSize + 4}px -apple-system`;
ctx.fillText("ร้านล้อพาณิชย์", cfg.padding, headerTopY);

ctx.fillText(
   "7/13 หมู่ 5",
   cfg.padding,
   headerTopY + cfg.lineHeight
 );
 ctx.fillText(
   "ต.หนองแขม อ.หนองแค",
   cfg.padding,
   headerTopY + cfg.lineHeight * 2
 );
 ctx.fillText(
   "จ.สระบุรี 18140",
   cfg.padding,
   headerTopY + cfg.lineHeight * 3
 );

/* ===== DOCUMENT META ===== */
const rightX = canvas.width - cfg.padding;

  ctx.textAlign = "right";
  ctx.fillText(`เลขที่: ${order.orderId}`, rightX, headerTopY);
 ctx.fillText(`PO: ${po}`, rightX, headerTopY + cfg.lineHeight);
 const docDate = new Date(order.createdAt);
 ctx.fillText(
   `วันที่: ${docDate.toLocaleDateString("th-TH")}`,
   rightX,
   headerTopY + cfg.lineHeight * 2
 );

  ctx.textAlign = "left";
  y = headerTopY + cfg.lineHeight * 5;


  /* ===== DIVIDER ===== */
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

/* ================= ITEMS (GRID TABLE) ================= */
  const tableTopY = y;
  const rowHeight = 42;

  const col = {
    no: cfg.padding,
    name: cfg.padding + 60,
    qty: canvas.width - cfg.padding - 260,
    price: canvas.width - cfg.padding - 180,
    total: canvas.width - cfg.padding - 90
  };

  ctx.font = `700 ${cfg.textSize}px -apple-system`;

  // HEADER
  ctx.fillText("ลำดับ", col.no, y);
  ctx.fillText("รายการสินค้า", col.name, y);
  ctx.fillText("จำนวน", col.qty, y);
  ctx.fillText("ราคา", col.price, y);
  ctx.fillText("รวม", col.total, y);

  y += 16;

  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();

  y += rowHeight - 16;

  ctx.font = `${cfg.textSize}px -apple-system`;

  items.forEach((i, index) => {
    const total = Number(i.price) * Number(i.qty);

    ctx.fillText(String(index + 1), col.no, y);

    // truncate name (single line grid)
    let name = `[${i.productId}] ${i.name}`;
    while (ctx.measureText(name).width > (col.qty - col.name - 20)) {
      name = name.slice(0, -1);
    }

    ctx.fillText(name, col.name, y);

    ctx.textAlign = "right";
    ctx.fillText(String(i.qty), col.qty + 40, y);
    ctx.fillText(`฿${Number(i.price).toLocaleString()}`, col.price + 60, y);
    ctx.fillText(`฿${total.toLocaleString()}`, col.total + 80, y);
    ctx.textAlign = "left";

    // horizontal line
    ctx.beginPath();
    ctx.moveTo(cfg.padding, y + 16);
    ctx.lineTo(canvas.width - cfg.padding, y + 16);
    ctx.strokeStyle = "#ddd";
    ctx.stroke();

    y += rowHeight;
  });
  
  /* ===== DIVIDER ===== */
  y += 4;
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

  /* ================= TOTAL ================= */
  ctx.font = `700 ${cfg.textSize + 4}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const safeTotal = Number(order.total) || 0;
  const totalText = `ยอดรวม: ฿${safeTotal.toLocaleString()}`;
  const tw = ctx.measureText(totalText).width;
  ctx.fillText(
    totalText,
    canvas.width - cfg.padding - tw,

  );

  /* ===== THAI TEXT TOTAL ===== */
  y += cfg.lineHeight;
  ctx.font = `${cfg.textSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const thaiText = `(${numberToThaiText(safeTotal)})`;
  const thaiWidth = ctx.measureText(thaiText).width;
  ctx.fillText(

  );

  /* ================= DOWNLOAD (FIXED) ================= */
  const a = document.createElement("a");
  a.download = `order-${order.orderId}.png`;

  // 🔴 FIX: ต้อง append เข้า DOM (Mobile Safari / Chrome policy)
 document.body.appendChild(a);

 document.body.removeChild(a);

async function restoreAdminSessionIfValid() {
  const restored = loadAdminSession();
  if (!restored?.token || !restored?.expiredAt) return false;

  // expired guard
  if (Date.now() > new Date(restored.expiredAt).getTime()) {
    clearAdminSession();
    return false;
  }

  try {
    // ✅ lightweight validate (POST ให้ตรง backend)
    const form = new URLSearchParams();
    form.append("action", "orders");
    form.append("token", restored.token);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (json?.success === true) {
      state.admin.loggedIn = true;
      state.admin.user = restored.username || null;
      state.admin.token = restored.token;
      state.admin.expiredAt = restored.expiredAt;

      // ❗ ไม่ set state.mode ที่นี่ (กันกระทบ flow)
      return true;
    }
  } catch (e) {

 function handleHeaderScroll(){

   const currentY = Math.max(0, window.scrollY); // 🔴 FIX: clamp negative scroll (iOS bounce)

   const delta = currentY - (_lastScrollY ?? currentY);
   const deltaTime = (now - (_lastScrollTime ?? now)) || 16;      // 🔴 NEW
   const velocity = delta / deltaTime;                 // 🔴 NEW

// 🔴 CHANGED: micro scroll noise guard (แต่ต้อง "โชว์ bar คืน" เมื่อหยุดเลื่อน)
   if (Math.abs(delta) < 1) {
     // ✅ FIX: ตอน delta เล็ก = "อย่าเปลี่ยนสถานะซ่อน/โชว์"
     // ยกเว้นกรณีอยู่บนสุดจริง ๆ ค่อยบังคับให้โชว์

   } 
   
if (header){

      header.classList.add("scrolled");

  }
   
  /* ================= BACK TO TOP SHOW/HIDE ================= */
  if (topBtn){
    // ✅ โผล่เมื่อเลื่อนลงพอสมควร และไม่มี overlay เปิดอยู่
    const shouldShow = currentY > 600 && state.ui.overlayCount === 0;

    /* ================= FLOATING BAR SMART HIDE ================= */
   if (bar && bar.classList.contains("show")) {

     if (currentY <= 10) {
       bar.classList.remove("scroll-hide");
     }
     // 🔴 CHANGED: direction-based
    else if (delta > 0) {
       // ⬇️ เลื่อนลง = ซ่อน (กันบังเวลาเลือกสินค้าเพิ่ม)
       bar.classList.add("scroll-hide");
     }
    else if (delta < 0) {
       // ⬆️ เลื่อนขึ้น = โชว์
       bar.classList.remove("scroll-hide");
     }
   }
   
   _lastScrollY = currentY;
   _lastScrollTime = now; // 🔴 NEW
   _headerTicking = false;
 }

 window.addEventListener("scroll", () => {

 // 🔴 ADD: Smart hide เมื่อ scroll ภายใน .sheet (เพราะ window.scrollY ไม่เปลี่ยน)
(function bindSheetScrollSmartHide(){
  const lastTop = new WeakMap(); // เก็บ scrollTop ล่าสุดของแต่ละ sheet

  document.addEventListener("scroll", (e) => {
    const t = e.target;
    if (!t) return;
    const sheetEl = (t.closest && t.closest(".sheet")) || (t.classList && t.classList.contains("sheet") ? t : null);
    if (!sheetEl) return;

    const bar = document.getElementById("floatingBar");
    if (!bar || !bar.classList.contains("show")) return;

   const prev = lastTop.get(sheetEl) ?? sheetEl.scrollTop;
    const d = sheetEl.scrollTop - prev;
    lastTop.set(sheetEl, sheetEl.scrollTop);

    if (Math.abs(d) < 1) return;
    if (d > 2) bar.classList.add("scroll-hide");        // ⬇️ เลื่อนลงใน sheet = ซ่อน
    else if (d < -2) bar.classList.remove("scroll-hide"); // ⬆️ เลื่อนขึ้นใน sheet = โชว์
  }, true); // capture=true เพื่อจับ element scroll
})();

// 🔍 DEBUG: Trace CSS winners for #floatingBar
// เป้าหมาย: หา "rule ไหน" ที่ชนะ opacity/transform จริง
// =========================
window.traceBarCSS = function traceBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[traceBarCSS] #floatingBar not found"); return []; }

  const props = ["opacity","transform","pointer-events"];
  const out = [];

  const tryPushRule = (sheet, rule, ruleIndex, sel) => {
    const style = rule.style;
    const hit = {
      sheet: sheet.href || "[inline <style>]",
      ruleIndex,
      selector: sel,
      cssText: rule.cssText
    };
    // เก็บเฉพาะค่าที่เกี่ยวข้อง
    props.forEach(p => {
      const v = style.getPropertyValue(p);
      if (v) {
        hit[p] = v.trim();
        hit[p + "_important"] = style.getPropertyPriority(p) === "important";
      }
    });
    // ดันเฉพาะ rule ที่แตะ props จริง
    if (props.some(p => hit[p])) out.push(hit);
  };

  for (const sheet of Array.from(document.styleSheets)) {
    let rules;
    try { rules = sheet.cssRules; } catch(e) { continue; } // cross-origin
    if (!rules) continue;

    for (let i = 0; i < rules.length; i++) {
      const r = rules[i];
      if (!r || !r.selectorText) continue;
      // รองรับ selector หลายตัวคั่นด้วย comma
      const sels = r.selectorText.split(",").map(s => s.trim()).filter(Boolean);
      for (const sel of sels) {
        try {
          if (bar.matches(sel)) {
            tryPushRule(sheet, r, i, sel);
          }
        } catch(_) {}
      }
    }
  }

  const cs = getComputedStyle(bar);
  console.log("===== traceBarCSS =====");
  console.log("className:", bar.className);
  console.table({
    computed_opacity: cs.opacity,
    computed_transform: cs.transform,
    computed_pointerEvents: cs.pointerEvents
  });
  console.table(out);
  return out;
};

// =========================
// 🔍 DEBUG: Watch class changes แล้ว trace ทันที

// =========================
window.watchBarCSS = function watchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[watchBarCSS] #floatingBar not found"); return; }
  if (bar.__watchingCSS) { console.warn("[watchBarCSS] already watching"); return; }
  bar.__watchingCSS = true;

  const mo = new MutationObserver(() => {
    // trace หลัง DOM อัปเดตแล้ว 1 เฟรม (กันอ่านค่าก่อน apply)
    requestAnimationFrame(() => window.traceBarCSS());
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["class","style"] });
  bar.__watchMO = mo;
  console.log("✅ watching #floatingBar class/style changes");
  window.traceBarCSS();
};

// =========================
// 🕵️ SPY: ใครเป็นคนแก้ class/style ของ #floatingBar
// ใช้: spyBar(); แล้วลองเลื่อน/เปิดปิด sheet/เพิ่มของในตะกร้า
// =========================
window.spyBar = function spyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[spyBar] #floatingBar not found"); return; }
  if (bar.__spyInstalled) { console.warn("[spyBar] already installed"); return; }
  bar.__spyInstalled = true;

  // 1) spy classList.add/remove/toggle
  const cl = bar.classList;
  ["add","remove","toggle"].forEach((m) => {
    const orig = cl[m].bind(cl);
    cl[m] = (...args) => {
      console.groupCollapsed(`🧩 [spyBar] classList.${m}(${args.join(", ")})  | before="${bar.className}"`);
      console.trace();
      const r = orig(...args);
      console.log(`after="${bar.className}"`);
      console.groupEnd();
      return r;
    };
  });

  // 2) spy style attribute changes (รวมถึง bar.style.opacity/transform ที่ไปลงเป็น inline)
  const mo = new MutationObserver((list) => {
    for (const it of list) {
      if (it.type === "attributes" && it.attributeName === "style") {
        console.groupCollapsed(`🎨 [spyBar] style changed: ${bar.getAttribute("style") || "(empty)"}`);
        console.trace();
        console.groupEnd();
      }
    }
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["style"] });
  bar.__spyMO = mo;

  console.log("✅ spyBar installed. Now reproduce the bug.");
};

window.unspyBar = function unspyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) return;
  if (bar.__spyMO) bar.__spyMO.disconnect();
  bar.__spyMO = null;
  bar.__spyInstalled = false;
  console.log("🛑 spyBar removed (note: classList methods won't auto-restore after override)");
};  

window.unwatchBarCSS = function unwatchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar || !bar.__watchMO) return;
  bar.__watchMO.disconnect();
  bar.__watchMO = null;
  bar.__watchingCSS = false;
  console.log("🛑 stop watching #floatingBar");
};
